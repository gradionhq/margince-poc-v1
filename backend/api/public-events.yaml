openapi: 3.1.0
info:
  title: Margince Public Event Payloads
  version: "1"
  description: >-
    The public, transport-agnostic projection of Margince domain events — the
    strict contract for outbound webhook delivery. This file is components-only
    (no paths, no webhooks block): it is compiled to typed Go structs by
    backend/tools/gen-payloads (into internal/contracts/webhookpayloads_gen.go)
    and to TypeScript by the frontend's gen:events script. It is kept SEPARATE
    from api/crm.yaml on purpose — crm.yaml's webhooks: block is silently pruned
    by kin-openapi, and enabling global skip-prune there trips a pre-existing
    ApprovalToken name collision. An isolated file sidesteps both.

    Only fields safe to expose beyond the trust boundary appear here. Internal
    envelope metadata (audit_log_id, causation_id, passport_id, on_behalf_of,
    workspace_id) is deliberately absent so a schema/code mismatch fails to
    compile rather than leaking internals over the wire.
components:
  schemas:
    SubscribableEventType:
      type: string
      description: >-
        The closed set of domain events a webhook subscription can select.
        Phase 4 fills this out family by family; today it carries the
        pilot event plus the deal family (Task 5a-i) and the offer family
        (Task 5a-ii).
      enum:
        - deal.created
        - deal.owner_changed
        - deal.stage_changed
        - deal.archived
        - deal.updated
        - deal.restored
        - offer.created
        - offer.sent
        - offer.accepted
        - offer.rejected
        - offer.superseded

    WebhookActor:
      type: object
      description: Who or what caused the event, as exposed publicly.
      required: [type]
      properties:
        type:
          type: string
          description: Actor kind (e.g. human, agent, connector).
      additionalProperties: false

    WebhookEntityRef:
      type: object
      description: The primary entity the event concerns.
      required: [type, id]
      properties:
        type:
          type: string
          description: Entity kind (e.g. deal, person, organization).
        id:
          type: string
          format: uuid
          description: Stable identifier of the entity.
      additionalProperties: false

    WebhookDeliveryEnvelope:
      type: object
      description: >-
        The public wrapper around every delivered event payload. This is the
        exact JSON shape a subscriber receives; it carries no internal metadata.
      required:
        - event_id
        - type
        - version
        - occurred_at
        - actor
        - entity
        - correlation_id
        - data
      properties:
        event_id:
          type: string
          format: uuid
          description: Unique id of this event occurrence.
        type:
          type: string
          description: The event type (a SubscribableEventType value).
        version:
          type: integer
          description: Schema version of the payload in data.
        occurred_at:
          type: string
          format: date-time
          description: When the event occurred (RFC 3339).
        actor:
          $ref: '#/components/schemas/WebhookActor'
        entity:
          $ref: '#/components/schemas/WebhookEntityRef'
        correlation_id:
          type: string
          format: uuid
          description: Correlates all events emitted for one originating request.
        data:
          type: object
          description: The typed event payload (one of the WebhookPayload* schemas).
      additionalProperties: false

    WebhookPayloadDealCreated:
      type: object
      x-event-type: deal.created
      x-entity-type: deal
      x-version: 1
      description: Payload for deal.created — a deal was opened.
      required:
        - name
      properties:
        name:
          type: string
          description: The deal's name at creation.
      additionalProperties: false

    WebhookPayloadDealOwnerChanged:
      type: object
      x-event-type: deal.owner_changed
      x-entity-type: deal
      x-version: 1
      description: >-
        Payload for deal.owner_changed — the deal's owner was reassigned.
        Emitted instead of (never alongside) deal.updated for the owner_id
        field (events.md §5.3).
      required:
        - to_owner_id
      properties:
        to_owner_id:
          type: string
          format: uuid
          description: The new owner.
        from_owner_id:
          type: string
          format: uuid
          description: The previous owner (absent when the deal had none).
      additionalProperties: false

    WebhookPayloadDealStageChanged:
      type: object
      x-event-type: deal.stage_changed
      x-entity-type: deal
      x-version: 1
      description: >-
        Payload for deal.stage_changed — a deal advanced between stages.
        Carries the amount/win-probability snapshot frozen at the moment
        of the move so consumers (the trajectory view, the overnight
        stalled/forecast sweep, the automation trigger keyed on
        to_status) never need a read-back.
      required:
        - to_stage_id
        - from_status
        - to_status
        - win_probability
      properties:
        from_stage_id:
          type: string
          format: uuid
          description: Stage the deal left (absent on first placement).
        to_stage_id:
          type: string
          format: uuid
          description: Stage the deal entered.
        from_status:
          type: string
          description: Deal status before the move (open | won | lost).
        to_status:
          type: string
          description: >-
            Deal status after the move (open | won | lost) — the field
            the automation trigger keys on (automation/handlers_event.go).
        amount_minor_at_change:
          type: integer
          format: int64
          description: The deal's amount, frozen at the moment of the move.
        currency_at_change:
          type: string
          description: The deal's currency, frozen at the moment of the move.
        win_probability:
          type: integer
          description: The target stage's win probability, frozen at the moment of the move.
      additionalProperties: false

    WebhookPayloadDealArchived:
      type: object
      x-event-type: deal.archived
      x-entity-type: deal
      x-version: 1
      description: Payload for deal.archived — a deal was archived. Carries no data.
      additionalProperties: false

    WebhookPayloadDealUpdated:
      type: object
      x-event-type: deal.updated
      x-entity-type: deal
      x-version: 1
      description: >-
        Payload for deal.updated — an OPEN envelope: its emit sites carry
        divergent shapes (a flat column patch, an accepted-offer amount
        sync, a close-date-correction note, a relationship delta), so the
        honest shape is a change-set map rather than a fixed field list.
      required:
        - changed_fields
      properties:
        changed_fields:
          type: object
          additionalProperties: true
          description: >-
            Field name → new value for whatever this update touched,
            incl. runtime cf_* custom fields.
      additionalProperties: false

    WebhookPayloadDealRestored:
      type: object
      x-event-type: deal.restored
      x-entity-type: deal
      x-version: 1
      description: >-
        Payload for deal.restored. Never emitted today (no restore path
        exists for deal); the schema is published so the type is a valid
        subscription target and the coverage gate can name it explicitly
        rather than silently omitting it.
      additionalProperties: false

    WebhookPayloadOfferCreated:
      type: object
      x-event-type: offer.created
      x-entity-type: offer
      x-version: 1
      description: >-
        Payload for offer.created — a new Angebot revision was opened
        (either the first revision, via CreateOffer, or a fresh draft
        revision minted by RegenerateOffer).
      required:
        - offer_id
        - deal_id
        - revision
        - currency
        - source
        - captured_by
      properties:
        offer_id:
          type: string
          format: uuid
          description: The created offer revision.
        deal_id:
          type: string
          format: uuid
          description: The deal this offer belongs to.
        revision:
          type: integer
          description: This offer's revision number (1 for a first offer).
        currency:
          type: string
          description: The offer's currency.
        source:
          type: string
          description: Where this offer originated (e.g. manual, ai).
        captured_by:
          type: string
          description: The principal that created this revision.
      additionalProperties: false

    WebhookPayloadOfferSent:
      type: object
      x-event-type: offer.sent
      x-entity-type: offer
      x-version: 1
      description: >-
        Payload for offer.sent — a draft offer left the workspace. Carries
        the FX rate frozen at send time (RT-PR-C2) so consumers never need
        a read-back for the native-currency-to-base conversion.
      required:
        - offer_id
        - deal_id
        - fx_rate_to_base
      properties:
        offer_id:
          type: string
          format: uuid
          description: The sent offer.
        deal_id:
          type: string
          format: uuid
          description: The deal this offer belongs to.
        revision:
          type: integer
          description: This offer's revision number.
        gross_minor:
          type: integer
          format: int64
          description: The offer's gross total at send time.
        fx_rate_to_base:
          type: string
          description: >-
            Native→base rate frozen at send (RT-PR-C2). Decimal-as-string
            to avoid float rounding.
        valid_until:
          type: string
          format: date
          description: The offer's validity date (absent when unset).
      additionalProperties: false

    WebhookPayloadOfferAccepted:
      type: object
      x-event-type: offer.accepted
      x-entity-type: offer
      x-version: 1
      description: >-
        Payload for offer.accepted — a sent offer was accepted. The deal's
        headline amount is synced from this offer's gross in the same
        transaction (see deal.updated on the paired deal entity).
      required:
        - offer_id
        - deal_id
      properties:
        offer_id:
          type: string
          format: uuid
          description: The accepted offer.
        deal_id:
          type: string
          format: uuid
          description: The deal this offer belongs to.
        revision:
          type: integer
          description: This offer's revision number.
        gross_minor:
          type: integer
          format: int64
          description: The offer's gross total, now also the deal's amount.
      additionalProperties: false

    WebhookPayloadOfferRejected:
      type: object
      x-event-type: offer.rejected
      x-entity-type: offer
      x-version: 1
      description: Payload for offer.rejected — a sent offer was rejected.
      required:
        - offer_id
        - deal_id
      properties:
        offer_id:
          type: string
          format: uuid
          description: The rejected offer.
        deal_id:
          type: string
          format: uuid
          description: The deal this offer belongs to.
        revision:
          type: integer
          description: This offer's revision number.
        reason:
          type: string
          description: The optional rejection reason (absent when none was given).
      additionalProperties: false

    WebhookPayloadOfferSuperseded:
      type: object
      x-event-type: offer.superseded
      x-entity-type: offer
      x-version: 1
      description: >-
        Payload for offer.superseded — a sent offer was regenerated into a
        fresh draft revision (B-E03.19) and marked superseded; the new
        revision arrives as its own offer.created event.
      required:
        - offer_id
        - deal_id
        - to_revision
      properties:
        offer_id:
          type: string
          format: uuid
          description: The superseded (prior) offer revision.
        deal_id:
          type: string
          format: uuid
          description: The deal this offer belongs to.
        from_revision:
          type: integer
          description: The superseded revision number.
        to_revision:
          type: integer
          description: The new revision number minted by the regenerate.
      additionalProperties: false
