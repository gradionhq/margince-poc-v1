    PublicEventApprovalDecided:
      type: object
      x-event-type: approval.decided
      x-entity-type: approval
      x-version: 1
      description: >-
        Payload for approval.decided — a human approved or rejected a
        staged approval (approvals/decide.go). verdict and edited_change
        are decoded BY NAME outside this module — automation's
        blocked-run consumer matches verdict (automation/engine_blocked.go),
        the Surface-B runner's resume consumer reads edited_change
        (compose/runnerservice.go) — see the JSON-tag regression tests in
        internal/modules/webhooks. edited/diff_hash/edited_change are
        present only on the ADR-0036 §4 modify-then-approve arm, where the
        human's edited payload replaced the staged change under a freshly
        computed diff_hash.
      required:
        - kind
        - verdict
        - decided_by
      properties:
        kind:
          type: string
          description: The decided staging's kind.
        verdict:
          type: string
          description: The decision outcome (approved | rejected).
        decided_by:
          type: string
          format: uuid
          description: The deciding human's user id.
        edited:
          type: boolean
          description: >-
            True when the human edited the proposed change before
            approving (present only on the modify-then-approve arm).
        diff_hash:
          type: string
          description: >-
            The edited change's freshly computed diff_hash (present only
            on the modify-then-approve arm).
        edited_change:
          type: object
          additionalProperties: true
          description: >-
            The human's edited version of the proposed change (present
            only on the modify-then-approve arm) — an OPEN object: its
            shape is whatever the staged kind's proposed_change carries,
            so it stays a raw map rather than a narrowly typed struct
            (the runner's resume consumer decodes it as json.RawMessage
            off the wire; a fixed struct here would drop fields a future
            staging kind adds).
      additionalProperties: false

