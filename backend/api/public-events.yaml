        resolved_org_id:
          type: string
          format: uuid
          description: The organization the signal resolved to (absent when dropped or ambiguous).
        resolved_person_id:
          type: string
          format: uuid
          description: >-
            The consent-gated person the signal resolved to (absent unless
            an existing person under a recorded consent grant matched).
        matched_on:
          type: string
          description: The match basis of the top candidate (domain | name | prior_interaction).
        match_confidence:
          type: number
          description: The top candidate's match confidence (0–1).
      additionalProperties: false

