    WebhookPayloadRetentionApplied:
      type: object
      x-event-type: retention.applied
      x-entity-type: dynamic
      x-version: 1
      description: >-
        Payload for retention.applied — a retention/erasure action ran
        against one record. Three emit sites, three different runtime
        subjects: the embed-call sweep (ai_call), a workspace's configured
        retention policy's object type (activity | deal | lead | person |
        ai_call_payload), and Art. 17 erasure (person) — none fixed enough
        for this schema to name, so this is dynamic-entity (contract
        `x-entity-type: dynamic`): the generated EntityType() is unused,
        and each emit site supplies its own runtime entity type through
        storekit.EmitEventForEntity. policy/reason are a union across the
        three sites — the embed-call sweep sets neither, the policy-driven
        sweep sets policy only, Art. 17 erasure sets reason only.
      required:
