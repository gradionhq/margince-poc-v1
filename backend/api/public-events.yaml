openapi: 3.1.0
info:
  title: Margince Public Event Payloads
  version: "1"
  description: >-
    The public, transport-agnostic projection of Margince domain events — the
    strict contract for outbound webhook delivery. This file is components-only
    (no paths, no webhooks block): it is compiled to typed Go structs by
    backend/tools/gen-payloads (into internal/contracts/publicevents_gen.go)
    and to TypeScript by the frontend's gen:events script. It is kept SEPARATE
    from api/crm.yaml on purpose — crm.yaml's webhooks: block is silently pruned
    by kin-openapi, and enabling global skip-prune there trips a pre-existing
    ApprovalToken name collision. An isolated file sidesteps both.

    Only fields safe to expose beyond the trust boundary appear here. Internal
    envelope metadata (audit_log_id, causation_id, passport_id, on_behalf_of,
    workspace_id) is deliberately absent so a schema/code mismatch fails to
    compile rather than leaking internals over the wire.
components:
  schemas:
    SubscribableEventType:
      type: string
      description: >-
        The closed set of domain event types a webhook subscription may
        select — every subscribable event across the deal, offer,
        pipeline/stage, person/organization, lead, activities,
        consent/privacy, signals, ai voice, identity, and overlay families.
        A subscription's event-type filter is validated against this set;
        an unlisted type cannot be subscribed to.
      enum:
        - deal.created
        - deal.owner_changed
        - deal.stage_changed
        - deal.archived
        - deal.updated
        - deal.restored
        - offer.created
        - offer.sent
        - offer.accepted
        - offer.rejected
        - offer.superseded
        - pipeline.created
        - pipeline.updated
        - pipeline.archived
        - stage.created
        - stage.updated
        - stage.archived
        - person.created
        - person.archived
        - person.merged
        - person.updated
        - person.restored
        - organization.created
        - organization.archived
        - organization.merged
        - organization.updated
        - lead.created
        - lead.disqualified
        - lead.promoted
        - lead.updated
        - activity.captured
        - activity.archived
        - activity.updated
        - engagement.reply
        - consent.changed
        - retention.applied
        - signal.detected
        - signal.resolved
        - voice.profile_created
        - voice.profile_updated
        - voice.profile_archived
        - voice.corpus_changed
        - voice.build_changed
        - voice.version_changed
        - voice.draft_outcome_recorded
        - user.invited
        - user.deactivated
        - user.reactivated
        - role.changed
        - passport.revoked
        - onboarding.state_changed
        - mirror.conflict
        - mirror.budget_degraded
        - mirror.deleted
        - mirror.write_rejected
        - incumbent.connected
        - incumbent.disconnected
        - approval.requested
        - approval.decided
        - coldstart.read_back_proposed
        - coldstart.accepted
        - coldstart.rejected
        - audit.appended

    PublicEventActor:
      type: object
      description: Who or what caused the event, as exposed publicly.
      required: [type]
      properties:
        type:
          type: string
          description: Actor kind (e.g. human, agent, connector).
      additionalProperties: false

    PublicEventEntityRef:
      type: object
      description: The primary entity the event concerns.
      required: [type, id]
      properties:
        type:
          type: string
          description: Entity kind (e.g. deal, person, organization).
        id:
          type: string
          format: uuid
          description: Stable identifier of the entity.
      additionalProperties: false

    PublicEventEnvelope:
      type: object
      description: >-
        The public wrapper around every delivered event payload. This is the
        exact JSON shape a subscriber receives; it carries no internal metadata.
      required:
        - event_id
        - type
        - version
        - occurred_at
        - actor
        - entity
        - correlation_id
        - data
      properties:
        event_id:
          type: string
          format: uuid
          description: Unique id of this event occurrence.
        type:
          type: string
          description: The event type (a SubscribableEventType value).
        version:
          type: integer
          description: Schema version of the payload in data.
        occurred_at:
          type: string
          format: date-time
          description: When the event occurred (RFC 3339).
        actor:
          $ref: '#/components/schemas/PublicEventActor'
        entity:
          $ref: '#/components/schemas/PublicEventEntityRef'
        correlation_id:
          type: string
          format: uuid
          description: Correlates all events emitted for one originating request.
        data:
          type: object
          description: The typed event payload (one of the PublicEvent* schemas).
      additionalProperties: false

    PublicEventDealCreated:
      type: object
      x-event-type: deal.created
      x-entity-type: deal
      x-version: 1
      description: Payload for deal.created — a deal was opened.
      required:
        - name
      properties:
        name:
          type: string
          description: The deal's name at creation.
      additionalProperties: false

    PublicEventDealOwnerChanged:
      type: object
      x-event-type: deal.owner_changed
      x-entity-type: deal
      x-version: 1
      description: >-
        Payload for deal.owner_changed — the deal's owner was reassigned.
        Emitted instead of (never alongside) deal.updated for the owner_id
        field (events.md §5.3).
      required:
        - to_owner_id
      properties:
        to_owner_id:
          type: string
          format: uuid
          description: The new owner.
        from_owner_id:
          type: string
          format: uuid
          description: The previous owner (absent when the deal had none).
      additionalProperties: false

    PublicEventDealStageChanged:
      type: object
      x-event-type: deal.stage_changed
      x-entity-type: deal
      x-version: 1
      description: >-
        Payload for deal.stage_changed — a deal advanced between stages.
        Carries the amount/win-probability snapshot frozen at the moment
        of the move so consumers (the trajectory view, the overnight
        stalled/forecast sweep, the automation trigger keyed on
        to_status) never need a read-back.
      required:
        - to_stage_id
        - from_status
        - to_status
        - win_probability
      properties:
        from_stage_id:
          type: string
          format: uuid
          description: Stage the deal left (absent on first placement).
        to_stage_id:
          type: string
          format: uuid
          description: Stage the deal entered.
        from_status:
          type: string
          description: Deal status before the move (open | won | lost).
        to_status:
          type: string
          description: >-
            Deal status after the move (open | won | lost) — the field
            the automation trigger keys on (automation/handlers_event.go).
        amount_minor_at_change:
          type: integer
          format: int64
          description: The deal's amount, frozen at the moment of the move.
        currency_at_change:
          type: string
          description: The deal's currency, frozen at the moment of the move.
        win_probability:
          type: integer
          description: The target stage's win probability, frozen at the moment of the move.
      additionalProperties: false

    PublicEventDealArchived:
      type: object
      x-event-type: deal.archived
      x-entity-type: deal
      x-version: 1
      description: Payload for deal.archived — a deal was archived. Carries no data.
      additionalProperties: false

    PublicEventDealUpdated:
      type: object
      x-event-type: deal.updated
      x-entity-type: deal
      x-version: 1
      description: >-
        Payload for deal.updated — an OPEN envelope: its emit sites carry
        divergent shapes (a flat column patch, an accepted-offer amount
        sync, a close-date-correction note, a relationship delta), so the
        honest shape is a change-set map rather than a fixed field list.
      required:
        - changed_fields
      properties:
        changed_fields:
          type: object
          additionalProperties: true
          description: >-
            What this update touched, incl. runtime cf_* custom fields.
            The value shape depends on the emit site: a column patch
            carries a flat field → new-value entry, while the
            recompute/routing/relationship sites carry a `{delta: {...}}`
            sub-object (occasionally with a sibling `source`). Read a
            key's value as either form.
      additionalProperties: false

    PublicEventDealRestored:
      type: object
      x-event-type: deal.restored
      x-entity-type: deal
      x-version: 1
      description: >-
        Payload for deal.restored. Never emitted today (no restore path
        exists for deal); the schema is published so the type is a valid
        subscription target and the coverage gate can name it explicitly
        rather than silently omitting it.
      additionalProperties: false

    PublicEventOfferCreated:
      type: object
      x-event-type: offer.created
      x-entity-type: offer
      x-version: 1
      description: >-
        Payload for offer.created — a new Angebot revision was opened
        (either the first revision, via CreateOffer, or a fresh draft
        revision minted by RegenerateOffer).
      required:
        - offer_id
        - deal_id
        - revision
        - currency
        - source
        - captured_by
      properties:
        offer_id:
          type: string
          format: uuid
          description: The created offer revision.
        deal_id:
          type: string
          format: uuid
          description: The deal this offer belongs to.
        revision:
          type: integer
          description: This offer's revision number (1 for a first offer).
        currency:
          type: string
          description: The offer's currency.
        source:
          type: string
          description: Where this offer originated (e.g. manual, ai).
        captured_by:
          type: string
          description: The principal that created this revision.
      additionalProperties: false

    PublicEventOfferSent:
      type: object
      x-event-type: offer.sent
      x-entity-type: offer
      x-version: 1
      description: >-
        Payload for offer.sent — a draft offer left the workspace. Carries
        the FX rate frozen at send time (RT-PR-C2) so consumers never need
        a read-back for the native-currency-to-base conversion.
      required:
        - offer_id
        - deal_id
        - fx_rate_to_base
      properties:
        offer_id:
          type: string
          format: uuid
          description: The sent offer.
        deal_id:
          type: string
          format: uuid
          description: The deal this offer belongs to.
        revision:
          type: integer
          description: This offer's revision number.
        gross_minor:
          type: integer
          format: int64
          description: The offer's gross total at send time.
        fx_rate_to_base:
          type: string
          description: >-
            Native→base rate frozen at send (RT-PR-C2). Decimal-as-string
            to avoid float rounding.
        valid_until:
          type: string
          format: date
          description: The offer's validity date (absent when unset).
      additionalProperties: false

    PublicEventOfferAccepted:
      type: object
      x-event-type: offer.accepted
      x-entity-type: offer
      x-version: 1
      description: >-
        Payload for offer.accepted — a sent offer was accepted. The deal's
        headline amount is synced from this offer's gross in the same
        transaction (see deal.updated on the paired deal entity).
      required:
        - offer_id
        - deal_id
      properties:
        offer_id:
          type: string
          format: uuid
          description: The accepted offer.
        deal_id:
          type: string
          format: uuid
          description: The deal this offer belongs to.
        revision:
          type: integer
          description: This offer's revision number.
        gross_minor:
          type: integer
          format: int64
          description: The offer's gross total, now also the deal's amount.
      additionalProperties: false

    PublicEventOfferRejected:
      type: object
      x-event-type: offer.rejected
      x-entity-type: offer
      x-version: 1
      description: Payload for offer.rejected — a sent offer was rejected.
      required:
        - offer_id
        - deal_id
      properties:
        offer_id:
          type: string
          format: uuid
          description: The rejected offer.
        deal_id:
          type: string
          format: uuid
          description: The deal this offer belongs to.
        revision:
          type: integer
          description: This offer's revision number.
        reason:
          type: string
          description: The optional rejection reason (absent when none was given).
      additionalProperties: false

    PublicEventOfferSuperseded:
      type: object
      x-event-type: offer.superseded
      x-entity-type: offer
      x-version: 1
      description: >-
        Payload for offer.superseded — a sent offer was regenerated into a
        fresh draft revision (B-E03.19) and marked superseded; the new
        revision arrives as its own offer.created event.
      required:
        - offer_id
        - deal_id
        - to_revision
      properties:
        offer_id:
          type: string
          format: uuid
          description: The superseded (prior) offer revision.
        deal_id:
          type: string
          format: uuid
          description: The deal this offer belongs to.
        from_revision:
          type: integer
          description: The superseded revision number.
        to_revision:
          type: integer
          description: The new revision number minted by the regenerate.
      additionalProperties: false

    PublicEventPipelineCreatedStage:
      type: object
      description: >-
        One initial stage as declared on a pipeline.created event — the
        stage's own stage.created is NOT separately emitted for these
        (events.md §5.3b: one pipeline.created carries the whole set).
      required:
        - name
        - position
        - semantic
      properties:
        name:
          type: string
          description: The stage's name.
        position:
          type: integer
          description: The stage's position within the pipeline.
        semantic:
          type: string
          description: The stage's semantic (open | won | lost).
      additionalProperties: false

    PublicEventPipelineCreated:
      type: object
      x-event-type: pipeline.created
      x-entity-type: pipeline
      x-version: 1
      description: >-
        Payload for pipeline.created — a pipeline was created with its
        initial stage set in the same transaction.
      required:
        - name
        - is_default
        - stages
      properties:
        name:
          type: string
          description: The pipeline's name.
        is_default:
          type: boolean
          description: Whether this pipeline is the workspace default.
        stages:
          type: array
          items: { $ref: '#/components/schemas/PublicEventPipelineCreatedStage' }
          description: The pipeline's initial stages, in the order created.
      additionalProperties: false

    PublicEventPipelineUpdated:
      type: object
      x-event-type: pipeline.updated
      x-entity-type: pipeline
      x-version: 1
      description: >-
        Payload for pipeline.updated — an OPEN envelope: its emit sites
        carry divergent shapes (a flat name/is_default/position patch from
        UpdatePipeline, or a stage_positions reorder map from UpdateStage
        when a stage's position changes), so the honest shape is a
        change-set map rather than a fixed field list.
      required:
        - changed_fields
      properties:
        changed_fields:
          type: object
          additionalProperties: true
          description: >-
            Field name → new value for whatever this update touched
            (name, is_default, position, or stage_positions).
      additionalProperties: false

    PublicEventPipelineArchived:
      type: object
      x-event-type: pipeline.archived
      x-entity-type: pipeline
      x-version: 1
      description: >-
        Payload for pipeline.archived. Never emitted today (no archive
        path exists for pipeline); the schema is published so the type is
        a valid subscription target and the coverage gate can name it
        explicitly rather than silently omitting it.
      additionalProperties: false

    PublicEventStageCreated:
      type: object
      x-event-type: stage.created
      x-entity-type: stage
      x-version: 1
      description: Payload for stage.created — a stage was added to a pipeline.
      required:
        - pipeline_id
        - name
        - position
        - semantic
        - win_probability
      properties:
        pipeline_id:
          type: string
          format: uuid
          description: The pipeline this stage belongs to.
        name:
          type: string
          description: The stage's name.
        position:
          type: integer
          description: The stage's position within the pipeline.
        semantic:
          type: string
          description: The stage's semantic (open | won | lost).
        win_probability:
          type: integer
          description: The stage's win probability (won=100, lost=0, open=0..100).
      additionalProperties: false

    PublicEventStageUpdated:
      type: object
      x-event-type: stage.updated
      x-entity-type: stage
      x-version: 1
      description: >-
        Payload for stage.updated — a BOUNDED delta: UpdateStage's known
        mutable fields (name, semantic, win_probability) each carried only
        when this update touched them. A position change is instead
        published as ONE pipeline.updated with a stage_positions delta
        (never an N-way stage.updated), so position never appears here.
      required:
        - pipeline_id
      properties:
        pipeline_id:
          type: string
          format: uuid
          description: The pipeline this stage belongs to.
        name:
          type: string
          description: The stage's new name (absent when this update did not touch it).
        semantic:
          type: string
          description: >-
            The stage's new semantic (absent when this update did not
            touch it).
        win_probability:
          type: integer
          description: >-
            The stage's new win probability (absent when this update did
            not touch it).
      additionalProperties: false

    PublicEventStageArchived:
      type: object
      x-event-type: stage.archived
      x-entity-type: stage
      x-version: 1
      description: >-
        Payload for stage.archived. Never emitted today (no archive path
        exists for stage); the schema is published so the type is a valid
        subscription target and the coverage gate can name it explicitly
        rather than silently omitting it.
      additionalProperties: false

    PublicEventPersonMergedRelinkCounts:
      type: object
      description: >-
        How many child rows on each side were repointed from the merged-
        away person onto the survivor (people/merge.go relinkCounts).
      required:
        - emails
        - phones
        - relationships
        - activity_links
      properties:
        emails:
          type: integer
          format: int64
          description: person_email rows relinked.
        phones:
          type: integer
          format: int64
          description: person_phone rows relinked.
        relationships:
          type: integer
          format: int64
          description: relationship edge rows relinked.
        activity_links:
          type: integer
          format: int64
          description: activity_link rows relinked.
      additionalProperties: false

    PublicEventPersonCreated:
      type: object
      x-event-type: person.created
      x-entity-type: person
      x-version: 1
      description: Payload for person.created — a person was created.
      required:
        - full_name
      properties:
        full_name:
          type: string
          description: The person's name at creation.
      additionalProperties: false

    PublicEventPersonArchived:
      type: object
      x-event-type: person.archived
      x-entity-type: person
      x-version: 1
      description: Payload for person.archived — a person was archived. Carries no data.
      additionalProperties: false

    PublicEventPersonMerged:
      type: object
      x-event-type: person.merged
      x-entity-type: person
      x-version: 1
      description: >-
        Payload for person.merged — two person records collapsed into one
        (the §1.3 merge); neither person.updated nor person.archived can
        say this, so it is its own verb.
      required:
        - merged_from_id
        - merged_into_id
        - relinked
      properties:
        merged_from_id:
          type: string
          format: uuid
          description: The merged-away (source) person, retired but still fetchable by id.
        merged_into_id:
          type: string
          format: uuid
          description: The survivor (target) person.
        relinked:
          $ref: '#/components/schemas/PublicEventPersonMergedRelinkCounts'
      additionalProperties: false

    PublicEventPersonUpdated:
      type: object
      x-event-type: person.updated
      x-entity-type: person
      x-version: 1
      description: >-
        Payload for person.updated — an OPEN envelope: its emit sites carry
        divergent shapes (a flat column patch, a lead-promotion conversion
        note, a signature-enrichment fill, a relationship delta), so the
        honest shape is a change-set map rather than a fixed field list.
      required:
        - changed_fields
      properties:
        changed_fields:
          type: object
          additionalProperties: true
          description: >-
            What this update touched, incl. runtime cf_* custom fields.
            The value shape depends on the emit site: a column patch
            carries a flat field → new-value entry, while the
            recompute/routing/relationship sites carry a `{delta: {...}}`
            sub-object (occasionally with a sibling `source`). Read a
            key's value as either form.
      additionalProperties: false

    PublicEventPersonRestored:
      type: object
      x-event-type: person.restored
      x-entity-type: person
      x-version: 1
      description: >-
        Payload for person.restored. Never emitted today (no restore path
        exists for person); the schema is published so the type is a
        valid subscription target and the coverage gate can name it
        explicitly rather than silently omitting it.
      additionalProperties: false

    PublicEventOrganizationCreated:
      type: object
      x-event-type: organization.created
      x-entity-type: organization
      x-version: 1
      description: >-
        Payload for organization.created — a UNION across five emit sites
        (a direct create, the capture auto-create engine, the anchor
        company save, the site-read confirmation, and the cold-start
        profile apply), each of which sets only its own subset; every
        field is therefore optional.
      properties:
        display_name:
          type: string
          description: The organization's display name at creation (absent when the site never set one).
        primary_domain:
          type: string
          description: The organization's primary domain (cold-start apply only).
        delta:
          type: object
          additionalProperties: true
          description: The fields the creating site applied (company save / site-read confirmation only).
        source:
          type: string
          description: Where this organization originated (e.g. human, site_read).
        source_url:
          type: string
          description: The source page this organization was read from (site-read confirmation only).
        site_read_id:
          type: string
          format: uuid
          description: The site-read that produced this organization (site-read confirmation only).
        anchor:
          type: boolean
          description: Whether this is the installation's own anchor organization (company save only).
        captured_by:
          type: string
          description: The principal that created this organization.
      additionalProperties: false

    PublicEventOrganizationArchived:
      type: object
      x-event-type: organization.archived
      x-entity-type: organization
      x-version: 1
      description: Payload for organization.archived — an organization was archived. Carries no data.
      additionalProperties: false

    PublicEventOrganizationMerged:
      type: object
      x-event-type: organization.merged
      x-entity-type: organization
      x-version: 1
      description: >-
        Payload for organization.merged — two organization records
        collapsed into one (the §1.3 merge); neither organization.updated
        nor organization.archived can say this, so it is its own verb.
      required:
        - merged_from_id
        - merged_into_id
      properties:
        merged_from_id:
          type: string
          format: uuid
          description: The merged-away (source) organization, retired but still fetchable by id.
        merged_into_id:
          type: string
          format: uuid
          description: The survivor (target) organization.
      additionalProperties: false

    PublicEventOrganizationUpdated:
      type: object
      x-event-type: organization.updated
      x-entity-type: organization
      x-version: 1
      description: >-
        Payload for organization.updated — an OPEN envelope: eight emit
        sites carry divergent shapes (a flat column patch, the anchor
        company save's field delta, the partner extension's nested
        delta, enrichment/deep-read applies, a relationship delta), so
        the honest shape is a change-set map rather than a fixed field
        list.
      required:
        - changed_fields
      properties:
        changed_fields:
          type: object
          additionalProperties: true
          description: >-
            What this update touched, incl. runtime cf_* custom fields.
            The value shape depends on the emit site: a column patch
            carries a flat field → new-value entry, while the
            recompute/routing/relationship sites carry a `{delta: {...}}`
            sub-object (occasionally with a sibling `source`). Read a
            key's value as either form.
      additionalProperties: false

    PublicEventLeadCreated:
      type: object
      x-event-type: lead.created
      x-entity-type: lead
      x-version: 1
      description: >-
        Payload for lead.created — a lead was created. Two emit sites: a
        direct create (people/lead.go) that sets no fields, and the
        capture auto-create engine (capture/sink.go) that names its
        originating source system; source_system is therefore optional.
      properties:
        source_system:
          type: string
          description: >-
            The originating source system (capture auto-create only;
            absent on a direct create).
      additionalProperties: false

    PublicEventLeadDisqualified:
      type: object
      x-event-type: lead.disqualified
      x-entity-type: lead
      x-version: 1
      description: Payload for lead.disqualified — a lead was disqualified. Carries no data.
      additionalProperties: false

    PublicEventLeadPromoted:
      type: object
      x-event-type: lead.promoted
      x-entity-type: lead
      x-version: 1
      description: >-
        Payload for lead.promoted — the lead's genuine-engagement
        promotion into the context graph (events.md §5.5); its own verb,
        never a lead.updated, since neither person.created nor
        person.updated on its own says a lead crossed this line.
      required:
        - promoted_person_id
        - dedupe_outcome
        - trigger
      properties:
        promoted_person_id:
          type: string
          format: uuid
          description: The person this lead promoted into (fresh or an existing survivor).
        dedupe_outcome:
          type: string
          description: 'Whether promotion created a new person or merged into an existing one: created or merged.'
        trigger:
          type: string
          description: 'The genuine-engagement trigger that authorized promotion: inbound_reply, meeting_booked, meeting_held, or human_qualify.'
        evidence_ref:
          type: string
          format: uuid
          description: The inbound activity that evidenced the trigger (absent for a human_qualify with no linked activity).
      additionalProperties: false

    PublicEventLeadUpdated:
      type: object
      x-event-type: lead.updated
      x-entity-type: lead
