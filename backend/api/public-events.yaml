        CreateSignal). entity_type/entity_id are DATA fields naming the
        signal's subject (deal | organization | person) when one is already
        known at creation time — not the envelope's own entity ref, which is
        the signal itself (this event's entity type is the static "signal").
        Both are absent on a raw signal (only a raw_ref), which enters
        unresolved and waits for the resolver; resolution_confidence is set
        only when the signal was created already resolved.
      required:
        - signal_id
        - kind
        - source_channel
        - resolution_state
        - severity
      properties:
        signal_id:
          type: string
          format: uuid
          description: The signal that was detected.
        kind:
          type: string
          description: >-
            The signal kind (stalled_deal | champion_left | reengagement |
            buying_intent | risk | other).
        source_channel:
          type: string
          description: Where the raw signal came from (derived | inbound | web | social | deal_room_engagement).
        resolution_state:
          type: string
          description: >-
            The raw→entity match outcome at creation time (resolved |
            low_confidence | unresolved | dropped).
        severity:
          type: string
          description: The signal's severity (info | warn | urgent).
        entity_type:
          type: string
          x-go-name: SubjectEntityType
          description: >-
            The subject record's type (deal | organization | person) — a
            payload data field, absent until a raw signal resolves (both
            entity fields set together). x-go-name avoids colliding with the
            generated EntityType() method, which names the ENVELOPE'S entity
            (always "signal"), not this data field.
        entity_id:
          type: string
          format: uuid
          x-go-name: SubjectEntityId
          description: The subject record's id — a payload data field, absent until a raw signal resolves.
        resolution_confidence:
          type: number
          description: The match confidence (0–1), set only when created already resolved.
      additionalProperties: false

    PublicEventSignalResolved:
      type: object
      x-event-type: signal.resolved
