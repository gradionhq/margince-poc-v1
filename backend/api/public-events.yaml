        policy:
          type: string
          format: uuid
          description: >-
            The retention policy that drove this action (absent for the
            fixed embed-call sweep and for Art. 17 erasure, neither of
            which is policy-configured).
        reason:
          type: string
          description: >-
            Why this action ran (Art. 17 erasure only — e.g. dsr_request;
            absent for both retention-sweep sites).
      additionalProperties: false

    WebhookPayloadSignalDetected:
      type: object
      x-event-type: signal.detected
      x-entity-type: signal
      x-version: 1
      description: >-
        Payload for signal.detected — a signal was created (signals/signal.go's
        CreateSignal). entity_type/entity_id are DATA fields naming the
        signal's subject (deal | organization | person) when one is already
        known at creation time — not the envelope's own entity ref, which is
        the signal itself (this event's entity type is the static "signal").
        Both are absent on a raw signal (only a raw_ref), which enters
        unresolved and waits for the resolver; resolution_confidence is set
        only when the signal was created already resolved.
      required:
        - signal_id
        - kind
        - source_channel
        - resolution_state
        - severity
      properties:
        signal_id:
          type: string
          format: uuid
          description: The signal that was detected.
        kind:
          type: string
          description: >-
            The signal kind (stalled_deal | champion_left | reengagement |
            buying_intent | risk | other).
        source_channel:
          type: string
          description: Where the raw signal came from (derived | inbound | web | social | deal_room_engagement).
        resolution_state:
          type: string
          description: >-
            The raw→entity match outcome at creation time (resolved |
            low_confidence | unresolved | dropped).
        severity:
          type: string
          description: The signal's severity (info | warn | urgent).
        entity_type:
          type: string
          x-go-name: SubjectEntityType
          description: >-
            The subject record's type (deal | organization | person) — a
            payload data field, absent until a raw signal resolves (both
            entity fields set together). x-go-name avoids colliding with the
            generated EntityType() method, which names the ENVELOPE'S entity
            (always "signal"), not this data field.
        entity_id:
          type: string
          format: uuid
          x-go-name: SubjectEntityId
          description: The subject record's id — a payload data field, absent until a raw signal resolves.
        resolution_confidence:
          type: number
          description: The match confidence (0–1), set only when created already resolved.
      additionalProperties: false

    WebhookPayloadSignalResolved:
      type: object
      x-event-type: signal.resolved
      x-entity-type: signal
      x-version: 1
      description: >-
        Payload for signal.resolved — the resolver ran over a signal
        (signals/resolver.go's Resolve). The verdict IS the candidate count
        (P12): zero candidates drops the signal (resolved_org_id,
        resolved_person_id, matched_on, match_confidence all absent);
        exactly one resolves it to that org (resolved_org_id set,
        resolved_person_id set only under a recorded consent grant);
        several flags it low_confidence for review (matched_on/
        match_confidence describe the top candidate, resolved_org_id stays
        absent).
      required:
        - signal_id
        - resolution_state
      properties:
        signal_id:
          type: string
          format: uuid
          description: The signal the resolver ran over.
        resolution_state:
          type: string
          description: The state after resolving (resolved | low_confidence | dropped).
        resolved_org_id:
          type: string
          format: uuid
          description: The organization the signal resolved to (absent when dropped or ambiguous).
        resolved_person_id:
          type: string
          format: uuid
          description: >-
            The consent-gated person the signal resolved to (absent unless
            an existing person under a recorded consent grant matched).
        matched_on:
          type: string
          description: The match basis of the top candidate (domain | name | prior_interaction).
        match_confidence:
          type: number
          description: The top candidate's match confidence (0–1).
      additionalProperties: false
