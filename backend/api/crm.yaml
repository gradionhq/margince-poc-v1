        active_median_voice_score: { type: [number, 'null'], minimum: 0, maximum: 1 }
        candidate_median_voice_score: { type: number, minimum: 0, maximum: 1 }
        anti_ai_hard_failures: { type: integer, minimum: 0 }
        structured_output_valid: { type: boolean }
        corpus_citations_valid: { type: boolean }
        identity_word_jaccard: { type: number, minimum: 0, maximum: 1 }
        signature_set_jaccard: { type: number, minimum: 0, maximum: 1 }
        removed_avoid_rules: { type: integer, minimum: 0 }
        removed_register_rules: { type: integer, minimum: 0 }
        classification: { type: string, enum: [routine, material] }
        passed: { type: boolean }

    VoiceProfileVersion:
