        - profile_id
        - id
        - profile_version
        - status
        - voice_profile_md
        - profile_json
        - stats_json
        - source_hash
        - source_count
        - reason
        - predecessor_version
        - activation_policy_version
        - model_provider
        - model_name
        - builder_version
        - source
        - captured_by
        - evaluation
        - review_reasons
        - version
        - created_at
        - updated_at
        - archived_at
        - activated_at
      properties:
        id: { type: string, format: uuid }
        profile_id: { type: string, format: uuid }
        profile_version: { type: integer, minimum: 1 }
        status: { type: string, enum: [candidate, active, superseded, rejected] }
        voice_profile_md: { type: string }
        profile_json: { type: object, additionalProperties: true }
        stats_json: { type: object, additionalProperties: true }
        source_hash: { type: string }
        source_count: { type: integer, minimum: 0 }
        reason: { type: string, enum: [onboarding, manual, automatic, rollback] }
        predecessor_version: { type: [integer, 'null'], minimum: 1 }
        model_provider: { type: string }
        model_name: { type: string }
        builder_version: { type: string }
        source: { type: string }
        captured_by: { type: string, readOnly: true }
        activation_policy_version: { type: string }
        evaluation: { $ref: '#/components/schemas/VoiceProfileEvaluation' }
        review_reasons: { type: array, items: { type: string } }
        version: { type: integer, minimum: 1, description: Row concurrency version; distinct from the immutable artifact's profile_version. }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }
        activated_at: { type: [string, 'null'], format: date-time }

    VoiceProfileDelta:
