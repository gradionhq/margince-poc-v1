      required:
        - id
        - profile_id
        - from_version
        - to_version
        - classification
        - activation_outcome
        - words_added
        - sources_added
        - sources_excluded
        - identity_word_jaccard
        - signature_set_jaccard
        - avoid_rules_added
        - avoid_rules_removed
        - register_rules_removed
        - created_at
        - updated_at
        - archived_at
      properties:
        id: { type: string, format: uuid }
        profile_id: { type: string, format: uuid }
        from_version: { type: [integer, 'null'], minimum: 1 }
        to_version: { type: integer, minimum: 1 }
        classification: { type: string, enum: [routine, material] }
        activation_outcome: { type: string, enum: [auto_activated, review_required, manually_activated, rejected, rollback] }
        words_added: { type: integer }
        sources_added: { type: integer, minimum: 0 }
        sources_excluded: { type: integer, minimum: 0 }
        identity_word_jaccard: { type: [number, 'null'], minimum: 0, maximum: 1 }
        signature_set_jaccard: { type: [number, 'null'], minimum: 0, maximum: 1 }
        avoid_rules_added: { type: integer, minimum: 0 }
        avoid_rules_removed: { type: integer, minimum: 0 }
        register_rules_removed: { type: integer, minimum: 0 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    VoiceLearningTransformation:
      type: object
      required: [key, observation_count, description]
      properties:
        key: { type: string }
        observation_count: { type: integer, minimum: 5 }
        description: { type: string, description: Aggregate transformation description; never copied user text. }

    VoiceLearningSummary:
      type: object
      required: [drafted, accepted, edited_sent, rejected, qualifying_source_count, qualifying_words, transformations]
      properties:
        drafted: { type: integer, minimum: 0 }
        accepted: { type: integer, minimum: 0 }
        edited_sent: { type: integer, minimum: 0 }
        rejected: { type: integer, minimum: 0 }
        qualifying_source_count: { type: integer, minimum: 0 }
        qualifying_words: { type: integer, minimum: 0 }
        transformations: { type: array, items: { $ref: '#/components/schemas/VoiceLearningTransformation' } }

    RejectVoiceDraftRequest:
      type: object
      required: [draft_ref]
      properties:
        draft_ref: { type: string, minLength: 1 }

    # ---- Offers / Angebote (B-E03.16–.20; data-model §12.6) ----
    Product:
      type: object
      description: A rate-card entry. Mirrors the `product` table — data an offer line snapshots from, never a configurator.
      required: [id, workspace_id, name, unit, unit_price_minor, currency, default_tax_rate, active, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        sku: { type: [string, 'null'], description: Optional; unique per workspace while live. }
        description: { type: [string, 'null'] }
        unit: { type: string, description: "'unit' | 'hour' | 'day' | … — display only, free text." }
        unit_price_minor: { type: integer, format: int64, description: Integer minor units (P11); no float money. }
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        default_tax_rate: { type: number, format: double, description: 'Percent, e.g. 19.00 (DE USt.); per-line override allowed.' }
        active: { type: boolean }
        source: { type: string }
        captured_by: { type: string, readOnly: true, description: Server-stamped from the authenticated principal; never client-supplied. }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }
      additionalProperties: true
      x-extension: true

    ProductListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Product' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    CreateProductRequest:
      type: object
      required: [name, unit_price_minor, currency, source]
      properties:
        name: { type: string }
        sku: { type: [string, 'null'] }
        description: { type: [string, 'null'] }
        unit: { type: [string, 'null'], description: Defaults to 'unit'. }
        unit_price_minor: { type: integer, format: int64, minimum: 0 }
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        default_tax_rate: { type: [number, 'null'], format: double, minimum: 0, description: Percent; defaults to 0. }
        active: { type: [boolean, 'null'], description: Defaults to true. }
        source: { type: string }
      additionalProperties: true
      x-extension: true

    UpdateProductRequest:
      type: object
      description: Any subset; omit a field to leave it unchanged. A price change never re-prices existing offer lines (they hold snapshots).
      properties:
        name: { type: string }
        sku: { type: [string, 'null'] }
        description: { type: [string, 'null'] }
        unit: { type: string }
        unit_price_minor: { type: integer, format: int64, minimum: 0 }
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        default_tax_rate: { type: number, format: double, minimum: 0 }
        active: { type: boolean }
      additionalProperties: true
      x-extension: true

    OfferTemplate:
      type: object
      description: >-
        A branded, workspace-governed DE/EN PDF layout for offers (data-model §12.6).
        Mirrors the `offer_template` table. Deliberately carries no source/captured_by —
        like Quota/CustomField, this is workspace-authored config, not a captured record;
        provenance lives in the audit row, not this schema.
      required: [id, workspace_id, name, locale, is_default, layout, version, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string, description: Unique per workspace among live (non-archived) templates. }
        locale: { type: string, default: de-DE, description: 'DE/EN at launch (de-DE, en-US); drives the rendered PDF label set.' }
        is_default: { type: boolean, default: false, description: At most one default template per locale (partial unique index; OFFER-DDL-4). }
        layout: { type: object, additionalProperties: true, description: Logo/header/footer/terms-block refs — bounded params, not a CMS. }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateOfferTemplateRequest:
      type: object
      required: [name, layout]
      properties:
        name: { type: string }
        locale: { type: [string, 'null'], default: de-DE }
        is_default: { type: [boolean, 'null'], description: Defaults to false. }
        layout: { type: object, additionalProperties: true }

    UpdateOfferTemplateRequest:
      type: object
      description: Full replace via PUT (unlike updateProduct's merge-PATCH) — every writable field must be supplied; omitting one resets it, it is not left unchanged.
      required: [name, locale, is_default, layout]
      properties:
        name: { type: string }
        locale: { type: string }
        is_default: { type: boolean }
        layout: { type: object, additionalProperties: true }

    OfferTemplateListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/OfferTemplate' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    OfferLineItem:
      type: object
      description: |
        A typed offer line. `description`/`unit_price_minor` are SNAPSHOTS (copied from the
        optional product at line creation); `line_net_minor`/`line_tax_minor`/`line_total_minor`
        are DERIVED server-side (formulas §12.6) and never stored or client-settable.
      required: [id, position, description, unit, quantity, unit_price_minor, discount_pct, tax_rate, line_net_minor, line_tax_minor, line_total_minor, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        position: { type: integer, description: Display order, unique per offer. }
        product_id: { type: [string, 'null'], format: uuid, description: Optional rate-card ref; the line survives the product. }
        description: { type: string }
        unit: { type: string }
        quantity: { type: number, format: double, description: 'Up to 3 decimal places (numeric 14,3); must be > 0.' }
        unit_price_minor: { type: integer, format: int64, description: Snapshot — never re-read from product after creation. }
        discount_pct: { type: number, format: double, description: '0–100, up to 2 decimal places.' }
        tax_rate: { type: number, format: double, description: 'Percent, up to 2 decimal places.' }
        line_net_minor: { type: integer, format: int64, readOnly: true, description: 'round(qty × unit_price × (1 − discount_pct/100)) — server-computed.' }
        line_tax_minor: { type: integer, format: int64, readOnly: true, description: 'round(line_net × tax_rate/100) — server-computed.' }
        line_total_minor: { type: integer, format: int64, readOnly: true, description: line_net + line_tax — server-computed. }
        evidence: { type: [object, 'null'], additionalProperties: true, description: '{snippet, source_id} when AI-drafted (evidence-or-omit, features/07).' }
        price_grounded: { type: boolean, readOnly: true, default: true, description: 'false only for an AI-proposed line whose price could not be grounded in conversation evidence or the rate card (unit_price_minor is 0 in that case — an honest sentinel, never a guessed value); true for every human-entered or grounded line.' }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Offer:
      type: object
      description: A versioned Angebot bound to one deal. Mirrors the `offer` table; totals are derived from the nested line items.
      required: [id, workspace_id, deal_id, offer_number, revision, status, currency, net_minor, tax_minor, gross_minor, line_items, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        deal_id: { type: string, format: uuid }
        offer_number: { type: string, readOnly: true, description: Human-facing Angebot number, minted server-side, unique per workspace (with revision). }
        revision: { type: integer, readOnly: true, description: Bumped when a sent offer is regenerated; the prior revision becomes superseded. }
        status: { type: string, enum: [draft, sent, accepted, rejected, expired, superseded] }
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        buyer_org_id: { type: [string, 'null'], format: uuid }
        buyer_snapshot: { type: [object, 'null'], additionalProperties: true, readOnly: true, description: Buyer legal block captured at send time. }
        issuer_snapshot: { type: [object, 'null'], additionalProperties: true, readOnly: true, description: Seller legal block captured at send time. }
        valid_until: { type: [string, 'null'], format: date }
        intro_text: { type: [string, 'null'] }
        terms_text: { type: [string, 'null'] }
        net_minor: { type: integer, format: int64, readOnly: true, description: Σ line nets — derived, never client-set. }
        tax_minor: { type: integer, format: int64, readOnly: true, description: Σ line taxes — derived, never client-set. }
        gross_minor: { type: integer, format: int64, readOnly: true, description: net + tax — derived, never client-set. }
        fx_rate_to_base: { type: [string, 'null'], readOnly: true, description: 'Native→base, frozen at send (RT-PR-C2). Decimal-as-string to avoid float rounding.' }
        fx_rate_date: { type: [string, 'null'], format: date, readOnly: true }
        template_id: { type: [string, 'null'], format: uuid, description: The offer_template used for locale/layout at render time; unset falls back to the workspace's default template for the offer's locale. }
        pdf_asset_ref: { type: [string, 'null'], description: Rendered PDF ref, set by renderOffer (B-E03.22/WP7). }
        accepted_at: { type: [string, 'null'], format: date-time, readOnly: true }
        ai_generated: { type: boolean, readOnly: true, default: false, description: 'Art. 50 AI-assisted disclosure (features/07 §11 gate 9). true only on the response of the regenerate call that produced this draft revision; false on every other read — disclosure is stamped on the drafting call itself, not persisted across future reads.' }
        ai_disclosure: { type: [string, 'null'], readOnly: true, description: 'The machine-readable Art. 50 disclosure line (features/07 §11 gate 9); non-null iff ai_generated=true.' }
        diff_from_previous:
          type: [object, 'null']
          readOnly: true
          description: 'Populated only on a regenerate response — added/removed/changed line items vs the immediately prior revision, so the human sees exactly what the AI proposed. Null on every other read; transient, never persisted.'
          properties:
            added: { type: array, items: { $ref: '#/components/schemas/OfferLineItem' } }
            removed: { type: array, items: { $ref: '#/components/schemas/OfferLineItem' } }
            changed:
              type: array
              items:
                type: object
                properties:
                  before: { $ref: '#/components/schemas/OfferLineItem' }
                  after: { $ref: '#/components/schemas/OfferLineItem' }
        line_items:
          type: array
          readOnly: true
          items: { $ref: '#/components/schemas/OfferLineItem' }
        source: { type: string }
        captured_by: { type: string, readOnly: true, description: Server-stamped from the authenticated principal; never client-supplied. }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }
      additionalProperties: true
      x-extension: true

    OfferListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Offer' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    OfferLineItemInput:
      type: object
      description: |
        One line to add. With `product_id`, description/unit/unit_price_minor/tax_rate default
        from the product (a SNAPSHOT — later product edits never touch the line); without it,
        description and unit_price_minor are required. Totals are never accepted here (422).
      required: [quantity]
      properties:
        position: { type: [integer, 'null'], minimum: 1, description: Defaults to the next free position. }
        product_id: { type: [string, 'null'], format: uuid }
        description: { type: [string, 'null'] }
        unit: { type: [string, 'null'] }
        quantity: { type: number, format: double, description: '> 0, up to 3 decimal places.' }
        unit_price_minor: { type: [integer, 'null'], format: int64, minimum: 0 }
        discount_pct: { type: [number, 'null'], format: double, minimum: 0, maximum: 100 }
        tax_rate: { type: [number, 'null'], format: double, minimum: 0 }

    UpdateOfferLineItemRequest:
      type: object
      description: Any subset; omit a field to leave it unchanged. Totals are derived and not settable (422).
      properties:
        position: { type: integer, minimum: 1 }
        description: { type: string }
        unit: { type: string }
        quantity: { type: number, format: double }
        unit_price_minor: { type: integer, format: int64, minimum: 0 }
        discount_pct: { type: number, format: double, minimum: 0, maximum: 100 }
        tax_rate: { type: number, format: double, minimum: 0 }

    CreateOfferRequest:
      type: object
      required: [currency, source]
      properties:
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        buyer_org_id: { type: [string, 'null'], format: uuid, description: Defaults to the deal's organization. }
        valid_until: { type: [string, 'null'], format: date }
        intro_text: { type: [string, 'null'] }
        terms_text: { type: [string, 'null'] }
        template_id: { type: [string, 'null'], format: uuid, description: Optional offer_template to render with; unset falls back to the workspace's default template for the offer's locale. }
        line_items:
          type: [array, 'null']
          items: { $ref: '#/components/schemas/OfferLineItemInput' }
        source: { type: string }
      additionalProperties: true
      x-extension: true

    UpdateOfferRequest:
      type: object
      description: Header-field patch; allowed only while status=draft (422 offer_not_draft otherwise). Totals are derived and not settable (422).
      properties:
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        buyer_org_id: { type: [string, 'null'], format: uuid }
        valid_until: { type: [string, 'null'], format: date }
        template_id: { type: [string, 'null'], format: uuid }
        intro_text: { type: [string, 'null'] }
        terms_text: { type: [string, 'null'] }
      additionalProperties: true
      x-extension: true

    RejectOfferRequest:
      type: object
      properties:
        reason: { type: [string, 'null'], description: Optional buyer-given decline reason (rides offer.rejected). }

    # ---- Agent Seat Passport issuance (ADR-0013; the local/A1 path) ----
    IssuePassportRequest:
      type: object
      additionalProperties: false
      required: [scopes]
      properties:
        label:  { type: [string, 'null'], maxLength: 120, description: 'Which agent this binds, e.g. "Claude Desktop".' }
        scopes:
          type: array
          minItems: 1
          uniqueItems: true
          items: { type: string, enum: [read, draft, write, send, enrich] }
          description: Verb classes the passport may exercise; effective authority is always ∩ the granting human's RBAC.
        ttl_hours:
          type: [integer, 'null']
          minimum: 1
          maximum: 2160
          description: Lifetime in hours (default 720 = 30 days, max 90 days). Revocable at any time.

    IssuePassportResponse:
      type: object
      required: [passport_id, token, scopes, on_behalf_of, expires_at]
      properties:
        passport_id: { type: string, format: uuid }
        token:       { type: string, description: The bearer token — shown ONCE, stored only as a hash. }
        scopes:
          type: array
          items: { type: string }
        on_behalf_of: { type: string, format: uuid, description: The human whose RBAC bounds every call this passport makes. }
        expires_at:   { type: string, format: date-time }

    PassportSummary:
      type: object
      description: Agent Seat Passport metadata for the Settings list (feedback/13). Never carries the token.
      required: [id, label, scopes, created_at]
      properties:
        id: { type: string, format: uuid }
        label: { type: string, description: Human-given name for the passport (e.g. "Marcus's Claude"). }
        scopes: { type: array, items: { type: string }, description: The granted MCP scopes (intersected with the minting human's role at bind time). }
        agent_id: { type: [string, 'null'], description: The agent this passport is bound to, if any. }
        created_at: { type: string, format: date-time }
        expires_at: { type: [string, 'null'], format: date-time }
        last_used_at: { type: [string, 'null'], format: date-time }
        revoked_at: { type: [string, 'null'], format: date-time }

    MorningBrief:
      type: object
      description: |
        One persisted Morning-Brief run for the acting rep (data-model §12.5 `brief_run` +
        `brief_item`): the ranked, honest-short queue of winnable deals plus the metadata that
        reproduces it. `candidate_count` is how many deals cleared the §10 honest-short bar;
        `items` is the top slice (≤ 7) — genuinely shorter when fewer qualify, never padded.
      required: [id, generated_at, as_of, candidate_count, items]
      properties:
        id: { type: string, format: uuid }
        generated_at: { type: string, format: date-time, description: When this run was assembled. }
        as_of: { type: string, format: date-time, description: The data cutoff this brief reflects; the next run derives "changed overnight" from it. }
        candidate_count: { type: integer, minimum: 0, description: Deals that cleared the §10 honest-short bar (may exceed the queue length). }
        revenue_norm_minor: { type: integer, format: int64, description: The workspace-P90 (or fallback) base value the revenue factor normalized against. }
        items:
          type: array
          items: { $ref: '#/components/schemas/MorningBriefItem' }
          description: The ranked queue, best-first, capped at the honest-short target (7).

    MorningBriefItem:
      type: object
      description: |
        One ranked queue entry: the §10.1 composite, its per-factor decomposition (no mystery
        number), the source rows behind the factors (evidence-or-omit, B-E05.12), and the
        per-rep acted/dismissed state (B-E05.13). `rank` reflects the L2 re-order within the
        deterministic candidate set, so it is not necessarily descending in `composite`.
      required: [id, deal_id, rank, composite, feature_vector, evidence_ids, state]
      properties:
        id: { type: string, format: uuid }
        deal_id: { type: string, format: uuid }
        rank: { type: integer, minimum: 1, description: Position in the queue (1 = top), after the L2 re-order. }
        composite: { type: number, minimum: 0, maximum: 1, description: The deterministic §10.1 composite score. }
        feature_vector: { $ref: '#/components/schemas/MorningBriefFeatureVector' }
        evidence_ids:
          type: array
          items: { type: string, format: uuid }
          description: The source rows (deal / activity / relationship) behind the factors; never empty (evidence-or-omit).
        state: { type: string, enum: [new, acted, dismissed, snoozed], description: The acting rep's queue state for this item. }
        state_at: { type: [string, 'null'], format: date-time, description: When the rep acted/dismissed/snoozed; null while new. }
        snoozed_until: { type: [string, 'null'], format: date-time, description: 'When a snoozed item re-surfaces (A77/AC-home-6); set exactly while state=snoozed, null otherwise.' }

    BriefSnoozeRequest:
      type: object
      description: Snooze a brief item until a future instant (A77/AC-home-6); it re-surfaces once the instant passes.
      required: [snoozed_until]
      properties:
        snoozed_until: { type: string, format: date-time, description: When the item re-surfaces; must be in the future. }

    MorningBriefFeatureVector:
      type: object
      description: The §10.1 factor decomposition, each normalized 0..1 — the composite reconciles to it.
      required: [winnability, revenue, timing, momentum, warmth]
      properties:
        winnability: { type: number, minimum: 0, maximum: 1, description: stage win probability / 100. }
        revenue: { type: number, minimum: 0, maximum: 1, description: min(1, base value / REVENUE_NORM); floor 0 when no evidencable amount. }
        timing: { type: number, minimum: 0, maximum: 1, description: bucketed days-until-expected-close urgency. }
        momentum: { type: number, minimum: 0, maximum: 1, description: 1.0 with an evidenced overnight change, else the 0.4 floor. }
        warmth: { type: number, minimum: 0, maximum: 1, description: strongest visible stakeholder's §4 strength / 100; floor 0 without contributing interactions. }

    # ---- Quota + attainment (RD-T06, RD-WIRE-2/3, RD-DDL-2, RD-FORM-2) ----
    Quota:
      type: object
      description: |
        A per-owner or per-team revenue target for one period (RD-DDL-2). Exactly one of
        owner_id/team_id is non-null (CHECK constraint) — never both, never neither;
        createQuota/updateQuota document and enforce this (422 owner_xor_team_required).
        target_minor is always human-set: no AI-guessed quota, no default, no
        server-computed fallback (RD-PARAM-3). Deliberately carries no
        source/captured_by/created_by provenance columns — unlike custom_field's
        created_by (CF-T01), RD-DDL-2's column list has none. Attainment is a separate
        read (getQuotaAttainment, RD-WIRE-3) — this schema never carries attainment
        fields itself.
      required: [id, workspace_id, period_start, period_end, target_minor, currency, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        owner_id:
          type: [string, 'null']
          format: uuid
          description: Exactly one of owner_id/team_id is non-null (RD-DDL-2 CHECK).
        team_id:
          type: [string, 'null']
          format: uuid
          description: Exactly one of owner_id/team_id is non-null (RD-DDL-2 CHECK).
        period_start: { type: string, format: date }
        period_end: { type: string, format: date }
        target_minor:
          type: integer
          format: int64
          description: >-
            Human-set revenue target, integer minor units (RD-PARAM-3) — never an AI-guessed
            or server-computed field.
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    QuotaListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Quota' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    CreateQuotaRequest:
      type: object
      description: |
        Exactly one of owner_id/team_id must be non-null — supplying both or neither is a 422
        validation_error carrying a distinct, machine-branchable details.errors[].code
        (owner_xor_team_required), not the generic per-field validation code (see
        createQuota's 422 examples). Not expressed as an OpenAPI 3.1 oneOf here — a prose
        note plus a 422 on mismatch, matching how CreateCustomFieldRequest documents its
        conditional currency/options requirement (CF-T01).
      required: [period_start, period_end, target_minor, currency]
      properties:
        owner_id: { type: [string, 'null'], format: uuid }
        team_id: { type: [string, 'null'], format: uuid }
        period_start: { type: string, format: date }
        period_end: { type: string, format: date }
        target_minor: { type: integer, format: int64, minimum: 0 }
        currency: { type: string, pattern: '^[A-Z]{3}$' }

    UpdateQuotaRequest:
      type: object
      description: >-
        Merge-PATCH (API-CONV-1). Re-validates owner-XOR-team after the merge is applied —
        patching the row into a both-set or neither-set state is refused with the same 422
        owner_xor_team_required shape as createQuota, not silently accepted. Switching a
        quota between owner- and team-scoped is archive-and-recreate: merge-PATCH cannot
        express the null clear (omitted and null are the same wire shape), so a PATCH can
        only reassign within the side the row already carries.
      properties:
        owner_id: { type: [string, 'null'], format: uuid }
        team_id: { type: [string, 'null'], format: uuid }
        period_start: { type: string, format: date }
        period_end: { type: string, format: date }
        target_minor: { type: integer, format: int64, minimum: 0 }
        currency: { type: string, pattern: '^[A-Z]{3}$' }

    QuotaAttainment:
      type: object
      description: |
        RD-WIRE-3 / RD-FORM-2 — server-computed attainment for one quota, decomposed for
        "explain this number": attainment = Σ(closed-won base_value_minor in the quota's
        period) ÷ target_minor, base-currency converted, in integer minor units. Never
        client-summed — contributing_deals always sums to closed_won_minor. Rides as a
        sub-resource of the quota (mirrors /organizations/{id}/hierarchy-rollup's
        "computed read with decomposition" shape) rather than an inline field on Quota or
        a GET ?include= expansion — chosen once, applied consistently; the plain Quota
        response (list or single-get) never carries attainment fields. A failed or absent
        computation is an honest error (getQuotaAttainment's 422 responses), never a
        cached or invented figure (RD-AC-4).
      required: [quota_id, closed_won_minor, target_minor, currency, attainment_pct, gap_minor, pace_pct, band, as_of_date, contributing_deals]
      properties:
        quota_id: { type: string, format: uuid }
        closed_won_minor:
          type: integer
          format: int64
          description: Σ base_value_minor over closed-won deals in the quota's period (RD-FORM-2).
        target_minor:
          type: integer
          format: int64
          description: >-
            The BASE-CONVERTED target this attainment is measured against — Quota.target_minor
            converted into the workspace base currency at the as_of_date FX rate. It equals
            Quota.target_minor only when the quota is set in the base currency; a cross-currency
            quota's echo differs, so gap arithmetic never mixes currencies.
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          description: >-
            The workspace base currency — every money figure here (closed_won_minor,
            target_minor, gap_minor) is denominated in it, NOT in Quota.currency.
        attainment_pct:
          type: number
          description: >-
            closed_won_minor ÷ target_minor × 100 (RD-FORM-2). Uncapped raw value — e.g. 113
            for the worked example — display capping (the ring visual stops at a full circle)
            is a RD-PARAM-4 UI concern, not this field's.
        gap_minor:
          type: integer
          format: int64
          description: >-
            Signed gap to target — closed_won_minor minus target_minor (RD-FORM-2's worked
            example: +33.872,00 EUR once closed-won exceeds target); positive once attainment
            exceeds 100%, negative while short of target.
        pace_pct:
          type: number
          description: >-
            Percent of the quota period elapsed at as_of_date (RD-PARAM-4 pace indicator):
            0 before period_start, 100 at/after period_end, linear between. Carries period
            progress ONLY — comparing it against attainment_pct (ahead/behind pace) is the
            consumer's step, not encoded in this field.
        band:
          type: string
          enum: [met, accent, behind]
          description: >-
            Server-computed display band (RD-PARAM-4): met >= 100%, accent 60-99%, behind
            < 60%. The client never recomputes this from raw attainment_pct.
        as_of_date: { type: string, format: date, description: The date this attainment was computed. }
        contributing_deals:
          type: array
          description: Per-deal decomposition for "Explain This Number"; sums to closed_won_minor.
          items: { $ref: '#/components/schemas/QuotaAttainmentDeal' }

    QuotaAttainmentDeal:
      type: object
      description: One row of RD-FORM-2's per-deal breakdown — a closed-won deal counted toward this quota's attainment.
      required: [deal_id, base_value_minor]
      properties:
        deal_id: { type: string, format: uuid }
        base_value_minor:
          type: integer
          format: int64
          description: This deal's counted amount toward closed_won_minor (base currency, minor units).
