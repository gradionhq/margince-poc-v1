  # ---------------------------- /activities ---------------------------------
  /activities:
    get:
      tags: [Activities]
      operationId: listActivities
      summary: List activities (the timeline; cursor-paginated, filterable by type/entity).
      x-mcp-tool: { verb: search_records, record_type: activity, tier: green }
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/IncludeArchived'
        - name: kind
          in: query
          schema: { type: string, enum: [email, call, meeting, note, task, whatsapp, telegram] }
        - name: entity_type
          in: query
          schema: { type: string, enum: [person, organization, deal] }
          description: Filter to activities linked to an entity type (with entity_id).
        - name: entity_id
          in: query
          schema: { type: string, format: uuid }
        - name: assignee_id
          in: query
          schema: { type: string, format: uuid }
          description: Open tasks for an assignee.
        - name: q
          in: query
          schema: { type: string }
      responses:
        '200':
          description: A page of activities (newest first by default).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActivityListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Activities]
      operationId: logActivity
      summary: Log an activity (the `log_activity` MCP verb).
      description: |
        Captured activities carry `source_system` + `source_id`; re-running capture with the
        same pair is idempotent (no duplicate). An activity may link to >1 entity
        (person and deal). `log_activity` is 🟢 (reversible).
      x-mcp-tool: { verb: log_activity, record_type: activity, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateActivityRequest' }
            examples:
              note:
                value:
                  kind: note
                  body: Discussed Q3 expansion on the call.
                  occurred_at: '2026-05-02T16:00:00Z'
                  links:
                    - { entity_type: person, entity_id: 018f3a1b-0000-7000-8000-000000000010 }
                    - { entity_type: deal, entity_id: 018f3a1b-0000-7000-8000-000000000030 }
                  source: ui
              capturedEmail:
                summary: Idempotent captured email (re-run → no dupe)
                value:
                  kind: email
                  subject: 'Re: proposal'
                  occurred_at: '2026-05-02T16:00:00Z'
                  source_system: gmail
                  source_id: 'CAF=abc@mail.gmail.com'
                  links:
                    - { entity_type: deal, entity_id: 018f3a1b-0000-7000-8000-000000000030 }
                  source: 'email:CAF=abc@mail.gmail.com'
      responses:
        '201':
          description: Created activity.
          headers:
            Location: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Activity' }
        '200':
          description: Idempotent no-op — an activity with the same (source_system, source_id) already exists.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Activity' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /activities/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Activities]
      operationId: getActivity
      summary: Get an activity by id (includes its links and raw capture payload).
      x-mcp-tool: { verb: read_record, record_type: activity, tier: green }
      responses:
        '200':
          description: The activity.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Activity' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Activities]
      operationId: updateActivity
      summary: Update an activity (e.g. complete a task).
      x-mcp-tool: { verb: update_record, record_type: activity, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateActivityRequest' }
      responses:
        '200':
          description: Updated activity.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Activity' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Activities]
      operationId: archiveActivity
      x-mcp-tool: { verb: archive_record, record_type: activity, tier: yellow }
      summary: Archive (soft-delete) an activity.
      responses:
        '200':
          description: Archived activity.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Activity' }
        '404': { $ref: '#/components/responses/NotFound' }

  /activities/{id}/relink:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Activities]
      operationId: relinkActivity
      summary: Re-associate a captured activity to a chosen deal/entity (idempotent, source-preserving).
      description: |
        Adds or moves an activity's typed link to a target entity (e.g. attach a captured email to the
        right deal) in **one idempotent action** — re-issuing the same `(activity, entity_type, entity_id)`
        does **not** create a duplicate link (`Idempotency-Key` + a unique `(activity_id, entity_type,
        entity_id)` constraint). The activity's original `source`/`captured_by` provenance is **preserved**
        (the relink is a `human:*` or `agent:*` association event, not a re-capture). Writes one `audit_log`
        row (`activity_relink`). 🟢 — it is an internal association, not an outbound action.
      x-mcp-tool: { verb: relink_activity, record_type: activity, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entity_type, entity_id]
              properties:
                entity_type: { type: string, enum: [person, organization, deal, lead] }
                entity_id:   { type: string, format: uuid }
                replace_existing_of_type:
                  type: boolean
                  default: false
                  description: When true, replaces any existing link of the same entity_type (move) rather than adding (associate).
      responses:
        '200':
          description: The activity with its updated links (idempotent — no duplicate on replay).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Activity' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /activities/{id}/draft-email:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Activities, AI]
      operationId: draftEmail
      summary: Draft a reply/follow-up email for context (the `draft_email` MCP verb).
      description: Drafting is 🟢 (never auto-sends). The draft is returned, not sent.
      x-mcp-tool: { verb: draft_email, record_type: activity, tier: green }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                intent:
                  type: string
                  description: Optional steering, e.g. "polite follow-up referencing Friday".
      responses:
        '200':
          description: A drafted email (never sent).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EmailDraft' }
        '404': { $ref: '#/components/responses/NotFound' }

  /activities/{id}/send-email:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Activities, AI]
      operationId: sendEmail
      summary: Send a (possibly edited) email draft — 🟡 confirm-first / gated.
      description: |
        The `send_email` MCP verb. Outbound + irreversible → 🟡 confirm-first: an agent
        caller must supply an approval token; a human caller's own action is the approval.
        Consent gate is **default-deny per purpose** (A22/ADR-0011, data-model §3.4): the send is
        suppressed (409, `code: consent_not_granted`) unless an active, proven `granted`
        `person_consent` row exists for the *purpose* this send falls under (passed as
        `consent_purpose` in the request). A grant for a different purpose does not authorize the
        send; `unknown` and `withdrawn` both block.
      x-mcp-tool: { verb: send_email, record_type: activity, tier: yellow }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ApprovalToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SendEmailRequest' }
      responses:
        '202':
          description: Accepted for send (queued); the resulting activity is logged.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Activity' }
        '403':
          description: Approval token missing for a 🟡 send, or RBAC denied.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '409':
          description: 'Consent not granted for the send purpose (`code: consent_not_granted`) — suppressed.'
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422': { $ref: '#/components/responses/ValidationError' }

  # ------------------------------ /availability + /bookings (E04 meeting scheduling) ----------
  /availability:
    get:
      tags: [Activities, AI]
      operationId: getAvailability
      summary: Free/busy availability for one or more hosts in a window (the `check_availability` MCP verb).
      description: |
        Reads connected-calendar free/busy and returns candidate slots. 🟢 read-only — proposes,
        never books. Scheduling is a **governed MCP tool** (`features/07 §5c`): this read pairs with
        the 🟡 `book_meeting` action below.
      x-mcp-tool: { verb: check_availability, tier: green }
      parameters:
        - { name: host_user_id, in: query, required: false, schema: { type: string, format: uuid }, description: 'Host to check (defaults to the caller).' }
        - { name: from, in: query, required: true, schema: { type: string, format: date-time } }
        - { name: to, in: query, required: true, schema: { type: string, format: date-time } }
        - { name: duration_minutes, in: query, required: false, schema: { type: integer, default: 30 } }
      responses:
        '200':
          description: Candidate free slots in the window.
          content:
            application/json:
              schema:
                type: object
                required: [slots]
                properties:
                  slots:
                    type: array
                    items:
                      type: object
                      required: [start, end]
                      properties:
                        start: { type: string, format: date-time }
                        end:   { type: string, format: date-time }
        '422': { $ref: '#/components/responses/ValidationError' }

  /bookings:
    post:
      tags: [Activities, AI]
      operationId: bookMeeting
      summary: Book a meeting at a chosen slot — 🟡 confirm-first / gated (the `book_meeting` MCP verb).
      description: |
        Outbound + creates a calendar event and sends an invite → 🟡 confirm-first: an agent caller
        must supply an approval token; a human caller's own action is the approval. On success a
        `meeting` `activity` is logged and linked to the supplied entities. Idempotent on
        `Idempotency-Key`.
      x-mcp-tool: { verb: book_meeting, record_type: activity, tier: yellow }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ApprovalToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [start, end, links]
              properties:
                host_user_id: { type: string, format: uuid }
                start: { type: string, format: date-time }
                end:   { type: string, format: date-time }
                subject: { type: string }
                attendee_emails: { type: array, items: { type: string, format: email } }
                links:
                  type: array
                  description: Entities to associate the resulting meeting activity with.
                  items:
                    type: object
                    required: [entity_type, entity_id]
                    properties:
                      entity_type: { type: string, enum: [person, organization, deal, lead] }
                      entity_id:   { type: string, format: uuid }
                consent: { $ref: '#/components/schemas/CaptureConsent' }
      responses:
        '201':
          description: Meeting booked; the logged meeting activity.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Activity' }
        '403':
          description: Approval token missing for the 🟡 booking, or RBAC denied.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '409':
          description: 'Slot no longer available (`code: slot_taken`).'
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422': { $ref: '#/components/responses/ValidationError' }

  # ---- Public booking (feedback/14 — B-EP09.14 book.html) ----
  # Deviation from the spec source (recorded in this batch's decision file):
  # bookPublicMeeting additionally carries `x-agent-access: human-only` —
  # the ADR-0055 lint is fail-closed on un-annotated mutating ops, and an
  # agent presenting a passport at the anonymous URL is rejected outright
  # (the surface is for the anonymous booker; agents book via /bookings).
  /public/booking/{host_slug}/availability:
    parameters:
      - { name: host_slug, in: path, required: true, schema: { type: string }, description: The host's unguessable public booking slug (not the user uuid). }
    get:
      tags: [Public]
      operationId: getPublicAvailability
      security: []   # anonymous public page
      summary: Free/busy slots for a public booking page (anonymous).
      description: |
        The anonymous read behind the public `book.html` (feedback/14 — B-EP09.14). Resolves the host
        by `host_slug` and returns candidate slots only — no session, no record data beyond free/busy.
      parameters:
        - { name: from, in: query, required: true, schema: { type: string, format: date-time } }
        - { name: to, in: query, required: true, schema: { type: string, format: date-time } }
        - { name: duration_minutes, in: query, required: false, schema: { type: integer, default: 30 } }
      responses:
        '200':
          description: Candidate free slots.
          content:
            application/json:
              schema:
                type: object
                required: [slots]
                properties:
                  slots:
                    type: array
                    items:
                      type: object
                      required: [start, end]
                      properties:
                        start: { type: string, format: date-time }
                        end:   { type: string, format: date-time }
        '404': { $ref: '#/components/responses/NotFound' }

  /public/booking/{host_slug}:
    parameters:
      - { name: host_slug, in: path, required: true, schema: { type: string } }
    post:
      tags: [Public]
      operationId: bookPublicMeeting
      security: []   # anonymous public page
      x-agent-access: human-only
      summary: Book a meeting from the public page (anonymous) — captures the booker + mandatory consent.
      description: |
        The anonymous booking behind `book.html` (feedback/14). Captures/matches the booker as a person
        (idempotent on email), books the slot on the host's calendar, logs the meeting activity.
        **Consent is mandatory** — a public capture surface must pass the purpose + policy wording/version
        through (EP07 capture contract, `features/07`); a booking without `consent` is `422`. Rate-limited;
        no approval token (the host pre-authorized the public page).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [start, end, booker, consent]
              properties:
                start: { type: string, format: date-time }
                end:   { type: string, format: date-time }
                subject: { type: string }
                booker:
                  type: object
                  required: [name, email]
                  properties:
                    name:  { type: string }
                    email: { type: string, format: email }
                consent: { $ref: '#/components/schemas/CaptureConsent' }
      responses:
        '201':
          description: Booked; a minimal confirmation (no CRM record data disclosed).
          content:
            application/json:
              schema:
                type: object
                required: [start, end]
                properties:
                  start: { type: string, format: date-time }
                  end:   { type: string, format: date-time }
        '409': { description: 'Slot no longer available (`code: slot_taken`).', content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } } }
        '422': { $ref: '#/components/responses/ValidationError' }

  # ---- Buyer preference center + RFC 8058 one-click unsubscribe (B-E11.32) ----
  # A no-login public surface over the consent engine. The token in the path
  # is the recipient's unguessable preference token (carried in the
  # List-Unsubscribe URL, not a session credential); it resolves to
  # (workspace, person) before any session exists. An unknown/revoked token
  # reads as absent (404) so the surface is never a consent-state oracle.
  /public/preferences/{token}:
    parameters:
      - { name: token, in: path, required: true, schema: { type: string }, description: The recipient's unguessable preference-center token (carried in the List-Unsubscribe URL; not a session credential). }
    get:
      tags: [Public]
      operationId: getPreferenceCenter
      security: []   # anonymous public page — the token is the capability
      summary: The recipient's per-purpose consent state (anonymous, token-authed).
      description: |
        The no-login preference center behind `preference-center.html` (B-E11.32). The token resolves to
        (workspace, person) before any session exists; the page shows each consent purpose and the
        recipient's current state. A locked purpose (transactional) cannot be withdrawn while a deal is
        live. An unknown or revoked token reads as absent (404) — never a consent-state oracle.
      responses:
        '200':
          description: The per-purpose preference state.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PreferenceCenter' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Public]
      operationId: updatePreferences
      security: []   # anonymous public page — the token is the capability
      x-agent-access: human-only
      summary: Save per-purpose choices from the preference center (anonymous, token-authed).
      description: |
        Records the recipient's explicit per-purpose choice as a withdrawable `consent_event` (verbatim
        wording + timestamp + a distinct `preference_center` source). Withdrawing one purpose never
        touches another (per-purpose default-deny). A locked purpose (transactional) is refused (422).
        Re-subscribe is an explicit opt-in that writes a fresh grant; a purpose requiring double-opt-in
        cannot be re-granted from this surface without the confirmation round-trip (422).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [choices]
              properties:
                choices:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [purpose_key, state]
                    properties:
                      purpose_key: { type: string }
                      state:       { type: string, enum: [granted, withdrawn] }
                      wording:     { type: string, description: The exact wording shown to the recipient, stored verbatim as proof. }
      responses:
        '200':
          description: The updated per-purpose state.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PreferenceCenter' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /public/preferences/{token}/unsubscribe:
    parameters:
      - { name: token, in: path, required: true, schema: { type: string } }
    post:
      tags: [Public]
      operationId: oneClickUnsubscribe
      security: []   # anonymous public page — the token is the capability
      x-agent-access: human-only
      summary: RFC 8058 one-click unsubscribe (anonymous, token-authed, POST-only).
      description: |
        The endpoint the RFC 8058 `List-Unsubscribe-Post: List-Unsubscribe=One-Click` POST hits: no login,
        no confirmation page, a fixed body. Records an immediate per-purpose withdrawal as a `consent_event`
        (source `preference_center`) which the default-deny suppression gate honors on the very next send
        across every path (manual + agent). Idempotent. Only POST acts — a GET/prefetch by a mail scanner
        never unsubscribes anyone (the reason RFC 8058 mandates POST). With `purpose` only that purpose is
        withdrawn (the one the message was sent under); without it every withdrawable purpose is.
      parameters:
        - { name: purpose, in: query, required: false, schema: { type: string }, description: The consent purpose key to withdraw. Omit to withdraw every non-transactional purpose. }
      responses:
        '200':
          description: Unsubscribed (idempotent).
          content:
            application/json:
              schema:
                type: object
                required: [unsubscribed]
                properties:
                  unsubscribed:
                    type: array
                    items: { type: string }
                    description: The purpose keys now withdrawn.
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  # ---- Automations (feedback/14 — un-defers E15/ADR-0035 for the EP09.15 editor) ----
  # Deviation from the spec source (recorded in this batch's decision file):
  # the three mutating ops carry `security: cookieAuth` + `x-agent-access:
  # human-only` — the spec leaves them un-annotated, which the ADR-0055
  # fail-closed lint (gen-agentpolicy) rejects, and an agent configuring
  # standing automations would be self-granted authority. Tighten-only.
  /automations/catalog:
    get:
      tags: [Automations]
      operationId: listAutomationCatalog
      summary: The closed starter library of automation types the workspace can instantiate.
      description: |
        Lists the available automation *types* (the closed starter library, E15/ADR-0035) — the left
        rail of the EP09.15 editor. Each entry names its trigger, action, tier, and a JSON-schema for
        its parameters. Closed set: the build does not invent types the catalog omits.
      responses:
        '200':
          description: Catalog entries.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/AutomationCatalogEntry' } }

  /automations:
    get:
      tags: [Automations]
      operationId: listAutomations
      summary: List the workspace's configured automation instances.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Automation instances.
          content:
            application/json:
              schema:
                type: object
                required: [data, page]
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Automation' } }
                  page: { $ref: '#/components/schemas/PageInfo' }
    post:
      tags: [Automations]
      operationId: createAutomation
      security: [ { cookieAuth: [] } ]   # human session only — see the deviation note above
      x-agent-access: human-only
      summary: Configure an automation instance from a catalog type (created paused).
      description: |
        Instantiates a catalog `key` with parameters. Created **paused** — enabling is a deliberate
        second step (`PATCH … status=enabled`). Configuring is 🟢; an instance whose actions are 🟡
        (outbound/irreversible) stages each run to `/approvals` at run time (ADR-0035).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAutomationRequest' }
      responses:
        '201':
          description: Created (paused).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Automation' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /automations/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Automations]
      operationId: getAutomation
      summary: Read one automation instance.
      responses:
        '200':
          description: The automation.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Automation' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Automations]
      operationId: updateAutomation
      security: [ { cookieAuth: [] } ]   # human session only — see the deviation note above
      x-agent-access: human-only
      summary: Update params or flip status (enable / pause).
      description: Re-parameterize, rename, or flip `status` between `enabled` and `paused` — how the editor's toggle maps to the contract (no separate enable/pause verbs).
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateAutomationRequest' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Automation' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Automations]
      operationId: deleteAutomation
      security: [ { cookieAuth: [] } ]   # human session only — see the deviation note above
      x-agent-access: human-only
      summary: Delete an automation instance.
      responses:
        '204': { description: Deleted. }
        '404': { $ref: '#/components/responses/NotFound' }

  /automations/{id}/preview:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Automations]
      operationId: previewAutomation
      security: [ { cookieAuth: [] } ]   # human session only — see the deviation note above
      x-agent-access: human-only
      summary: Dry-run an automation's blast radius (🟢 read; no writes, no sends).
      description: |
        Powers the designer's live dry-run (A72/ADR-0035 Am.1). Evaluates the recipe's trigger + filter and
        returns how many records match **now** and an estimate of how many times it *would have* fired over a
        trailing window — **without** performing any action. This is a **🟢 read**, executed under the caller's
        Passport: it never mutates a record, never sends, and never stages an approval. Accepts either the stored
        automation or, for a not-yet-created draft, an inline recipe in the body (so the editor can preview
        before the first save). `x-mcp-tool` read tier.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AutomationPreviewRequest' }
      responses:
        '200':
          description: Blast-radius preview.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AutomationPreview' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /automations/{id}/runs:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Automations]
      operationId: listAutomationRuns
      security: [ { cookieAuth: [] } ]   # human session only — see the deviation note above
      x-agent-access: human-only
      summary: Read-only run history for one automation — successes AND errored/blocked/skipped runs.
      description: |
        The designer's run history (A72/ADR-0035 Am.1 — **promoted into V1**, previously fast-follow). Each
        `AutomationRun` is reconstructed from `audit_log`/`automation_run` (data-model §12.5) and stamped with
        the tier that fired and whether approval was needed. Runs of every outcome are first-class (mapping to
        `automation_run.status`) — including `failed` (a provider/action error), `blocked` (a 🟡 step whose
        approval expired or was rejected — **added to the status set by A72/ADR-0035 Am.1**), and `skipped`
        (e.g. the Passport no longer permits the action) — never only `fired` successes. Read-only: runs are
        produced by the engine, not created via the API. 🟡 actions still queue to `/approvals` at run time.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: outcome
          in: query
          description: Filter by run outcome (matches automation_run.status, data-model §12.5).
          schema: { type: string, enum: [fired, failed, blocked, skipped, queued_for_approval] }
      responses:
        '200':
          description: A page of run records.
          content:
            application/json:
              schema:
                type: object
                required: [data, page]
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/AutomationRun' } }
                  page: { $ref: '#/components/schemas/PageInfo' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ------------------------------ /leads ------------------------------------
  /leads:
    get:
      tags: [Leads]
      operationId: listLeads
      summary: List leads (their OWN list, distinct from contacts; cursor-paginated).
      description: Leads are segregated by construction — they never appear in /people.
      x-mcp-tool: { verb: search_records, record_type: lead, tier: green }
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/IncludeArchived'
        - name: status
          in: query
          schema: { type: string, enum: [new, working, promoted, disqualified] }
        - name: owner_id
          in: query
          schema: { type: string, format: uuid }
        - name: min_score
          in: query
          schema: { type: integer }
          description: Triage by score.
        - name: q
          in: query
          schema: { type: string }
      responses:
        '200':
          description: A page of leads.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LeadListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Leads]
      operationId: createLead
      summary: Create a lead.
      description: |
        With name + email returns 201 + stable UUID; round-trips on GET (features/01 §6.1).
        `company_name` is FREE TEXT — a lead has NO organization FK. Lead-internal exact-email
        dedupe → 409 with existing lead id. Bulk/connector sourcing uses (source_system, source_id)
        for idempotent re-import.
      x-mcp-tool: { verb: create_record, record_type: lead, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateLeadRequest' }
            examples:
              sourced:
                value:
                  full_name: Sam Prospect
                  email: sam@newco.com
                  title: Head of RevOps
                  company_name: NewCo GmbH
                  source_system: apollo
                  source_id: apollo-9931
                  source: 'connector:apollo:apollo-9931'
      responses:
        '201':
          description: Created lead.
          headers:
            Location: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Lead' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: A live lead already owns this email.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /leads/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Leads]
      operationId: getLead
      summary: Get a lead by id.
      x-mcp-tool: { verb: read_record, record_type: lead, tier: green }
      responses:
        '200':
          description: The lead.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Lead' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Leads]
      operationId: updateLead
      summary: Update a lead (partial).
      x-mcp-tool: { verb: update_record, record_type: lead, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateLeadRequest' }
      responses:
        '200':
          description: Updated lead.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Lead' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Leads]
      operationId: disqualifyLead
      summary: Disqualify (soft-archive) a lead.
      description: Sets `archived_at` + `status=disqualified`; still fetchable by id.
      x-mcp-tool: { verb: disqualify_lead, record_type: lead, tier: yellow }
      responses:
        '200':
          description: Disqualified lead.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Lead' }
        '404': { $ref: '#/components/responses/NotFound' }

  /leads/{id}/promote:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Leads]
      operationId: promoteLead
      x-mcp-tool: { verb: promote_lead, record_type: lead, tier: yellow }
      summary: Promote a lead to a person on genuine engagement (non-lossy merge).
      description: |
        Promotion runs in one transaction (features/01 §6.4, ADR-0008): if the lead email
        matches a live person it MERGES into that person (no duplicate); else creates a
        person. Sets `person.converted_from_lead_id`, carries provenance + activities (zero
        orphaned FKs), marks lead `status=promoted` + archives it. One audit row recording
        trigger + evidence; emits `lead.promoted` + `person.*`. Cold outbound with no reply
        must NOT call this path. 🟡 confirm-first when triggered by an agent.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ApprovalToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PromoteLeadRequest' }
            examples:
              inboundReply:
                value:
                  trigger: inbound_reply
                  evidence:
                    activity_id: 018f3a1b-0000-7000-8000-000000000040
                    note: Prospect replied to our outreach.
      responses:
        '200':
          description: The resulting (created or merged-into) person.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PromoteLeadResponse' }
        '403':
          description: Approval required (agent-triggered 🟡) or RBAC denied.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Lead already promoted.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422':
          description: Trigger not allowed (e.g. cold-outbound-no-reply does not promote).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

