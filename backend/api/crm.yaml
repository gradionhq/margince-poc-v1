        stage: { type: [string, 'null'], enum: [null, snapshot, extract, evaluate, activate] }
        source_hash: { type: string }
        source_count: { type: integer, minimum: 0 }
        result_version: { type: [integer, 'null'], minimum: 1 }
        candidate_action: { type: string, enum: [none, auto_activated, review_required], default: none }
        status_code: { type: [string, 'null'], enum: [null, budget_deferred, model_unavailable, invalid_output, quality_regression, material_drift, internal] }
        status_detail: { type: [string, 'null'], description: Safe operator guidance; never provider payload, prompt, SQL, or stack data. }
        next_attempt_at: { type: [string, 'null'], format: date-time }
        version: { type: integer, minimum: 1 }
        created_at: { type: string, format: date-time }
        started_at: { type: [string, 'null'], format: date-time }
        completed_at: { type: [string, 'null'], format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    VoiceProfileEvaluation:
