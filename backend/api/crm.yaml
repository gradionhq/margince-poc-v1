          in: query
          schema: { type: string, format: uuid }
          description: Read one Kanban column.
        - name: owner_id
          in: query
          schema: { type: string, format: uuid }
        - name: organization_id
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
