    get:
      tags: [Search]
      operationId: getRecordContext
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: Assembled context (related evidence) for one record.
      description: >
        The fixed-depth context walk (anchor → neighborhood): recent touches, related people,
        open questions — each item provenance-stamped. Row-scoped; a record outside the caller's
        scope yields an empty picture, never another workspace's neighborhood.
      parameters:
        - name: max_items
          in: query
          schema: { type: integer, minimum: 1, maximum: 25 }
          description: Max items per section (default 5, capped at 25).
      responses:
        '200':
          description: The assembled picture (empty sections when nothing is related).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContextResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /field-history:
    get:
      tags: [Compliance]
      operationId: getFieldHistory
      security: [ { cookieAuth: [] } ]   # human session only
      x-agent-access: human-only
      summary: Per-field change history for one record, projected from audit_log before/after diffs.
      description: |
        One entry per field change, newest first, for the given `entity_type` + `entity_id`.
        A read-only projection over the append-only audit spine — no second history store.
        Only audit verbs whose before/after are honest field images project (create, update,
        archive, restore, advance_stage); evidence-shaped rows (merge, promote, exports,
        tombstones) never fabricate field entries. The projection stops at the erasure
        boundary: after an Art. 17 erase or a retention anonymize, the scrub's tombstone row
        and everything older are withheld — the spine keeps its rows, the read refuses them —
        and a field mask hides history and live value in the same motion. Agent-authored
        changes additionally carry `passport_id`/`evidence`. `limit` counts entries, but one
        mutation's entries are never split across pages, so a page may exceed `limit` by the
        width of its final row. A visible record with no matching changes answers
        `200 {data: []}` — an empty history is honest, not a gap. A record outside the
        caller's row scope answers 404 (existence-hiding), like every single-record read; an
        unbounded caller asking about an id that never existed reads the same honest empty page.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: entity_type
          in: query
          required: true
          schema: { type: string, enum: [person, organization, deal, lead, activity] }
        - name: entity_id
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: field
          in: query
          schema: { type: string }
          description: Narrow to one field name.
        - name: actor_type
          in: query
          schema: { type: string, enum: [human, agent, system, connector] }
          description: Narrow to one actor category.
      responses:
        '200':
          description: A page of per-field change entries (empty when none).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FieldHistoryListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  # ------------------------------ /custom-fields -----------------------------
  /custom-fields:
    get:
      tags: [CustomFields]
      operationId: listCustomFields
      summary: List custom fields for an object (admin read; includes retired by default).
      description: |
        CUSTOM-FIELDS-WIRE-1. Unlike a normal resource list, this admin view returns both
        active and retired fields by default — `status` narrows to one lifecycle state.
        Backs the custom-fields admin field table.
      x-mcp-tool: { verb: search_records, record_type: custom_field, tier: green }
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - name: object
          in: query
          required: true
          schema: { type: string, enum: [person, organization, deal, lead, activity] }
          description: Target core object (CUSTOM-FIELDS-PARAM-2).
        - name: status
          in: query
          schema: { type: string, enum: [active, retired] }
          description: >-
            Filter to one lifecycle state. Omitted returns both active and retired — this
            admin list intentionally does not default-exclude retired rows.
      responses:
        '200':
          description: A page of custom fields for the given object.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CustomFieldListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
    post:
      tags: [CustomFields]
      operationId: createCustomField
      summary: Define a new custom field on an existing core object (🟡 — a schema change).
      description: |
        CUSTOM-FIELDS-WIRE-2. Runs the governed engine's single-transaction add: schema
        change + catalog row + one audit entry land or roll back together. Always 🟡 —
        a schema change is never 🟢 — so an agent caller must supply `X-Approval-Token`,
        exactly like `advanceDeal`'s closed-won transition; a human's direct call is
        itself the approval. `column_name` is server-derived and never client-supplied —
        immutable once live. When the requested `label`/`type`/`object` combination is
        judged structural — a new object, a relationship, or logic, never one of the six
        closed types on one of the five closed objects — the request is refused with a
        `structural_change_refused` 422 (see the example below) and nothing is written:
        a structural change ships as a reviewed source change, not a runtime column.
      x-mcp-tool: { verb: create_record, record_type: custom_field, tier: yellow }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ApprovalToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCustomFieldRequest' }
            examples:
              text:
                value:
                  object: deal
                  label: Renewal date
                  type: date
                  source: ui
              currency:
                value:
                  object: deal
                  label: Budget ceiling
                  type: currency
                  currency: USD
                  source: ui
              picklist:
                value:
                  object: deal
                  label: Procurement route
                  type: picklist
                  options: [direct, reseller, marketplace]
                  source: ui
      responses:
        '201':
          description: The newly created custom field.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CustomField' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: RBAC denied, or an agent 🟡 create attempted without an approval token.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                approvalRequired:
                  value:
                    type: 'https://errors.gradion.com/approval_required'
                    title: Approval required
                    status: 403
                    code: approval_required
                    detail: Adding a custom field is a schema change and is confirm-first; supply an approval token.
        '409':
          description: >-
            The slug already exists in this workspace, the derived column name is taken
            platform-wide (the physical column namespace on a shared core table is global),
            or the target table is busy with concurrent activity — the last is retryable.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                duplicateSlug:
                  summary: The same (object, slug) already exists in this workspace
                  value:
                    type: 'https://errors.gradion.com/conflict'
                    title: Conflict
                    status: 409
                    code: conflict
                    detail: 'a custom field named "renewal_date" already exists on deal in this workspace: conflict'
                columnTaken:
                  summary: Another workspace holds the derived column name
                  value:
                    type: 'https://errors.gradion.com/conflict'
                    title: Conflict
                    status: 409
                    code: conflict
                    detail: custom-field column "cf_renewal_date" is taken platform-wide; choose another label
                tableBusy:
                  summary: The bounded lock wait fired — retry the schema change
                  value:
                    type: 'https://errors.gradion.com/conflict'
                    title: Conflict
                    status: 409
                    code: conflict
                    detail: 'the target table is busy with concurrent activity; retry the schema change: conflict'
        '422':
          description: Field definition failed validation, or is judged structural (`structural_change_refused`).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                validation:
                  value:
                    type: 'https://errors.gradion.com/validation_error'
                    title: Validation failed
                    status: 422
                    code: validation_error
                    detail: One or more fields are invalid.
                    details:
                      errors:
                        - { field: currency, code: required_for_type_currency }
                structuralChangeRefused:
                  summary: The requested field is structural, not a bounded scalar attribute
                  value:
                    type: 'https://errors.gradion.com/structural_change_refused'
                    title: Structural change refused
                    status: 422
                    code: structural_change_refused
                    detail: This looks like a new object, relationship, or logic — not a scalar attribute on an existing object. Runtime custom fields only add bounded scalar columns; a structural change ships as a reviewed source change instead.
                    details:
                      route: source_development_path
        '501':
          description: >-
            Schema changes are not enabled on this deployment — the schema-change pool
            (--schema-dsn) is not mounted.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                schemaPoolUnmounted:
                  value:
                    type: 'https://errors.gradion.com/not_implemented'
                    title: Not Implemented
                    status: 501
                    code: not_implemented
                    detail: operation custom-field schema changes is specified but not yet implemented

  /custom-fields/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    patch:
      tags: [CustomFields]
      operationId: renameCustomField
      summary: Rename a custom field's display label (🟢 — not a schema change).
      description: |
        CUSTOM-FIELDS-WIRE-3. Audited catalog `label` update only; `column_name` never
        moves — the physical column identity is stable across rename. Merge-PATCH:
        `column_name`, `object`, and `type` are absent from the request schema entirely.
        A retired field refuses rename with a 409 `conflict` — retirement is terminal,
        so its label is frozen.
      x-mcp-tool: { verb: update_record, record_type: custom_field, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RenameCustomFieldRequest' }
      responses:
        '200':
          description: The renamed custom field.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CustomField' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /custom-fields/{id}/retire:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [CustomFields]
      operationId: retireCustomField
      summary: Retire (soft-retire) a custom field — irreversible-feeling, confirm-first.
      description: |
        CUSTOM-FIELDS-WIRE-4. Sets `status=retired`; hides the field from the API and
        filtering while the column and every value in it are preserved — the engine never
        drops a column as a side effect (CUSTOM-FIELDS-AC-13). 🟡 (mirrors `archivePerson`'s
        posture: an irreversible-feeling state change users must confirm) — an agent caller
        must supply `X-Approval-Token`. Not the generic archive shape: this is a status flip
        on a still-fetchable row, not `archived_at` (which stays null).
      x-mcp-tool: { verb: update_record, record_type: custom_field, tier: yellow }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ApprovalToken'
      responses:
        '200':
          description: >-
            The retired custom field (`status: "retired"`, `archived_at` still null).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CustomField' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: RBAC denied, or an agent 🟡 retire attempted without an approval token.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                approvalRequired:
                  value:
                    type: 'https://errors.gradion.com/approval_required'
                    title: Approval required
                    status: 403
                    code: approval_required
                    detail: Retiring a custom field is confirm-first; supply an approval token.
        '404': { $ref: '#/components/responses/NotFound' }

  /custom-fields/{id}/options:
    parameters:
      - $ref: '#/components/parameters/Id'
    patch:
      tags: [CustomFields]
      operationId: updateCustomFieldOptions
      summary: Edit a picklist custom field's allowed options (🟡 — regenerates the column's CHECK).
      description: |
        CUSTOM-FIELDS-PARAM-5. Only valid for `type=picklist` fields (422 `not_picklist`
        otherwise). Replaces the catalog's `options` array and regenerates the physical
        column's CHECK constraint from the new set via the governed engine (the same
        owner-ALTER-then-downgrade transaction shape as `createCustomField` — this is the
        one DDL path rename/retire never touch). Removing every option is refused (422,
        detail "A picklist needs at least one option") — a picklist always keeps at least
        one allowed value. 🟡 like `retireCustomField`: this mutates a schema-adjacent CHECK
        constraint, so an agent caller must supply `X-Approval-Token`. A retired field
        refuses the edit with a 409 `conflict` — retirement is terminal, so its options
        are frozen; removing an option that stored values still use is also a 409
        (`ADD CONSTRAINT` validates existing rows — migrate the values first).
      x-mcp-tool: { verb: update_record, record_type: custom_field, tier: yellow }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ApprovalToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateCustomFieldOptionsRequest' }
      responses:
        '200':
          description: The custom field with its regenerated option set.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CustomField' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: RBAC denied, or an agent 🟡 options edit attempted without an approval token.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                approvalRequired:
                  value:
                    type: 'https://errors.gradion.com/approval_required'
                    title: Approval required
                    status: 403
                    code: approval_required
                    detail: Editing a picklist's options changes a schema-adjacent CHECK constraint and is confirm-first; supply an approval token.
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: >-
            Stored values still use a removed option, the field is retired (options are
            frozen — retirement is terminal), or the target table is busy with concurrent
            activity — the last is retryable.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                removedOptionInUse:
                  summary: Records still carry an option the edit removes
                  value:
                    type: 'https://errors.gradion.com/conflict'
                    title: Conflict
                    status: 409
                    code: conflict
                    detail: 'existing deal values still use a removed option; migrate them first: conflict'
                fieldRetired:
                  summary: The field is retired — its options are frozen
                  value:
                    type: 'https://errors.gradion.com/conflict'
                    title: Conflict
                    status: 409
                    code: conflict
                    detail: 'the field is retired; a retired field cannot be renamed or have its options edited: conflict'
        '422':
          description: The field is not a picklist, or the edit would remove every option.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                notPicklist:
                  value:
                    type: 'https://errors.gradion.com/not_picklist'
                    title: Validation failed
                    status: 422
                    code: not_picklist
                    detail: Only a picklist field's options can be edited.
                lastOption:
                  value:
                    type: 'https://errors.gradion.com/validation_error'
                    title: Validation failed
                    status: 422
                    code: validation_error
                    detail: A picklist needs at least one option
                    details:
                      errors:
                        - { field: options, code: min_one_required }
        '501':
          description: >-
            Schema changes are not enabled on this deployment — the schema-change pool
            (--schema-dsn) is not mounted.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                schemaPoolUnmounted:
                  value:
                    type: 'https://errors.gradion.com/not_implemented'
                    title: Not Implemented
                    status: 501
                    code: not_implemented
                    detail: operation custom-field schema changes is specified but not yet implemented

