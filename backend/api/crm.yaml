                  pipeline_id: 018f3a1b-0000-7000-8000-0000000000c0
                  stage_id: 018f3a1b-0000-7000-8000-0000000000c1
                  organization_id: 018f3a1b-0000-7000-8000-000000000020
                  source: ui
