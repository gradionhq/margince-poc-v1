# =============================================================================
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Bearer token — the token IS the Agent Seat Passport (ADR-0013: one governed surface, no
        privileged backdoors), minted via `POST /passports` (the local/A1 issuance path; the hosted
        A2 surface replaces issuance with the spec's OAuth2 + PKCE + DCR Authorization Server).
        The token binds the workspace (tenant) and the principal — an agent acting
        under a passport (`agent:<id>` + passport id + on-behalf-of `human:<user-uuid>`). The
        principal's effective RBAC (own/team/all + field masks) is enforced server-side; an agent can
        never exceed its granting human's permissions. Mutations by this scheme ride the autonomy
        gate + approval staging (ADR-0055). Human interactive sessions use `cookieAuth`, not this
        scheme.
    cookieAuth:
      type: apiKey
      in: cookie
      name: crm_session
      description: |
        Human interactive session (ADR-0043). An opaque 32-byte token set at login as
        `crm_session=<token>; HttpOnly; Secure; SameSite=Strict; Path=/`. The server stores only
        `SHA-256(token)` (`session.token_hash`) and authenticates iff the row is un-revoked and
        within idle + absolute expiry. Same `Authorize()` enforcement as the bearer path — no
        bypass. `/auth/login` is unauthenticated (`security: []`); it *mints* it. The first admin
        is created at boot from deployment configuration (A107/ADR-0061) — no public bootstrap.

  # --------------------------- shared parameters ----------------------------
  parameters:
    CaptureProvider:
      name: provider
      in: path
      required: true
      schema: { type: string, enum: [gmail, gcal, graph, imap] }
      description: |
        The mail/calendar capture provider (RC-8; A51 email+calendar parity). `gmail`/`gcal` =
        Google mail+calendar, `graph` = Microsoft 365 (Outlook via Graph), `imap` = the
        self-hostable IMAP engine (which uses the dedicated one-shot `/connectors/imap/connect`).
        WhatsApp/Telegram connect is the messaging-channels surface, not this one.
    Id:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
      description: Opaque resource id (UUID; ordering semantics are not exposed).
    VoiceProfileVersionNumber:
      name: profileVersion
      in: path
      required: true
      schema: { type: integer, minimum: 1 }
      description: Immutable Voice DNA artifact version number within one profile.
    Cursor:
      name: cursor
      in: query
      schema: { type: string }
      description: |
        Opaque keyset cursor from a prior response's `page.next_cursor`. The cursor encodes the
        effective `sort` of the originating request (field + direction) plus the last row's keyset
        (sort-key tuple + the `created_at`/`id` tie-breaker). **Stability:** results are stable
        under concurrent inserts/updates (keyset pagination, not offset). Supplying `cursor`
        together with a `sort` that differs from the one the cursor was minted under returns
        `422 code: cursor_param_mismatch` — re-issue the query without the cursor. Filters are
        **not** fingerprinted by the cursor: changing a filter mid-walk changes which rows the
        remaining pages see, so re-issue the query without the cursor when changing filters.
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      description: Max items in the page.
    Sort:
      name: sort
      in: query
      schema: { type: string }
      description: |
        Sort spec: ONE field, `-` prefix = descending (e.g. `-updated_at`). The house
        `created_at`/`id` tie-breaker is always appended so ordering is total and the keyset
        cursor is deterministic. The default sort when omitted is `-created_at,id` — also the only
        accepted multi-field spelling; any other comma-separated multi-field spec returns
        `422 code: sort_unsupported`. **Allowed sort fields per resource** are the indexed columns
        enumerated in data-model.md §13 (Sort/filter vocabulary) plus the workspace's active `cf_`
        columns (custom columns carry no index in V1 — a `cf_` sort runs as a tenant-scoped scan);
        an out-of-vocabulary field returns `422 code: sort_field_not_allowed`.
    IncludeArchived:
      name: include_archived
      in: query
      schema: { type: boolean, default: false }
      description: Include soft-deleted (archived) rows. Default false.
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      schema: { type: string, maxLength: 255 }
      description: |
        Client-supplied key making a POST safe to retry. **Scope:** the key is unique within
        `(workspace_id, principal, request-path)` and retained **24h**; a replay within that window
        returns the original status + body. Reusing the same key with a *different* request body
        returns `409 code: idempotency_key_conflict` (never a silent replay of mismatched intent).
        **Precedence vs natural keys:** on `logActivity`/`createLead`, the Idempotency-Key (transport
        retry-safety) is checked first; if absent, the `(source_system, source_id)` natural key
        (data-model dedupe) governs. The two never both create a row. Strongly recommended on all POSTs.
    ApprovalToken:
      name: X-Approval-Token
      in: header
      schema: { type: string }
      description: |
        A signed, single-use approval token (see schema `ApprovalToken`) minted by
        POST /approvals/{id}/approve, authorizing exactly one 🟡 confirm-first operation. It is a
        compact JWS whose claims **bind** the token to a specific approval, effect, tenant and
        principal — it is NOT a bare opaque string (ADR-0036). The server rejects a token that is
        expired, already consumed, or whose `diff_hash`/`workspace_id`/`passport_id`/`tool` does not
        match the operation being executed (`403 code: approval_token_invalid`). Required when an
        AGENT principal invokes a 🟡 operation; a human's direct call is itself the approval.
    IfMatch:
      name: If-Match
      in: header
      schema: { type: string }
      description: |
        Optional optimistic-concurrency precondition for a mutating request (PATCH/advance/merge):
        the last-seen entity `version`. If the row's current `version` differs, the write is
        rejected with `409 code: version_skew` (ErrVersionSkew) and no change is made — re-read,
        re-apply, retry. Omitting it is last-write-wins (discouraged for agent/automated writers).
        Accepted on every native (SoR-mode) mutating endpoint that returns a versioned entity.

  # --------------------------- shared responses -----------------------------
  responses:
    Unauthorized:
      description: No valid credential — a missing/invalid/expired `crm_session` cookie (human path) or a missing/invalid/expired bearer token (agent path).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            unauth:
              value: { type: 'https://errors.gradion.com/unauthorized', title: Unauthorized, status: 401, code: unauthorized, detail: No valid session cookie or bearer token. }
    Forbidden:
      description: Authenticated but not permitted (RBAC row/field scope, or 🟡 approval missing).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            rbac:
              value: { type: 'https://errors.gradion.com/forbidden', title: Forbidden, status: 403, code: forbidden, detail: Your role does not permit this action. }
    PermissionDenied:
      description: 'RBAC object/action denial — the authenticated principal''s role lacks the grant for this object+action (`code: permission_denied`, ErrPermissionDenied). Distinct from `scope_exceeds_grantor`/`seat_tier_insufficient` (agent-passport limits) and `approval_required` (🟡 gate).'
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            denied:
              value: { type: 'https://errors.gradion.com/permission_denied', title: Permission denied, status: 403, code: permission_denied, detail: Your role does not grant permission for this action on this object. }
    ScopeExceeded:
      description: 'Agent-Passport ceiling — the Passport requested/attempted more than its granting human''s effective RBAC allows (`code: scope_exceeds_grantor`, ErrScopeExceeded; agent ≤ human, ADR-0013/ADR-0026). Distinct from `permission_denied` (plain RBAC) and `seat_tier_insufficient` (seat ceiling).'
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            scope:
              value: { type: 'https://errors.gradion.com/scope_exceeds_grantor', title: Passport scope exceeds grantor, status: 403, code: scope_exceeds_grantor, detail: The agent Passport may not exceed the granting human's permissions. }
    SeatTierInsufficient:
      description: 'Seat ceiling — a `read` seat (or an agent acting for one) attempted a mutate/send/approve or a write `record_grant`/over-ceiling Passport bind (`code: seat_tier_insufficient`, ErrSeatTierInsufficient; A62/ADR-0047).'
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            seat:
              value: { type: 'https://errors.gradion.com/seat_tier_insufficient', title: Seat tier insufficient, status: 403, code: seat_tier_insufficient, detail: A read seat cannot perform this write/send/approve action. }
    FxRateUnavailable:
      description: 'A multi-currency roll-up could not obtain an FX rate to the base currency (`code: fx_rate_unavailable`; formulas-and-rules §6.1). The report/list is not silently computed on a missing rate.'
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            fx:
              value: { type: 'https://errors.gradion.com/fx_rate_unavailable', title: FX rate unavailable, status: 422, code: fx_rate_unavailable, detail: No FX rate to the base currency was available for this period. }
    EntityTypeMismatch:
      description: 'A list member''s entity type does not match the list''s declared `entity_type` (`code: entity_type_mismatch`; data-model §10.1).'
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            mismatch:
              value: { type: 'https://errors.gradion.com/entity_type_mismatch', title: Entity type mismatch, status: 422, code: entity_type_mismatch, detail: The member's entity type does not match the list's entity_type. }
    NotFound:
      description: No such resource in this workspace (or out of RBAC scope).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            notFound:
              value: { type: 'https://errors.gradion.com/not_found', title: Not found, status: 404, code: not_found, detail: Resource not found. }
    Conflict:
      description: State conflict (duplicate key, concurrent edit, already-decided, default-pipeline collision).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    VersionConflict:
      description: 'Optimistic-lock failure — the entity changed since the version in If-Match (`code: version_skew`).'
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            skew:
              value: { type: 'https://errors.gradion.com/version_skew', title: Version conflict, status: 409, code: version_skew, detail: The resource changed since your last read; re-read and retry. }
    ValidationError:
      description: Request failed validation (RFC 7807 with field-level `details.errors`).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            invalid:
              value:
                type: 'https://errors.gradion.com/validation_error'
                title: Validation failed
                status: 422
                code: validation_error
                detail: One or more fields are invalid.
                details:
                  errors:
                    - { field: 'emails[0].email', code: invalid_email }

  # ------------------------------- schemas ----------------------------------
  schemas:

    # ---- capture connectors (per-user OAuth mail/calendar; RC-8, CAP-WIRE-1) ----
    CaptureConnection:
      type: object
      description: |
        A per-user mail/calendar capture connection + sync state (capture.md CAP-DDL-2). The
        credential itself is NEVER in this shape — it lives encrypted in the vault, referenced only
        server-side by `credential_ref`.
      required: [id, provider, status, scopes]
      properties:
        id: { type: string, format: uuid }
        provider: { type: string, enum: [gmail, gcal, graph, imap], description: The mail/calendar provider (A51 email+calendar parity). }
        status: { type: string, enum: [connected, disconnected, error, reauth_required], description: 'Connection state; `reauth_required` when the stored token expired/was revoked upstream.' }
        sync_cursor: { type: [string, 'null'], description: 'Opaque provider watermark (Gmail historyId / IMAP UID / Graph delta) for incremental capture — read-only.' }
        watch_expires_at: { type: [string, 'null'], format: date-time, description: 'Push/delta subscription renewal deadline (Gmail Pub/Sub / Graph change-notification), or null.' }
        scopes: { type: array, items: { type: string }, description: The granted provider scopes. }
        last_synced_at: { type: [string, 'null'], format: date-time, description: 'Last sync attempt (CAP-DDL-5); null before the first.' }
        last_sync_error_class: { type: [string, 'null'], description: 'rate_limited | unreachable | auth | history_gone | internal — class only, detail in system_log.' }
        next_sync_due_at: { type: [string, 'null'], format: date-time, description: 'When the sweep will next pick this connection up (backoff-aware).' }
        backfill: { allOf: [ { $ref: '#/components/schemas/BackfillStatus' } ], description: 'Summary of the connection''s backfill run; state `none` when never run.' }
        created_at: { type: string, format: date-time, readOnly: true }
        updated_at: { type: string, format: date-time, readOnly: true }
    CaptureConnectionListResponse:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/CaptureConnection' } }
    ConnectConnectorRequest:
      type: object
      description: |
        Connect input. OAuth providers (`gmail`/`gcal`/`graph`) need only an optional `redirect_uri`
        (the app page to return to after consent); `imap` supplies direct credentials. The secret is
        written to the vault, never echoed.
      properties:
        redirect_uri: { type: string, format: uri, description: 'App page to return to after OAuth consent (OAuth providers).' }
        imap:
          type: object
          description: Direct IMAP credentials (the `imap` provider only).
          required: [host, username, secret]
          properties:
            host: { type: string }
            port: { type: integer, default: 993, minimum: 1, maximum: 65535 }
            username: { type: string }
            secret: { type: string, writeOnly: true, description: 'IMAP password / app password — written to the vault, never returned.' }
    ConnectConnectorResponse:
      type: object
      description: 'An OAuth redirect target (OAuth providers).'
      properties:
        authorize_url: { type: [string, 'null'], format: uri, description: 'Provider consent URL to redirect the user to (OAuth providers).' }
        connection: { allOf: [ { $ref: '#/components/schemas/CaptureConnection' } ], description: 'The established/updated connection (appears after the callback completes for OAuth).' }
    BackfillPreviewRequest:
      type: object
      required: [window]
      properties:
        window: { type: string, enum: [none, 3m, 6m, 12m], description: 'The CAP-PARAM-4 window; default UI selection is 6m.' }
    BackfillPreview:
      type: object
      description: 'The scope before the spend (ADR-0063/ADR-0020): what starting this window would touch and roughly cost. An estimate, labeled as such — actual spend is metered per task.'
      required: [window, estimated_messages, computed_at]
      properties:
        window: { type: string, enum: [none, 3m, 6m, 12m] }
        estimated_messages: { type: integer, description: 'Provider-side message count for the window (Gmail resultSizeEstimate / Graph $count).' }
        estimated_ai_tokens: { type: integer, description: 'The estimator''s input-anchored token figure across classify+enrich+embeddings for that count; absent on estimator fault (ADR-0068).' }
        estimated_cost_minor: { type: integer, description: 'USD minor units, estimated from observed ai_call history priced per served model at current ai_model_rate; absent when no rate applies (ADR-0068).' }
        estimate_quality: { type: string, enum: [observed, heuristic], description: 'observed = priced from this workspace''s ai_call history; heuristic = cold-start work-shape floor or a defaulted ratio.' }
        currency: { type: string, description: 'ISO-4217; "USD" in v1.' }
        computed_at: { type: string, format: date-time }
    StartBackfillRequest:
      type: object
      required: [window]
      properties:
        window: { type: string, enum: [3m, 6m, 12m], description: '`none` is expressed by never calling this op. Widen-only versus a prior run.' }
    BackfillStatus:
      type: object
      description: 'The CAP-DDL-4 single-row activation read: every count is a persisted-row count, never a fabricated counter (closes CAP-AC-OPEN-1).'
      required: [state]
      properties:
        state: { type: string, enum: [none, queued, running, done, error, cancelled] }
        backfill_id: { type: [string, 'null'], format: uuid }
        window: { type: [string, 'null'], enum: [3m, 6m, 12m, null] }
        estimated_messages: { type: [integer, 'null'], description: 'The previewed count the user consented to — the progress fraction''s denominator.' }
        counts:
          type: object
          properties:
            messages_scanned: { type: integer }
            captured: { type: integer }
            skipped: { type: integer }
            people_created: { type: integer }
            organizations_created: { type: integer }
            dedupe_candidates: { type: integer }
        started_at: { type: [string, 'null'], format: date-time }
        completed_at: { type: [string, 'null'], format: date-time }
        updated_at: { type: [string, 'null'], format: date-time, description: 'Staleness stamp — a killed worker leaves this honest ("last updated Xs ago").' }
        last_error_class: { type: [string, 'null'], description: 'Error class only; detail lives in system_log (0078 rationale).' }
    MorningDigest:
      type: object
      description: 'The CAP-DDL-6 payload: what capture did overnight and what awaits the human (CAP-WIRE-6).'
      required: [date, generated_at, capture, review, connectors]
      properties:
        date: { type: string, format: date }
        generated_at: { type: string, format: date-time }
        capture:
          type: object
          properties:
            messages_synced: { type: integer }
            activities_created: { type: integer }
            people_created: { type: integer }
            organizations_created: { type: integer }
        review:
          type: object
          properties:
            dedupe_open: { type: integer, description: 'Open DH-DDL-1 candidate pairs.' }
            approvals_pending: { type: integer, description: 'Pending 🟡 items (enrich, quarantine, merge).' }
            classify:
              type: object
              properties:
                commitments: { type: integer }
                meetings: { type: integer }
                noise: { type: integer }
        connectors:
          type: array
          items:
            type: object
            properties:
              provider: { type: string, enum: [gmail, gcal, graph, imap] }
              status: { type: string, enum: [connected, disconnected, error, reauth_required] }
              last_synced_at: { type: [string, 'null'], format: date-time }
              last_sync_error_class: { type: [string, 'null'] }
    DedupeCandidate:
      type: object
      description: 'One DH-DDL-1 review-queue row: the canonical unordered pair, its confidence, and the detection-time evidence snapshot (DH-N-8).'
      required: [id, entity_type, left_id, right_id, confidence, evidence, status, created_at]
      properties:
        id: { type: string, format: uuid }
        entity_type: { type: string, enum: [person, organization] }
        left_id: { type: string, format: uuid, description: 'Canonical ordering: left is the lower id — {A,B} and {B,A} are one row.' }
        right_id: { type: string, format: uuid }
        confidence: { type: number, minimum: 0, maximum: 1, description: 'The PO-F-1/PO-F-2 fuzzy score at detection.' }
        evidence:
          type: array
          description: 'Per-field agree/collide snapshot captured at detection — what the queue renders (AC-dedupe-2/3); never re-derived against since-edited rows.'
          items:
            type: object
            required: [field, left_value, right_value, signal]
            properties:
              field: { type: string, description: 'full_name, org, domain, …' }
              left_value: { type: [string, 'null'] }
              right_value: { type: [string, 'null'] }
              signal: { type: string, description: 'agree | collide | one_sided' }
              score: { type: [number, 'null'], description: 'The field''s contribution where scored (e.g. name_sim).' }
        status: { type: string, enum: [open, merged, not_a_duplicate] }
        disposed_by: { type: [string, 'null'], format: uuid }
        disposed_at: { type: [string, 'null'], format: date-time }
        created_at: { type: string, format: date-time }
    DedupeCandidateListResponse:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/DedupeCandidate' } }
        page: { $ref: '#/components/schemas/PageInfo' }
    DedupeDispositionRequest:
      type: object
      required: [disposition]
      properties:
        disposition: { type: string, enum: [merge, not_a_duplicate] }
        winner_id: { type: [string, 'null'], format: uuid, description: 'Required for merge: the surviving record — must be one of the pair.' }
    AiUsage:
      type: object
      description: 'AI usage + budget (AIRT-WIRE-1): the AIRT-PARAM-33 meter aggregated per day × task × tier, plus the budget band. Token-denominated; cost_est_minor is computed on read from the workspace''s ai_model_rate price sheet as of each call''s day (ADR-0067, price-on-read) — omitted, never a fabricated 0, when a task line''s window carries no priced call.'
      required: [days, budget]
      properties:
        days:
          type: array
          items:
            type: object
            required: [date, tasks]
            properties:
              date: { type: string, format: date }
              tasks:
                type: array
                items:
                  type: object
                  required: [task, tier, calls, tokens_in, tokens_out]
                  properties:
                    task: { type: string, description: 'capture_classify, enrich, summarize, …' }
                    tier: { type: string, description: 'local_small, cheap_cloud, premium, local_large.' }
                    calls: { type: integer }
                    cached_hits: { type: integer }
                    tokens_in: { type: integer }
                    tokens_out: { type: integer }
                    cost_est_minor: { type: integer, description: 'USD minor units (cents), estimated on read from ai_model_rate at each call''s day (ADR-0067). Omitted, not 0, when none of this line''s calls priced.' }
        budget:
          type: object
          required: [monthly_tokens, spent_tokens, band]
          properties:
            monthly_tokens: { type: integer, description: 'seats × base × safety factor (AIRT-PARAM-8).' }
            spent_tokens: { type: integer, description: 'Calendar-month tokens_in + tokens_out.' }
            band: { type: string, enum: [normal, degraded, queued], description: '< 80% / 80–100% soft-degrade / ≥ 100% non-interactive queued (AIRT-PARAM-9..11).' }
            band_since: { type: [string, 'null'], format: date-time }
            currency: { type: string, description: 'ISO-4217 of cost_est_minor — always USD in phase 1 (ADR-0067).' }
    AiCallSummary:
      type: object
      description: One terminal model call from the ai_call trace (AIRT-SCHEMA-2).
      required: [id, occurred_at, task, tier, provider, model_id, served_model, calls_attempted, tokens_in, tokens_out, reasoning_tokens, cached_tokens, latency_ms, cache_hit, degraded, has_payload]
      properties:
        id: { type: string, format: uuid }
        occurred_at: { type: string, format: date-time }
        task: { type: string }
        tier: { type: string, description: 'Empty when the call failed before routing.' }
        provider: { type: string }
        model_id: { type: string, description: 'The configured binding.' }
        served_model: { type: string, description: 'What the provider reported serving.' }
        calls_attempted: { type: integer, description: 'The attempt number of this terminal attempt: 1 = first try succeeded/failed terminally, >1 = retries happened.' }
        tokens_in: { type: integer }
        tokens_out: { type: integer }
        reasoning_tokens: { type: integer }
        cached_tokens: { type: integer }
        latency_ms: { type: integer }
        cache_hit: { type: boolean }
        degraded: { type: boolean }
        error_sentinel: { type: [string, 'null'], description: 'Stable failure code; null on success.' }
        has_payload: { type: boolean, description: 'A captured payload row exists for this call.' }
    AiCallAttempt:
      type: object
      description: One attempt (terminal or not) within a logical call.
      required: [attempt, is_terminal, attempt_reason, tokens_in, tokens_out, latency_ms, occurred_at]
      properties:
        attempt: { type: integer }
        is_terminal: { type: boolean }
        attempt_reason: { type: string, description: 'Why this attempt ran — one of provider_error, schema_invalid, budget_degrade; empty for an ordinary first attempt, though budget_degrade can appear on attempt 1 when the budget guardrail demotes the ladder.' }
        error_sentinel: { type: [string, 'null'] }
        tokens_in: { type: integer }
        tokens_out: { type: integer }
        latency_ms: { type: integer }
        occurred_at: { type: string, format: date-time }
    AiCall:
      allOf:
        - $ref: '#/components/schemas/AiCallSummary'
        - type: object
          required: [served_identity_source, context_scopes, context_fingerprint, attempts, payload_captured]
          properties:
            correlation_id: { type: [string, 'null'], format: uuid }
            agent_run_id: { type: [string, 'null'], format: uuid }
            served_identity_source: { type: string, description: 'response | echo | configured.' }
            config_hash: { type: [string, 'null'], description: 'Routing/prompt config identity of this call.' }
            context_scopes: { type: array, items: { type: string }, description: 'Company-context scopes injected into the request.' }
            context_fingerprint: { type: string }
            attempts:
              type: array
              items: { $ref: '#/components/schemas/AiCallAttempt' }
              description: 'The full attempt ladder for this logical call, oldest first (includes the terminal attempt).'
            payload_captured: { type: boolean }
            payload:
              type: [object, 'null']
              description: 'Present only when payload_captured. Post-secret-stripper content (AIRT-AC-4); rune-capped with a visible truncation marker.'
              required: [request, response]
              properties:
                request: { description: 'The captured request: {"system": string, "messages": [{role, content}]}.' }
                response: { description: 'The captured response text (JSON string).' }
    AiCallListResponse:
      type: object
      required: [data, page, payload_capture_enabled, tasks]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/AiCallSummary' } }
        page: { $ref: '#/components/schemas/PageInfo' }
        payload_capture_enabled: { type: boolean, description: 'The deployment''s ai.capture_payloads posture.' }
        tasks: { type: array, items: { type: string }, description: 'Every task with at least one terminal call, sorted — the complete filter option set (matches the terminal-only list), independent of the current page.' }
    CaptureExclusionRule:
      type: object
      description: |
        One bounded personal-mail exclusion rule (RC-2; capture.md CAP-DDL-3). A matching message
        produces zero CRM rows and a `capture.skipped{personal_exclusion}` event. Deliberately not a
        filtering DSL — a small typed (kind, value) pair, per connected user.
      required: [id, kind, value]
      properties:
        id: { type: string, format: uuid }
        kind: { type: string, enum: [sender_domain, recipient_domain, label], description: 'Match a sender domain, a recipient domain, or a mail label.' }
        value: { type: string, description: 'The normalized domain (e.g. `personal-family.example`) or the provider mail-label name.' }
        created_at: { type: string, format: date-time, readOnly: true }
    CreateCaptureExclusionRequest:
      type: object
      required: [kind, value]
      properties:
        kind: { type: string, enum: [sender_domain, recipient_domain, label] }
        value: { type: string }
    CaptureExclusionRuleListResponse:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/CaptureExclusionRule' } }

    # ---- error (RFC 7807) ----
    Problem:
      type: object
      description: RFC 7807 problem+json with a stable machine `code` and structured `details`.
      required: [status, code]
      properties:
        type:
          type: string
          format: uri
          default: about:blank
          description: A URI identifying the problem type.
        title: { type: string, description: Short, human-readable summary. }
        status: { type: integer, description: HTTP status code. }
        code:
          type: string
          description: Stable machine-readable error code (e.g. duplicate_email, validation_error).
        detail: { type: string, description: Human-readable explanation for this occurrence. }
        instance: { type: string, format: uri, description: URI of the specific occurrence. }
        details:
          type: object
          additionalProperties: true
          description: |
            Structured machine context — e.g. `existing_id` on 409 duplicate, or an
            `errors` array of `{ field, code, message }` on 422 validation.

    # ---- pagination envelope ----
    PageInfo:
      type: object
      required: [has_more]
      properties:
        next_cursor:
          type: [string, 'null']
          description: Opaque cursor for the next page, or null if none.
        has_more: { type: boolean }

    # ---- mixins ----
    Provenance:
      type: object
      description: Provenance carried on every captured/user-entered domain row (data-model §1.6).
      required: [source, captured_by]
      properties:
        source:
          type: string
          description: 'What produced the row: email:<id> | calendar:<id> | connector:<n>:<id> | api | import:<batch> | ui | coldstart.'
        captured_by:
          type: string
          readOnly: true
          description: 'Who produced it: human:<uuid> | agent:<id> | connector:<name>. Server-stamped from the authenticated principal; never client-supplied.'
        raw:
          type: [object, 'null']
          additionalProperties: true
          description: Re-parseable original capture payload (off the query hot path); usually omitted in list views.
    Timestamps:
      type: object
      required: [created_at, updated_at]
      properties:
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at:
          type: [string, 'null']
          format: date-time
          description: Soft-delete marker. Null = live.

    Address:
      type: [object, 'null']
      description: Structured postal address.
      properties:
        line1: { type: [string, 'null'] }
        line2: { type: [string, 'null'] }
        city: { type: [string, 'null'] }
        region: { type: [string, 'null'] }
        postal_code: { type: [string, 'null'] }
        country: { type: [string, 'null'], description: ISO-3166 alpha-2. }
      additionalProperties: true

    Money:
      type: object
      description: Money as integer minor-units + ISO-4217 currency. Never a float.
      properties:
        amount_minor:
          type: [integer, 'null']
          format: int64
          description: Smallest currency unit (e.g. cents). 100000 EUR-cents = €1,000.00.
        currency:
          type: [string, 'null']
          pattern: '^[A-Z]{3}$'
          description: ISO-4217 uppercase.

    # ---- Person + children ----
    PersonEmail:
      type: object
      required: [id, email, email_type, is_primary, position, source, captured_by]
      properties:
        id: { type: string, format: uuid }
        person_id: { type: string, format: uuid }
        email: { type: string, format: email, description: Stored lowercased. }
        email_type: { type: string, enum: [work, personal, other], default: work }
        is_primary: { type: boolean, default: false, description: At most one primary per type (DB-enforced). }
        position: { type: integer, default: 0, description: Explicit ordering. }
        source: { type: string }
        captured_by: { type: string, readOnly: true, description: 'Server-stamped from the authenticated principal (human:<uuid> | agent:<id> | connector:<name>); never client-supplied.' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    PersonPhone:
      type: object
      required: [id, phone, phone_type, is_primary, position, source, captured_by]
      properties:
        id: { type: string, format: uuid }
        person_id: { type: string, format: uuid }
        phone: { type: string, description: E.164 normalized. }
        phone_type: { type: string, enum: [work, mobile, home, other], default: work }
        is_primary: { type: boolean, default: false }
        position: { type: integer, default: 0 }
        source: { type: string }
        captured_by: { type: string, readOnly: true, description: 'Server-stamped from the authenticated principal (human:<uuid> | agent:<id> | connector:<name>); never client-supplied.' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    RelationshipStrength:
      type: object
      description: |
        Deterministic relationship-strength (features/07 §4) — a transparent function over captured
        interaction features (recency, frequency, direction, reciprocity), NOT a trained model. A fixed
        interaction set + fixed clock yields a stable value (P6/P12). The `factors` decompose the score and
        `contributing_activity_ids` are the receipts, so the UI can show its inputs — no mystery number.
      required: [score, bucket, factors]
      properties:
        score: { type: integer, minimum: 0, maximum: 100, description: 0..100 composite. }
        bucket: { type: string, enum: [dormant, weak, warm, strong], description: Coarse band derived from score for display. }
        factors:
          type: object
          description: The 0..1 sub-scores the composite was built from (the explanation).
          required: [recency, frequency, reciprocity, direction]
          properties:
            recency:     { type: number, minimum: 0, maximum: 1 }
            frequency:   { type: number, minimum: 0, maximum: 1 }
            reciprocity: { type: number, minimum: 0, maximum: 1 }
            direction:   { type: number, minimum: 0, maximum: 1 }
        contributing_activity_ids:
          type: array
          items: { type: string, format: uuid }
          description: The activities the score was computed from (the receipts behind the number).
        computed_at: { type: string, format: date-time, description: When this value was last recomputed (fixed-clock reproducible). }
        last_interaction: { type: [string, 'null'], format: date-time, description: Timestamp of the most recent qualifying interaction; null when there are none. }
        inbound_90d: { type: integer, minimum: 0, description: Count of qualifying inbound interactions in the trailing 90-day window. }
        outbound_90d: { type: integer, minimum: 0, description: Count of qualifying outbound interactions in the trailing 90-day window. }

    Person:
      type: object
      description: A contact. Mirrors the `person` table.
      required: [id, workspace_id, full_name, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        first_name: { type: [string, 'null'] }
        last_name: { type: [string, 'null'] }
        full_name: { type: string, description: Always present (display name). }
        title: { type: [string, 'null'], description: Denormalized current title; authoritative title is on the employment relationship. }
        owner_id: { type: [string, 'null'], format: uuid }
        social:
          type: object
          additionalProperties: true
          description: '{ linkedin, twitter, github, ... }'
        address: { $ref: '#/components/schemas/Address' }
        emails:
          type: array
          items: { $ref: '#/components/schemas/PersonEmail' }
        phones:
          type: array
          items: { $ref: '#/components/schemas/PersonPhone' }
        consent:
          type: array
          readOnly: true
          description: |
            Per-purpose consent summary (A22/ADR-0011). Read-only derived view of the `person_consent`
            rows; one entry per purpose the workspace tracks. The single flat `consent_state` flag was
            REMOVED — consent is per-purpose and demonstrable (data-model.md §3.4). Mutate via
            `POST /people/{id}/consent`; read the full proof log via `GET /people/{id}/consent`.
          items: { $ref: '#/components/schemas/PersonConsentState' }
        merged_into_id: { type: [string, 'null'], format: uuid, description: Set when this row was merged away. }
        converted_from_lead_id: { type: [string, 'null'], format: uuid, description: Canonical origin pointer if promoted from a lead. }
        strength: { allOf: [ { $ref: '#/components/schemas/RelationshipStrength' } ], readOnly: true, description: 'Deterministic relationship-strength (features/07 §4). Read-only derived view; NULL until capture has interactions. No mystery number — the factors + contributing activities are the explanation.' }
        source: { type: string }
        captured_by: { type: string, readOnly: true, description: 'Server-stamped from the authenticated principal (human:<uuid> | agent:<id> | connector:<name>); never client-supplied.' }
        raw: { type: [object, 'null'], additionalProperties: true }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }
      additionalProperties: true
      x-extension: true
      x-extension-note: |
        additionalProperties:true admits client custom fields (data-model §9 — custom fields
        are real columns added by migration, surfaced additively through this same contract).
        Because these extra keys carry no per-key schema, writes are drop-on-mismatch: a key
        that names no ACTIVE custom column (unknown or retired), or whose value shape does
        not match the column's declared type, is silently excluded from the write — the
        request still succeeds. A picklist value outside the declared options is the one
        typed refusal (422, the column's CHECK constraint). Reads surface only ACTIVE
        columns; a retired field's stored values are preserved but leave the payload.

    CreatePersonRequest:
      type: object
      required: [full_name, source]
      properties:
        full_name: { type: string }
        first_name: { type: [string, 'null'] }
        last_name: { type: [string, 'null'] }
        title: { type: [string, 'null'] }
        owner_id: { type: [string, 'null'], format: uuid }
        social: { type: object, additionalProperties: true }
        address: { $ref: '#/components/schemas/Address' }
        emails:
          type: array
          items:
            type: object
            required: [email]
            properties:
              email: { type: string, format: email }
              email_type: { type: string, enum: [work, personal, other], default: work }
              is_primary: { type: boolean, default: false }
              position: { type: integer, default: 0 }
        phones:
          type: array
          items:
            type: object
            required: [phone]
            properties:
              phone: { type: string }
              phone_type: { type: string, enum: [work, mobile, home, other], default: work }
              is_primary: { type: boolean, default: false }
              position: { type: integer, default: 0 }
        source: { type: string }
      additionalProperties: true
      x-extension: true

    UpdatePersonRequest:
      type: object
      description: Partial update. Omitted fields are unchanged.
      properties:
        full_name: { type: string }
        first_name: { type: [string, 'null'] }
        last_name: { type: [string, 'null'] }
        title: { type: [string, 'null'] }
        owner_id: { type: [string, 'null'], format: uuid }
        social: { type: object, additionalProperties: true }
        address: { $ref: '#/components/schemas/Address' }
      additionalProperties: true
      x-extension: true
      x-consent-note: |
        Consent is NOT mutable through person update (A22/ADR-0011). Use POST /people/{id}/consent
