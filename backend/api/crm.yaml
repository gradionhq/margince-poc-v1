          content:
            application/json:
              schema: { $ref: '#/components/schemas/VoiceBuild' }
        '404': { $ref: '#/components/responses/NotFound' }

  /voice-profiles/{id}/versions:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Voice]
      operationId: listVoiceProfileVersions
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: List immutable active, superseded, rejected, and candidate versions newest first.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Version history.
          content:
            application/json:
              schema:
                type: object
                required: [data, page]
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/VoiceProfileVersion' } }
                  page: { $ref: '#/components/schemas/PageInfo' }
        '404': { $ref: '#/components/responses/NotFound' }

  /voice-profiles/{id}/versions/{profileVersion}/apply:
    parameters:
      - $ref: '#/components/parameters/Id'
      - $ref: '#/components/parameters/VoiceProfileVersionNumber'
    post:
      tags: [Voice]
      operationId: applyVoiceProfileVersion
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: Explicitly activate a candidate version that awaited owner review.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Activated version.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VoiceProfileVersion' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /voice-profiles/{id}/versions/{profileVersion}/reject:
    parameters:
      - $ref: '#/components/parameters/Id'
      - $ref: '#/components/parameters/VoiceProfileVersionNumber'
    post:
      tags: [Voice]
      operationId: rejectVoiceProfileVersion
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: Reject a candidate; the last known-good remains active.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Rejected candidate.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VoiceProfileVersion' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /voice-profiles/{id}/versions/{profileVersion}/rollback:
    parameters:
      - $ref: '#/components/parameters/Id'
      - $ref: '#/components/parameters/VoiceProfileVersionNumber'
    post:
      tags: [Voice]
      operationId: rollbackVoiceProfileVersion
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: Restore an earlier artifact byte-for-byte as a new forward active version.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '201':
          description: New active forward version.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VoiceProfileVersion' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /voice-profiles/{id}/deltas:
    parameters:
