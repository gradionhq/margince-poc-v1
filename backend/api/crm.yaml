            application/json:
              schema: { $ref: '#/components/schemas/PersonConsentState' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /people/{id}/consent/double-opt-in:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Compliance]
      operationId: issueDoubleOptIn
      security: [ { cookieAuth: [] } ]   # human session only
      x-agent-access: human-only
      summary: Mint + deliver a double-opt-in confirmation token (the issuance half of the DOI round-trip).
      description: |
        Issues the token that `recordConsent` later redeems (feedback/11 — the contract previously
        defined only redemption). Mints a **single-use, 72h-TTL** double-opt-in token for `purpose_id`
        and, when `deliver=true`, queues the confirmation message through the outbound surface for
        delivery to the data subject. Only the token's **SHA-256 hash is stored** (`consent_doi_token`,
        data-model §3.4); the plaintext is returned **once** here (and in the delivered message) and
        never again. A new issuance **supersedes** any unredeemed prior token for the same
        `(person, purpose)`. Requires the purpose to have `requires_double_opt_in=true` (else `422`).
        🟢 — an internal issuance; the confirmation send rides the outbound/consent gate like any message.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [purpose_id]
              properties:
                purpose_id: { type: string, format: uuid }
                deliver:
                  type: boolean
                  default: true
                  description: When true, queues the confirmation message; false mints only (for a capture surface that delivers its own — feedback/14 booking/forms).
      responses:
        '201':
          description: Token issued (plaintext shown once); confirmation queued when deliver=true.
          content:
            application/json:
              schema:
                type: object
                required: [token, expires_at]
                properties:
                  token: { type: string, description: The single-use DOI token — shown once; redeem via recordConsent.double_opt_in_token. }
                  expires_at: { type: string, format: date-time }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /record-grants:
    get:
      tags: [Access]
      operationId: listRecordGrants
      summary: List manual per-record grants, filtered by record or by subject (A52/ADR-0039).
      description: |
        Returns active `record_grant` rows. Filter by a record (`record_type`+`record_id`) to answer
        "who has been granted access to this record?", or by a subject (`subject_type`+`subject_id`) to
        answer "what has this user/team been granted?". Read-only; tiered base scope (own/team/all) is
        not returned here — this surfaces only the *manual* grants on top of it.
      parameters:
        - { name: record_type, in: query, schema: { type: string, enum: [deal, person, organization, lead] } }
        - { name: record_id, in: query, schema: { type: string, format: uuid } }
        - { name: subject_type, in: query, schema: { type: string, enum: [user, team] } }
        - { name: subject_id, in: query, schema: { type: string, format: uuid } }
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      x-mcp-tool: { verb: search_records, record_type: record_grant, tier: green }
      responses:
        '200':
          description: A page of record grants.
          content:
            application/json:
              schema:
                type: object
                required: [data, page]
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/RecordGrant' } }
                  page: { $ref: '#/components/schemas/PageInfo' }
    post:
      tags: [Access]
      operationId: createRecordGrant
      summary: Share one record with a user or team. 🟡 — agent calls are queued behind the approval gate.
      description: |
        Grants `read` or `write` on a single record to a user or team otherwise out of their own/team/all
        scope. Enforced by widening BOTH the application visibility WHERE clause AND the RLS backstop
        policy (`data-model §1.3c/§2.5`). Idempotent on `(record_type, record_id, subject_type, subject_id)` —
        re-asserting upgrades/downgrades `access` and resets `expires_at`. A grant can never exceed the
        granting principal's own access (scope-intersection). Audited (`action: record_share`). Bounded:
        flat explicit grants only — no sharing hierarchies, criteria-rules, or grant-of-grant delegation.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ApprovalToken'
      x-mcp-tool: { verb: share_record, record_type: record_grant, tier: yellow }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateRecordGrantRequest' }
      responses:
        '201':
          description: Grant created (or updated).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RecordGrant' }
        '403':
          description: RBAC denied (`manage_sharing` required), or an agent 🟡 share attempted without an approval token.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                approvalRequired:
                  value:
                    type: 'https://errors.gradion.com/approval_required'
                    title: Approval required
                    status: 403
                    code: approval_required
                    detail: Sharing a record is confirm-first for an agent; supply an approval token.
        '422': { $ref: '#/components/responses/ValidationError' }

  /record-grants/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    delete:
      tags: [Access]
      operationId: revokeRecordGrant
      summary: Revoke a manual record grant. 🟡 — agent calls are queued behind the approval gate.
      description: |
        Deletes the grant; the subject loses the widened access immediately (the next query no longer
        matches the `OR EXISTS (record_grant …)` clause). Audited (`action: record_unshare`).
      parameters:
        - $ref: '#/components/parameters/ApprovalToken'
        - $ref: '#/components/parameters/IfMatch'
      x-mcp-tool: { verb: share_record, record_type: record_grant, tier: yellow }
      responses:
        '204': { description: Revoked. }
        '403':
          description: RBAC denied (`manage_sharing` required), or an agent 🟡 revoke attempted without an approval token.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                approvalRequired:
                  value:
                    type: 'https://errors.gradion.com/approval_required'
                    title: Approval required
                    status: 403
                    code: approval_required
                    detail: Revoking a share is confirm-first for an agent; supply an approval token.
        '404': { $ref: '#/components/responses/NotFound' }

  /users:
    get:
      tags: [Identity]
      operationId: listUsers
      summary: List workspace members (roster) — cursor-paginated. Read-only.
      description: |
        The workspace member roster: id + display name + email + seat/status. Any authenticated member
        may read it (needed to pick a record-share subject and to resolve subject/granter names). Excludes
        archived users. Row-scoped by workspace RLS.
      x-mcp-tool: { verb: search_records, record_type: app_user, tier: green }
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: q
          in: query
          schema: { type: string }
          description: Case-insensitive match over display_name/email.
        - name: include_inactive
          in: query
          schema: { type: boolean, default: false }
          description: Admin management view — include deactivated/suspended members. Honored only for an admin caller.
      responses:
        '200':
          description: A page of workspace members.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Identity]
      operationId: inviteUser
      summary: Invite a new member. Admin-only, human-only.
      description: |
        Creates an active member with the chosen system role and no password, then issues a
        single-use set-password token. When an email sender is configured the invite link is
        mailed to the new address; otherwise the member sets a password through the standard
        account-recovery flow. Admin-only (`role: admin`); an agent may never provision a human.
        Emits `user.invited`.
      x-agent-access: human-only
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InviteUserRequest' }
      responses:
        '201':
          description: The invited member.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: A member with this email already exists.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /users/{id}/role:
    parameters:
      - $ref: '#/components/parameters/Id'
    patch:
      tags: [Identity]
      operationId: changeUserRole
      summary: Set a member's system role. Admin-only, human-only.
      description: |
        Replaces the member's role assignments with the one target system role and emits
        `role.changed` so effective-permission caches never serve a stale grant. Admin-only.
      x-agent-access: human-only
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChangeUserRoleRequest' }
      responses:
        '200':
          description: The updated member.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Refused — demoting this member would leave the organization with no active admin.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /users/{id}/deactivate:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Identity]
      operationId: deactivateUser
      summary: Deactivate a member and revoke their live access. Admin-only, human-only.
      description: |
        Flips the member to `deactivated` and hard-revokes every live session and passport they
        bound, in one transaction; per-call re-auth already refuses a deactivated principal, and
        `user.deactivated` lets caches drop access without polling. Idempotent. Admin-only.
      x-agent-access: human-only
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DeactivateUserRequest' }
      responses:
        '200':
          description: The deactivated member.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Refused — this is the last active admin; deactivating them would lock the organization out.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /users/{id}/reactivate:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Identity]
      operationId: reactivateUser
      summary: Reactivate a deactivated member. Admin-only, human-only.
      description: |
        Returns a `deactivated` member to `active`; they may sign in again (existing sessions
        stay revoked and are re-minted on the next login). Idempotent on an already-active member.
        Emits `user.reactivated`. Admin-only.
      x-agent-access: human-only
      responses:
        '200':
          description: The reactivated member.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /teams:
    get:
      tags: [Identity]
      operationId: listTeams
      summary: List workspace teams — cursor-paginated. Read-only.
      description: |
        Teams available as record-share subjects, with a member count. Any authenticated member may read.
        Excludes archived teams. Row-scoped by workspace RLS.
      x-mcp-tool: { verb: search_records, record_type: team, tier: green }
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: q
          in: query
          schema: { type: string }
          description: Case-insensitive match over team name.
      responses:
        '200':
          description: A page of teams.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TeamListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # =========================================================================
  # VOICE — owner-private Voice DNA management (ADR-0066).
  # The V1 surface is per-user and human-only. Draft generation may consume the
  # active artifact internally, but an agent cannot browse or alter the human's
  # corpus, learning signals, candidates, or identity preferences.
  # =========================================================================
  /voice-profiles:
    get:
      tags: [Voice]
      operationId: listVoiceProfiles
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: List the calling user's live Voice DNA (zero or one in V1).
      responses:
        '200':
          description: The caller's profile, when one exists.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { type: array, maxItems: 1, items: { $ref: '#/components/schemas/VoiceProfile' } }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Voice]
      operationId: createVoiceProfile
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: Create the calling user's one personal Voice DNA.
      description: The profile starts collecting with an empty derived artifact. A second live profile is 409.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateVoiceProfileRequest' }
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VoiceProfile' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /voice-profiles/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Voice]
      operationId: getVoiceProfile
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: Read the calling user's Voice DNA and active derived artifact.
      responses:
        '200':
          description: The Voice DNA.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VoiceProfile' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Voice]
      operationId: updateVoiceProfile
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: Replace human-authored preferences or enable/disable automatic improvement.
      description: The derived artifact and its version are never writable through this operation.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateVoiceProfileRequest' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VoiceProfile' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Voice]
      operationId: deleteVoiceProfile
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: Archive the calling user's Voice DNA and stop its use in drafts.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: Archived profile; no longer used for drafting.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VoiceProfile' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /voice-profiles/{id}/sources:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Voice]
      operationId: listVoiceCorpusSources
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: List the owner's corpus manifest and live meter; source text is never returned.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Manifest and meter.
          content:
            application/json:
              schema:
                type: object
                required: [data, summary, page]
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/VoiceCorpusSource' } }
                  summary: { $ref: '#/components/schemas/VoiceCorpusSummary' }
                  page: { $ref: '#/components/schemas/PageInfo' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [Voice]
      operationId: ingestVoiceCorpusSource
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: Ingest or replace one manual own-authored text source.
      description: |
        Idempotent on `source_ref`. Transcript inputs are speaker-filtered to the supplied owner label;
        other speakers contribute zero words. V1 accepts text/transcript formats only, never binary
        documents. Ingest updates the meter and marks a built profile stale but makes no model call.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/IngestVoiceCorpusSourceRequest' }
      responses:
        '201':
          description: Created or replaced.
          content:
            application/json:
              schema:
                type: object
                required: [source, summary]
                properties:
                  source: { $ref: '#/components/schemas/VoiceCorpusSource' }
                  summary: { $ref: '#/components/schemas/VoiceCorpusSummary' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /voice-profiles/{id}/sources/{sourceId}:
    parameters:
      - $ref: '#/components/parameters/Id'
      - name: sourceId
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Voice]
      operationId: updateVoiceCorpusSource
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: Exclude/re-include a source or change its weight without rebuilding inline.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateVoiceCorpusSourceRequest' }
      responses:
        '200':
          description: Updated source and meter.
          content:
            application/json:
              schema:
                type: object
                required: [source, summary]
                properties:
                  source: { $ref: '#/components/schemas/VoiceCorpusSource' }
                  summary: { $ref: '#/components/schemas/VoiceCorpusSummary' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Voice]
      operationId: deleteVoiceCorpusSource
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: Permanently remove one retained source and mark any active artifact stale.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: Archived source manifest; retained content has been scrubbed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VoiceCorpusSource' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /voice-profiles/{id}/corpus/clear:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Voice]
      operationId: clearVoiceCorpus
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: Permanently clear retained corpus, learning content, builds, deltas, and derived versions.
      description: Human preferences remain; automatic improvement turns off; the profile returns to collecting.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Corpus and derived history cleared; human-authored preferences remain.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VoiceProfile' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /voice-profiles/{id}/builds:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Voice]
      operationId: createVoiceBuild
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: Queue a durable build over the current included corpus.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateVoiceBuildRequest' }
      responses:
        '202':
          description: Queued, or the already-active build returned idempotently.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VoiceBuild' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /voice-profiles/{id}/builds/{buildId}:
    parameters:
      - $ref: '#/components/parameters/Id'
      - name: buildId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
