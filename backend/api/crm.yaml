  # ----------------------------- /reports -----------------------------------
  /reports/{report}:
    parameters:
      - name: report
        in: path
        required: true
        schema: { type: string }
        description: Report key (prebuilt) or a saved-report id.
        examples:
          prebuilt: { value: open-deals-per-company }
    post:
      tags: [Reports]
      operationId: runReport
      summary: Run a report (the `run_report` MCP verb) and return aggregate rows.
      description: |
        Executes a validated, typed query plan (NOT free-form SQL). Every aggregate cell is
        reconcilable via the `derivation` for "Explain This Number" (features/03 §1.3).
        Bound by RBAC; an agent caller cannot read beyond the human's scope. Audit-logged.
      x-mcp-tool: { verb: run_report, tier: green }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RunReportRequest' }
            examples:
              winRateBySource:
                value:
                  filters: { period: last_quarter }
                  group_by: [source]
      responses:
        '200':
          description: Report result (aggregate rows + plan + per-cell derivation handles).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportResult' }
              examples:
                result:
                  value:
                    report: open-deals-per-company
                    plan:
                      object: deal
                      filters: { status: open }
                      group_by: [organization_id]
                      aggregates: [{ fn: count, as: open_deals }]
                    columns: [organization_id, open_deals]
                    rows:
                      - { organization_id: 018f3a1b-0000-7000-8000-000000000020, open_deals: 3 }
                    total_rows: 1
                    generated_at: '2026-06-04T08:00:00Z'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: The plan failed validation (out-of-vocabulary field, invalid aggregate).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /reports/{report}/derivation:
    parameters:
      - name: report
        in: path
        required: true
        schema: { type: string }
        description: Report key (prebuilt) or a saved-report id.
    get:
      tags: [Reports]
      operationId: explainReport
      summary: '"Explain This Number" — resolve a derivation handle to its definition + source rows.'
      description: |
        Resolves the drill-through handle minted as `derivation_url` on every `runReport`
        aggregate row (features/03 §1.3, AC-R6). Returns (a) the exact filter+group+aggregate
        definition **in plain language** and (b) the underlying source rows, row-scoped through
        the SAME RBAC clauses the report itself used — an explanation never out-sees the report.
        The drill-through rows reconcile exactly to the explained aggregate (AC-X1).

        Query vocabulary: `by` names the plan's grouping dimensions and `agg` its aggregates
        (`fn:field:alias` triplets); **every other query parameter is an equality predicate**
        from the report's closed field vocabulary — the group-key values of the explained row
        plus the plan's filters. An empty predicate value matches SQL NULL (the "no owner"
        group). An out-of-vocabulary key returns `422 code: report_field_not_allowed`.
      parameters:
        - name: by
          in: query
          schema:
            type: array
            items: { type: string }
          style: form
          explode: true
          description: The plan's grouping dimensions (each must also appear as a predicate parameter carrying the explained row's group-key value).
        - name: agg
          in: query
          schema:
            type: array
            items: { type: string }
          style: form
          explode: true
          description: 'The plan''s aggregates as `fn:field:alias` triplets (field empty for `count`), e.g. `sum:amount_minor:unweighted_minor`.'
      responses:
        '200':
          description: The plain-language definition + drill-through source rows behind the number.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportDerivation' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: A predicate key, grouping dimension, or aggregate is outside the report's vocabulary.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  # ----------------------------- /search ------------------------------------
  /search:
    get:
      tags: [Search]
      operationId: search
      summary: Cross-object search (people, orgs, deals, activities, leads).
      description: Hybrid full-text search. Results are scoped by RBAC; leads are a distinct result type.
      x-mcp-tool: { verb: search_records, tier: green }
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
          description: The search query.
        - name: types
          in: query
          schema:
            type: array
            items: { type: string, enum: [person, organization, deal, activity, lead] }
          style: form
          explode: false
          description: Restrict to these object types (default all).
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Ranked cross-object results.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SearchResponse' }
              examples:
                hits:
                  value:
                    data:
                      - { type: person, id: 018f3a1b-0000-7000-8000-000000000010, title: 'Dana Buyer', score: 0.91 }
                      - { type: deal, id: 018f3a1b-0000-7000-8000-000000000030, title: 'Acme — Platform expansion', score: 0.74 }
                    page: { next_cursor: null, has_more: false }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /agent-tools:
    get:
      tags: [Agents]
      operationId: listAgentTools
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: The governed tool surface (registry metadata) for the operator UI.
      description: >
        Read-only inventory of the tools an agent passport can call — name, action verb, the
        passport scope each requires, its autonomy tier (green/yellow/dynamic) and whether it
        reaches outside the workspace. This is governance metadata, not tenant data; it mirrors
        exactly what an MCP client sees from `tools/list`.
      responses:
        '200':
          description: The governed tool surface, stably ordered by name.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentToolListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ---------------------------- /coldstart ----------------------------------
  /coldstart:
    post:
      tags: [AI]
      operationId: coldStartReadback
      summary: Website cold-start read-back — returns a staged proposal with evidence.
      description: |
        Reads back a structured company profile (ICP, buying center, value proposition, USP, buying
        intents) from EXACTLY ONE input (B-E01.2b/.13): a company `url` (fetched+parsed via the ADR-0006
        connector), pasted `text` (the manual fallback when a site is robots-disallowed/unreadable — a
        paste-text form, never an error wall), or a `self_description` (the user's own dictated/typed ICP).
        EVERY returned field carries a non-empty `evidence_snippet` + `confidence` + a `source_kind`
        (`source_url` only when `source_kind=url`), or it is ABSENT (the no-guess gate, features/07 §1).
        NOTHING is written to real records — this is a 🟡 staging surface; the user accepts via /approvals.
        A `self_description` field is "grounded" in the user's own words (source_kind=self_description) —
        that is honest grounding, not fabrication, and it still stages 🟡.
      x-mcp-tool: { verb: enrich, tier: yellow }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ColdStartRequest' }
            examples:
              url:
                value: { url: 'https://acme.com' }
              pasteText:
                summary: Manual paste-text fallback (unreadable/robots-disallowed site)
                value: { text: 'Acme onboards RevOps teams in minutes. Built for scaling B2B SaaS…' }
              selfDescription:
                summary: User's own dictated/typed ICP (B-E01.13 speech input)
                value: { self_description: 'We sell fractional CFO services to seed-stage German startups.' }
      responses:
        '200':
          description: A staged proposal with per-field evidence (no records written).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ColdStartProposal' }
              examples:
                proposal:
                  value:
                    proposal_id: 018f3a1b-0000-7000-8000-0000000000d0
                    source_url: 'https://acme.com'
                    status: staged
                    fields:
                      - field: value_proposition
                        value: Cuts onboarding time by 80%.
                        evidence_snippet: '"Onboard your team in minutes, not weeks."'
                        source_url: 'https://acme.com/#hero'
                        confidence: 0.86
                      - field: icp
                        value: Mid-market B2B SaaS RevOps teams.
                        evidence_snippet: '"Built for RevOps leaders at scaling SaaS companies."'
                        source_url: 'https://acme.com/customers'
                        confidence: 0.71
                    created_at: '2026-06-04T08:00:00Z'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422':
          description: URL unfetchable / read too little — honest degradation, zero fabricated fields.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                couldNotRead:
                  value:
                    type: 'https://errors.gradion.com/coldstart_unreadable'
                    title: Could not read enough
                    status: 422
                    code: coldstart_unreadable
                    detail: Couldn't read enough from this page. Retry or paste text.
                    details: { populated_fields: 0 }

  /coldstart/preview:
    post:
      tags: [AI]
      operationId: coldStartPreview
      summary: Read a company back from a website (or text) to PRE-FILL the company form. Stages nothing.
      description: |
        The same extraction + no-guess gate as POST /coldstart, with no staging: the fields are returned
        for a human to check and correct in the company form, and NOTHING is written or queued. Confirm-first
        (🟡) is honoured by the form itself — the unsaved form IS the staged state, and PUT /company is the
        human's confirmation. This is the read-back onboarding uses; POST /coldstart's approval-inbox
        staging remains for callers that propose asynchronously, with no human at the screen.

        Exactly one of `url`, `text` or `self_description`, as on /coldstart. Every field still carries a
        non-empty `evidence_snippet` + `confidence`, or it is ABSENT — a field the source does not ground
        is returned as an omission for the human to fill in by hand, never as a guess.
      x-mcp-tool: { verb: read, tier: green }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ColdStartRequest' }
            examples:
              url:
                value: { url: 'https://acme.com' }
      responses:
        '200':
          description: The evidenced fields, for the form to pre-fill. Nothing written, nothing staged.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ColdStartReadback' }
              examples:
                readback:
                  value:
                    fields:
                      - field: value_proposition
                        value: Cuts onboarding time by 80%.
                        evidence_snippet: '"Onboard your team in minutes, not weeks."'
                        source_kind: url
                        source_url: 'https://acme.com/#hero'
                        confidence: 0.86
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422':
          description: URL unfetchable / read too little — honest degradation, zero fabricated fields.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  # ------------------------- onboarding state ------------------------------
  /onboarding/state:
    get:
      tags: [Identity]
      operationId: getOnboardingState
      summary: Get the acting user's resumable onboarding state.
      description: |
        Returns only wizard orchestration state. Confirmed company data, website-read findings,
        voice artifacts, and connector grants remain in their owning resources. A user with no
        persisted state receives 404; the client starts from the server-derived creator/member path.
      x-agent-access: human-only
      security:
        - cookieAuth: []
      responses:
        '200':
          description: The acting user's current onboarding state.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OnboardingState' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Identity]
      operationId: putOnboardingState
      summary: Create or replace the acting user's resumable onboarding state.
      description: |
        `expected_version=0` creates the state. Later writes must supply the version last read;
        a stale concurrent tab receives 409 and must reload before retrying. The server derives
        creator/member path from anchor-company existence and rejects creator advancement beyond
        Confirm until the minimum company profile exists.
      x-agent-access: human-only
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PutOnboardingStateRequest' }
      responses:
        '200':
          description: Persisted onboarding state with its new optimistic version.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OnboardingState' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  # ----------------------------- /company -----------------------------------
  /company:
    get:
      tags: [Organizations]
      operationId: getCompany
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: The installation's own company (the anchor organization).
      description: |
        The company this installation belongs to — the spec's anchor organization, marked by
        `organization.is_anchor` (0083; at most one live anchor per workspace). 404 until a human first
        saves the company form: that 404 IS the "this installation has not described itself yet" signal,
        and it is what onboarding gates on. Distinct from GET /organizations/{id}, which reads the
        customer records.
      responses:
        '200':
          description: The anchor organization's profile.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CompanyProfile' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: No company saved yet — onboarding has not been completed.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
    put:
      tags: [Organizations]
      operationId: putCompany
      security: [ { cookieAuth: [] } ]   # human session only — rejects agent bearer/Passport (x-agent-access: human-only)
      # This save IS the 🟡 confirmation of a read-back: an agent may PROPOSE the company
      # (POST /coldstart/preview) but never make it true, exactly as it may stage an approval
      # and never approve it.
      x-agent-access: human-only
      summary: Save the installation's own company — the human's confirm-first write.
      description: |
        Creates the anchor organization on first save (marking it `is_anchor`) and updates it on every
        later one. This is a HUMAN write: every field is stamped
        `captured_by=human:<user id>`, `source=human`, whether it was typed from scratch or accepted
        from a /coldstart/preview read-back — once a human has looked at a value and saved it, it is
        theirs, and a later agent read-back will not overwrite it.

        Unlike the cold-start accept path this never resolves a target by domain: the workspace names its
        own anchor, so a company saved from pasted text or typed by hand works exactly like one read from
        a website. Fields omitted from the body are left untouched; fields sent empty are cleared.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CompanyProfileInput' }
            examples:
              typed:
                summary: Typed by hand — no website read at all
                value:
                  display_name: Acme GmbH
                  legal_name: Acme Gesellschaft mit beschränkter Haftung
                  register_vat: DE123456789
                  registered_address: Torstraße 1, 10119 Berlin
                  industry: B2B SaaS
                  icp: Mid-market RevOps teams.
      responses:
        '200':
          description: The saved company.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CompanyProfile' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /company/context/capabilities:
    get:
      tags: [Organizations, AI]
      operationId: getCompanyContextCapabilities
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: Get the effective server-side company-context rollout capability.
      description: The UI follows this authenticated response instead of inferring deployment configuration.
      responses:
        '200':
          description: Effective ordered rollout stage and its derived capabilities.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CompanyContextCapabilities' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /company/context:
    get:
      tags: [Organizations, AI]
      operationId: getCompanyContext
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: The deterministic, typed context assembled from the anchor company.
      description: |
        Reads confirmed company identity, profile fields and accepted repeatable facts under the
        caller's normal organization row scope. The requested scopes bound the result; raw crawl
        pages and individual people never enter this read model. Ordering and fingerprinting are
        deterministic so downstream model calls can bind cache entries and traces to the exact
        company knowledge they used.
      parameters:
        - name: scopes
          in: query
          description: Comma-separated context scopes. Omit for the bounded default set.
          schema: { type: string, example: 'identity,positioning,offer' }
      responses:
        '200':
          description: The selected company-context scopes and their provenance-bearing values.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CompanyContext' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /company/site-reads:
    post:
      tags: [Organizations, AI]
      operationId: startCompanySiteRead
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: Start an optional progressive website read before the anchor company exists.
      description: |
        Creates only an unbound operational dossier and queues the shared deep-read engine in the
        same transaction. No organization, profile field, fact, lead, or domain row is created.
        Repeating the same URL while its read is active joins the existing dossier.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StartCompanySiteReadRequest' }
      responses:
        '202':
          description: Read accepted; poll the returned dossier while extraction progresses.
          headers:
            Location: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CompanySiteRead' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /company/site-reads/{readId}:
    parameters:
      - name: readId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Organizations, AI]
      operationId: getCompanySiteRead
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: Read the latest progressive onboarding dossier and its grounded draft findings.
      responses:
        '200':
          description: Current read state, coverage, findings, omissions, and separately staged people.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CompanySiteRead' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /company/site-reads/{readId}/confirm:
    parameters:
      - name: readId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Organizations, AI]
      operationId: confirmCompanySiteRead
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: Confirm a selected onboarding draft into the anchor company atomically.
      description: |
        Applies only the submitted profile and selected fact keys. The draft version and proposal
        hash bind confirmation to the exact inspected proposal; a stale confirmation returns 409.
        Every human-held collision requires an explicit keyed resolution. Unchanged values retain
        website evidence, edits become human assertions, and published people remain separate
        site-lead proposals rather than becoming contacts or company-context rows.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ConfirmCompanySiteReadRequest' }
      responses:
        '200':
          description: Confirmed anchor company profile and accepted facts.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CompanyProfile' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  # -------------------------- /connectors/imap ------------------------------
  /connectors/imap/connect:
    post:
      tags: [Connectors]
      operationId: connectImap
      summary: One-shot IMAP pull — capture the most recent mailbox messages as email activities.
      description: |
        Dials a user's mailbox over IMAPS with the supplied credentials, pulls the most recent
        `max_messages` messages from `mailbox`, and captures each as an email activity on the
        timeline. This is a ONE-SHOT pull: the credentials are used for this call only — they are
        NEVER persisted (no stored connection, no background sync) and NEVER logged. Automated /
        system mail (no-reply, bounces, auto-submitted) is skipped. The write lands through the
        capture Sink, so every captured row carries its audit + outbox entry in one transaction.
        Human-only: an agent Passport is not an accepted credential here.
      x-agent-access: human-only
      security: [ { cookieAuth: [] } ]   # human session only — rejects agent bearer/Passport
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ImapConnectRequest' }
            examples:
              inbox:
                value:
                  host: imap.example.com
                  port: 993
                  email: alice@example.com
                  password: app-specific-password
                  mailbox: INBOX
                  max_messages: 50
      responses:
        '200':
          description: The pull completed; the summary reports what was captured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImapConnectResult' }
              examples:
                captured:
                  value: { connected: true, mailbox: INBOX, captured: 37, skipped: 13, contacts: 21 }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422':
          description: The mailbox rejected the credentials, or the request was malformed — no internals leaked.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                loginRejected:
                  value:
                    type: 'https://errors.gradion.com/imap_login_rejected'
                    title: Mailbox rejected the credentials
                    status: 422
                    code: imap_login_rejected
                    detail: The mail server rejected these credentials. Check the host, email and password.
        '502':
          description: The mail server could not be reached (DNS / TCP / TLS / timeout) — the raw cause stays server-side.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                unreachable:
                  value:
                    type: 'https://errors.gradion.com/imap_unreachable'
                    title: Could not reach the mail server
                    status: 502
                    code: imap_unreachable
                    detail: Couldn't reach that mail server. Check the host and port, then retry.

  # ------------------ /connectors (per-provider OAuth capture) ---------------
  # Per-user mail/calendar connectors (RC-8): OAuth connect/callback/disconnect
  # for gmail/gcal/graph plus the standing connection list. Distinct from the
  # one-shot /connectors/imap/connect above — these persist a connection and
  # sync incrementally in the background (capture.md CAP-WIRE-1). Connecting a
  # mailbox is a human-only consent act; an agent never self-connects.
  /connectors:
    get:
      tags: [Connectors]
      operationId: listConnectors
      summary: List the calling user's capture connections + sync state.
      description: |
        The per-user mail/calendar connections this user has established (RC-8), each with its
        status and sync watermark. Never returns the credential — it lives encrypted in the vault
        (`credential_ref`); this row carries only status + cursor (capture.md CAP-DDL-2).
      x-agent-access: human-only
      security: [ { cookieAuth: [] } ]
      responses:
        '200':
          description: The calling user's capture connections.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CaptureConnectionListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /connectors/{provider}/connect:
    parameters:
      - $ref: '#/components/parameters/CaptureProvider'
    post:
      tags: [Connectors]
      operationId: connectConnector
      summary: Connect (or re-authorize) the calling user's mail/calendar for capture.
      description: |
        Per-user, consent-driven connect (RC-8). For an OAuth provider (`gmail`/`gcal`/`graph`)
        returns the provider `authorize_url` to redirect the user to; the flow completes at
        `GET /connectors/{provider}/callback`. The refresh token is written to the vault on
        callback, NEVER to the row or a response. Human-only: an agent connecting a human's mailbox
        would self-grant read of personal mail. (`imap` uses the dedicated one-shot
        `/connectors/imap/connect`.)
      x-agent-access: human-only
      security: [ { cookieAuth: [] } ]
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ConnectConnectorRequest' }
            examples:
              oauth:
                summary: OAuth provider — server returns the authorize_url to redirect to
                value: { redirect_uri: 'https://app.example.com/activation' }
      responses:
        '200':
          description: OAuth redirect target (OAuth providers).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConnectConnectorResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /connectors/{provider}/callback:
    parameters:
      - $ref: '#/components/parameters/CaptureProvider'
    get:
      tags: [Connectors]
      operationId: connectorOAuthCallback
      summary: OAuth redirect callback — completes a mail/calendar connect.
      description: |
        The redirect URI the OAuth provider returns to after user consent. The `state` parameter is
        the signed, single-use binding to the initiating user + provider (CSRF defence; the session
        cookie is not sent on this cross-site redirect). On success the authorization `code` is
        exchanged for tokens server-side, the tokens are stored in the vault, and the user's
        connection flips to `connected` with its initial sync cursor.
      security: []   # provider→CRM redirect; the signed `state` binds the flow (session cookie is SameSite, not sent cross-site)
      parameters:
        - { name: code, in: query, schema: { type: string }, description: Provider authorization code (absent when the user denied consent). }
        - { name: state, in: query, required: true, schema: { type: string }, description: Signed single-use binding to the initiating user + provider. }
        - { name: error, in: query, schema: { type: string }, description: Set instead of `code` when the user denied consent. }
      responses:
        '302': { description: Redirect back into the app — connection established, or the denial surfaced honestly. }
        '422': { $ref: '#/components/responses/ValidationError' }

  /connectors/{provider}/disconnect:
    parameters:
      - $ref: '#/components/parameters/CaptureProvider'
    post:
      tags: [Connectors]
      operationId: disconnectConnector
      summary: Disconnect the calling user's mail/calendar capture.
      description: |
        Revokes the stored provider token, stops the background sync, and flips the user's
        connection to `disconnected` (RC-8). Idempotent. Already-captured activities are retained —
        they are real history; capture simply stops. Human-only.
      x-agent-access: human-only
      security: [ { cookieAuth: [] } ]
      responses:
        '204': { description: Disconnected (or already disconnected). }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /connectors/{provider}/backfill/preview:
    parameters:
      - $ref: '#/components/parameters/CaptureProvider'
    post:
      tags: [Capture]
      operationId: previewConnectorBackfill
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: Preview a backfill window — the scope before the spend.
      description: |
        Returns the provider-side message count for a CAP-PARAM-4 window plus the projected AI
        token/cost estimate (ADR-0063; the ADR-0020 preview-before-spend obligation). MUST precede
        `startConnectorBackfill` — the estimate is what the user consents to. Labeled an estimate:
        actual spend is metered per task. Requires a `connected` connection; needs one provider
        round-trip, so a provider outage surfaces honestly as 502.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BackfillPreviewRequest' }
      responses:
        '200':
          description: The window's estimated scope.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BackfillPreview' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '502':
          description: 'Provider unreachable — the estimate needs the provider (`code: provider_unreachable`).'
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /connectors/{provider}/backfill:
    parameters:
      - $ref: '#/components/parameters/CaptureProvider'
    post:
      tags: [Capture]
      operationId: startConnectorBackfill
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: Start the bounded connect-time backfill.
      description: |
        Creates the CAP-DDL-4 run and enqueues the resumable job (ADR-0063). Widen-only — a
        re-invoke with a larger window re-scans only the delta (the capture key makes overlap a
        no-op); a smaller window is refused (`409 window_narrowing`). One live run per connection
        (`409 backfill_running`). This op commands the job; it never ingests (CAP-WIRE-N-1).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StartBackfillRequest' }
      responses:
        '202':
          description: Backfill queued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BackfillStatus' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
    get:
      tags: [Capture]
      operationId: getConnectorBackfillStatus
      security: [ { cookieAuth: [] } ]
      summary: Backfill progress — the activation read.
      description: |
        The single-row progress read behind the activation screen (CAP-PARAM-2: < 150 ms, never
        blocks on the pipeline). Every count is a persisted-row count; `updated_at` is the
        staleness stamp a killed worker leaves honest. `state: none` when this connection has
        never backfilled.
      responses:
        '200':
          description: Current (or last) backfill state.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BackfillStatus' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Capture]
      operationId: cancelConnectorBackfill
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: Cancel a running backfill — captured rows are retained.
      description: |
        Stops the job; everything already captured stays (real history). Incremental sync is
        untouched. `409 not_running` when there is nothing to cancel.
      responses:
        '202':
          description: Cancellation accepted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BackfillStatus' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /digest:
    get:
      tags: [Capture]
      operationId: getMorningDigest
      security: [ { cookieAuth: [] } ]
      summary: The calling user's morning digest — what capture did overnight.
      description: |
        Reads the CAP-DDL-6 payload built by the nightly suite (CAP-WIRE-6): capture totals,
        review counts (open dedupe candidates, pending 🟡 approvals, the classify summary), and
        the connector health strip. `404 no_digest_yet` before the first nightly run — the
        client renders the honest empty state. v1 delivery is in-app; email is delivery-only
        later, same object.
      parameters:
        - { name: date, in: query, schema: { type: string, format: date }, description: 'A specific digest day; default: the latest generated.' }
      responses:
        '200':
          description: The digest.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MorningDigest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /ai/usage:
    get:
      tags: [AI]
      operationId: getAiUsage
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: AI usage + budget — the spend is never invisible.
      description: |
        Per-day × task × tier usage from the metering record (AIRT-PARAM-33) plus the workspace
        budget block: monthly token budget, spent, current band (AIRT-PARAM-9..11), and since
        when. The admin economy-mode banner and the spend view read this (AIRT-WIRE-1; resolves
        the former AIRT-WIRE-N-1 gap). Inference is the customer's own key (ADR-0020) — this is
        their own bill made visible, never a Margince meter for resale.
      parameters:
        - { name: from, in: query, schema: { type: string, format: date }, description: 'Default: first day of the current month. Must not be after `to`; the window is capped at 366 days (422 otherwise).' }
        - { name: to, in: query, schema: { type: string, format: date }, description: 'Default: today.' }
      responses:
        '200':
          description: Usage + budget.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AiUsage' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/PermissionDenied' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /ai/calls:
    get:
      tags: [AI]
      operationId: listAiCalls
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: The AI call trace — every terminal model call, newest first.
      description: |
        Terminal attempts from the AIRT-SCHEMA-2 call record (`ai_call`), keyset-paginated
        newest-first. The admin trace view reads this; the same automation-config grant
        that admits `getAiUsage` admits it. `payload_capture_enabled` reports the
        deployment's `ai.capture_payloads` posture so a client can distinguish
        "capture is off" from "this call has no payload".
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - { name: task, in: query, schema: { type: string }, description: 'Filter to one task (capture_classify, enrich, …).' }
      responses:
        '200':
          description: One page of terminal calls.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AiCallListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/PermissionDenied' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /ai/calls/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [AI]
      operationId: getAiCall
      security: [ { cookieAuth: [] } ]
      x-agent-access: human-only
      summary: One call — attempt ladder, routing identity, context provenance, captured payload.
      description: |
        The full trace of one terminal call: its non-terminal retry siblings (shared
        `logical_call_id`), the configured-vs-served model identity, the injected company-context
        scopes, and — when `ai.capture_payloads` captured it — the post-secret-stripper
        request/response payload verbatim.
      responses:
        '200':
          description: The call.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AiCall' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/PermissionDenied' }
        '404': { $ref: '#/components/responses/NotFound' }


  # ------------------ /dedupe (DH-EXT-1/2, ADR-0062) ------------------------
  # The dedupe review queue over dedupe_candidate (DH-DDL-1): confidence-
  # sorted open pairs with their detection-time evidence snapshot (DH-N-8).
  # `merge` executes the owner's merge verb server-side (one merge in the
  # system); `not_a_duplicate` suppresses the pair from every future sweep
  # (AC-dedupe-7).
  /dedupe/candidates:
    get:
      tags: [People]
      operationId: listDedupeCandidates
      security: [ { cookieAuth: [] } ]
      summary: The dedupe review queue, confidence-sorted.
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [open, merged, not_a_duplicate], default: open } }
        - { name: entity_type, in: query, schema: { type: string, enum: [person, organization] } }
        - { name: cursor, in: query, schema: { type: string }, description: Opaque keyset cursor. }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 25 } }
      responses:
        '200':
          description: One page of candidates.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DedupeCandidateListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /dedupe/candidates/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [People]
      operationId: getDedupeCandidate
      security: [ { cookieAuth: [] } ]
      summary: One candidate with its full detection-time evidence.
      responses:
        '200':
          description: The candidate.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DedupeCandidate' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /dedupe/candidates/{id}/disposition:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [People]
      operationId: disposeDedupeCandidate
      x-agent-access: human-only
      security: [ { cookieAuth: [] } ]
      summary: Decide one pair — merge through the owner's verb, or dismiss forever.
      description: |
        `merge` requires `winner_id` (one of the pair) and executes `mergePerson`/
        `mergeOrganization` server-side — one merge in the system, no second verb.
        `not_a_duplicate` flips the row and suppresses the pair from every future
        sweep (AC-dedupe-7). `409 already_disposed`; `422` when `winner_id` is not
        one of the pair.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DedupeDispositionRequest' }
      responses:
        '200':
          description: The disposed candidate.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DedupeCandidate' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /dedupe/candidates/{id}/undo:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [People]
      operationId: undoDedupeDisposition
      x-agent-access: human-only
      security: [ { cookieAuth: [] } ]
      summary: Re-open a disposed pair.
      description: |
        A dismissed pair re-opens (the suppression lifts). A merged pair needs the
        merge verb's reversibility (PO-AC-M6) — `409 not_undoable` until the
        survivor-side restore exists or when the survivor mutated since.
      responses:
        '200':
          description: The re-opened candidate.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DedupeCandidate' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  # ------------------ /capture/exclusions (RC-2 personal-mail) ---------------
  # The per-user personal-mail exclusion rule set (RC-2): a bounded, typed
  # (kind, value) list — sender domain, recipient domain, or mail label,
  # deliberately NOT a filtering DSL. Evaluated in the ONE Sink BEFORE
  # ingestion writes anything, so a matching message produces zero CRM rows
  # plus one `capture.skipped{personal_exclusion}` event (capture.md
  # CAP-DDL-3 / CAP-WIRE-2, EVT-SEM-10). Human-only — an agent must not widen
  # or narrow a human's personal-mail boundary (ADR-0013).
  /capture/exclusions:
    get:
      tags: [Connectors]
      operationId: listCaptureExclusions
      x-agent-access: human-only
      security: [ { cookieAuth: [] } ]
      summary: List the calling user's personal-mail exclusion rules (RC-2).
      description: |
        The bounded per-user rule set that gates whether ingestion writes anything at all (RC-2):
        exclude by sender domain, recipient domain, or mail label — deliberately NOT a filtering
        DSL. A matching message produces zero CRM rows plus a `capture.skipped{personal_exclusion}`
        event (capture.md CAP-DDL-3, EVT-SEM-10). Personal by nature — a rep manages their own.
      responses:
        '200':
          description: The calling user's exclusion rules.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CaptureExclusionRuleListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Connectors]
      operationId: createCaptureExclusion
      x-agent-access: human-only
      security: [ { cookieAuth: [] } ]
      summary: Add a personal-mail exclusion rule (RC-2).
      description: |
        Adds one bounded rule — `kind` ∈ `sender_domain` | `recipient_domain` | `label`, `value`
        the domain or label. Idempotent on (user, kind, value): re-adding an existing rule is a
        no-op returning the existing row. Human-only — an agent must not widen or narrow a human's
        personal-mail boundary.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCaptureExclusionRequest' }
            examples:
              senderDomain: { value: { kind: sender_domain, value: 'personal-family.example' } }
              label:        { value: { kind: label, value: 'Personal' } }
      responses:
        '201':
          description: Rule created (or the existing rule, on an idempotent re-add).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CaptureExclusionRule' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /capture/exclusions/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    delete:
      tags: [Connectors]
      operationId: deleteCaptureExclusion
      x-agent-access: human-only
      security: [ { cookieAuth: [] } ]
      summary: Remove a personal-mail exclusion rule (RC-2).
      description: Removes one of the caller's own rules. Idempotent. Human-only.
      responses:
        '204': { description: Rule removed (or already absent). }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---------------------------- /approvals ----------------------------------
  /approvals:
    get:
      tags: [Approvals]
      operationId: listApprovals
      summary: The approval inbox — list staged 🟡 actions awaiting human decision.
      description: |
        Lists confirm-first items proposed by agents/AI moments (cold-start accept,
        transcript proposal, overnight reconciliation, drafted sends, deal advances).
        Each item carries the proposed change + evidence + confidence (features/07 §8).
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: status
          in: query
          schema: { type: string, enum: [pending, approved, rejected] }
        - name: kind
          in: query
          schema: { type: string }
          description: Filter by proposal kind (e.g. coldstart, send_email, advance_deal, overnight).
      responses:
        '200':
          description: A page of approval items.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApprovalListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /approvals/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Approvals]
      operationId: getApproval
      summary: Get a single approval item (full proposed diff + evidence).
      responses:
        '200':
          description: The approval item.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Approval' }
        '404': { $ref: '#/components/responses/NotFound' }

  /approvals/{id}/approve:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Approvals]
      operationId: approveApproval
      security: [ { cookieAuth: [] } ]   # human session only — rejects agent bearer/Passport (x-agent-access: human-only)
      x-agent-access: human-only
      summary: Approve a staged action (commits it; mints the approval token).
      description: |
        Approving commits the proposed change in one audit transaction. The (optionally
        edited) payload is what executes. Returns the approval with the resulting entity ref
        + the `approval_token` that authorized the downstream 🟡 operation.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApproveRequest' }
            examples:
              editThenApprove:
                value:
                  edited_payload: { subject: 'Re: proposal (revised)' }
      responses:
        '200':
          description: Approved + committed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Approval' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Already decided (approved/rejected).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /approvals/{id}/reject:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Approvals]
      operationId: rejectApproval
      security: [ { cookieAuth: [] } ]   # human session only — rejects agent bearer/Passport (x-agent-access: human-only)
      x-agent-access: human-only
      summary: Reject a staged action (discards it; nothing commits).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        '200':
          description: Rejected; no records changed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Approval' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Already decided.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  # ---- Per-purpose consent (A22/ADR-0011 — V1) ----
  /data-subject-requests:
    get:
      tags: [Compliance]
      operationId: listDataSubjectRequests
      summary: List GDPR data-subject requests (B-E11.30).
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [open, in_progress, fulfilled, rejected] } }
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      x-mcp-tool: { verb: search_records, record_type: data_subject_request, tier: green }
      responses:
        '200':
          description: A page of data-subject requests.
          content:
            application/json:
              schema:
                type: object
                required: [data, page]
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/DataSubjectRequest' } }
                  page: { $ref: '#/components/schemas/PageInfo' }
    post:
