    post:
      tags: [Activities]
      operationId: logActivity
      summary: Log an activity (the `log_activity` MCP verb).
      description: |
        Captured activities carry `source_system` + `source_id`; re-running capture with the
        same pair is idempotent (no duplicate). An activity may link to >1 entity
        (person and deal). `log_activity` is 🟢 (reversible).
      x-mcp-tool: { verb: log_activity, record_type: activity, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateActivityRequest' }
            examples:
              note:
                value:
                  kind: note
                  body: Discussed Q3 expansion on the call.
                  occurred_at: '2026-05-02T16:00:00Z'
                  links:
                    - { entity_type: person, entity_id: 018f3a1b-0000-7000-8000-000000000010 }
                    - { entity_type: deal, entity_id: 018f3a1b-0000-7000-8000-000000000030 }
                  source: ui
              capturedEmail:
                summary: Idempotent captured email (re-run → no dupe)
                value:
                  kind: email
                  subject: 'Re: proposal'
                  occurred_at: '2026-05-02T16:00:00Z'
                  source_system: gmail
                  source_id: 'CAF=abc@mail.gmail.com'
                  links:
                    - { entity_type: deal, entity_id: 018f3a1b-0000-7000-8000-000000000030 }
                  source: 'email:CAF=abc@mail.gmail.com'
      responses:
        '201':
