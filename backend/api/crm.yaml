  # ---------------------------- /coldstart ----------------------------------
  /coldstart:
    post:
      tags: [AI]
      operationId: coldStartReadback
      summary: Website cold-start read-back — returns a staged proposal with evidence.
      description: |
        Given a company URL, fetches + parses it (via the ADR-0006 connector) and returns a
        structured read-back: ICP, buying center, value proposition, USP, buying intents.
        EVERY returned field carries a non-empty `evidence_snippet` + `source_url` +
        `confidence`, or it is ABSENT (the no-guess gate, features/07 §1). NOTHING is written
        to real records — this is a 🟡 staging surface; the user accepts via /approvals.
      x-mcp-tool: { verb: enrich, tier: yellow }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ColdStartRequest' }
            examples:
              url:
                value: { url: 'https://acme.com' }
      responses:
        '200':
          description: A staged proposal with per-field evidence (no records written).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ColdStartProposal' }
              examples:
                proposal:
                  value:
                    proposal_id: 018f3a1b-0000-7000-8000-0000000000d0
                    source_url: 'https://acme.com'
                    status: staged
                    fields:
                      - field: value_proposition
                        value: Cuts onboarding time by 80%.
                        evidence_snippet: '"Onboard your team in minutes, not weeks."'
                        source_url: 'https://acme.com/#hero'
                        confidence: 0.86
                      - field: icp
                        value: Mid-market B2B SaaS RevOps teams.
                        evidence_snippet: '"Built for RevOps leaders at scaling SaaS companies."'
                        source_url: 'https://acme.com/customers'
                        confidence: 0.71
                    created_at: '2026-06-04T08:00:00Z'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422':
          description: URL unfetchable / read too little — honest degradation, zero fabricated fields.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                couldNotRead:
                  value:
                    type: 'https://errors.gradion.com/coldstart_unreadable'
                    title: Could not read enough
                    status: 422
                    code: coldstart_unreadable
                    detail: Couldn't read enough from this page. Retry or paste text.

  # -------------------------- /connectors/imap ------------------------------
  /connectors/imap/connect:
    post:
      tags: [Connectors]
      operationId: connectImap
      summary: One-shot IMAP pull — capture the most recent mailbox messages as email activities.
      description: |
        Dials a user's mailbox over IMAPS with the supplied credentials, pulls the most recent
        `max_messages` messages from `mailbox`, and captures each as an email activity on the
        timeline. This is a ONE-SHOT pull: the credentials are used for this call only — they are
        NEVER persisted (no stored connection, no background sync) and NEVER logged. Automated /
        system mail (no-reply, bounces, auto-submitted) is skipped. The write lands through the
        capture Sink, so every captured row carries its audit + outbox entry in one transaction.
        Human-only: an agent Passport is not an accepted credential here.
      x-agent-access: human-only
      security: [ { cookieAuth: [] } ]   # human session only — rejects agent bearer/Passport
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ImapConnectRequest' }
            examples:
              inbox:
                value:
                  host: imap.example.com
                  port: 993
                  email: alice@example.com
                  password: app-specific-password
                  mailbox: INBOX
                  max_messages: 50
      responses:
        '200':
          description: The pull completed; the summary reports what was captured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImapConnectResult' }
              examples:
                captured:
                  value: { connected: true, mailbox: INBOX, captured: 37, skipped: 13, contacts: 21 }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422':
          description: The mailbox rejected the credentials, or the request was malformed — no internals leaked.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                loginRejected:
                  value:
                    type: 'https://errors.gradion.com/imap_login_rejected'
                    title: Mailbox rejected the credentials
                    status: 422
                    code: imap_login_rejected
                    detail: The mail server rejected these credentials. Check the host, email and password.
        '502':
          description: The mail server could not be reached (DNS / TCP / TLS / timeout) — the raw cause stays server-side.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                unreachable:
                  value:
                    type: 'https://errors.gradion.com/imap_unreachable'
                    title: Could not reach the mail server
                    status: 502
                    code: imap_unreachable
                    detail: Couldn't reach that mail server. Check the host and port, then retry.

  # ---------------------------- /approvals ----------------------------------
  /approvals:
    get:
      tags: [Approvals]
      operationId: listApprovals
      summary: The approval inbox — list staged 🟡 actions awaiting human decision.
      description: |
        Lists confirm-first items proposed by agents/AI moments (cold-start accept,
        transcript proposal, overnight reconciliation, drafted sends, deal advances).
        Each item carries the proposed change + evidence + confidence (features/07 §8).
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: status
          in: query
          schema: { type: string, enum: [pending, approved, rejected] }
        - name: kind
          in: query
          schema: { type: string }
          description: Filter by proposal kind (e.g. coldstart, send_email, advance_deal, overnight).
      responses:
        '200':
          description: A page of approval items.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApprovalListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /approvals/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Approvals]
      operationId: getApproval
      summary: Get a single approval item (full proposed diff + evidence).
      responses:
        '200':
          description: The approval item.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Approval' }
        '404': { $ref: '#/components/responses/NotFound' }

  /approvals/{id}/approve:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Approvals]
      operationId: approveApproval
      security: [ { cookieAuth: [] } ]   # human session only — rejects agent bearer/Passport (x-agent-access: human-only)
      x-agent-access: human-only
      summary: Approve a staged action (commits it; mints the approval token).
      description: |
        Approving commits the proposed change in one audit transaction. The (optionally
        edited) payload is what executes. Returns the approval with the resulting entity ref
        + the `approval_token` that authorized the downstream 🟡 operation.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApproveRequest' }
            examples:
              editThenApprove:
                value:
                  edited_payload: { subject: 'Re: proposal (revised)' }
      responses:
        '200':
          description: Approved + committed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Approval' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Already decided (approved/rejected).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /approvals/{id}/reject:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Approvals]
      operationId: rejectApproval
      security: [ { cookieAuth: [] } ]   # human session only — rejects agent bearer/Passport (x-agent-access: human-only)
      x-agent-access: human-only
      summary: Reject a staged action (discards it; nothing commits).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        '200':
          description: Rejected; no records changed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Approval' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Already decided.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  # ---- Per-purpose consent (A22/ADR-0011 — V1) ----
  /data-subject-requests:
    get:
      tags: [Compliance]
      operationId: listDataSubjectRequests
      summary: List GDPR data-subject requests (B-E11.30).
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [open, in_progress, fulfilled, rejected] } }
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      x-mcp-tool: { verb: search_records, record_type: data_subject_request, tier: green }
      responses:
        '200':
          description: A page of data-subject requests.
          content:
            application/json:
              schema:
                type: object
                required: [data, page]
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/DataSubjectRequest' } }
                  page: { $ref: '#/components/schemas/PageInfo' }
    post:
      tags: [Compliance]
      operationId: createDataSubjectRequest
      security: [ { cookieAuth: [] } ]   # human session only — rejects agent bearer/Passport (x-agent-access: human-only)
      x-agent-access: human-only
      summary: Open a data-subject request (access/rectify/erasure). Admin-mediated; ties to retention/erasure (B-EP07.13/.16).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateDataSubjectRequest' }
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DataSubjectRequest' }
  /data-subject-requests/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    patch:
      tags: [Compliance]
      operationId: updateDataSubjectRequest
      security: [ { cookieAuth: [] } ]   # human session only — rejects agent bearer/Passport (x-agent-access: human-only)
      x-agent-access: human-only
      summary: Update a data-subject request's status / assignee / resolution.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateDataSubjectRequest' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DataSubjectRequest' }
  /audit-log:
    get:
      tags: [Compliance]
      operationId: listAuditLog
      security: [ { cookieAuth: [] } ]   # human session only
      x-agent-access: human-only
      summary: Read the human+agent-attributable audit log (Settings governance view).
      description: |
        Cursor-paginated read over `audit_log` (feedback/13, un-defers the fast-follow stub). Powers
        AC-settings-16 (B-EP09.13b) — the live-filterable audit view. Every entry attributes the actor
        (`human:*` / `agent:*` + `passport_id`), the action, and the target. Admin/compliance scope;
        read-only.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - { name: actor, in: query, schema: { type: string }, description: 'Typed principal filter, e.g. human:<uuid> or agent:sdr.' }
        - { name: entity_type, in: query, schema: { type: string } }
        - { name: entity_id, in: query, schema: { type: string, format: uuid } }
        - { name: action, in: query, schema: { type: string }, description: 'One of the AuditLogEntry.action values.' }
        - { name: from, in: query, schema: { type: string, format: date-time } }
        - { name: to, in: query, schema: { type: string, format: date-time } }
      responses:
        '200':
          description: A page of audit entries, newest first.
          content:
            application/json:
              schema:
                type: object
                required: [data, page]
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/AuditLogEntry' } }
                  page: { $ref: '#/components/schemas/PageInfo' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /consent-purposes:
    get:
      tags: [Compliance]
      operationId: listConsentPurposes
      summary: List the workspace's consent purposes (e.g. transactional, marketing_email, profiling).
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A page of consent purposes.
          content:
            application/json:
              schema:
                type: object
                required: [data, page]
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/ConsentPurpose' } }
                  page: { $ref: '#/components/schemas/PageInfo' }
    post:
      tags: [Compliance]
      operationId: createConsentPurpose
      security: [ { cookieAuth: [] } ]   # human session only — rejects agent bearer/Passport (x-agent-access: human-only)
      x-agent-access: human-only
      summary: Define a consent purpose. 🟢 admin write.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateConsentPurposeRequest' }
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConsentPurpose' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /people/{id}/consent:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Compliance]
      operationId: getPersonConsent
      summary: Read a person's per-purpose consent state plus the append-only proof log.
      description: |
        Returns the current `granted/withdrawn/unknown` state for every tracked purpose and the
        full `consent_event` history (Art. 7 demonstrability). Read-only; never falls back to a
        blanket flag.
      responses:
        '200':
          description: Per-purpose consent state + proof log.
          content:
            application/json:
              schema:
                type: object
                required: [state, events]
                properties:
                  state: { type: array, items: { $ref: '#/components/schemas/PersonConsentState' } }
                  events: { type: array, items: { $ref: '#/components/schemas/ConsentEvent' } }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [Compliance]
      operationId: recordConsent
      security: [ { cookieAuth: [] } ]   # human session only — rejects agent bearer/Passport (x-agent-access: human-only)
      x-agent-access: human-only
      summary: Grant or withdraw consent for one purpose — writes an append-only proof row.
      description: |
        Sets the person's consent for one `purpose_id` to `granted` or `withdrawn`, appending a
        `consent_event` (who/when/basis/source, double-opt-in token where required). Idempotent on
        re-asserting the same state. Audited (`action: consent_grant`/`consent_withdraw`); emits
        `consent.changed`.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecordConsentRequest' }
      responses:
        '200':
          description: Updated consent state for the purpose.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PersonConsentState' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /people/{id}/consent/double-opt-in:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Compliance]
      operationId: issueDoubleOptIn
      security: [ { cookieAuth: [] } ]   # human session only
      x-agent-access: human-only
      summary: Mint + deliver a double-opt-in confirmation token (the issuance half of the DOI round-trip).
      description: |
        Issues the token that `recordConsent` later redeems (feedback/11 — the contract previously
        defined only redemption). Mints a **single-use, 72h-TTL** double-opt-in token for `purpose_id`
        and, when `deliver=true`, queues the confirmation message through the outbound surface for
        delivery to the data subject. Only the token's **SHA-256 hash is stored** (`consent_doi_token`,
        data-model §3.4); the plaintext is returned **once** here (and in the delivered message) and
        never again. A new issuance **supersedes** any unredeemed prior token for the same
        `(person, purpose)`. Requires the purpose to have `requires_double_opt_in=true` (else `422`).
        🟢 — an internal issuance; the confirmation send rides the outbound/consent gate like any message.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [purpose_id]
              properties:
                purpose_id: { type: string, format: uuid }
                deliver:
                  type: boolean
                  default: true
                  description: When true, queues the confirmation message; false mints only (for a capture surface that delivers its own — feedback/14 booking/forms).
      responses:
        '201':
          description: Token issued (plaintext shown once); confirmation queued when deliver=true.
          content:
            application/json:
              schema:
                type: object
                required: [token, expires_at]
                properties:
                  token: { type: string, description: The single-use DOI token — shown once; redeem via recordConsent.double_opt_in_token. }
                  expires_at: { type: string, format: date-time }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /record-grants:
    get:
      tags: [Access]
      operationId: listRecordGrants
      summary: List manual per-record grants, filtered by record or by subject (A52/ADR-0039).
      description: |
        Returns active `record_grant` rows. Filter by a record (`record_type`+`record_id`) to answer
        "who has been granted access to this record?", or by a subject (`subject_type`+`subject_id`) to
        answer "what has this user/team been granted?". Read-only; tiered base scope (own/team/all) is
        not returned here — this surfaces only the *manual* grants on top of it.
      parameters:
        - { name: record_type, in: query, schema: { type: string, enum: [deal, person, organization, lead] } }
        - { name: record_id, in: query, schema: { type: string, format: uuid } }
        - { name: subject_type, in: query, schema: { type: string, enum: [user, team] } }
        - { name: subject_id, in: query, schema: { type: string, format: uuid } }
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      x-mcp-tool: { verb: search_records, record_type: record_grant, tier: green }
      responses:
        '200':
          description: A page of record grants.
          content:
            application/json:
              schema:
                type: object
                required: [data, page]
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/RecordGrant' } }
                  page: { $ref: '#/components/schemas/PageInfo' }
    post:
      tags: [Access]
      operationId: createRecordGrant
      summary: Share one record with a user or team. 🟡 — agent calls are queued behind the approval gate.
      description: |
        Grants `read` or `write` on a single record to a user or team otherwise out of their own/team/all
        scope. Enforced by widening BOTH the application visibility WHERE clause AND the RLS backstop
        policy (`data-model §1.3c/§2.5`). Idempotent on `(record_type, record_id, subject_type, subject_id)` —
        re-asserting upgrades/downgrades `access` and resets `expires_at`. A grant can never exceed the
        granting principal's own access (scope-intersection). Audited (`action: record_share`). Bounded:
        flat explicit grants only — no sharing hierarchies, criteria-rules, or grant-of-grant delegation.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ApprovalToken'
      x-mcp-tool: { verb: share_record, record_type: record_grant, tier: yellow }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateRecordGrantRequest' }
      responses:
        '201':
          description: Grant created (or updated).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RecordGrant' }
        '403':
          description: RBAC denied (`manage_sharing` required), or an agent 🟡 share attempted without an approval token.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                approvalRequired:
                  value:
                    type: 'https://errors.gradion.com/approval_required'
                    title: Approval required
                    status: 403
                    code: approval_required
                    detail: Sharing a record is confirm-first for an agent; supply an approval token.
        '422': { $ref: '#/components/responses/ValidationError' }

  /record-grants/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    delete:
      tags: [Access]
      operationId: revokeRecordGrant
      summary: Revoke a manual record grant. 🟡 — agent calls are queued behind the approval gate.
      description: |
        Deletes the grant; the subject loses the widened access immediately (the next query no longer
        matches the `OR EXISTS (record_grant …)` clause). Audited (`action: record_unshare`).
      parameters:
        - $ref: '#/components/parameters/ApprovalToken'
        - $ref: '#/components/parameters/IfMatch'
      x-mcp-tool: { verb: share_record, record_type: record_grant, tier: yellow }
      responses:
        '204': { description: Revoked. }
        '403':
          description: RBAC denied (`manage_sharing` required), or an agent 🟡 revoke attempted without an approval token.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                approvalRequired:
                  value:
                    type: 'https://errors.gradion.com/approval_required'
                    title: Approval required
                    status: 403
                    code: approval_required
                    detail: Revoking a share is confirm-first for an agent; supply an approval token.
        '404': { $ref: '#/components/responses/NotFound' }

  # --------------------------- /voice-profiles ------------------------------
  # Voice DNA (E07, B-E07.4/.5a): the derived voice_profile_md artifact +
  # per-source corpus manifest. Corpus sources ride the parent
  # (/voice-profiles/{id}/sources) — §12.5 gives them no standalone CRUD.
  /voice-profiles:
    get:
      tags: [Voice]
      operationId: listVoiceProfiles
      summary: List the voice profiles visible to the caller.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Voice profiles.
          content:
            application/json:
              schema:
                type: object
                required: [data, page]
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/VoiceProfile' } }
                  page: { $ref: '#/components/schemas/PageInfo' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Voice]
      operationId: createVoiceProfile
      security: [ { cookieAuth: [] } ]   # human session only — a voice is the human's identity asset
      x-agent-access: human-only
      summary: Create a voice profile (status=building, empty derived artifact).
      description: |
        A `user`-scope profile is owned by the caller — one live profile per user (409 on a second).
        `personality_md` is the human-authored identity half; the derived `voice_profile_md` is
        written only by the profile builder and arrives empty here.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateVoiceProfileRequest' }
      responses:
        '201':
          description: Created (building).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VoiceProfile' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /voice-profiles/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Voice]
      operationId: getVoiceProfile
      summary: Read one voice profile (derived artifact + human identity).
      responses:
        '200':
          description: The voice profile.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VoiceProfile' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Voice]
      operationId: updateVoiceProfile
      security: [ { cookieAuth: [] } ]   # human session only — see createVoiceProfile
      x-agent-access: human-only
      summary: Edit the human-authored personality_md (never the derived artifact).
      description: |
        The PATCH surface deliberately carries ONLY `personality_md`: the derived
        `voice_profile_md` + its `profile_version` are written by the rebuild path alone, so the
        human-authored/machine-derived split (features/09 §B0.2) is enforced by the contract shape.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateVoiceProfileRequest' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VoiceProfile' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Voice]
      operationId: deleteVoiceProfile
      security: [ { cookieAuth: [] } ]   # human session only — see createVoiceProfile
      x-agent-access: human-only
      summary: Archive a voice profile (soft; its corpus stops being read).
      responses:
        '204': { description: Archived. }
        '404': { $ref: '#/components/responses/NotFound' }
  /voice-profiles/{id}/sources:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Voice]
      operationId: listVoiceCorpusSources
      summary: The corpus manifest — every ingested source plus the live word/register meter.
      responses:
        '200':
          description: Manifest rows + meter summary.
          content:
            application/json:
              schema:
                type: object
                required: [data, summary]
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/VoiceCorpusSource' } }
                  summary: { $ref: '#/components/schemas/VoiceCorpusSummary' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [Voice]
      operationId: ingestVoiceCorpusSource
      security: [ { cookieAuth: [] } ]   # human session only — the corpus is consented personal material
      x-agent-access: human-only
      summary: Ingest one corpus source (idempotent on source_ref).
      description: |
        Accepts the source text (`.txt`/`.md` as-is; `.vtt`/`.srt`/transcript-JSON are parsed and
        SPEAKER-FILTERED to `speaker_label` — only the owner's own turns enter, features/09 §B1.2),
        tags its register (explicit or defaulted by kind), counts the REAL words of the ingested
        text (never an estimate), and upserts by `source_ref` — re-ingesting a source replaces its
        row, it never double-counts the meter. The V1 corpus is text only (features/09 §B1.1):
        binary documents (`.docx`/`.pdf`) are refused with a 422 — convert or paste the text
        instead. Server-side binary extraction is deferred to B-E07.5c.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/IngestVoiceCorpusSourceRequest' }
      responses:
        '201':
          description: Ingested (created or replaced).
          content:
            application/json:
              schema:
                type: object
                required: [source, summary]
                properties:
                  source: { $ref: '#/components/schemas/VoiceCorpusSource' }
                  summary: { $ref: '#/components/schemas/VoiceCorpusSummary' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /voice-profiles/{id}/sources/{sourceId}:
    parameters:
      - $ref: '#/components/parameters/Id'
      - name: sourceId
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Voice]
      operationId: updateVoiceCorpusSource
      security: [ { cookieAuth: [] } ]   # human session only — see ingestVoiceCorpusSource
      x-agent-access: human-only
      summary: Flip a source's manifest opt-out (excluded) or its weight.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateVoiceCorpusSourceRequest' }
      responses:
        '200':
          description: Updated manifest row + refreshed meter.
          content:
            application/json:
              schema:
                type: object
                required: [source, summary]
                properties:
                  source: { $ref: '#/components/schemas/VoiceCorpusSource' }
                  summary: { $ref: '#/components/schemas/VoiceCorpusSummary' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  # ------------------------------ /products ---------------------------------
  # The optional rate-card (B-E03.16, data-model §12.6): reusable priced
  # items an offer line SNAPSHOTS from. Data, not a configurator — no
  # bundles, options or pricing rules (ADR-0037). A workspace may quote
  # fully free-form and never touch this surface.
  /products:
    get:
      tags: [Offers]
      operationId: listProducts
      summary: List rate-card products (live by default; cursor-paginated).
      x-mcp-tool: { verb: search_records, record_type: product, tier: green }
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/IncludeArchived'
        - name: active
          in: query
          schema: { type: boolean }
        - name: q
          in: query
          schema: { type: string }
          description: Case-insensitive name/SKU substring match.
      responses:
        '200':
          description: A page of products.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Offers]
      operationId: createProduct
      summary: Create a rate-card product.
      description: |
        Price is integer minor-units + ISO-4217 currency (P11, no float money). `sku` is
        optional; when present it is unique per workspace (409 on a live duplicate).
      x-mcp-tool: { verb: create_record, record_type: product, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateProductRequest' }
      responses:
        '201':
          description: Created product.
          headers:
            Location: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /products/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Offers]
      operationId: getProduct
      summary: Get a product by id.
      x-mcp-tool: { verb: read_record, record_type: product, tier: green }
      responses:
        '200':
          description: The product.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Offers]
      operationId: updateProduct
      summary: Update a product (partial). Existing offer lines keep their price snapshot.
      x-mcp-tool: { verb: update_record, record_type: product, tier: green }
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateProductRequest' }
      responses:
        '200':
          description: Updated product.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Offers]
      operationId: archiveProduct
      summary: Archive (soft-delete) a product. Lines referencing it survive with their snapshot.
      x-mcp-tool: { verb: archive_record, record_type: product, tier: yellow }
      responses:
        '200':
          description: Archived product.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ------------------------------ offers -------------------------------------
  # The versioned, deal-bound Angebot (B-E03.17–.20, data-model §12.6).
  # Totals (line and offer) are SERVER-COMPUTED from the line items (P11);
  # a client-supplied total is rejected 422. An offer is mutable only while
  # status=draft; sent is immutable — regenerate mints the next revision.
  /deals/{id}/offers:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Offers]
      operationId: listDealOffers
      summary: List a deal's offers, newest revision first.
      x-mcp-tool: { verb: search_records, record_type: offer, tier: green }
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: status
          in: query
          schema: { type: string, enum: [draft, sent, accepted, rejected, expired, superseded] }
      responses:
        '200':
          description: A page of the deal's offers.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OfferListResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [Offers]
      operationId: createOffer
      summary: Create a draft offer under a deal (offer_number minted server-side).
      description: |
        Line items may ride the create; each snapshots description/price from its optional
        `product_id` unless given explicitly. Totals are DERIVED — a body carrying
        `net_minor`/`gross_minor`/`line_total` (any spelling) is rejected 422.
      x-mcp-tool: { verb: create_record, record_type: offer, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateOfferRequest' }
      responses:
        '201':
          description: Created draft offer with computed totals.
          headers:
            Location: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Offer' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /offers/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Offers]
      operationId: getOffer
      summary: Get an offer with its line items and computed totals.
      x-mcp-tool: { verb: read_record, record_type: offer, tier: green }
      responses:
        '200':
          description: The offer.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Offer' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Offers]
      operationId: updateOffer
      summary: Update offer header fields — allowed only while status=draft.
      x-mcp-tool: { verb: update_record, record_type: offer, tier: green }
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateOfferRequest' }
      responses:
        '200':
          description: Updated draft offer.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Offer' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422':
          description: Validation error — including any mutation of a non-draft offer (offer_not_draft).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
    delete:
      tags: [Offers]
      operationId: archiveOffer
      summary: Archive (soft-delete) an offer.
      x-mcp-tool: { verb: archive_record, record_type: offer, tier: yellow }
      responses:
        '200':
          description: Archived offer.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Offer' }
        '404': { $ref: '#/components/responses/NotFound' }

  /offers/{id}/line-items:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Offers]
      operationId: addOfferLineItem
      summary: Add a line item to a draft offer (position defaults to next; totals recomputed).
      x-mcp-tool: { verb: update_record, record_type: offer, tier: green }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OfferLineItemInput' }
      responses:
        '201':
          description: The offer with the new line and recomputed totals.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Offer' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /offers/{id}/line-items/{lineItemId}:
    parameters:
      - $ref: '#/components/parameters/Id'
      - name: lineItemId
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Offers]
      operationId: updateOfferLineItem
      summary: Update a draft offer's line item (totals recomputed; totals themselves are not settable).
      x-mcp-tool: { verb: update_record, record_type: offer, tier: green }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateOfferLineItemRequest' }
      responses:
        '200':
          description: The offer with the updated line and recomputed totals.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Offer' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Offers]
      operationId: removeOfferLineItem
      summary: Remove a line item from a draft offer (totals recomputed).
      x-mcp-tool: { verb: update_record, record_type: offer, tier: green }
      responses:
        '200':
          description: The offer without the line, totals recomputed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Offer' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /offers/{id}/send:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Offers]
      operationId: sendOffer
      summary: Send a draft offer (🟡 — leaves the workspace; freezes FX + buyer/issuer snapshot).
      description: |
        draft → sent. Freezes `fx_rate_to_base` as of today (422 `fx_rate_unavailable` when the
        daily rate is missing — never rate=1, RT-PR-C2), captures the buyer/issuer snapshots and
        emits `offer.sent`. Sending leaves the workspace, so an AGENT principal is refused with
        `ErrRequiresApproval` and the call is staged to the approval inbox; the approved retry
        redeems with the X-Approval-Token header (ADR-0036).
      x-mcp-tool: { verb: send_offer, record_type: offer, tier: yellow }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ApprovalToken'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: The sent offer (frozen totals + FX).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Offer' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /offers/{id}/accept:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Offers]
      operationId: acceptOffer
      summary: Record the buyer's acceptance — syncs the deal's amount from the offer's gross.
      description: |
        sent → accepted; sets `accepted_at`, syncs `deal.amount_minor`/`currency` from the
        accepted offer's `gross_minor` (the offer becomes the deal's value source) and emits
        `offer.accepted`. Recording the buyer's acceptance is a human attestation — an agent
        principal is rejected outright.
      security: [ { cookieAuth: [] } ]   # human session only — rejects agent bearer/Passport (x-agent-access: human-only)
      x-agent-access: human-only
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: The accepted offer.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Offer' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /offers/{id}/reject:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Offers]
      operationId: rejectOffer
      summary: Record the buyer's decline (sent → rejected; emits offer.rejected).
      security: [ { cookieAuth: [] } ]   # human session only — rejects agent bearer/Passport (x-agent-access: human-only)
      x-agent-access: human-only
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RejectOfferRequest' }
      responses:
        '200':
          description: The rejected offer.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Offer' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /offers/{id}/regenerate:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Offers]
      operationId: regenerateOffer
      summary: Mint the next revision as a fresh draft; the sent original becomes superseded.
      description: |
        The `draft_offer` verb (🟢 — a reversible internal write): copies the sent offer's
        header + lines into revision N+1 as a new `draft`, marks the prior revision
        `superseded` and emits `offer.superseded` + `offer.created`. A sent offer is never
        mutated in place. The produced draft still cannot leave without the 🟡 send gate.
      x-mcp-tool: { verb: draft_offer, record_type: offer, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '201':
          description: The new draft revision.
          headers:
            Location: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Offer' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  # =========================================================================
  # =========================================================================
  # NET-NEW V1 RESOURCES (data-model.md §12.5) — first-class, but specified by
  # PATTERN here rather than expanded inline, to keep this file readable. Each
  # follows the SAME resource shape as /people|/deals above — list (cursor+Sort),
  # get, create, update (If-Match), archive — with schemas drawn 1:1 from the
  # §12.5 DDL. The contract-codegen + AC-MCP-3 lint MUST emit/verify these ops:
  #   /signals            (E08; MCP search_records/read_record; resolve via POST /signals/{id}/resolve)
  #   /deal-rooms         (E08/E12; engagement events are read via /deal-rooms/{id}/engagement)
  #   /voice-profiles     (E07; now SPECIFIED above, B-E07.4/.5a — corpus sources via /voice-profiles/{id}/sources)
  #   /drafting-assets    (E07/E08; approval flips `approved` — admin/🟡)
  #   /agent-connections  (E10; revoke via POST /agent-connections/{id}/revoke; events read-only)
  #   /automations/{id}/runs   (run records; the CRUD + catalog surface is now SPECIFIED above, feedback/14; run records stay fast-follow — 🟡 actions still queue to /approvals)
  #   /saved-views        (E15; V1 enforces shared_scope=private)
  #   /quotas             (E09; owner XOR team)
  #   /webhook-subscriptions (E10/S-E10.6, A51; HTTPS-only target_url, event_types ⊆ the published
  #                       events.md §2 catalog, signing_secret_ref; state active|paused. create/update
  #                       is 🟡 — registers outbound egress; x-mcp-tool create_record tier yellow.
  #                       Deliveries are read via /webhook-subscriptions/{id}/deliveries and a parked one
  #                       replays via POST /webhook-subscriptions/{id}/deliveries/{id}/replay. Fan-out is
  #                       RBAC-bounded to the owner's visibility + fully audited; 🟡-gated event types
  #                       deliver only AFTER the ADR-0036 approval gate — B-E10.13a/.15)
  # field_mask, conversation_link, deal_channel, gtm_module_install, webhook_delivery are config/
  # join/append tables surfaced through admin/parent endpoints, not standalone CRUD.
  #
  # OFFERS / ANGEBOTE (data-model.md §12.6; A48/ADR-0037) — bounded line-item
  # quote engine, NOT CPQ. /products, /deals/{id}/offers, /offers/{id}
  # (+/line-items, /regenerate, /send, /accept, /reject) are now SPECIFIED
  # above (B-E03.16–.20). Still pattern-only until their work packages land:
  #   /offer-templates       (branded DE/EN PDF layouts; admin; one default per locale — B-E03.22/WP7)
  #   POST /offers/{id}/render      (produce the branded PDF → pdf_asset_ref — B-E03.22/WP7)
  # Money totals (net/tax/gross) are DERIVED server-side from line items (P11
  # integer minor-units); a client-supplied total is rejected. Multi-currency
  # offers roll up to base via fx_rate (RT-PR-C2). Offer drafting obeys evidence-
  # or-omit (features/07) and NEVER fabricates a price (rate-card or blank).
  # =========================================================================
  #
  # OVERLAY / AUGMENTATION MANAGEMENT (data-model.md §12 overlay cluster;
  # narrative/03e AC-OV-1..11; E18/E19/E20; A53). The B-E18.*/B-E19.*/B-E20.*
  # build stories trace here.
  #
  # **Bounded-equivalence invariant (AC-OV-2 / ADR-0018): overlay mode does NOT
  # fork the data API.** Mirrored people/orgs/deals/activities/relationships are
  # read and written through the SAME operations above (/people, /deals, …) via
  # the SystemOfRecordProvider seam (architecture/01); each L1 MCP tool either
  # passes identically OR returns a declared, tested `unsupported_by_sor` result
  # (422) — never a silent break. The ops below are ONLY the overlay LIFECYCLE /
  # MANAGEMENT surface, which has no SoR-mode equivalent and exists only when
  # `workspace.sor_mode = overlay` (data-model §12); in SoR-mode each returns
  # 404 `mode_not_overlay`. Schemas drawn 1:1 from data-model §12
  # (`incumbent_connection`, `overlay_mirror` sync-state); contract-codegen +
  # AC-MCP-3 lint MUST emit/verify these ops. One incumbent per workspace, so the
  # connection resource is SINGULAR. Associations (`overlay_association`,
  # B-E18.22) surface through the normal /relationships endpoint — NOT a new path.
  #
  #   GET    /overlay/connection
  #       Current incumbent binding + status: {incumbent, region, status ∈
  #       active|revoked|error, connected_at, scopes[]}. 🟢 read.
  #       x-mcp-tool: read_record record_type=overlay_connection, tier green.
  #   POST   /overlay/connection
  #       Connect an incumbent via OAuth (HubSpot public app B-E18.13 /
  #       Salesforce ECA-JWT B-E19.* / Entra app B-E20.*). Body {incumbent,
  #       region, auth_code|assertion}. EU customers MUST route to the incumbent's
  #       EU region with an honest dual-residency disclosure (mirror replica lives
  #       in OUR store → operator's residency, A35; B-E18.14). 🟡 — establishes
  #       egress + ingest of the customer's entire CRM; ErrRequiresApproval +
  #       ADR-0036 token; Idempotency-Key. 409 `incumbent_already_connected` if a
  #       binding exists. x-mcp-tool: connect_incumbent, tier yellow.
  #   DELETE /overlay/connection
  #       Disconnect → revoke token + mirror teardown: purge the `overlay_mirror`
  #       replica AND incumbent-derived embeddings/context-graph nodes within the
  #       declared retention window (B-E18.15; GDPR — the mirror must not outlive
  #       the connection). 🟡, ErrRequiresApproval; 202 + teardown job ref.
  #       x-mcp-tool: disconnect_incumbent, tier yellow.
  #   GET    /overlay/sync-status
  #       Mirror freshness, per object class: [{object, last_synced_at, state ∈
  #       fresh|pending_sync|stale, backfill_progress}]. Backs the three overlay
  #       UI affordances every overlay screen must show (last_synced_at,
  #       pending_sync optimism, staleness warning — 30-screen-acceptance §3a;
  #       B-E18.4/.16). 🟢 read.
  #   POST   /overlay/reconcile
  #       Trigger the reconciliation poller sweep — heal gaps within the incumbent
  #       search budget, incumbent-wins on divergence emitting `mirror.conflict`
  #       (AC-OV-8; B-E18.7/.18). 🟢 (read-heavy, budget-metered); 202 + job ref.
  #   GET    /overlay/budget
  #       Per-incumbent consumption meter: {window, consumed, limit, band ∈
  #       healthy|degrading|exhausted, policy} (B-E18.11/.12). At threshold,
  #       force-fresh reads degrade to mirror-with-staleness (AC-OV-7) — surfaced
  #       here so the UI/agent warns instead of starving the customer's quota.
  #       🟢 read.
  #   POST   /overlay/flip:preflight
  #       Overlay→SoR flip preflight gate (B-E18.26, V1-WOW): force-fresh sync +
  #       conflict reconciliation + honest-scope export check → {ready,
  #       blocking[], unresolved_conflicts[]}. 🟢. 409 `overlay_flip_blocked` is
  #       returned by the execute op below when this is not satisfied.
  #   POST   /overlay/flip
  #       Execute Overlay→SoR flip (B-E18.27; AC-OV-9/10): reuse the features/04
  #       §5 importer, preserve record counts/relationships, carry over OUR
  #       augmentation (context/embeddings/audit/capture/mappings), re-tag
  #       incumbent-derived nodes T2→T1, detach write-back, flip
  #       `workspace.sor_mode = native`. 🟡 (irreversible mode change),
  #       ErrRequiresApproval + token; 202 + migration job ref.
  #       x-mcp-tool: tier yellow.
  #
  # Overlay error sentinels (interfaces.md §0 + overlay additions): 404
  # `mode_not_overlay` (op called in SoR-mode), 409 `incumbent_already_connected`,
  # 422 `unsupported_by_sor` (declared bounded-capability gap, AC-OV-2), 409
  # `overlay_flip_blocked` (preflight unsatisfied), 503
  # `incumbent_budget_exhausted` (degrade-don't-starve, AC-OV-7). All as RFC-7807
  # `Problem`.
  # =========================================================================

  # DEFERRED — stubs only (data-model.md §12). Intentionally NOT specified:
  #   /sequences, /sequences/{id}/steps, /enrollments   (outbound cadences; sends gated)
  #   /calls, /telephony/*                               (telephony / click-to-call)
  #   /embeddings, /context-graph/*                      (pgvector retrieval store)
  #   /workflow-runs                                     (workflow registry run records)
  #   /attachments                                       (S3/MinIO refs — schema exists; endpoints fast-follow)
  #   /users, /teams, /roles                             (admin identity mgmt — schema below; CRUD fast-follow)
  # =========================================================================

# =============================================================================
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Bearer token — the token IS the Agent Seat Passport (ADR-0013: one governed surface, no
        privileged backdoors), minted via `POST /passports` (the local/A1 issuance path; the hosted
        A2 surface replaces issuance with the spec's OAuth2 + PKCE + DCR Authorization Server —
        decisions/0012). The token binds the workspace (tenant) and the principal — an agent acting
        under a passport (`agent:<id>` + passport id + on-behalf-of `human:<user-uuid>`). The
        principal's effective RBAC (own/team/all + field masks) is enforced server-side; an agent can
        never exceed its granting human's permissions. Mutations by this scheme ride the autonomy
        gate + approval staging (ADR-0055). Human interactive sessions use `cookieAuth`, not this
        scheme.
    cookieAuth:
      type: apiKey
      in: cookie
      name: crm_session
      description: |
        Human interactive session (ADR-0043). An opaque 32-byte token set at login as
        `crm_session=<token>; HttpOnly; Secure; SameSite=Strict; Path=/`. The server stores only
        `SHA-256(token)` (`session.token_hash`) and authenticates iff the row is un-revoked and
        within idle + absolute expiry. Same `Authorize()` enforcement as the bearer path — no
        bypass. `/workspaces`, `/auth/login` are unauthenticated (`security: []`); they *mint* it.

  # --------------------------- shared parameters ----------------------------
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
      description: Opaque resource id (UUID; ordering semantics are not exposed).
    Cursor:
      name: cursor
      in: query
      schema: { type: string }
      description: |
        Opaque keyset cursor from a prior response's `page.next_cursor`. The cursor encodes the
        effective `sort` and `filter` of the originating request plus the last row's keyset
        (sort-key tuple + `id` tie-breaker). **Stability:** results are stable under concurrent
        inserts/updates (keyset pagination, not offset). Supplying `cursor` together with a `sort`
        or filter that differs from the one the cursor was minted under returns
        `422 code: cursor_param_mismatch` — re-issue the query without the cursor.
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      description: Max items in the page.
    Sort:
      name: sort
      in: query
      schema: { type: string }
      description: |
        Sort spec: comma-separated fields, `-` prefix = descending (e.g. `-updated_at,full_name`).
        `id` is always appended as the final tie-breaker so ordering is total and the keyset cursor
        is deterministic. **Allowed sort fields per resource** are the indexed columns enumerated in
        data-model.md §13 (Sort/filter vocabulary); the default sort when omitted is `-created_at,id`.
        An out-of-vocabulary field returns `422 code: sort_field_not_allowed`.
    IncludeArchived:
      name: include_archived
      in: query
      schema: { type: boolean, default: false }
      description: Include soft-deleted (archived) rows. Default false.
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      schema: { type: string, maxLength: 255 }
      description: |
        Client-supplied key making a POST safe to retry. **Scope:** the key is unique within
        `(workspace_id, principal, request-path)` and retained **24h**; a replay within that window
        returns the original status + body. Reusing the same key with a *different* request body
        returns `409 code: idempotency_key_conflict` (never a silent replay of mismatched intent).
        **Precedence vs natural keys:** on `logActivity`/`createLead`, the Idempotency-Key (transport
        retry-safety) is checked first; if absent, the `(source_system, source_id)` natural key
        (data-model dedupe) governs. The two never both create a row. Strongly recommended on all POSTs.
    ApprovalToken:
      name: X-Approval-Token
      in: header
      schema: { type: string }
      description: |
        A signed, single-use approval token (see schema `ApprovalToken`) minted by
        POST /approvals/{id}/approve, authorizing exactly one 🟡 confirm-first operation. It is a
        compact JWS whose claims **bind** the token to a specific approval, effect, tenant and
        principal — it is NOT a bare opaque string (ADR-0036). The server rejects a token that is
        expired, already consumed, or whose `diff_hash`/`workspace_id`/`passport_id`/`tool` does not
        match the operation being executed (`403 code: approval_token_invalid`). Required when an
        AGENT principal invokes a 🟡 operation; a human's direct call is itself the approval.
    IfMatch:
      name: If-Match
      in: header
      schema: { type: string }
      description: |
        Optional optimistic-concurrency precondition for a mutating request (PATCH/advance/merge):
        the last-seen entity `version`. If the row's current `version` differs, the write is
        rejected with `409 code: version_skew` (ErrVersionSkew) and no change is made — re-read,
        re-apply, retry. Omitting it is last-write-wins (discouraged for agent/automated writers).
        Accepted on every native (SoR-mode) mutating endpoint that returns a versioned entity.

  # --------------------------- shared responses -----------------------------
  responses:
    Unauthorized:
      description: No valid credential — a missing/invalid/expired `crm_session` cookie (human path) or a missing/invalid/expired bearer token (agent path).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            unauth:
              value: { type: 'https://errors.gradion.com/unauthorized', title: Unauthorized, status: 401, code: unauthorized, detail: No valid session cookie or bearer token. }
    Forbidden:
      description: Authenticated but not permitted (RBAC row/field scope, or 🟡 approval missing).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            rbac:
              value: { type: 'https://errors.gradion.com/forbidden', title: Forbidden, status: 403, code: forbidden, detail: Your role does not permit this action. }
    PermissionDenied:
      description: 'RBAC object/action denial — the authenticated principal''s role lacks the grant for this object+action (`code: permission_denied`, ErrPermissionDenied). Distinct from `scope_exceeds_grantor`/`seat_tier_insufficient` (agent-passport limits) and `approval_required` (🟡 gate).'
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            denied:
              value: { type: 'https://errors.gradion.com/permission_denied', title: Permission denied, status: 403, code: permission_denied, detail: Your role does not grant permission for this action on this object. }
    ScopeExceeded:
      description: 'Agent-Passport ceiling — the Passport requested/attempted more than its granting human''s effective RBAC allows (`code: scope_exceeds_grantor`, ErrScopeExceeded; agent ≤ human, ADR-0013/ADR-0026). Distinct from `permission_denied` (plain RBAC) and `seat_tier_insufficient` (seat ceiling).'
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            scope:
              value: { type: 'https://errors.gradion.com/scope_exceeds_grantor', title: Passport scope exceeds grantor, status: 403, code: scope_exceeds_grantor, detail: The agent Passport may not exceed the granting human's permissions. }
    SeatTierInsufficient:
      description: 'Seat ceiling — a `read` seat (or an agent acting for one) attempted a mutate/send/approve or a write `record_grant`/over-ceiling Passport bind (`code: seat_tier_insufficient`, ErrSeatTierInsufficient; A62/ADR-0047).'
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            seat:
              value: { type: 'https://errors.gradion.com/seat_tier_insufficient', title: Seat tier insufficient, status: 403, code: seat_tier_insufficient, detail: A read seat cannot perform this write/send/approve action. }
    FxRateUnavailable:
      description: 'A multi-currency roll-up could not obtain an FX rate to the base currency (`code: fx_rate_unavailable`; formulas-and-rules §6.1). The report/list is not silently computed on a missing rate.'
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            fx:
              value: { type: 'https://errors.gradion.com/fx_rate_unavailable', title: FX rate unavailable, status: 422, code: fx_rate_unavailable, detail: No FX rate to the base currency was available for this period. }
    EntityTypeMismatch:
      description: 'A list member''s entity type does not match the list''s declared `entity_type` (`code: entity_type_mismatch`; data-model §10.1).'
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            mismatch:
              value: { type: 'https://errors.gradion.com/entity_type_mismatch', title: Entity type mismatch, status: 422, code: entity_type_mismatch, detail: The member's entity type does not match the list's entity_type. }
    NotFound:
      description: No such resource in this workspace (or out of RBAC scope).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            notFound:
              value: { type: 'https://errors.gradion.com/not_found', title: Not found, status: 404, code: not_found, detail: Resource not found. }
    Conflict:
      description: State conflict (duplicate key, concurrent edit, already-decided, default-pipeline collision).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    VersionConflict:
      description: 'Optimistic-lock failure — the entity changed since the version in If-Match (`code: version_skew`).'
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            skew:
              value: { type: 'https://errors.gradion.com/version_skew', title: Version conflict, status: 409, code: version_skew, detail: The resource changed since your last read; re-read and retry. }
    ValidationError:
      description: Request failed validation (RFC 7807 with field-level `details.errors`).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            invalid:
              value:
                type: 'https://errors.gradion.com/validation_error'
                title: Validation failed
                status: 422
                code: validation_error
                detail: One or more fields are invalid.
                details:
                  errors:
                    - { field: 'emails[0].email', code: invalid_email }

  # ------------------------------- schemas ----------------------------------
  schemas:

    # ---- error (RFC 7807) ----
    Problem:
      type: object
      description: RFC 7807 problem+json with a stable machine `code` and structured `details`.
      required: [status, code]
      properties:
        type:
          type: string
          format: uri
          default: about:blank
          description: A URI identifying the problem type.
        title: { type: string, description: Short, human-readable summary. }
        status: { type: integer, description: HTTP status code. }
        code:
          type: string
          description: Stable machine-readable error code (e.g. duplicate_email, validation_error).
        detail: { type: string, description: Human-readable explanation for this occurrence. }
        instance: { type: string, format: uri, description: URI of the specific occurrence. }
        details:
          type: object
          additionalProperties: true
          description: |
            Structured machine context — e.g. `existing_id` on 409 duplicate, or an
            `errors` array of `{ field, code, message }` on 422 validation.

    # ---- pagination envelope ----
    PageInfo:
      type: object
      required: [has_more]
      properties:
        next_cursor:
          type: [string, 'null']
          description: Opaque cursor for the next page, or null if none.
        has_more: { type: boolean }

    # ---- mixins ----
    Provenance:
      type: object
      description: Provenance carried on every captured/user-entered domain row (data-model §1.6).
      required: [source, captured_by]
      properties:
        source:
          type: string
          description: 'What produced the row: email:<id> | calendar:<id> | connector:<n>:<id> | api | import:<batch> | ui | coldstart.'
        captured_by:
          type: string
          readOnly: true
          description: 'Who produced it: human:<uuid> | agent:<id> | connector:<name>. Server-stamped from the authenticated principal; never client-supplied.'
        raw:
          type: [object, 'null']
          additionalProperties: true
          description: Re-parseable original capture payload (off the query hot path); usually omitted in list views.
    Timestamps:
      type: object
      required: [created_at, updated_at]
      properties:
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at:
          type: [string, 'null']
          format: date-time
          description: Soft-delete marker. Null = live.

    Address:
      type: [object, 'null']
      description: Structured postal address.
      properties:
        line1: { type: [string, 'null'] }
        line2: { type: [string, 'null'] }
        city: { type: [string, 'null'] }
        region: { type: [string, 'null'] }
        postal_code: { type: [string, 'null'] }
        country: { type: [string, 'null'], description: ISO-3166 alpha-2. }
      additionalProperties: true

    Money:
      type: object
      description: Money as integer minor-units + ISO-4217 currency. Never a float.
      properties:
        amount_minor:
          type: [integer, 'null']
          format: int64
          description: Smallest currency unit (e.g. cents). 100000 EUR-cents = €1,000.00.
        currency:
          type: [string, 'null']
          pattern: '^[A-Z]{3}$'
          description: ISO-4217 uppercase.

    # ---- Person + children ----
    PersonEmail:
      type: object
      required: [id, email, email_type, is_primary, position, source, captured_by]
      properties:
        id: { type: string, format: uuid }
        person_id: { type: string, format: uuid }
        email: { type: string, format: email, description: Stored lowercased. }
        email_type: { type: string, enum: [work, personal, other], default: work }
        is_primary: { type: boolean, default: false, description: At most one primary per type (DB-enforced). }
        position: { type: integer, default: 0, description: Explicit ordering. }
        source: { type: string }
        captured_by: { type: string, readOnly: true, description: 'Server-stamped from the authenticated principal (human:<uuid> | agent:<id> | connector:<name>); never client-supplied.' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    PersonPhone:
      type: object
      required: [id, phone, phone_type, is_primary, position, source, captured_by]
      properties:
        id: { type: string, format: uuid }
        person_id: { type: string, format: uuid }
        phone: { type: string, description: E.164 normalized. }
        phone_type: { type: string, enum: [work, mobile, home, other], default: work }
        is_primary: { type: boolean, default: false }
        position: { type: integer, default: 0 }
        source: { type: string }
        captured_by: { type: string, readOnly: true, description: 'Server-stamped from the authenticated principal (human:<uuid> | agent:<id> | connector:<name>); never client-supplied.' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    Person:
      type: object
      description: A contact. Mirrors the `person` table.
      required: [id, workspace_id, full_name, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        first_name: { type: [string, 'null'] }
        last_name: { type: [string, 'null'] }
        full_name: { type: string, description: Always present (display name). }
        title: { type: [string, 'null'], description: Denormalized current title; authoritative title is on the employment relationship. }
        owner_id: { type: [string, 'null'], format: uuid }
        social:
          type: object
          additionalProperties: true
          description: '{ linkedin, twitter, github, ... }'
        address: { $ref: '#/components/schemas/Address' }
        emails:
          type: array
          items: { $ref: '#/components/schemas/PersonEmail' }
        phones:
          type: array
          items: { $ref: '#/components/schemas/PersonPhone' }
        consent:
          type: array
          readOnly: true
          description: |
            Per-purpose consent summary (A22/ADR-0011). Read-only derived view of the `person_consent`
            rows; one entry per purpose the workspace tracks. The single flat `consent_state` flag was
            REMOVED — consent is per-purpose and demonstrable (data-model.md §3.4). Mutate via
            `POST /people/{id}/consent`; read the full proof log via `GET /people/{id}/consent`.
          items: { $ref: '#/components/schemas/PersonConsentState' }
        merged_into_id: { type: [string, 'null'], format: uuid, description: Set when this row was merged away. }
        converted_from_lead_id: { type: [string, 'null'], format: uuid, description: Canonical origin pointer if promoted from a lead. }
        source: { type: string }
        captured_by: { type: string, readOnly: true, description: 'Server-stamped from the authenticated principal (human:<uuid> | agent:<id> | connector:<name>); never client-supplied.' }
        raw: { type: [object, 'null'], additionalProperties: true }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }
      additionalProperties: true
      x-extension: true
      x-extension-note: |
        additionalProperties:true admits client custom fields (data-model §9 — custom fields
        are real columns added by migration, surfaced additively through this same contract).

    CreatePersonRequest:
      type: object
      required: [full_name, source]
      properties:
        full_name: { type: string }
        first_name: { type: [string, 'null'] }
        last_name: { type: [string, 'null'] }
        title: { type: [string, 'null'] }
        owner_id: { type: [string, 'null'], format: uuid }
        social: { type: object, additionalProperties: true }
        address: { $ref: '#/components/schemas/Address' }
        emails:
          type: array
          items:
            type: object
            required: [email]
            properties:
              email: { type: string, format: email }
              email_type: { type: string, enum: [work, personal, other], default: work }
              is_primary: { type: boolean, default: false }
              position: { type: integer, default: 0 }
        phones:
          type: array
          items:
            type: object
            required: [phone]
            properties:
              phone: { type: string }
              phone_type: { type: string, enum: [work, mobile, home, other], default: work }
              is_primary: { type: boolean, default: false }
              position: { type: integer, default: 0 }
        source: { type: string }
      additionalProperties: true
      x-extension: true

    UpdatePersonRequest:
      type: object
      description: Partial update. Omitted fields are unchanged.
      properties:
        full_name: { type: string }
        first_name: { type: [string, 'null'] }
        last_name: { type: [string, 'null'] }
        title: { type: [string, 'null'] }
        owner_id: { type: [string, 'null'], format: uuid }
        social: { type: object, additionalProperties: true }
        address: { $ref: '#/components/schemas/Address' }
      additionalProperties: true
      x-extension: true
      x-consent-note: |
        Consent is NOT mutable through person update (A22/ADR-0011). Use POST /people/{id}/consent
        so that every change writes an append-only `consent_event` proof row.

    PersonListResponse:
      type: object
      required: [data, page]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Person' }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Organization + domain ----
    OrganizationDomain:
      type: object
      required: [id, domain, is_primary, source, captured_by]
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        domain: { type: string, description: Lowercased, no scheme, no www. }
        is_primary: { type: boolean, default: false }
        source: { type: string }
        captured_by: { type: string, readOnly: true, description: 'Server-stamped from the authenticated principal (human:<uuid> | agent:<id> | connector:<name>); never client-supplied.' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    Organization:
      type: object
      description: A company. Mirrors the `organization` table.
      required: [id, workspace_id, display_name, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        display_name: { type: string }
        legal_name: { type: [string, 'null'] }
        industry: { type: [string, 'null'] }
        size_band:
          type: [string, 'null']
          enum: [null, '1-10', '11-50', '51-200', '201-500', '501-1000', '1001-5000', '5000+']
        address: { $ref: '#/components/schemas/Address' }
        owner_id: { type: [string, 'null'], format: uuid }
        parent_org_id: { type: [string, 'null'], format: uuid, description: Single-level hierarchy FK; no cycles. }
        merged_into_id: { type: [string, 'null'], format: uuid }
        domains:
          type: array
          items: { $ref: '#/components/schemas/OrganizationDomain' }
        classification: { type: [string, 'null'], enum: [null, prospect, customer, agency, reseller, tech_vendor, platform, partner, competitor, other], description: "An org IS a partner iff classification='partner' AND it has a `partner` row (A41/ADR-0032). Values match the data-model §4.1 CHECK." }
        source: { type: string }
        captured_by: { type: string, readOnly: true, description: 'Server-stamped from the authenticated principal (human:<uuid> | agent:<id> | connector:<name>); never client-supplied.' }
        raw: { type: [object, 'null'], additionalProperties: true }
        partner: { $ref: '#/components/schemas/Partner' }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }
      additionalProperties: true
      x-extension: true

    CreateOrganizationRequest:
      type: object
      required: [display_name, source]
      properties:
        display_name: { type: string }
        legal_name: { type: [string, 'null'] }
        industry: { type: [string, 'null'] }
        size_band: { type: [string, 'null'], enum: [null, '1-10', '11-50', '51-200', '201-500', '501-1000', '1001-5000', '5000+'] }
        address: { $ref: '#/components/schemas/Address' }
        owner_id: { type: [string, 'null'], format: uuid }
        parent_org_id: { type: [string, 'null'], format: uuid }
        domains:
          type: array
          items:
            type: object
            required: [domain]
            properties:
              domain: { type: string }
              is_primary: { type: boolean, default: false }
        source: { type: string }
      additionalProperties: true
      x-extension: true

    UpdateOrganizationRequest:
      type: object
      properties:
        display_name: { type: string }
        legal_name: { type: [string, 'null'] }
        industry: { type: [string, 'null'] }
        size_band: { type: [string, 'null'], enum: [null, '1-10', '11-50', '51-200', '201-500', '501-1000', '1001-5000', '5000+'] }
        address: { $ref: '#/components/schemas/Address' }
        owner_id: { type: [string, 'null'], format: uuid }
        parent_org_id: { type: [string, 'null'], format: uuid }
      additionalProperties: true
      x-extension: true

    OrganizationListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Organization' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Relationship ----
    Relationship:
      type: object
      description: |
        The typed edge. Mirrors `relationship` (data-model §5). Shapes by `kind`:
        `employment` (person↔org), `deal_stakeholder` (deal↔person), and the partner edges
        (A41/ADR-0032, org↔org via `counterparty_org_id`): `partner_of` (org served by a partner
        org), `referred_by` (org referred by a partner org), `co_sell_with` (org co-sold with a partner org).
      required: [id, workspace_id, kind, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        kind: { type: string, enum: [employment, deal_stakeholder, partner_of, referred_by, co_sell_with] }
        person_id: { type: [string, 'null'], format: uuid }
        organization_id: { type: [string, 'null'], format: uuid }
        counterparty_org_id: { type: [string, 'null'], format: uuid, description: 'The other org on a partner edge (partner_of/referred_by/co_sell_with). Null for employment/deal_stakeholder.' }
        deal_id: { type: [string, 'null'], format: uuid }
        role:
          type: [string, 'null']
          description: 'employment: cto/vp_sales/...; stakeholder: champion/economic_buyer/blocker/influencer/user.'
        is_current_primary: { type: boolean, default: false, description: Employment — the one current primary employer (≤1 per person). }
        started_at: { type: [string, 'null'], format: date }
        ended_at: { type: [string, 'null'], format: date, description: Null = current/ongoing. }
        source: { type: string }
        captured_by: { type: string, readOnly: true, description: 'Server-stamped from the authenticated principal (human:<uuid> | agent:<id> | connector:<name>); never client-supplied.' }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateRelationshipRequest:
      type: object
      required: [kind, source]
      properties:
        kind: { type: string, enum: [employment, deal_stakeholder, partner_of, referred_by, co_sell_with] }
        person_id: { type: [string, 'null'], format: uuid }
        organization_id: { type: [string, 'null'], format: uuid }
        counterparty_org_id: { type: [string, 'null'], format: uuid }
        deal_id: { type: [string, 'null'], format: uuid }
        role: { type: [string, 'null'] }
        is_current_primary: { type: boolean, default: false }
        started_at: { type: [string, 'null'], format: date }
        ended_at: { type: [string, 'null'], format: date }
        source: { type: string }

    UpdateRelationshipRequest:
      type: object
      properties:
        role: { type: [string, 'null'] }
        is_current_primary: { type: boolean }
        started_at: { type: [string, 'null'], format: date }
        ended_at: { type: [string, 'null'], format: date }

    RelationshipListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Relationship' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Deal ----
    Deal:
      type: object
      description: A deal. Mirrors the `deal` table.
      required: [id, workspace_id, name, pipeline_id, stage_id, status, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        amount_minor: { type: [integer, 'null'], format: int64 }
        currency: { type: [string, 'null'], pattern: '^[A-Z]{3}$' }
        fx_rate_to_base: { type: [string, 'null'], description: 'Native→base, frozen at close (null while open). Decimal-as-string to avoid float rounding of the 10-dp rate.' }
        fx_rate_date: { type: [string, 'null'], format: date }
        pipeline_id: { type: string, format: uuid }
        stage_id: { type: string, format: uuid, description: Must belong to pipeline_id. }
        organization_id: { type: [string, 'null'], format: uuid, description: Primary org; never a raw lead. }
        partner_org_id: { type: [string, 'null'], format: uuid, description: 'Deal registration/attribution to a partner org (A38/A41/ADR-0032). The org must have a `partner` row.' }
        owner_id: { type: [string, 'null'], format: uuid }
        status: { type: string, enum: [open, won, lost], default: open }
        lost_reason: { type: [string, 'null'], description: Required when status=lost. }
        forecast_category: { type: [string, 'null'], enum: [null, commit, best_case, pipeline, omitted] }
        expected_close_date: { type: [string, 'null'], format: date, description: 'INV-CLOSE-PAST (formulas §11): an open deal never claims a past close date — saving one is rejected 422 (close_date_past); one that ages into the past is corrected by the nightly run.' }
        close_date_provisional: { type: boolean, readOnly: true, description: 'True while the close date is a machine-computed replacement awaiting human confirmation (formulas §11 🟡 tier); a provisional deal stays out of Commit/Best-case. Cleared when a human sets the date.' }
        wait_until: { type: [string, 'null'], format: date, description: "'Customer asked us to wait until' date; suppresses the stalled flag but not the overdue close-date flag." }
        closed_at: { type: [string, 'null'], format: date-time }
        last_activity_at: { type: [string, 'null'], format: date-time, description: Drives the deterministic stalled flag. }
        stalled: { type: boolean, readOnly: true, description: Derived — no activity past the threshold (absolute duration). }
        source: { type: string }
        captured_by: { type: string, readOnly: true, description: 'Server-stamped from the authenticated principal (human:<uuid> | agent:<id> | connector:<name>); never client-supplied.' }
        raw: { type: [object, 'null'], additionalProperties: true }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }
      additionalProperties: true
      x-extension: true

    CreateDealRequest:
      type: object
      required: [name, pipeline_id, stage_id, source]
      properties:
        name: { type: string }
        amount_minor: { type: [integer, 'null'], format: int64 }
        currency: { type: [string, 'null'], pattern: '^[A-Z]{3}$' }
        pipeline_id: { type: string, format: uuid }
        stage_id: { type: string, format: uuid }
        organization_id: { type: [string, 'null'], format: uuid }
        owner_id: { type: [string, 'null'], format: uuid }
        expected_close_date: { type: [string, 'null'], format: date, description: 'Deals are born open, so a date before today is rejected 422 (INV-CLOSE-PAST, formulas §11).' }
        source: { type: string }
      additionalProperties: true
      x-extension: true

    UpdateDealRequest:
      type: object
      properties:
        name: { type: string }
        amount_minor: { type: [integer, 'null'], format: int64 }
        currency: { type: [string, 'null'], pattern: '^[A-Z]{3}$' }
        organization_id: { type: [string, 'null'], format: uuid }
        partner_org_id: { type: [string, 'null'], format: uuid }
        owner_id: { type: [string, 'null'], format: uuid }
        status: { type: string, enum: [open, won, lost] }
        lost_reason: { type: [string, 'null'] }
        fx_rate_to_base: { type: [string, 'null'], description: 'Native→base rate to FREEZE at close. Required (server may also compute it from the FX table) when transitioning to won with a non-base currency — satisfies the deal_closed_fx CHECK (formulas §6.1). Ignored while open.' }
        fx_rate_date: { type: [string, 'null'], format: date }
        forecast_category: { type: [string, 'null'], enum: [null, commit, best_case, pipeline, omitted] }
        expected_close_date: { type: [string, 'null'], format: date, description: 'On an open deal a date before today is rejected 422 (INV-CLOSE-PAST, formulas §11); a human setting it also clears close_date_provisional.' }
        wait_until: { type: [string, 'null'], format: date }
      additionalProperties: true
      x-extension: true

    AdvanceDealRequest:
      type: object
      required: [to_stage_id]
      properties:
        to_stage_id: { type: string, format: uuid, description: Target stage (must belong to the deal's pipeline). }
        status: { type: string, enum: [open, won, lost], description: Set when advancing into a terminal stage. }
        lost_reason: { type: [string, 'null'], description: Required if status=lost. }

    DealListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Deal' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Pipeline + Stage ----
    Stage:
      type: object
      description: A pipeline stage. Mirrors the `stage` table.
      required: [id, workspace_id, pipeline_id, name, position, semantic, win_probability]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        pipeline_id: { type: string, format: uuid }
        name: { type: string }
        position: { type: integer, description: Unique within the pipeline. }
        semantic: { type: string, enum: [open, won, lost], default: open }
        win_probability: { type: integer, minimum: 0, maximum: 100, description: 'won=100, lost=0, open=0..100.' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateStageRequest:
      type: object
      required: [pipeline_id, name, position]
      properties:
        pipeline_id: { type: string, format: uuid }
        name: { type: string }
        position: { type: integer }
        semantic: { type: string, enum: [open, won, lost], default: open }
        win_probability: { type: integer, minimum: 0, maximum: 100, default: 0 }

    UpdateStageRequest:
      type: object
      properties:
        name: { type: string }
        position: { type: integer }
        semantic: { type: string, enum: [open, won, lost] }
        win_probability: { type: integer, minimum: 0, maximum: 100 }

    StageListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Stage' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    Pipeline:
      type: object
      description: A pipeline. Mirrors the `pipeline` table (with embedded stages on GET).
      required: [id, workspace_id, name, is_default, position]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        is_default: { type: boolean, default: false, description: Exactly one default per workspace. }
        position: { type: integer, default: 0 }
        stages:
          type: array
          items: { $ref: '#/components/schemas/Stage' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreatePipelineRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        is_default: { type: boolean, default: false }
        position: { type: integer, default: 0 }
        stages:
          type: array
          description: Optional initial stages.
          items: { $ref: '#/components/schemas/CreateStageRequest' }

    UpdatePipelineRequest:
      type: object
      properties:
        name: { type: string }
        is_default: { type: boolean }
        position: { type: integer }

    PipelineListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Pipeline' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Activity + link ----
    ActivityLink:
      type: object
      required: [entity_type, entity_id]
      properties:
        id: { type: string, format: uuid }
        activity_id: { type: string, format: uuid }
        entity_type: { type: string, enum: [person, organization, deal] }
        entity_id: { type: string, format: uuid }

    Activity:
      type: object
      description: |
        A polymorphic timeline item. Mirrors the `activity` table + `activity_link`.
        **Per-kind field constraints** (enforced server-side to match the DB `activity_task_fields`
        CHECK; the OpenAPI cannot express these conditionally): `due_at`/`assignee_id`/`is_done`/
        `done_at` are valid ONLY when `kind=task`; `meeting_status` ONLY when `kind=meeting`;
        `duration_seconds` only for meeting/call; `direction` is null for note/task. Setting a
        disallowed field for the kind returns `422 code: field_not_valid_for_kind` (the API rejects
        what the DB CHECK would reject, rather than 500-ing at write time).
      required: [id, workspace_id, kind, occurred_at, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        kind: { type: string, enum: [email, call, meeting, note, task, whatsapp, telegram] }
        subject: { type: [string, 'null'] }
        body: { type: [string, 'null'] }
        occurred_at: { type: string, format: date-time }
        due_at: { type: [string, 'null'], format: date-time, description: Task only. }
        remind_at: { type: [string, 'null'], format: date-time, description: Task only. }
        assignee_id: { type: [string, 'null'], format: uuid, description: Task only. }
        is_done: { type: boolean, default: false, description: Task only. }
        done_at: { type: [string, 'null'], format: date-time }
        duration_seconds: { type: [integer, 'null'], description: Meeting/call only. }
        direction: { type: [string, 'null'], enum: [null, inbound, outbound], description: 'inbound/outbound for email/call; null for note/task.' }
        meeting_status: { type: [string, 'null'], enum: [null, booked, held, no_show, canceled], description: 'Set only when kind=meeting.' }
        source_system: { type: [string, 'null'], description: 'gmail/gcal/outlook/transcript — idempotency key part.' }
        source_id: { type: [string, 'null'], description: Provider message/event id — idempotency key part. }
        links:
          type: array
          description: One activity may link to >1 entity (person + deal).
          items: { $ref: '#/components/schemas/ActivityLink' }
        source: { type: string }
        captured_by: { type: string, readOnly: true, description: 'Server-stamped from the authenticated principal (human:<uuid> | agent:<id> | connector:<name>); never client-supplied.' }
        raw: { type: [object, 'null'], additionalProperties: true }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateActivityRequest:
      type: object
      required: [kind, source]
      properties:
        kind: { type: string, enum: [email, call, meeting, note, task, whatsapp, telegram] }
        subject: { type: [string, 'null'] }
        body: { type: [string, 'null'] }
        occurred_at: { type: string, format: date-time }
        due_at: { type: [string, 'null'], format: date-time }
        remind_at: { type: [string, 'null'], format: date-time }
        assignee_id: { type: [string, 'null'], format: uuid }
        duration_seconds: { type: [integer, 'null'] }
        direction: { type: [string, 'null'], enum: [null, inbound, outbound] }
        meeting_status: { type: [string, 'null'], enum: [null, booked, held, no_show, canceled] }
        source_system: { type: [string, 'null'] }
        source_id: { type: [string, 'null'] }
        links:
          type: array
          items:
            type: object
            required: [entity_type, entity_id]
            properties:
              entity_type: { type: string, enum: [person, organization, deal] }
              entity_id: { type: string, format: uuid }
        source: { type: string }
        raw: { type: [object, 'null'], additionalProperties: true }

    UpdateActivityRequest:
      type: object
      properties:
        subject: { type: [string, 'null'] }
        body: { type: [string, 'null'] }
        occurred_at: { type: string, format: date-time }
        due_at: { type: [string, 'null'], format: date-time }
        remind_at: { type: [string, 'null'], format: date-time }
        assignee_id: { type: [string, 'null'], format: uuid }
        is_done: { type: boolean, description: Completing a task writes one audit row + task.completed event. }

    ActivityListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Activity' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    EmailDraft:
      type: object
      description: A drafted email (never sent by drafting). Send via /activities/{id}/send-email (🟡).
      required: [subject, body]
      properties:
        subject: { type: string }
        body: { type: string }
        to: { type: array, items: { type: string, format: email } }
        in_reply_to_activity_id: { type: [string, 'null'], format: uuid }

    SendEmailRequest:
      type: object
      required: [subject, body, to, consent_purpose]
      properties:
        subject: { type: string }
        body: { type: string, description: The (possibly edited) final body that is sent. }
        to: { type: array, items: { type: string, format: email } }
        cc: { type: array, items: { type: string, format: email } }
        consent_purpose:
          type: string
          description: |
            The consent purpose this send falls under (e.g. `transactional`, `marketing_email`).
            The send is suppressed (409 `consent_not_granted`) unless every recipient has an active
            `granted` `person_consent` for THIS purpose (default-deny per purpose, A22/ADR-0011).

    # ---- Lead ----
    Lead:
      type: object
      description: A thin, segregated prospect. Mirrors the `lead` table. NO organization FK.
      required: [id, workspace_id, status, score, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        full_name: { type: [string, 'null'] }
        email: { type: [string, 'null'], format: email, description: Lowercased; lead-internal dedupe key. }
        title: { type: [string, 'null'] }
        company_name: { type: [string, 'null'], description: FREE TEXT — NOT an organization FK. }
        candidate_org_key: { type: [string, 'null'], description: Loose key for ABM routing without creating an org. }
        status: { type: string, enum: [new, working, promoted, disqualified], default: new }
        score: { type: integer, default: 0, description: Lead-local scoring; never reads the contact graph. }
        owner_id: { type: [string, 'null'], format: uuid }
        source_system: { type: [string, 'null'] }
        source_id: { type: [string, 'null'] }
        promoted_person_id: { type: [string, 'null'], format: uuid, description: Set on promotion (convenience mirror). }
        promoted_at: { type: [string, 'null'], format: date-time }
        source: { type: string }
        captured_by: { type: string, readOnly: true, description: 'Server-stamped from the authenticated principal (human:<uuid> | agent:<id> | connector:<name>); never client-supplied.' }
        raw: { type: [object, 'null'], additionalProperties: true }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateLeadRequest:
      type: object
      required: [source]
      properties:
        full_name: { type: [string, 'null'] }
        email: { type: [string, 'null'], format: email }
        title: { type: [string, 'null'] }
        company_name: { type: [string, 'null'] }
        candidate_org_key: { type: [string, 'null'] }
        status: { type: string, enum: [new, working, promoted, disqualified], default: new }
        owner_id: { type: [string, 'null'], format: uuid }
        source_system: { type: [string, 'null'] }
        source_id: { type: [string, 'null'] }
        source: { type: string }

    UpdateLeadRequest:
      type: object
      description: |
        Partial update. `status` may move only between `new`/`working` here. **Disqualifying is done
        via DELETE /leads/{id}** (which sets status=disqualified AND archives — the invariant
        "disqualified ⇒ archived" is enforced on that one path); `promoted` is reachable only via
        POST /leads/{id}/promote. Both terminal states are therefore excluded from this enum.
      properties:
        full_name: { type: [string, 'null'] }
        email: { type: [string, 'null'], format: email }
        title: { type: [string, 'null'] }
        company_name: { type: [string, 'null'] }
        candidate_org_key: { type: [string, 'null'], description: 'Loose ABM routing key. Format: lowercased registrable domain when known (`acme.com`), else a slug of company_name. Never an organization FK.' }
        status: { type: string, enum: [new, working] }
        score: { type: [integer, 'null'], minimum: 0, maximum: 100, description: 'Manual human score override (formulas §3.1, AC-S1). Omit to keep the computed lead-local score.' }
        owner_id: { type: [string, 'null'], format: uuid }

    PromoteLeadRequest:
      type: object
      required: [trigger]
      properties:
        trigger:
          type: string
          enum: [inbound_reply, meeting_booked, meeting_held, human_qualify]
          description: |
            The genuine-engagement trigger. cold_outbound_no_reply is NOT permitted and is
            rejected with 422 — promotion is engagement, not import or an outbound touch.
        evidence:
          type: object
          description: Which inbound email/meeting (or human) triggered promotion; recorded in audit.
          properties:
            activity_id: { type: [string, 'null'], format: uuid }
            note: { type: [string, 'null'] }

    PromoteLeadResponse:
      type: object
      required: [person, merged]
      properties:
        person: { $ref: '#/components/schemas/Person' }
        merged:
          type: boolean
          description: True if promotion merged into an existing person (no duplicate); false if a new person was created.
        lead_id: { type: string, format: uuid }

    LeadListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Lead' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- List / Tag ----
    List:
      type: object
      description: A static membership set or a dynamic segment. Mirrors the `list` table.
      required: [id, workspace_id, name, entity_type, list_type]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        list_type: { type: string, enum: [static, dynamic], default: static }
        definition: { type: [object, 'null'], additionalProperties: true, description: Dynamic — validated query plan; static — null. }
        owner_id: { type: [string, 'null'], format: uuid }
        team_id: { type: [string, 'null'], format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateListRequest:
      type: object
      required: [name, entity_type]
      properties:
        name: { type: string }
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        list_type: { type: string, enum: [static, dynamic], default: static }
        definition: { type: [object, 'null'], additionalProperties: true }
        owner_id: { type: [string, 'null'], format: uuid }
        team_id: { type: [string, 'null'], format: uuid }

    ListMember:
      type: object
      required: [id, list_id, entity_type, entity_id]
      properties:
        id: { type: string, format: uuid }
        list_id: { type: string, format: uuid }
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        entity_id: { type: string, format: uuid }
        added_by: { type: string }
        created_at: { type: string, format: date-time }

    AddListMemberRequest:
      type: object
      required: [entity_type, entity_id]
      properties:
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        entity_id: { type: string, format: uuid }

    ListListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/List' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    ListMemberListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/ListMember' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    Tag:
      type: object
      description: A tag. Mirrors the `tag` table.
      required: [id, workspace_id, name]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        color: { type: [string, 'null'] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateTagRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        color: { type: [string, 'null'] }

    Taggable:
      type: object
      required: [id, tag_id, entity_type, entity_id]
      properties:
        id: { type: string, format: uuid }
        tag_id: { type: string, format: uuid }
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        entity_id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }

    ApplyTagRequest:
      type: object
      required: [entity_type, entity_id]
      properties:
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        entity_id: { type: string, format: uuid }

    TagListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Tag' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Identity (User / Team / Role) ----
    User:
      type: object
      description: A seat — human or first-party agent. Mirrors `app_user`.
      required: [id, workspace_id, email, display_name, status, is_agent]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        email: { type: string, format: email }
        display_name: { type: string }
        timezone: { type: string, default: UTC, description: IANA name. }
        status: { type: string, enum: [active, suspended, deactivated], default: active }
        is_agent: { type: boolean, default: false, description: First-party Agent Runner identity vs a human seat. }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    Team:
      type: object
      description: Mirrors the `team` table.
      required: [id, workspace_id, name]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        parent_team_id: { type: [string, 'null'], format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    Role:
      type: object
      description: An RBAC role bundle. Mirrors the `role` table.
      required: [id, workspace_id, key, name, is_system, permissions]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        key: { type: string, description: 'admin | manager | rep | read_only | ops | <code-defined>.' }
        name: { type: string }
        is_system: { type: boolean, default: false }
        permissions:
          type: object
          additionalProperties: true
          description: '{ object: {crud}, field_masks: [...], row_scope: own|team|all }.'
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    BootstrapWorkspaceRequest:
      type: object
      additionalProperties: false
      required: [workspace_name, admin_email, admin_password, admin_display_name]
      properties:
        workspace_name:     { type: string, minLength: 1, maxLength: 200 }
        admin_email:        { type: string, format: email }
        admin_password:     { type: string, minLength: 12, maxLength: 256, description: Hashed server-side (Argon2id/bcrypt); never stored or logged in plaintext. }
        admin_display_name: { type: string, minLength: 1, maxLength: 200 }
        timezone:           { type: string, default: 'UTC', description: IANA zone for the first user. }

    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:    { type: string, format: email }
        password: { type: string, minLength: 1, maxLength: 256 }
        mfa_code: { type: [string, 'null'], description: TOTP code; supply when the workspace requires MFA (else first call returns 403 mfa_required). }

    MeResponse:
      type: object
      required: [user, roles, teams]
      properties:
        user: { $ref: '#/components/schemas/User' }
        roles:
          type: array
          items: { type: string }
          description: Effective role keys for this principal.
        teams:
          type: array
          items: { type: string, format: uuid }
        passport:
          type: [object, 'null']
          description: Present when the principal is an agent acting under an Agent Seat Passport.
          properties:
            passport_id: { type: string, format: uuid }
            on_behalf_of: { type: string, format: uuid }
            scopes:
              type: array
              items: { type: string, enum: [read_only, draft_only, act_with_approval, auto_execute_low_risk] }

    # ---- Audit ----
    AuditLogEntry:
      type: object
      description: An append-only audit row. Mirrors the `audit_log` table.
      required: [id, workspace_id, actor_type, actor_id, action, entity_type, occurred_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        actor_type: { type: string, enum: [human, agent, system, connector] }
        actor_id: { type: string, description: "User uuid, agent id, connector name (e.g. connector:gmail), or 'system'." }
        passport_id: { type: [string, 'null'], format: uuid, description: Agent Seat Passport that authorized an agent action. }
        on_behalf_of: { type: [string, 'null'], format: uuid, description: The human authority for an agent action. }
        action:
          type: string
          # Every mutation is attributable (P12). connector captures audit as actor_type=connector.
          enum: [create, update, archive, merge, promote, disqualify, restore, export, erase, anonymize, login, assign, advance_stage, send_email, consent_grant, consent_withdraw, approve, reject, record_share, record_unshare]
        entity_type: { type: string }
        entity_id: { type: [string, 'null'], format: uuid }
        before: { type: [object, 'null'], additionalProperties: true }
        after: { type: [object, 'null'], additionalProperties: true }
        authorization_rule: { type: [string, 'null'], description: Which RBAC/scope rule allowed it. }
        evidence: { type: [object, 'null'], additionalProperties: true, description: e.g. which inbound email/meeting triggered a promotion. }
        occurred_at: { type: string, format: date-time }

    # ---- Reports ----
    RunReportRequest:
      type: object
      description: |
        A typed, validated query plan (not free-form SQL). For prebuilt reports, filters
        parameterize the plan; for ad-hoc, the object/group_by/aggregates compile to a plan.
        **Field vocabulary:** every key in `filters`, every entry in `group_by`, and every
        `aggregates[].field` MUST be a field in the target report's declared vocabulary
        (the per-report allowed dimension/measure list in data-model.md §13 / contract README).
        An out-of-vocabulary field returns `422 code: report_field_not_allowed`. `additionalProperties`
        is open only to admit *values*, never to admit arbitrary SQL identifiers.
        **`/reports/{report}` path param:** a value matching the UUID format resolves to a saved
        report; any other value resolves against the prebuilt-report key catalog (README "Prebuilt
        reports"). A prebuilt key is never a UUID, so there is no collision.
      properties:
        filters:
          type: object
          additionalProperties: true
          description: Typed predicates (period, status, owner, ...) — keys must be in the report vocabulary.
        group_by:
          type: array
          items: { type: string }
        aggregates:
          type: array
          items:
            type: object
            required: [fn]
            properties:
              fn: { type: string, enum: [count, count_distinct, sum, avg, min, max] }
              field: { type: [string, 'null'] }
              as: { type: [string, 'null'] }
        as_of_date: { type: [string, 'null'], format: date, description: Snapshot / historical reporting via deal_stage_history. }

    ReportResult:
      type: object
      required: [report, plan, columns, rows]
      properties:
        report: { type: string }
        plan:
          type: object
          additionalProperties: true
          description: The validated query plan that was executed (shown before/after run).
        columns:
          type: array
          items: { type: string }
        rows:
          type: array
          items: { type: object, additionalProperties: true }
          description: Aggregate rows; each carries its own `derivation_url` handle for the exact cell (group keys bound to the row's values).
        total_rows: { type: integer }
        generated_at: { type: string, format: date-time }
        derivation_url:
          type: [string, 'null']
          description: Handle for "Explain This Number" drill-through to source rows (`GET /reports/{report}/derivation`); the result-level handle explains the whole filtered set, each row's handle the single cell.

    ReportDerivation:
      type: object
      description: |
        The "Explain This Number" resolution (features/03 §1.3): a plain-language definition of
        the exact filter+group+aggregate plus the underlying source rows, which reconcile
        exactly to the explained aggregate (AC-X1).
      required: [report, definition, plan, columns, rows]
      properties:
        report: { type: string }
        definition:
          type: string
          description: Plain-language reading of the exact filter + group + aggregate that produced the number.
        plan:
          type: object
          additionalProperties: true
          description: The validated predicate/group/aggregate set that was resolved.
        columns:
          type: array
          items: { type: string }
        rows:
          type: array
          items: { type: object, additionalProperties: true }
          description: The underlying source rows (drill-through), row-scoped exactly like the report.
        aggregates:
          type: object
          additionalProperties: true
          description: The requested aggregates recomputed over exactly these source rows — equals the explained cell.
        total_rows: { type: integer, description: Source rows matched (rows is capped at the report row limit). }
        generated_at: { type: string, format: date-time }

    # ---- Search ----
    SearchResult:
      type: object
      required: [type, id]
      properties:
        type: { type: string, enum: [person, organization, deal, activity, lead] }
        id: { type: string, format: uuid }
        title: { type: [string, 'null'], description: Display label (name/subject). }
        snippet: { type: [string, 'null'] }
        score: { type: [number, 'null'], description: Relevance score. }

    SearchResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/SearchResult' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Connectors: IMAP one-shot capture ----
    ImapConnectRequest:
      type: object
      required: [host, email, password]
      properties:
        host: { type: string, minLength: 1, description: IMAP server hostname (e.g. imap.gmail.com). }
        port: { type: integer, minimum: 1, maximum: 65535, default: 993, description: IMAPS port; defaults to 993. }
        email: { type: string, format: email, description: Mailbox login / address. }
        password: { type: string, minLength: 1, description: Mailbox password (used for this call only — never stored, never logged). }
        mailbox: { type: string, default: INBOX, description: Folder to pull from; defaults to INBOX. }
        max_messages: { type: integer, minimum: 1, maximum: 200, default: 50, description: Most-recent messages to pull; capped at 200. }

    ImapConnectResult:
      type: object
      description: The outcome of a one-shot IMAP pull.
      required: [connected, mailbox, captured, skipped, contacts]
      properties:
        connected: { type: boolean, description: True when the mailbox was reached and read. }
        mailbox: { type: string, description: The folder that was pulled. }
        captured: { type: integer, description: Messages that landed as email activities. }
        skipped: { type: integer, description: Messages intentionally dropped (automated/system mail, unparseable). }
        contacts: { type: integer, description: Distinct counterparties seen across the captured messages. }

    # ---- AI: cold-start ----
    ColdStartRequest:
      type: object
      required: [url]
      properties:
        url: { type: string, format: uri, description: Company website URL to read back. }

    ColdStartField:
      type: object
      description: One read-back field. EVERY field carries non-empty evidence + confidence, or it is omitted (no-guess gate).
      required: [field, value, evidence_snippet, source_url, confidence]
      properties:
        field: { type: string, enum: [icp, buying_center, value_proposition, usp, buying_intents, legal_name, registered_address, register_vat, industry, history] }
        value: { type: string }
        evidence_snippet: { type: string, minLength: 1, description: Verbatim source text — non-empty or the field is absent. }
        source_url: { type: string, format: uri }
        confidence: { type: number, minimum: 0, maximum: 1 }

    ColdStartProposal:
      type: object
      description: A staged proposal. NOTHING is written to real records until accepted via /approvals.
      required: [proposal_id, source_url, status, fields]
      properties:
        proposal_id: { type: string, format: uuid }
        source_url: { type: string, format: uri }
        status: { type: string, enum: [staged], description: Always staged — accept via the approval inbox. }
        fields:
          type: array
          items: { $ref: '#/components/schemas/ColdStartField' }
        created_at: { type: string, format: date-time }

    EnrichCompanyRequest:
      type: object
      description: Optional override. With no body the org's own domain is read.
      properties:
        url: { type: string, format: uri, description: Company URL to read instead of the org's domain. }

    EnrichmentProposal:
      type: object
      description: A staged enrichment of one organization. Field shape is the read-back's (evidence-or-omit); NOTHING is written until accepted via /approvals, which fills only the org's empty fields.
      required: [proposal_id, organization_id, source_url, status, fields]
      properties:
        proposal_id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid, description: The org this proposal enriches — the accept executor writes only here. }
        source_url: { type: string, format: uri }
        status: { type: string, enum: [staged], description: Always staged — accept via the approval inbox. }
        fields:
          type: array
          items: { $ref: '#/components/schemas/ColdStartField' }
        created_at: { type: string, format: date-time }

    # ---- Approvals ----
    Approval:
      type: object
      description: A staged 🟡 confirm-first action awaiting human decision.
      required: [id, workspace_id, kind, status, proposed_by, created_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        kind: { type: string, description: 'coldstart | send_email | advance_deal | promote_lead | overnight | transcript_proposal.' }
        status: { type: string, enum: [pending, approved, rejected, expired] }
        proposal_id: { type: [string, 'null'], format: uuid, description: 'For kind=coldstart, the ColdStartProposal this approval accepts (links the staged proposal to its approval item).' }
        proposed_by: { type: string, description: 'agent:<id> / connector:<n> that staged this.' }
        on_behalf_of: { type: [string, 'null'], format: uuid }
        expires_at: { type: [string, 'null'], format: date-time, description: 'When the staged action expires unactioned (mirrors approval.requested.expires_at). After this it auto-transitions to status=expired and cannot be approved.' }
        target_entity_type: { type: [string, 'null'], description: Entity the effect mutates (for precondition re-validation). }
        target_entity_id: { type: [string, 'null'], format: uuid }
        target_version: { type: [integer, 'null'], description: 'The `version` of the target row when the diff was staged. On approve-execute the server RE-READS the row; if its current version ≠ target_version the execution is rejected with 409 ErrVersionSkew (the world changed since the human last saw the diff — re-stage). This closes the stage→approval race (ADR-0036).' }
        diff_hash: { type: [string, 'null'], description: 'Hash of the staged proposed_change; the minted approval_token is bound to this hash so a token cannot authorize a different effect.' }
        summary: { type: [string, 'null'], description: One-line description of the proposed change. }
        proposed_change:
          type: object
          additionalProperties: true
          description: The staged diff/payload that will execute on approve.
        evidence:
          type: array
          description: Per-claim evidence (snippet + source id) backing the proposal.
          items:
            type: object
            properties:
              evidence_snippet: { type: string }
              source_type: { type: [string, 'null'], enum: [activity, deal, signal, relationship, page, null] }
              source_id: { type: [string, 'null'], format: uuid }
        confidence: { type: [number, 'null'], minimum: 0, maximum: 1 }
        result_entity_type: { type: [string, 'null'] }
        result_entity_id: { type: [string, 'null'], format: uuid }
        approval_token: { type: [string, 'null'], description: 'Signed single-use token minted on approve (schema ApprovalToken, serialized as compact JWS); authorizes exactly the downstream 🟡 operation it is bound to.' }
        decided_by: { type: [string, 'null'], format: uuid }
        decided_at: { type: [string, 'null'], format: date-time }
        created_at: { type: string, format: date-time }

    ApproveRequest:
      type: object
      description: |
        Approve a staged 🟡 action. **Who may approve:** the principal must hold the RBAC required
        to perform the action on the target (≥ the on_behalf_of human's authority for that effect);
        a lower-privilege user cannot approve an action they could not themselves perform. **Edit
        path:** if `edited_payload` is supplied, the edited effect RE-ENTERS the admission gate from
        scratch (re-tiered, re-RBAC-checked, new diff_hash) before a token is minted — an edit can
        never escalate a 🟢 staged note into an external send without re-gating (ADR-0036).
      properties:
        edited_payload:
          type: object
          additionalProperties: true
          description: Optional edits — the edited payload is re-admitted, then it executes (edit-then-send).

    ApprovalListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Approval' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Optimistic concurrency ----
    RowVersion:
      type: integer
      format: int64
      readOnly: true
      minimum: 1
      description: |
        Monotonic row version, incremented by the server on every mutation (data-model §1.3a).
        Echoed back as the `version` field on every mutable entity. To make a write conditional,
        send the last-seen value in `If-Match`; a mismatch returns `409 code: version_skew`
        (ErrVersionSkew) so the client re-reads before retrying. Applies to the native SoR path,
        not only overlay mode.

    # ---- Approval token (ADR-0036) ----
    ApprovalToken:
      type: object
      description: |
        The claims carried by the signed `X-Approval-Token` (serialized as a compact JWS; the wire
        value is the string). It is single-use and bound to one effect — it is NOT a bare opaque
        string. The server verifies the signature, that `jti` has not been consumed, that `exp` is
        in the future, and that `workspace_id`/`passport_id`/`tool`/`diff_hash` match the operation
        being executed; any mismatch → `403 code: approval_token_invalid`.
      required: [jti, approval_id, workspace_id, tool, diff_hash, exp, single_use]
      properties:
        jti: { type: string, description: Unique token id; recorded as consumed on first use (replay → 403). }
        approval_id: { type: string, format: uuid, description: The Approval this token authorizes. }
        workspace_id: { type: string, format: uuid }
        passport_id: { type: [string, 'null'], format: uuid, description: Agent Seat Passport the token was minted for; null for a human-minted token. }
        on_behalf_of: { type: [string, 'null'], format: uuid }
        tool: { type: string, description: 'The exact 🟡 operation authorized (e.g. send_email, advance_deal). A token for one tool cannot authorize another.' }
        diff_hash: { type: string, description: Hash of the approved effect; binds the token to that specific staged change. }
        target_version: { type: [integer, 'null'], description: Row version the diff was staged against; re-checked at execute (see Approval.target_version). }
        exp: { type: string, format: date-time, description: Expiry (short TTL — minutes, not hours). }
        single_use: { type: boolean, default: true }

    # ---- Partner (A41/ADR-0032) ----
    Partner:
      type: object
      description: |
        First-class partner state as a 1:1 extension of an organization (an org IS a partner iff it
        has a `partner` row + classification='partner'). Company identity is never duplicated.
      required: [organization_id, cert_status, created_at, updated_at]   # partner_role is nullable (data-model §4.3)
      properties:
        organization_id: { type: string, format: uuid, description: The org this partner record extends (PK = FK). }
        partner_role: { type: string, enum: [hosting, consulting, strategic], description: Functional role (A44/ADR-0034); implementation + dev are Gradion's turf. }
        cert_status: { type: string, enum: [applied, certified, suspended] }   # data-model §4.3 CHECK
        margin_tier: { type: [string, 'null'], enum: [null, tier1_15, tier2_20, tier3_25], description: Scenario-C margin tier (business/14-partner-program.md; data-model §4.3 CHECK). }
        gate_metrics: { type: [object, 'null'], additionalProperties: true, description: Program gate metrics (certified seats, CSAT, ...). }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    UpsertPartnerRequest:
      type: object
      required: [partner_role]
      properties:
        partner_role: { type: string, enum: [hosting, consulting, strategic] }
        cert_status: { type: string, enum: [applied, certified, suspended] }   # data-model §4.3 CHECK
        margin_tier: { type: [string, 'null'], enum: [null, tier1_15, tier2_20, tier3_25] }
        gate_metrics: { type: [object, 'null'], additionalProperties: true }

    # ---- Per-purpose consent (A22/ADR-0011) ----
    ConsentPurpose:
      type: object
      required: [id, workspace_id, key, label, created_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        key: { type: string, description: 'Stable machine key (e.g. transactional, marketing_email, profiling). Referenced by send_email.consent_purpose.' }
        label: { type: string }
        requires_double_opt_in: { type: boolean, default: false, description: 'When true, a grant is only effective after a confirmed DOI event (German email norm).' }
        created_at: { type: string, format: date-time }

    CreateConsentPurposeRequest:
      type: object
      required: [key, label]
      properties:
        key: { type: string }
        label: { type: string }
        requires_double_opt_in: { type: boolean, default: false }

    PersonConsentState:
      type: object
      description: A person's current consent for one purpose.
      required: [purpose_id, state]
      properties:
        purpose_id: { type: string, format: uuid }
        purpose_key: { type: [string, 'null'] }
        state: { type: string, enum: [unknown, granted, withdrawn] }
        lawful_basis: { type: [string, 'null'] }
        double_opt_in_confirmed_at: { type: [string, 'null'], format: date-time }
        updated_at: { type: [string, 'null'], format: date-time }

    ConsentEvent:
      type: object
      description: An append-only proof row (Art. 7 demonstrability). Never updated or deleted.
      required: [id, purpose_id, new_state, occurred_at]
      properties:
        id: { type: string, format: uuid }
        purpose_id: { type: string, format: uuid }
        new_state: { type: string, enum: [granted, withdrawn], description: Proof rows record only transitions to granted/withdrawn (never to unknown). }
        lawful_basis: { type: [string, 'null'] }
        source: { type: [string, 'null'], description: 'How consent was captured (e.g. webform, import, double_opt_in).' }
        actor_type: { type: string, enum: [human, agent, system, connector] }
        actor_id: { type: [string, 'null'] }
        occurred_at: { type: string, format: date-time }

    RecordConsentRequest:
      type: object
      required: [purpose_id, new_state]
      properties:
        purpose_id: { type: string, format: uuid }
        new_state: { type: string, enum: [granted, withdrawn] }
        lawful_basis: { type: [string, 'null'] }
        source: { type: [string, 'null'] }
        double_opt_in_token: { type: [string, 'null'], description: Required to make a grant effective when the purpose has requires_double_opt_in=true. }

    RecordGrant:
      type: object
      description: A manual per-record share (A52/ADR-0039) — widens own/team/all base scope for one record.
      required: [id, record_type, record_id, subject_type, subject_id, access, granted_by, created_at]
      properties:
        id: { type: string, format: uuid }
        record_type: { type: string, enum: [deal, person, organization, lead] }
        record_id: { type: string, format: uuid }
        subject_type: { type: string, enum: [user, team] }
        subject_id: { type: string, format: uuid, description: 'app_user(id) or team(id) per subject_type.' }
        access: { type: string, enum: [read, write], description: "'write' also satisfies 'read'." }
        granted_by: { type: string, format: uuid }
        reason: { type: [string, 'null'], description: 'Accountability/lawful-basis note surfaced in the audit row.' }
        expires_at: { type: [string, 'null'], format: date-time, description: 'Optional TTL; an expired grant matches no rows.' }
        created_at: { type: string, format: date-time }
        version: { type: integer, format: int64 }

    CreateRecordGrantRequest:
      type: object
      required: [record_type, record_id, subject_type, subject_id, access]
      properties:
        record_type: { type: string, enum: [deal, person, organization, lead] }
        record_id: { type: string, format: uuid }
        subject_type: { type: string, enum: [user, team] }
        subject_id: { type: string, format: uuid }
        access: { type: string, enum: [read, write] }
        reason: { type: [string, 'null'] }
        expires_at: { type: [string, 'null'], format: date-time }

    DataSubjectRequest:
      type: object
      description: A GDPR data-subject request (Art. 15/16/17) tracked to completion (B-E11.30; data-model §12.5).
      required: [id, kind, subject_ref, status, due_at, created_at]
      properties:
        id: { type: string, format: uuid }
        kind: { type: string, enum: [access, rectify, erasure] }
        subject_ref: { type: string, description: 'The data subject — a person id or external identifier.' }
        status: { type: string, enum: [open, in_progress, fulfilled, rejected] }
        due_at: { type: string, format: date-time, description: 'Statutory deadline (e.g. 30 days).' }
        assignee_id: { type: [string, 'null'], format: uuid }
        resolution: { type: [string, 'null'] }
        created_at: { type: string, format: date-time }
        # no `version`/If-Match: data_subject_request has no version column (data-model §12.5) and is a
        # single-assignee human-only workflow record (x-agent-access: human-only) — not optimistically concurrent.

    CreateDataSubjectRequest:
      type: object
      required: [kind, subject_ref, due_at]
      properties:
        kind: { type: string, enum: [access, rectify, erasure] }
        subject_ref: { type: string }
        due_at: { type: string, format: date-time }
        assignee_id: { type: [string, 'null'], format: uuid }

    UpdateDataSubjectRequest:
      type: object
      properties:
        status: { type: string, enum: [open, in_progress, fulfilled, rejected] }
        assignee_id: { type: [string, 'null'], format: uuid }
        resolution: { type: [string, 'null'] }

    CaptureConsent:
      type: object
      description: |
        The consent passthrough every capture surface (booking, public forms, imports) must carry
        (EP07 capture contract, `features/07`; feedback/11 + /14). Names the purpose and the exact
        wording/version shown, so the resulting grant is demonstrable (Art 7(1)).
      required: [purpose_id, policy_version]
      properties:
        purpose_id: { type: string, format: uuid }
        policy_version: { type: string, description: Version id of the consent wording shown to the subject. }
        wording: { type: [string, 'null'], description: The exact wording shown, stored with the consent event for demonstrability. }
        double_opt_in_token: { type: [string, 'null'], description: Present when the surface delivered its own DOI confirmation (issueDoubleOptIn with deliver=false). }

    # ---- Automations (E15/ADR-0035, feedback/14) ----
    AutomationCatalogEntry:
      type: object
      description: An automation *type* in the closed starter library (E15/ADR-0035, feedback/14).
      required: [key, name, trigger, action, params_schema]
      properties:
        key: { type: string, description: 'Stable type key, e.g. stalled_deal_nudge.' }
        name: { type: string }
        description: { type: string }
        trigger: { type: string, description: 'What fires it (e.g. deal.stage_changed or schedule).' }
        action: { type: string, description: 'What it does (e.g. create_task or send_email).' }
        tier: { type: string, enum: [green, yellow], description: 'yellow actions stage to /approvals at run time.' }
        params_schema: { type: object, additionalProperties: true, description: JSON-schema for this type's parameters (drives the editor form). }

    Automation:
      type: object
      description: A configured automation instance (feedback/14).
      required: [id, key, name, status, params, created_at]
      properties:
        id: { type: string, format: uuid }
        key: { type: string, description: The catalog type this instance is built from. }
        name: { type: string }
        status: { type: string, enum: [enabled, paused] }
        params: { type: object, additionalProperties: true }
        version: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: [string, 'null'], format: date-time }

    CreateAutomationRequest:
      type: object
      required: [key, name, params]
      properties:
        key: { type: string }
        name: { type: string }
        params: { type: object, additionalProperties: true }

    UpdateAutomationRequest:
      type: object
      description: Any subset; omit a field to leave it unchanged. `status` flips enable/pause.
      properties:
        name: { type: [string, 'null'] }
        params: { type: [object, 'null'], additionalProperties: true }
        status: { type: [string, 'null'], enum: [enabled, paused, null] }

    # ---- Voice DNA (E07, B-E07.4/.5a; data-model §12.5 + features/09 §B0.2) ----
    VoiceProfile:
      type: object
      description: |
        A user's/team's voice DNA. `voice_profile_md` is machine-DERIVED (versioned by
        `profile_version`, rewritten wholesale on rebuild); `personality_md` is human-AUTHORED
        free text a rebuild never touches.
      required: [id, scope, status, voice_profile_md, profile_version, personality_md, created_at]
      properties:
        id: { type: string, format: uuid }
        owner_id: { type: [string, 'null'], format: uuid, description: 'null = workspace/team profile.' }
        scope: { type: string, enum: [user, team, workspace] }
        model_ref: { type: [string, 'null'], description: Derived style descriptor / embedding ref. }
        status: { type: string, enum: [building, ready, stale] }
        voice_profile_md: { type: string, description: 'The derived artifact (Identity · stats · signature moves · patterns · rules · vocabulary · anti-patterns · register notes · few-shot examples).' }
        profile_version: { type: integer, description: 'Bumps on every derived rebuild; 0 = never built.' }
        personality_md: { type: string }
        version: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: [string, 'null'], format: date-time }

    CreateVoiceProfileRequest:
      type: object
      properties:
        scope: { type: [string, 'null'], enum: [user, team, workspace, null], description: 'Defaults to user (owned by the caller).' }
        personality_md: { type: [string, 'null'] }

    UpdateVoiceProfileRequest:
      type: object
      required: [personality_md]
      properties:
        personality_md: { type: string }

    VoiceCorpusSource:
      type: object
      description: One corpus manifest row. The ingested text itself is builder-internal and never echoed back.
      required: [id, kind, register, weight, source_label, source_ref, word_count, excluded, created_at]
      properties:
        id: { type: string, format: uuid }
        kind: { type: string, enum: [post, transcript, email, chat, longform, voice_memo] }
        register: { type: string, enum: [spoken, written, casual, formal] }
        weight: { type: number }
        source_label: { type: string }
        source_ref: { type: string, description: 'The source natural key ingest is idempotent on.' }
        word_count: { type: integer }
        excluded: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: [string, 'null'], format: date-time }

    IngestVoiceCorpusSourceRequest:
      type: object
      required: [kind, source_label, content]
      properties:
        kind: { type: string, enum: [post, transcript, email, chat, longform, voice_memo] }
        register: { type: [string, 'null'], enum: [spoken, written, casual, formal, null], description: 'Defaults by kind: transcript/voice_memo→spoken, chat→casual, post/longform/email→written.' }
        weight: { type: [number, 'null'], description: '0.1–5.0; defaults to 1.0.' }
        source_label: { type: string }
        source_ref: { type: [string, 'null'], description: 'Natural key (message id, upload name…); defaults to a hash of the content.' }
        format: { type: [string, 'null'], enum: [txt, md, vtt, srt, json, null], description: 'Defaults to txt. vtt/srt/json are transcript formats and require speaker_label when turns are speaker-labelled.' }
        speaker_label: { type: [string, 'null'], description: 'The owner''s label in a transcript; only matching turns are ingested (features/09 §B1.2).' }
        content: { type: string, description: The raw source text in the declared format. }

    UpdateVoiceCorpusSourceRequest:
      type: object
      description: Any subset; omit a field to leave it unchanged.
      properties:
        excluded: { type: [boolean, 'null'] }
        weight: { type: [number, 'null'] }

    VoiceCorpusSummary:
      type: object
      description: The live word-count + register-mix meter over the non-excluded manifest (features/09 §B1.4).
      required: [total_words, target_words, quality_band, register_words, source_count]
      properties:
        total_words: { type: integer }
        target_words: { type: integer, description: 'The ~30k corpus target the meter fills toward.' }
        quality_band: { type: string, enum: [thin, good, rich, sharp] }
        register_words:
          type: object
          description: Word totals per register (spoken/written/casual/formal mix).
          additionalProperties: { type: integer }
        source_count: { type: integer }

    # ---- Offers / Angebote (B-E03.16–.20; data-model §12.6) ----
    Product:
      type: object
      description: A rate-card entry. Mirrors the `product` table — data an offer line snapshots from, never a configurator.
      required: [id, workspace_id, name, unit, unit_price_minor, currency, default_tax_rate, active, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        sku: { type: [string, 'null'], description: Optional; unique per workspace while live. }
        description: { type: [string, 'null'] }
        unit: { type: string, description: "'unit' | 'hour' | 'day' | … — display only, free text." }
        unit_price_minor: { type: integer, format: int64, description: Integer minor units (P11); no float money. }
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        default_tax_rate: { type: number, format: double, description: 'Percent, e.g. 19.00 (DE USt.); per-line override allowed.' }
        active: { type: boolean }
        source: { type: string }
        captured_by: { type: string, readOnly: true, description: Server-stamped from the authenticated principal; never client-supplied. }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }
      additionalProperties: true
      x-extension: true

    ProductListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Product' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    CreateProductRequest:
      type: object
      required: [name, unit_price_minor, currency, source]
      properties:
        name: { type: string }
        sku: { type: [string, 'null'] }
        description: { type: [string, 'null'] }
        unit: { type: [string, 'null'], description: Defaults to 'unit'. }
        unit_price_minor: { type: integer, format: int64, minimum: 0 }
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        default_tax_rate: { type: [number, 'null'], format: double, minimum: 0, description: Percent; defaults to 0. }
        active: { type: [boolean, 'null'], description: Defaults to true. }
        source: { type: string }
      additionalProperties: true
      x-extension: true

    UpdateProductRequest:
      type: object
      description: Any subset; omit a field to leave it unchanged. A price change never re-prices existing offer lines (they hold snapshots).
      properties:
        name: { type: string }
        sku: { type: [string, 'null'] }
        description: { type: [string, 'null'] }
        unit: { type: string }
        unit_price_minor: { type: integer, format: int64, minimum: 0 }
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        default_tax_rate: { type: number, format: double, minimum: 0 }
        active: { type: boolean }
      additionalProperties: true
      x-extension: true

    OfferLineItem:
      type: object
      description: |
        A typed offer line. `description`/`unit_price_minor` are SNAPSHOTS (copied from the
        optional product at line creation); `line_net_minor`/`line_tax_minor`/`line_total_minor`
        are DERIVED server-side (formulas §12.6) and never stored or client-settable.
      required: [id, position, description, unit, quantity, unit_price_minor, discount_pct, tax_rate, line_net_minor, line_tax_minor, line_total_minor, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        position: { type: integer, description: Display order, unique per offer. }
        product_id: { type: [string, 'null'], format: uuid, description: Optional rate-card ref; the line survives the product. }
        description: { type: string }
        unit: { type: string }
        quantity: { type: number, format: double, description: 'Up to 3 decimal places (numeric 14,3); must be > 0.' }
        unit_price_minor: { type: integer, format: int64, description: Snapshot — never re-read from product after creation. }
        discount_pct: { type: number, format: double, description: '0–100, up to 2 decimal places.' }
        tax_rate: { type: number, format: double, description: 'Percent, up to 2 decimal places.' }
        line_net_minor: { type: integer, format: int64, readOnly: true, description: 'round(qty × unit_price × (1 − discount_pct/100)) — server-computed.' }
        line_tax_minor: { type: integer, format: int64, readOnly: true, description: 'round(line_net × tax_rate/100) — server-computed.' }
        line_total_minor: { type: integer, format: int64, readOnly: true, description: line_net + line_tax — server-computed. }
        evidence: { type: [object, 'null'], additionalProperties: true, description: '{snippet, source_id} when AI-drafted (evidence-or-omit, features/07).' }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Offer:
      type: object
      description: A versioned Angebot bound to one deal. Mirrors the `offer` table; totals are derived from the nested line items.
      required: [id, workspace_id, deal_id, offer_number, revision, status, currency, net_minor, tax_minor, gross_minor, line_items, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        deal_id: { type: string, format: uuid }
        offer_number: { type: string, readOnly: true, description: Human-facing Angebot number, minted server-side, unique per workspace (with revision). }
        revision: { type: integer, readOnly: true, description: Bumped when a sent offer is regenerated; the prior revision becomes superseded. }
        status: { type: string, enum: [draft, sent, accepted, rejected, expired, superseded] }
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        buyer_org_id: { type: [string, 'null'], format: uuid }
        buyer_snapshot: { type: [object, 'null'], additionalProperties: true, readOnly: true, description: Buyer legal block captured at send time. }
        issuer_snapshot: { type: [object, 'null'], additionalProperties: true, readOnly: true, description: Seller legal block captured at send time. }
        valid_until: { type: [string, 'null'], format: date }
        intro_text: { type: [string, 'null'] }
        terms_text: { type: [string, 'null'] }
        net_minor: { type: integer, format: int64, readOnly: true, description: Σ line nets — derived, never client-set. }
        tax_minor: { type: integer, format: int64, readOnly: true, description: Σ line taxes — derived, never client-set. }
        gross_minor: { type: integer, format: int64, readOnly: true, description: net + tax — derived, never client-set. }
        fx_rate_to_base: { type: [string, 'null'], readOnly: true, description: 'Native→base, frozen at send (RT-PR-C2). Decimal-as-string to avoid float rounding.' }
        fx_rate_date: { type: [string, 'null'], format: date, readOnly: true }
        pdf_asset_ref: { type: [string, 'null'], description: Rendered PDF ref (render is the WP7 slice). }
        accepted_at: { type: [string, 'null'], format: date-time, readOnly: true }
        line_items:
          type: array
          readOnly: true
          items: { $ref: '#/components/schemas/OfferLineItem' }
        source: { type: string }
        captured_by: { type: string, readOnly: true, description: Server-stamped from the authenticated principal; never client-supplied. }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }
      additionalProperties: true
      x-extension: true

    OfferListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Offer' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    OfferLineItemInput:
      type: object
      description: |
        One line to add. With `product_id`, description/unit/unit_price_minor/tax_rate default
        from the product (a SNAPSHOT — later product edits never touch the line); without it,
        description and unit_price_minor are required. Totals are never accepted here (422).
      required: [quantity]
      properties:
        position: { type: [integer, 'null'], minimum: 1, description: Defaults to the next free position. }
        product_id: { type: [string, 'null'], format: uuid }
        description: { type: [string, 'null'] }
        unit: { type: [string, 'null'] }
        quantity: { type: number, format: double, description: '> 0, up to 3 decimal places.' }
        unit_price_minor: { type: [integer, 'null'], format: int64, minimum: 0 }
        discount_pct: { type: [number, 'null'], format: double, minimum: 0, maximum: 100 }
        tax_rate: { type: [number, 'null'], format: double, minimum: 0 }

    UpdateOfferLineItemRequest:
      type: object
      description: Any subset; omit a field to leave it unchanged. Totals are derived and not settable (422).
      properties:
        position: { type: integer, minimum: 1 }
        description: { type: string }
        unit: { type: string }
        quantity: { type: number, format: double }
        unit_price_minor: { type: integer, format: int64, minimum: 0 }
        discount_pct: { type: number, format: double, minimum: 0, maximum: 100 }
        tax_rate: { type: number, format: double, minimum: 0 }

    CreateOfferRequest:
      type: object
      required: [currency, source]
      properties:
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        buyer_org_id: { type: [string, 'null'], format: uuid, description: Defaults to the deal's organization. }
        valid_until: { type: [string, 'null'], format: date }
        intro_text: { type: [string, 'null'] }
        terms_text: { type: [string, 'null'] }
        line_items:
          type: [array, 'null']
          items: { $ref: '#/components/schemas/OfferLineItemInput' }
        source: { type: string }
      additionalProperties: true
      x-extension: true

    UpdateOfferRequest:
      type: object
      description: Header-field patch; allowed only while status=draft (422 offer_not_draft otherwise). Totals are derived and not settable (422).
      properties:
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        buyer_org_id: { type: [string, 'null'], format: uuid }
        valid_until: { type: [string, 'null'], format: date }
        intro_text: { type: [string, 'null'] }
        terms_text: { type: [string, 'null'] }
      additionalProperties: true
      x-extension: true

    RejectOfferRequest:
      type: object
      properties:
        reason: { type: [string, 'null'], description: Optional buyer-given decline reason (rides offer.rejected). }

    # ---- Agent Seat Passport issuance (ADR-0013; the local/A1 path) ----
    IssuePassportRequest:
      type: object
      additionalProperties: false
      required: [scopes]
      properties:
        label:  { type: [string, 'null'], maxLength: 120, description: 'Which agent this binds, e.g. "Claude Desktop".' }
        scopes:
          type: array
          minItems: 1
          uniqueItems: true
          items: { type: string, enum: [read, draft, write, send, enrich] }
          description: Verb classes the passport may exercise; effective authority is always ∩ the granting human's RBAC.
        ttl_hours:
          type: [integer, 'null']
          minimum: 1
          maximum: 2160
          description: Lifetime in hours (default 720 = 30 days, max 90 days). Revocable at any time.

    IssuePassportResponse:
      type: object
      required: [passport_id, token, scopes, on_behalf_of, expires_at]
      properties:
        passport_id: { type: string, format: uuid }
        token:       { type: string, description: The bearer token — shown ONCE, stored only as a hash. }
        scopes:
          type: array
          items: { type: string }
        on_behalf_of: { type: string, format: uuid, description: The human whose RBAC bounds every call this passport makes. }
        expires_at:   { type: string, format: date-time }

    PassportSummary:
      type: object
      description: Agent Seat Passport metadata for the Settings list (feedback/13). Never carries the token.
      required: [id, label, scopes, created_at]
      properties:
        id: { type: string, format: uuid }
        label: { type: string, description: Human-given name for the passport (e.g. "Marcus's Claude"). }
        scopes: { type: array, items: { type: string }, description: The granted MCP scopes (intersected with the minting human's role at bind time). }
        agent_id: { type: [string, 'null'], description: The agent this passport is bound to, if any. }
        created_at: { type: string, format: date-time }
        expires_at: { type: [string, 'null'], format: date-time }
        last_used_at: { type: [string, 'null'], format: date-time }
        revoked_at: { type: [string, 'null'], format: date-time }
