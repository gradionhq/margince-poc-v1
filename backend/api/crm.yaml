        organization_id: { type: string, format: uuid }
        domain: { type: string, description: Lowercased, no scheme, no www. }
        is_primary: { type: boolean, default: false }
        source: { type: string }
        captured_by: { type: string, readOnly: true, description: 'Server-stamped from the authenticated principal (human:<uuid> | agent:<id> | connector:<name>); never client-supplied.' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    ComputedField:
      type: object
      description: |
        S-E15.8c formula-field display row (RD-AC-6/RD-AC-7/RD-AC-N-1) — a read-only,
        database-computed value, never a runtime-authored expression. `computable: false` +
        `reason` is the honest floor for a field with no backend data model yet — the row is
        still returned, never omitted or fabricated.
      required: [key, label, kind, formula_sql, dependencies, computable]
      properties:
        key: { type: string }
        label: { type: string }
        kind:
          type: string
          enum: [currency_minor, count, duration_months, percent]
        value_minor:
          type: [integer, 'null']
          format: int64
          description: Present (and non-null) only when kind=currency_minor and computable=true.
        value:
          type: [number, 'null']
          description: Present (and non-null) only when kind is count/duration_months/percent and computable=true.
        formula_sql:
          type: string
          description: The literal GENERATED-column/view SQL definition; empty string when computable=false.
        dependencies:
          type: array
          items: { type: string }
        computable: { type: boolean }
        reason:
          type: [string, 'null']
          description: Set (non-null) iff computable=false, e.g. "not_yet_built", "awaiting_fx".

    Organization:
      type: object
      description: A company. Mirrors the `organization` table.
      required: [id, workspace_id, display_name, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        display_name: { type: string }
        legal_name: { type: [string, 'null'] }
        industry: { type: [string, 'null'] }
        size_band:
          type: [string, 'null']
          enum: [null, '1-10', '11-50', '51-200', '201-500', '501-1000', '1001-5000', '5000+']
        address: { $ref: '#/components/schemas/Address' }
        owner_id: { type: [string, 'null'], format: uuid }
        parent_org_id: { type: [string, 'null'], format: uuid, description: Single-level hierarchy FK; no cycles. }
        merged_into_id: { type: [string, 'null'], format: uuid }
        computed_fields:
          type: array
          readOnly: true
          description: |
            S-E15.8c formula-field display rows (RD-AC-6/RD-AC-7/RD-AC-N-1). Populated on
            `getOrganization` only; the key is absent entirely (not an empty array) when the
            viewer's role lacks computed_field:read visibility (STATE-4).
          items: { $ref: '#/components/schemas/ComputedField' }
        domains:
          type: array
          items: { $ref: '#/components/schemas/OrganizationDomain' }
        classification: { type: [string, 'null'], enum: [null, prospect, customer, agency, reseller, tech_vendor, platform, partner, competitor, other], description: "An org IS a partner iff classification='partner' AND it has a `partner` row (A41/ADR-0032). Values match the data-model §4.1 CHECK." }
        strength: { allOf: [ { $ref: '#/components/schemas/RelationshipStrength' } ], readOnly: true, description: 'Deterministic org-level relationship-strength roll-up (features/07 §4). Read-only derived view; NULL until capture has interactions.' }
        source: { type: string }
        captured_by: { type: string, readOnly: true, description: 'Server-stamped from the authenticated principal (human:<uuid> | agent:<id> | connector:<name>); never client-supplied.' }
        raw: { type: [object, 'null'], additionalProperties: true }
        partner: { $ref: '#/components/schemas/Partner' }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }
      additionalProperties: true
      x-extension: true
      x-extension-note: |
        additionalProperties:true admits client custom fields (data-model §9 — custom fields
        are real columns added by migration, surfaced additively through this same contract).
        Because these extra keys carry no per-key schema, writes are drop-on-mismatch: a key
        that names no ACTIVE custom column (unknown or retired), or whose value shape does
        not match the column's declared type, is silently excluded from the write — the
        request still succeeds. A picklist value outside the declared options is the one
        typed refusal (422, the column's CHECK constraint). Reads surface only ACTIVE
        columns; a retired field's stored values are preserved but leave the payload.

    CreateOrganizationRequest:
      type: object
      required: [display_name, source]
      properties:
        display_name: { type: string }
        legal_name: { type: [string, 'null'] }
        industry: { type: [string, 'null'] }
        size_band: { type: [string, 'null'], enum: [null, '1-10', '11-50', '51-200', '201-500', '501-1000', '1001-5000', '5000+'] }
        address: { $ref: '#/components/schemas/Address' }
        owner_id: { type: [string, 'null'], format: uuid }
        parent_org_id: { type: [string, 'null'], format: uuid }
