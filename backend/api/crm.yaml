  # ----------------------------- /reports -----------------------------------
  /reports/{report}:
    parameters:
      - name: report
        in: path
        required: true
        schema: { type: string }
        description: Report key (prebuilt) or a saved-report id.
        examples:
          prebuilt: { value: open-deals-per-company }
    post:
      tags: [Reports]
      operationId: runReport
      summary: Run a report (the `run_report` MCP verb) and return aggregate rows.
      description: |
        Executes a validated, typed query plan (NOT free-form SQL). Every aggregate cell is
        reconcilable via the `derivation` for "Explain This Number" (features/03 §1.3).
        Bound by RBAC; an agent caller cannot read beyond the human's scope. Audit-logged.
      x-mcp-tool: { verb: run_report, tier: green }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RunReportRequest' }
            examples:
              winRateBySource:
                value:
                  filters: { period: last_quarter }
                  group_by: [source]
      responses:
        '200':
          description: Report result (aggregate rows + plan + per-cell derivation handles).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportResult' }
              examples:
                result:
                  value:
                    report: open-deals-per-company
                    plan:
                      object: deal
                      filters: { status: open }
                      group_by: [organization_id]
                      aggregates: [{ fn: count, as: open_deals }]
                    columns: [organization_id, open_deals]
                    rows:
                      - { organization_id: 018f3a1b-0000-7000-8000-000000000020, open_deals: 3 }
                    total_rows: 1
                    generated_at: '2026-06-04T08:00:00Z'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: The plan failed validation (out-of-vocabulary field, invalid aggregate).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /reports/{report}/derivation:
    parameters:
      - name: report
        in: path
        required: true
        schema: { type: string }
        description: Report key (prebuilt) or a saved-report id.
    get:
      tags: [Reports]
      operationId: explainReport
      summary: '"Explain This Number" — resolve a derivation handle to its definition + source rows.'
      description: |
        Resolves the drill-through handle minted as `derivation_url` on every `runReport`
        aggregate row (features/03 §1.3, AC-R6). Returns (a) the exact filter+group+aggregate
        definition **in plain language** and (b) the underlying source rows, row-scoped through
        the SAME RBAC clauses the report itself used — an explanation never out-sees the report.
        The drill-through rows reconcile exactly to the explained aggregate (AC-X1).

        Query vocabulary: `by` names the plan's grouping dimensions and `agg` its aggregates
        (`fn:field:alias` triplets); **every other query parameter is an equality predicate**
        from the report's closed field vocabulary — the group-key values of the explained row
        plus the plan's filters. An empty predicate value matches SQL NULL (the "no owner"
        group). An out-of-vocabulary key returns `422 code: report_field_not_allowed`.
      parameters:
        - name: by
          in: query
          schema:
            type: array
            items: { type: string }
          style: form
          explode: true
          description: The plan's grouping dimensions (each must also appear as a predicate parameter carrying the explained row's group-key value).
        - name: agg
          in: query
          schema:
            type: array
            items: { type: string }
          style: form
          explode: true
          description: 'The plan''s aggregates as `fn:field:alias` triplets (field empty for `count`), e.g. `sum:amount_minor:unweighted_minor`.'
      responses:
        '200':
          description: The plain-language definition + drill-through source rows behind the number.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportDerivation' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: A predicate key, grouping dimension, or aggregate is outside the report's vocabulary.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

