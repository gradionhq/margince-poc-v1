openapi: 3.1.0

# =============================================================================
# Margince — V1 Core API Contract (contract-first source of truth)
# -----------------------------------------------------------------------------
# This file is THE contract from which Go server stubs + TS client types are
# generated (P3 contract-first). It mirrors spec/data-model.md field-for-field
# and encodes the acceptance criteria of features/01-core-objects.md,
# features/03-reporting-and-scoring.md, features/07-ai-native-moments.md, and
# the MCP tool surface of 03b-ai-architecture.md.
#
# Conventions (full text in ./README.md):
#   - Resources are plural nouns (/people, /organizations, /deals, ...).
#   - Pagination is cursor-based: ?cursor=&limit= -> { data, page: {next_cursor, has_more} }.
#   - Errors are RFC 7807 problem+json with a stable machine `code`, plus `details`.
#   - Auth is two schemes (ADR-0043): `cookieAuth` — an opaque `crm_session` cookie for
#     interactive humans; and `bearerAuth` — an opaque bearer token (the Agent Seat Passport,
#     ADR-0013, minted via POST /passports — the local/A1 path) for agents. Both resolve the same
#     workspace + principal and hit the same server-side RBAC enforcement; neither is a JWT path.
#   - POST is idempotent via the `Idempotency-Key` header.
#   - Every domain response carries provenance: `source` (client-supplied — names the producing
#     artifact) + `captured_by` (server-stamped from the authenticated principal, read-only, never
#     accepted on a create/update request — Finding 09).
#   - Soft-delete only: archive endpoints set `archived_at`; rows stay fetchable by id.
#   - Client custom fields appear additively, marked with the `x-extension` vendor key.
#   - Operations that back a Layer-1 MCP tool verb carry `x-mcp-tool` with a 🟢/🟡 tier.
#   - `correlation_id` (the events.md envelope field grouping all events from one originating
#     request) is minted SERVER-SIDE per request and is NEVER client-supplied — no request header
#     is honored for it. Clients do not set it.
#   - Autonomy gate applies identically on REST and MCP (ADR-0055): when the caller is an AGENT
#     principal (bearer/Passport), a mutating operation whose mapped autonomy tier is 🟡 does NOT
#     perform the change — it stages an approval (ErrRequiresApproval) exactly as the MCP tool does,
#     keyed by operationId→ToolSpec, and returns the approval-required response (403 code:
#     approval_required, or 202 where a staging ref is returned). REST is NOT read-only for agents;
#     the SAME resolver/approval flow gates both surfaces. A human's direct call is itself approval.
#   - Human-edit precedence is PER FIELD (interfaces.md §2.1): `update_record` is 🟢, but when an
#     agent's patch touches a field whose current value a HUMAN last wrote (audit-trail lookup),
#     exactly those fields are split off into a 🟡 staged approval while the rest of the patch
#     applies green in the same request. A mixed patch answers 200 with the updated record plus a
#     `staged_approval` member naming the withheld fields and the approval id; a patch made up
#     entirely of human-owned fields answers 403 approval_required with the staging reference.
#     Redemption replays ONLY the staged fields with the approval reference (X-Approval-Token on
#     REST, `approval_id` on MCP) — the staged sub-patch, not the original call, is the bound diff.
#   - DEFAULT-DENY (fail-closed): the gate resolves an agent-principal mutation's tier from
#     `operationId → ToolSpec`. A mutating operation that maps to NO ToolSpec tier is REFUSED for an
#     agent principal (403 code: permission_denied) — never silently admitted. So a new endpoint that
#     forgets `x-mcp-tool` fails closed, not open. CONTRACT INVARIANT (drift-lint): every mutating
#     operation (POST/PUT/PATCH/DELETE) MUST carry either `x-mcp-tool` (a tier) OR `x-agent-access`.
#   - `x-agent-access: human-only` — the operation rejects an AGENT (Passport) principal outright
#     (403 code: permission_denied), whatever its scope/seat. Used for governance the agent must not
#     self-serve: approval decisions (approve/reject — an agent may STAGE a 🟡 action but never
#     APPROVE it, incl. its own), consent + DSR writes, and pipeline/stage *config* (the semantic
#     ground truth advance_deal's 🟡 floor reads). DEFENSE IN DEPTH: these ops also OVERRIDE the global
#     `security:` to `cookieAuth` only (human session) — an agent bearer/Passport is not even an accepted
#     credential at the transport, so the human-only rule holds at the contract layer, not only in the gate.
#     `x-agent-access: auth-bootstrap` — the auth/session machinery itself (workspace bootstrap,
#     login/logout); the pre-auth endpoints (bootstrap, login) override `security: []` (no prior
#     credential required); not tier-gated, not an agent tool.
#
# Deferred areas (NOT specified here — see data-model.md §12): sequences/cadences,
# telephony/click-to-call, the dedicated embedding store, workflow-run records.
# They are commented stubs at the bottom of `paths` so the shape is intentional
# but unspecified. (Overlay/augmentation MANAGEMENT is now specified — see the
# OVERLAY block in `paths`; its mirrored data is served through the normal
# resource ops via the SoR seam, not a forked data API — AC-OV-2/ADR-0018.)
# =============================================================================

info:
  title: Margince API
  version: 1.0.0-draft
  summary: AI-native, open-source CRM core — people, orgs, deals, pipelines, activities, leads, plus the agent/AI surface.
  description: |
    The V1 core CRM contract. Derived from `spec/data-model.md` (the canonical
    Postgres schema), `spec/features/01-core-objects.md` (endpoint acceptance
    criteria), `spec/features/03-reporting-and-scoring.md`,
    `spec/features/07-ai-native-moments.md`, and `spec/03b-ai-architecture.md`
    (the MCP tool surface). Every component schema mirrors a table; the agent
    MCP tool surface maps onto these same REST operations via `x-mcp-tool`.
  license:
    name: BUSL-1.1
    identifier: BUSL-1.1
  contact:
    name: Gradion
    email: lars@gradion.com

servers:
  - url: https://{workspace}.api.gradion.com/v1
    description: Per-workspace production host
    variables:
      workspace:
        default: demo
        description: Workspace slug (tenant). Tenant is also asserted from the JWT claims.
  - url: http://localhost:8080/v1
    description: Local development

security:
  - bearerAuth: []      # agents — OAuth2 + Agent Seat Passport (ADR-0013)
  - cookieAuth: []      # humans — interactive session cookie (ADR-0043)

tags:
  - name: People
    description: Person (contact) records, their emails and phones.
  - name: Organizations
    description: Company records and their domains.
  - name: Relationships
    description: The typed relationship edge (employment + deal stakeholder).
  - name: Deals
    description: Deals, including stage advancement.
  - name: Pipelines
    description: Pipelines and their ordered stages.
  - name: Activities
    description: Polymorphic activity timeline (email/call/meeting/note/task).
  - name: Leads
    description: Thin, segregated machine/bulk-sourced prospects + promotion.
  - name: Lists
    description: Static and dynamic-segment lists.
  - name: Tags
    description: Tags applicable to people/orgs/deals/leads.
  - name: Reports
    description: Run validated, typed reports (the clean-core HubSpot fix).
  - name: Search
    description: Cross-object search.
  - name: AI
    description: AI-native moments — cold-start read-back and proposals.
  - name: Connectors
    description: Inbound capture connectors — one-shot and standing pulls that land as CRM records.
  - name: Approvals
    description: The 🟡 confirm-first approval inbox (approve/reject staged agent actions).
  - name: Identity
    description: Current user / principal, plus Agent Seat Passport issuance (the local/A1 path).

# =============================================================================
paths:

  # ------------------------------- /me --------------------------------------
  /me:
    get:
      tags: [Identity]
      operationId: getCurrentPrincipal
      summary: Get the current authenticated principal (user or agent).
      responses:
        '200':
          description: The current principal.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeResponse' }
              examples:
                human:
                  value:
                    user:
                      id: 018f3a1b-0000-7000-8000-000000000001
                      workspace_id: 018f3a1b-0000-7000-8000-0000000000ff
                      email: jane@acme.com
                      display_name: Jane Rep
                      timezone: Europe/Berlin
                      status: active
                      is_agent: false
                      created_at: '2026-01-02T09:00:00Z'
                      updated_at: '2026-01-02T09:00:00Z'
                      archived_at: null
                    roles: [rep]
                    teams: [018f3a1b-0000-7000-8000-0000000000ab]
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ----------------------------- /workspaces --------------------------------
  /workspaces:
    post:
      tags: [Identity]
      operationId: bootstrapWorkspace
      x-agent-access: auth-bootstrap
      summary: Bootstrap a workspace and its first admin user (ADR-0043).
      description: |
        Creates a workspace **and** its first admin `app_user` in one transaction, then opens
        an interactive session (sets the `crm_session` cookie). Unauthenticated — this is how a
        new tenant comes into existence. Email/password is the baseline (ADR-0043); SSO is added
        later per workspace. Audited as an auth event (`features/04 §7`/P12).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BootstrapWorkspaceRequest' }
      responses:
        '201':
          description: Workspace + first admin created; session cookie set.
          headers:
            Set-Cookie:
              schema: { type: string }
              description: 'crm_session=<token>; HttpOnly; Secure; SameSite=Strict; Path=/'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeResponse' }
        '409':
          description: Email or workspace already exists.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422': { $ref: '#/components/responses/ValidationError' }

  # ------------------------------- /auth ------------------------------------
  /auth/login:
    post:
      tags: [Identity]
      operationId: login
      security: []   # pre-auth endpoint — no prior credential required
      x-agent-access: auth-bootstrap
      summary: Authenticate with email + password (+ MFA when required) and open a session.
      description: |
        Baseline interactive sign-in (ADR-0043). On success mints an opaque server-side session
        and sets the `crm_session` cookie (`HttpOnly; Secure; SameSite=Strict; Path=/`). When the
        workspace requires MFA, a first call without `mfa_code` returns `403 code: mfa_required`;
        when SSO-enforced, password login returns `403 code: sso_enforced`. Every attempt
        (success/failure/lockout/MFA challenge) is audited (`features/04 §7`).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Authenticated; session cookie set.
          headers:
            Set-Cookie:
              schema: { type: string }
              description: 'crm_session=<token>; HttpOnly; Secure; SameSite=Strict; Path=/'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeResponse' }
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Problem' }
        '403':
          description: 'MFA required (`mfa_required`) or password login disabled by SSO-enforced mode (`sso_enforced`).'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/logout:
    post:
      tags: [Identity]
      operationId: logout
      security: [ { cookieAuth: [] } ]   # human session only — rejects agent bearer/Passport (x-agent-access: human-only)
      x-agent-access: auth-bootstrap
      summary: End the current session and clear the cookie.
      description: Deletes the current `session` row and clears `crm_session`. Idempotent. Audited.
      responses:
        '204':
          description: Session ended; cookie cleared.
          headers:
            Set-Cookie:
              schema: { type: string }
              description: 'crm_session=; Max-Age=0; HttpOnly; Secure; SameSite=Strict; Path=/'
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ------------------------------ /passports --------------------------------
  /passports:
    get:
      tags: [Identity]
      operationId: listPassports
      security: [ { cookieAuth: [] } ]   # human session only
      x-agent-access: human-only
      summary: List the caller's own Agent Seat Passports (metadata only — no token re-disclosure).
      description: |
        Enumerates the Agent Seat Passports the caller has minted, so Settings can show them and offer
        revoke (feedback/13). **Never re-discloses a token** — the plaintext is shown once at mint time
        only. Pairs with the mint (`POST`) and revoke (`DELETE /passports/{id}`) below.
      responses:
        '200':
          description: The caller's passports (metadata).
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/PassportSummary' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Identity]
      operationId: issuePassport
      security: [ { cookieAuth: [] } ]   # human session only — rejects agent bearer/Passport (x-agent-access: human-only)
      x-agent-access: human-only
      summary: Mint an Agent Seat Passport for the calling user's own agent.
      description: |
        Session-authenticated (human) minting of a Passport bearer token bounding an agent to the
        caller's own identity (`on_behalf_of` = the session user, always — "agent ≤ human",
        ADR-0013/ADR-0043). Scopes are the verb classes a tool may require; the agent's effective
        authority is scopes ∩ the granting human's RBAC, resolved at every call. The raw token is
        returned ONCE and never stored. Human-only: an agent minting (or widening) a Passport would
        be self-granted authority. This is the local/A1 issuance path; the hosted A2 surface
        replaces it with the spec's full OAuth2 + PKCE + DCR Authorization-Server flow
        (decisions/0012 records the deliberate contract lag).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/IssuePassportRequest' }
      responses:
        '201':
          description: Passport minted; the token appears only in this response.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IssuePassportResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /passports/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    delete:
      tags: [Identity]
      operationId: revokePassport
      security: [ { cookieAuth: [] } ]   # human session only — rejects agent bearer/Passport (x-agent-access: human-only)
      x-agent-access: human-only
      summary: Revoke a Passport (kill switch for one agent binding).
      description: |
        Revocation is enforced at the next token lookup. A user revokes their own passports;
        revoking another user's requires the admin role. Idempotent. Audited. Human-only: the
        kill switch belongs to the granting human, never to the agent it bounds.
      responses:
        '204':
          description: Passport revoked (or already revoked).
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ------------------------------- /people ----------------------------------
  /people:
    get:
      tags: [People]
      operationId: listPeople
      summary: List people (live by default; cursor-paginated).
      description: Default view excludes archived rows (`archived_at IS NULL`). Leads never appear here.
      x-mcp-tool:
        verb: search_records
        record_type: person
        tier: green
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/IncludeArchived'
        - name: owner_id
          in: query
          schema: { type: string, format: uuid }
          description: Filter to a single owner.
        - name: q
          in: query
          schema: { type: string }
          description: Full-text query over name/title (tsvector).
        - name: tag
          in: query
          schema: { type: string }
          description: Filter by tag name.
      responses:
        '200':
          description: A page of people.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PersonListResponse' }
              examples:
                page:
                  value:
                    data:
                      - id: 018f3a1b-0000-7000-8000-000000000010
                        workspace_id: 018f3a1b-0000-7000-8000-0000000000ff
                        full_name: Dana Buyer
                        first_name: Dana
                        last_name: Buyer
                        title: VP Engineering
                        owner_id: 018f3a1b-0000-7000-8000-000000000001
                        social: { linkedin: 'https://linkedin.com/in/danabuyer' }
                        address: null
                        emails:
                          - id: 018f3a1b-0000-7000-8000-000000000011
                            person_id: 018f3a1b-0000-7000-8000-000000000010
                            email: dana@acme.com
                            email_type: work
                            is_primary: true
                            position: 0
                            source: 'email:CAF=abc@mail'
                            captured_by: 'agent:capture'
                            created_at: '2026-05-02T10:00:00Z'
                            updated_at: '2026-05-02T10:00:00Z'
                            archived_at: null
                        phones: []
                        consent_state: unknown
                        merged_into_id: null
                        converted_from_lead_id: null
                        source: 'email:CAF=abc@mail'
                        captured_by: 'agent:capture'
                        created_at: '2026-05-02T10:00:00Z'
                        updated_at: '2026-05-02T10:00:00Z'
                        archived_at: null
                    page: { next_cursor: 'eyJpZCI6IjAxOGYzYTFiIn0', has_more: true }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
    post:
      tags: [People]
      operationId: createPerson
      summary: Create a person.
      description: |
        With name + email returns 201 and a stable `id` (UUID) that round-trips on GET
        (features/01 §1.1 AC). If the email already exists on a live person, returns 409
        with the existing person id (features/01 §1.3). Writes one audit row + one
        `person.created` event.
      x-mcp-tool:
        verb: create_record
        record_type: person
        tier: green
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePersonRequest' }
            examples:
              minimal:
                summary: Name + email (the §1.1 acceptance case)
                value:
                  full_name: Dana Buyer
                  emails:
                    - { email: dana@acme.com, email_type: work, is_primary: true }
                  source: ui
      responses:
        '201':
          description: Created. Body round-trips identically on GET.
          headers:
            Location:
              schema: { type: string }
              description: URL of the created person.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Person' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: An email on the request already belongs to a live person.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                duplicate:
                  value:
                    type: 'https://errors.gradion.com/duplicate_email'
                    title: Duplicate email
                    status: 409
                    code: duplicate_email
                    detail: An active person already owns dana@acme.com.
                    details:
                      existing_id: 018f3a1b-0000-7000-8000-000000000010
                      field: emails[0].email
        '422': { $ref: '#/components/responses/ValidationError' }

  /people/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [People]
      operationId: getPerson
      summary: Get a person by id (the 360 record).
      description: Fetchable by id even when archived (features/01 §1.1 AC).
      x-mcp-tool: { verb: read_record, record_type: person, tier: green }
      responses:
        '200':
          description: The person.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Person' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [People]
      operationId: updatePerson
      summary: Update a person (partial).
      x-mcp-tool: { verb: update_record, record_type: person, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdatePersonRequest' }
      responses:
        '200':
          description: Updated person.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Person' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [People]
      operationId: archivePerson
      summary: Archive (soft-delete) a person.
      description: |
        Sets `archived_at`, removes from default lists, retains in audit; the row is
        still fetchable by id (features/01 §1.1 AC). No hard delete by default.
      x-mcp-tool: { verb: archive_record, record_type: person, tier: yellow }
      responses:
        '200':
          description: Archived person (now carries a non-null `archived_at`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Person' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /people/{id}/merge:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [People]
      operationId: mergePerson
      x-mcp-tool: { verb: merge_records, record_type: person, tier: yellow }
      summary: Merge this person into a target (non-lossy).
      description: |
        Merge A→B relinks A's emails/phones/relationships/activity links to B with zero
        orphaned FKs, archives A with `merged_into_id = B` (features/01 §1.3). One audit
        transaction; reversible within audit.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_id]
              properties:
                target_id:
                  type: string
                  format: uuid
                  description: The surviving person (B). This row (A) is archived.
      responses:
        '200':
          description: The surviving (target) person after merge.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Person' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  # --------------------------- /organizations -------------------------------
  /organizations:
    get:
      tags: [Organizations]
      operationId: listOrganizations
      summary: List organizations (live by default; cursor-paginated).
      x-mcp-tool: { verb: search_records, record_type: organization, tier: green }
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/IncludeArchived'
        - name: owner_id
          in: query
          schema: { type: string, format: uuid }
        - name: domain
          in: query
          schema: { type: string }
          description: Lookup by normalized domain (the employer-inference index).
        - name: q
          in: query
          schema: { type: string }
      responses:
        '200':
          description: A page of organizations.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrganizationListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Organizations]
      operationId: createOrganization
      summary: Create an organization.
      description: Domains are normalized/lowercased and unique per workspace (409 on collision).
      x-mcp-tool: { verb: create_record, record_type: organization, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateOrganizationRequest' }
            examples:
              minimal:
                value:
                  display_name: Acme Inc
                  domains: [{ domain: acme.com, is_primary: true }]
                  source: ui
      responses:
        '201':
          description: Created organization.
          headers:
            Location: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Organization' }
        '401': { $ref: '#/components/responses/Unauthorized' }
