    CreateStageRequest:
      type: object
      required: [pipeline_id, name, position]
      properties:
        pipeline_id: { type: string, format: uuid }
        name: { type: string }
        position: { type: integer }
        semantic: { type: string, enum: [open, won, lost], default: open }
        win_probability: { type: integer, minimum: 0, maximum: 100, default: 0 }

    UpdateStageRequest:
      type: object
      properties:
        name: { type: string }
        position: { type: integer }
        semantic: { type: string, enum: [open, won, lost] }
        win_probability: { type: integer, minimum: 0, maximum: 100 }

    StageListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Stage' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    Pipeline:
      type: object
      description: A pipeline. Mirrors the `pipeline` table (with embedded stages on GET).
      required: [id, workspace_id, name, is_default, position]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        is_default: { type: boolean, default: false, description: Exactly one default per workspace. }
        position: { type: integer, default: 0 }
        stages:
          type: array
          items: { $ref: '#/components/schemas/Stage' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreatePipelineRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        is_default: { type: boolean, default: false }
        position: { type: integer, default: 0 }
        stages:
          type: array
          description: Optional initial stages.
          items: { $ref: '#/components/schemas/CreateStageRequest' }

    UpdatePipelineRequest:
      type: object
      properties:
        name: { type: string }
        is_default: { type: boolean }
        position: { type: integer }

    PipelineListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Pipeline' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Activity + link ----
    ActivityLink:
      type: object
      required: [entity_type, entity_id]
      properties:
        id: { type: string, format: uuid }
        activity_id: { type: string, format: uuid }
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        entity_id: { type: string, format: uuid }

    Activity:
      type: object
      description: |
        A polymorphic timeline item. Mirrors the `activity` table + `activity_link`.
        **Per-kind field constraints** (enforced server-side to match the DB `activity_task_fields`
        CHECK; the OpenAPI cannot express these conditionally): `due_at`/`assignee_id`/`is_done`/
        `done_at` are valid ONLY when `kind=task`; `meeting_status` ONLY when `kind=meeting`;
        `duration_seconds` only for meeting/call; `direction` is null for note/task. Setting a
        disallowed field for the kind returns `422 code: field_not_valid_for_kind` (the API rejects
        what the DB CHECK would reject, rather than 500-ing at write time).
      required: [id, workspace_id, kind, occurred_at, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        kind: { type: string, enum: [email, call, meeting, note, task, whatsapp, telegram] }
        subject: { type: [string, 'null'] }
        body: { type: [string, 'null'] }
        occurred_at: { type: string, format: date-time }
        due_at: { type: [string, 'null'], format: date-time, description: Task only. }
        remind_at: { type: [string, 'null'], format: date-time, description: 'Task only. Reminder-fire time; the B-E16.6 scan reads tasks whose reminder is due, not-done, and un-archived.' }
        assignee_id: { type: [string, 'null'], format: uuid, description: Task only. }
        is_done: { type: boolean, default: false, description: Task only. }
        done_at: { type: [string, 'null'], format: date-time }
        duration_seconds: { type: [integer, 'null'], description: Meeting/call only. }
        direction: { type: [string, 'null'], enum: [null, inbound, outbound], description: 'inbound/outbound for email/call; null for note/task.' }
        meeting_status: { type: [string, 'null'], enum: [null, booked, held, no_show, canceled], description: 'Set only when kind=meeting.' }
        source_system: { type: [string, 'null'], description: 'gmail/gcal/outlook/transcript — idempotency key part.' }
        source_id: { type: [string, 'null'], description: Provider message/event id — idempotency key part. }
        links:
          type: array
          description: One activity may link to >1 entity (person + deal).
          items: { $ref: '#/components/schemas/ActivityLink' }
        source: { type: string }
        captured_by: { type: string, readOnly: true, description: 'Server-stamped from the authenticated principal (human:<uuid> | agent:<id> | connector:<name>); never client-supplied.' }
        raw: { type: [object, 'null'], additionalProperties: true }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateActivityRequest:
      type: object
      required: [kind, source]
      properties:
        kind: { type: string, enum: [email, call, meeting, note, task, whatsapp, telegram] }
        subject: { type: [string, 'null'] }
        body: { type: [string, 'null'] }
        occurred_at: { type: string, format: date-time }
        due_at: { type: [string, 'null'], format: date-time }
        remind_at: { type: [string, 'null'], format: date-time, description: Task only. }
        assignee_id: { type: [string, 'null'], format: uuid }
        duration_seconds: { type: [integer, 'null'] }
        direction: { type: [string, 'null'], enum: [null, inbound, outbound] }
        meeting_status: { type: [string, 'null'], enum: [null, booked, held, no_show, canceled] }
        source_system: { type: [string, 'null'] }
        source_id: { type: [string, 'null'] }
        links:
          type: array
          items:
            type: object
            required: [entity_type, entity_id]
            properties:
              entity_type: { type: string, enum: [person, organization, deal, lead] }
              entity_id: { type: string, format: uuid }
        source: { type: string }
        raw: { type: [object, 'null'], additionalProperties: true }

    UpdateActivityRequest:
      type: object
      properties:
        subject: { type: [string, 'null'] }
        body: { type: [string, 'null'] }
        occurred_at: { type: string, format: date-time }
        due_at: { type: [string, 'null'], format: date-time }
        assignee_id: { type: [string, 'null'], format: uuid }
        remind_at: { type: [string, 'null'], format: date-time, description: 'Task only. Set/clear the reminder; PATCH target for B-E16.2/.3. The reminder scan (B-E16.6) fires on this.' }
        is_done: { type: boolean, description: 'Completing a task writes one audit row + an `activity.updated` event carrying the `is_done` delta (events.md §5.5 — there is no separate `task.*` family).' }

    ActivityListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Activity' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    Attachment:
      type: object
      description: |
        A file hung off an entity. Mirrors the `attachment` table: the row is the
        system of record and the tenant anchor; the bytes live in object storage,
        addressed by an internal object key that is never exposed on the wire.
      required: [id, workspace_id, entity_type, entity_id, filename, source, captured_by, created_at, scan_status]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        entity_type: { type: string, enum: [person, organization, deal, activity, lead] }
        entity_id: { type: string, format: uuid }
        filename: { type: string }
        content_type: { type: [string, 'null'] }
        byte_size: { type: [integer, 'null'], format: int64 }
        checksum: { type: [string, 'null'], description: 'sha256 of the bytes, for integrity/dedupe.' }
        scan_status:
          type: string
          enum: [scanning, clean, blocked]
          readOnly: true
          description: |
            Virus-scan state (RD-T05). Server-computed; never client-supplied. Gates the
            byte stream, not the row: `downloadAttachment` refuses with 409 `scan_pending`
            (retryable — scan still running) while `scanning`, and 409
            `attachment_blocked` (terminal — quarantined) while `blocked`. The attachment
            row itself is always disclosed regardless of scan_status; only the download
            stream is withheld.
        source: { type: string }
        captured_by: { type: string, readOnly: true, description: 'Server-stamped from the authenticated principal; never client-supplied.' }
        created_at: { type: string, format: date-time }

    AttachmentListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Attachment' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    ExtractedField:
      type: object
      description: One attempted grounded field from the staged AI-extraction read (RD-T10).
      required: [field, value, source_quote, page_or_section, confidence]
      properties:
        field: { type: string }
        value: { type: string }
        source_quote: { type: string, description: Verbatim text the value was read from — never a paraphrase. }
        page_or_section: { type: string }
        confidence: { type: string, enum: [high, medium] }

    OmittedExtractionField:
      type: object
      description: A field the extractor could not ground in the document text (evidence-or-omit; never guessed).
      required: [field, reason]
      properties:
        field: { type: string }
        reason: { type: string, enum: [not_stated_in_file] }

    AttachmentExtraction:
      type: object
      description: The staged extraction for one attachment — grounded fields plus what was honestly omitted.
      required: [fields, omitted]
      properties:
        fields: { type: array, items: { $ref: '#/components/schemas/ExtractedField' } }
        omitted: { type: array, items: { $ref: '#/components/schemas/OmittedExtractionField' } }

    AcceptExtractionRequest:
      type: object
      required: [field_keys]
      properties:
        field_keys:
          type: array
          items: { type: string }
          minItems: 1
          description: Field names to accept onto the deal; each is checked against the deal-update allowlist.
        edits:
          type: object
          additionalProperties: true
          description: |
            field -> edited value, for fields the user typed over before accepting. A key
            present here flips that field's audit provenance from `ai-extracted` to `human`.

    AcceptedExtractionField:
      type: object
      required: [field, value, provenance]
      properties:
        field: { type: string }
        value: { type: string }
        provenance: { type: string, enum: [ai-extracted, human] }

    AttachmentExtractionAcceptResponse:
      type: object
      required: [deal_id, accepted]
      properties:
        deal_id: { type: string, format: uuid }
        accepted: { type: array, items: { $ref: '#/components/schemas/AcceptedExtractionField' } }

    RequestAccessResponse:
      type: object
      required: [requested]
      properties:
        requested: { type: boolean }

    EmailDraft:
      type: object
      description: A drafted email (never sent by drafting). Send via /activities/{id}/send-email (🟡).
      required: [subject, body]
      properties:
        subject: { type: string }
        body: { type: string }
        to: { type: array, items: { type: string, format: email } }
        in_reply_to_activity_id: { type: [string, 'null'], format: uuid }

    SendEmailRequest:
      type: object
      required: [subject, body, to, consent_purpose]
      properties:
        subject: { type: string }
        body: { type: string, description: The (possibly edited) final body that is sent. }
        to: { type: array, items: { type: string, format: email } }
        cc: { type: array, items: { type: string, format: email } }
        consent_purpose:
          type: string
          description: |
            The consent purpose this send falls under (e.g. `transactional`, `marketing_email`).
            The send is suppressed (409 `consent_not_granted`) unless every recipient has an active
            `granted` `person_consent` for THIS purpose (default-deny per purpose, A22/ADR-0011).

    # ---- Lead ----
    Lead:
      type: object
      description: A thin, segregated prospect. Mirrors the `lead` table. NO organization FK.
      required: [id, workspace_id, status, score, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        full_name: { type: [string, 'null'] }
        email: { type: [string, 'null'], format: email, description: Lowercased; lead-internal dedupe key. }
        linkedin_url: { type: [string, 'null'], description: 'Normalized LinkedIn profile URL — the E12.11 exact-match dedupe key.' }
        title: { type: [string, 'null'] }
        company_name: { type: [string, 'null'], description: FREE TEXT — NOT an organization FK. }
        candidate_org_key: { type: [string, 'null'], description: Loose key for ABM routing without creating an org. }
        status: { type: string, enum: [new, working, promoted, disqualified], default: new }
        score: { type: integer, default: 0, description: 'Lead-local scoring; never reads the contact graph. While an override is in force this is the human-set value (see score_override_reason).' }
        score_override_reason: { type: [string, 'null'], readOnly: true, description: 'Non-null ⇒ `score` is a human Commercial-Judgement override (formulas §3.1) and recompute is suppressed; the machine value is retained in `score_computed`.' }
        score_computed: { type: [integer, 'null'], readOnly: true, description: 'Server-derived. The latest machine-computed §3 score, retained ONLY while an override is in force (else null, because score itself is the machine value).' }
        owner_id: { type: [string, 'null'], format: uuid }
        source_system: { type: [string, 'null'] }
        source_id: { type: [string, 'null'] }
        promoted_person_id: { type: [string, 'null'], format: uuid, description: Set on promotion (convenience mirror). }
        promoted_at: { type: [string, 'null'], format: date-time }
        source: { type: string }
        captured_by: { type: string, readOnly: true, description: 'Server-stamped from the authenticated principal (human:<uuid> | agent:<id> | connector:<name>); never client-supplied.' }
        raw: { type: [object, 'null'], additionalProperties: true }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }
      additionalProperties: true
      x-extension: true
      x-extension-note: |
        additionalProperties:true admits client custom fields (data-model §9 — custom fields
        are real columns added by migration, surfaced additively through this same contract).
        Because these extra keys carry no per-key schema, writes are drop-on-mismatch: a key
        that names no ACTIVE custom column (unknown or retired), or whose value shape does
        not match the column's declared type, is silently excluded from the write — the
        request still succeeds. A picklist value outside the declared options is the one
        typed refusal (422, the column's CHECK constraint). Reads surface only ACTIVE
        columns; a retired field's stored values are preserved but leave the payload.

    CreateLeadRequest:
      type: object
      required: [source]
      properties:
        full_name: { type: [string, 'null'] }
        email: { type: [string, 'null'], format: email }
        linkedin_url: { type: [string, 'null'], description: 'Normalized LinkedIn profile URL — the E12.11 exact-match dedupe key for LinkedIn-captured leads.' }
        title: { type: [string, 'null'] }
        company_name: { type: [string, 'null'] }
        candidate_org_key: { type: [string, 'null'] }
        status: { type: string, enum: [new, working, promoted, disqualified], default: new }
        owner_id: { type: [string, 'null'], format: uuid }
        source_system: { type: [string, 'null'] }
        source_id: { type: [string, 'null'] }
        source: { type: string }
      additionalProperties: true
      x-extension: true

    UpdateLeadRequest:
      type: object
      description: |
        Partial update. `status` may move only between `new`/`working` here. **Disqualifying is done
        via DELETE /leads/{id}** (which sets status=disqualified AND archives — the invariant
        "disqualified ⇒ archived" is enforced on that one path); `promoted` is reachable only via
        POST /leads/{id}/promote. Both terminal states are therefore excluded from this enum.
      properties:
        full_name: { type: [string, 'null'] }
        email: { type: [string, 'null'], format: email }
        title: { type: [string, 'null'] }
        company_name: { type: [string, 'null'] }
        candidate_org_key: { type: [string, 'null'], description: 'Loose ABM routing key. Format: lowercased registrable domain when known (`acme.com`), else a slug of company_name. Never an organization FK.' }
        status: { type: string, enum: [new, working] }
        score: { type: [integer, 'null'], minimum: 0, maximum: 100, description: 'Manual human score override (formulas §3.1, AC-S1). Omit to keep the computed lead-local score. Setting it REQUIRES `score_override_reason`; passing null clears the override and resumes recompute.' }
        score_override_reason: { type: [string, 'null'], minLength: 1, description: 'Written reason for the Commercial Judgement override (formulas §3.1). REQUIRED when `score` is set (422 otherwise); the override is sticky — it suppresses recompute until cleared.' }
        owner_id: { type: [string, 'null'], format: uuid }
      additionalProperties: true
      x-extension: true

    PromoteLeadRequest:
      type: object
      required: [trigger]
      properties:
        trigger:
          type: string
          enum: [inbound_reply, meeting_booked, meeting_held, human_qualify]
          description: |
            The genuine-engagement trigger. cold_outbound_no_reply is NOT permitted and is
            rejected with 422 — promotion is engagement, not import or an outbound touch.
        evidence:
          type: object
          description: Which inbound email/meeting (or human) triggered promotion; recorded in audit.
          properties:
            activity_id: { type: [string, 'null'], format: uuid }
            note: { type: [string, 'null'] }

    PromoteLeadResponse:
      type: object
      required: [person, merged]
      properties:
        person: { $ref: '#/components/schemas/Person' }
        merged:
          type: boolean
          description: True if promotion merged into an existing person (no duplicate); false if a new person was created.
        lead_id: { type: string, format: uuid }

    LeadListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Lead' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Signals (E08 warm room, data-model §12.5) ----
    Signal:
      type: object
      description: |
        A surfaced "something changed / worth attention" item. Mirrors the `signal` table:
        company-level and consent-gated by construction — the only mandatory attribution is
        organizational (`resolved_org_id` after resolution); `resolved_person_id` is optional
        and set only under a recorded consent grant (P12). Unattributable signals are
        `dropped`, never retained as a person-level dossier.
      required: [id, workspace_id, kind, source_channel, resolution_state, severity, summary, evidence, status, detected_at, source, captured_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        kind: { type: string, enum: [stalled_deal, champion_left, reengagement, buying_intent, risk, other] }
        source_channel:
          type: string
          enum: [derived, inbound, web, social, deal_room_engagement]
          default: derived
          description: Where the raw signal came from.
        raw_ref: { type: [string, 'null'], description: 'Pointer to the raw source payload the resolver works from: an email address/handle, a domain, a URL, or a company mention.' }
        entity_type:
          type: [string, 'null']
          enum: [deal, organization, person, null]
          description: The subject record the signal is about; null until a raw signal resolves (both entity fields set together).
        entity_id: { type: [string, 'null'], format: uuid }
        resolution_state:
          type: string
          enum: [resolved, low_confidence, unresolved, dropped]
          description: 'The raw→entity match outcome: an ambiguous match is `low_confidence` (surfaced, never silently asserted); an unattributable one is `dropped`.'
        resolution_confidence: { type: [number, 'null'], minimum: 0, maximum: 1 }
        resolved_org_id: { type: [string, 'null'], format: uuid, description: The organization the raw signal resolved to (the only required attribution level). }
        resolved_person_id: { type: [string, 'null'], format: uuid, description: Optional person resolution — set only under a recorded consent grant, never inferred. }
        severity: { type: string, enum: [info, warn, urgent], default: info }
        summary: { type: string }
        evidence:
          type: array
          items: { $ref: '#/components/schemas/SignalEvidence' }
          description: Per-claim evidence (evidence-or-omit, features/07 §11 gate 1).
        status: { type: string, enum: [open, acknowledged, resolved, dismissed], default: open }
        detected_at: { type: string, format: date-time }
        source: { type: string }
        captured_by: { type: string, readOnly: true, description: 'Server-stamped from the authenticated principal; never client-supplied.' }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    SignalEvidence:
      type: object
      required: [snippet]
      properties:
        snippet: { type: string }
        source_type: { type: [string, 'null'], enum: [activity, deal, signal, relationship, page, null] }
        source_id: { type: [string, 'null'] }

    CreateSignalRequest:
      type: object
      required: [kind, summary, source]
      properties:
        kind: { type: string, enum: [stalled_deal, champion_left, reengagement, buying_intent, risk, other] }
        source_channel: { type: string, enum: [derived, inbound, web, social, deal_room_engagement], default: derived }
        raw_ref: { type: [string, 'null'] }
        entity_type:
          type: [string, 'null']
          enum: [deal, organization, person, null]
          description: 'Subject record, both entity fields together or neither: with a subject the signal enters `resolved`; without one it enters `unresolved` (a raw item needing a raw_ref for POST /signals/{id}/resolve).'
        entity_id: { type: [string, 'null'], format: uuid }
        severity: { type: string, enum: [info, warn, urgent], default: info }
        summary: { type: string }
        evidence:
          type: array
          items: { $ref: '#/components/schemas/SignalEvidence' }
        detected_at: { type: [string, 'null'], format: date-time, description: When the underlying observation happened (defaults to now). }
        source: { type: string }

    UpdateSignalRequest:
      type: object
      description: |
        Triage. A `status` move to acknowledged/resolved/dismissed appends the human-outcome
        `signal_resolution` row; `note` travels with that outcome. `resolution_state` and the
        resolved ids are resolver-owned and not writable here.
      properties:
        status: { type: string, enum: [open, acknowledged, resolved, dismissed] }
        note: { type: [string, 'null'], description: Optional outcome note recorded with a status change. }
        severity: { type: string, enum: [info, warn, urgent] }

    SignalListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Signal' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    SignalWarmContact:
      type: object
      description: One contact edge in our own graph that makes the signal warm — evidence, with its explainable §4 strength.
      required: [person_id, relationship_kind, strength, strength_bucket]
      properties:
        person_id: { type: string, format: uuid }
        full_name: { type: [string, 'null'] }
        relationship_kind: { type: string, enum: [employment, deal_stakeholder] }
        relationship_role: { type: [string, 'null'], description: 'e.g. cto, champion, economic_buyer.' }
        strength: { type: integer, description: The deterministic §4 relationship strength (0–100). }
        strength_bucket: { type: string, enum: [none, weak, moderate, strong] }

    SignalWarmth:
      type: object
      description: |
        The warm/cold branch with its full evidence: source signal id, resolved org id, and
        the specific contact id(s) that make it warm. No mystery score — a numeric-only
        answer would be a contract violation (features/07 §9).
      required: [warm, routing, source_signal_id, resolved_org_id, contact_ids, contacts]
      properties:
        warm: { type: boolean }
        routing:
          type: string
          enum: [warm_room, cold_queue]
          description: The real routing branch — warm signals surface in the warm room, cold ones queue separately.
        source_signal_id: { type: string, format: uuid }
        resolved_org_id: { type: string, format: uuid }
        contact_ids:
          type: array
          items: { type: string, format: uuid }
          description: Empty exactly when cold.
        contacts:
          type: array
          items: { $ref: '#/components/schemas/SignalWarmContact' }

    SignalIntroPath:
      type: object
      description: |
        An actionable warm-intro path — names the route-in contact, the relationship we
        have, and a concrete next move with a drafted message. Proposal only: the send is
        the 🟡 confirm-first send tool, never this read.
      required: [signal_id, resolved_org_id, contact_id, relationship, next_move, evidence]
      properties:
        signal_id: { type: string, format: uuid }
        resolved_org_id: { type: string, format: uuid }
        contact_id: { type: string, format: uuid, description: The route-in contact (the strongest live relationship at the resolved organization). }
        contact_name: { type: [string, 'null'] }
        relationship: { $ref: '#/components/schemas/SignalWarmContact' }
        next_move:
          type: object
          required: [kind, draft_subject, draft_body, ai_disclosure]
          properties:
            kind:
              type: string
              enum: [draft_to_contact, intro_request]
              description: 'intro_request when the signal resolved (under consent) to a specific person other than the route-in contact; otherwise a direct draft to the contact.'
            draft_subject: { type: string }
            draft_body: { type: string, description: Renders the Art. 50 AI-assisted disclosure (features/07 §11 gate 9). }
            ai_disclosure: { type: string, description: The machine-readable Art. 50 disclosure line the draft carries. }
        evidence:
          type: object
          description: Provenance back to the warm signal (evidence-or-omit).
          required: [source_signal_id, resolved_org_id, contact_ids]
          properties:
            source_signal_id: { type: string, format: uuid }
            resolved_org_id: { type: string, format: uuid }
            contact_ids: { type: array, items: { type: string, format: uuid } }

    # ---- List / Tag ----
    List:
      type: object
      description: A static membership set or a dynamic segment. Mirrors the `list` table.
      required: [id, workspace_id, name, entity_type, list_type]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        list_type: { type: string, enum: [static, dynamic], default: static }
        definition: { type: [object, 'null'], additionalProperties: true, description: Dynamic — validated query plan; static — null. }
        owner_id: { type: [string, 'null'], format: uuid }
        team_id: { type: [string, 'null'], format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateListRequest:
      type: object
      required: [name, entity_type]
      properties:
        name: { type: string }
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        list_type: { type: string, enum: [static, dynamic], default: static }
        definition: { type: [object, 'null'], additionalProperties: true }
        owner_id: { type: [string, 'null'], format: uuid }
        team_id: { type: [string, 'null'], format: uuid }

    ListMember:
      type: object
      required: [id, list_id, entity_type, entity_id]
      properties:
        id: { type: string, format: uuid }
        list_id: { type: string, format: uuid }
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        entity_id: { type: string, format: uuid }
        added_by: { type: string }
        created_at: { type: string, format: date-time }

    AddListMemberRequest:
      type: object
      required: [entity_type, entity_id]
      properties:
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        entity_id: { type: string, format: uuid }

    ListListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/List' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    ListMemberListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/ListMember' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    Tag:
      type: object
      description: A tag. Mirrors the `tag` table.
      required: [id, workspace_id, name]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        color: { type: [string, 'null'] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateTagRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        color: { type: [string, 'null'] }

    Taggable:
      type: object
      required: [id, tag_id, entity_type, entity_id]
      properties:
        id: { type: string, format: uuid }
        tag_id: { type: string, format: uuid }
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        entity_id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }

    ApplyTagRequest:
      type: object
      required: [entity_type, entity_id]
      properties:
        entity_type: { type: string, enum: [person, organization, deal, lead] }
        entity_id: { type: string, format: uuid }

    TagListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Tag' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    SavedView:
      type: object
      description: >-
        A per-user saved view (columns, sort, filter state) over one resource.
        Mirrors the `saved_view` table. V1 is private (owner-only); shared/team
        views are a fast-follow.
      required: [id, workspace_id, owner_id, resource, name, query, version]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        owner_id: { type: string, format: uuid }
        shared_scope: { type: string, enum: [private, team, workspace], default: private, description: V1 enforces private. }
        resource: { type: string, enum: [people, organizations, deals, activities, leads, partners] }
        name: { type: string }
        query:
          type: object
          additionalProperties: true
          description: The saved column choice, sort, and filter state (§13.5 vocabulary); persisted verbatim and restored exactly.
        version: { type: integer, format: int64, description: Optimistic-concurrency version; echo it in If-Match on update. }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateSavedViewRequest:
      type: object
      required: [resource, name, query]
      properties:
        resource: { type: string, enum: [people, organizations, deals, activities, leads, partners] }
        name: { type: string }
        query: { type: object, additionalProperties: true }

    UpdateSavedViewRequest:
      type: object
      description: A partial update; omitted fields keep their stored value.
      properties:
        name: { type: string }
        query: { type: object, additionalProperties: true }

    SavedViewListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/SavedView' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    FilteredExportRequest:
      type: object
      description: >-
        A filtered export request. Supply exactly ONE source: an inline `object`
        (with a required `filter`), a `view_id` (a saved view whose filter state is
        exported), or a `list_id` (a dynamic list whose definition is exported). The
        slice is always row-scoped to the caller through the one filter engine.
      required: [format]
      properties:
        object:
          type: string
          enum: [person, organization, deal, lead]
          description: The object type to filter-export; requires `filter`. Mutually exclusive with view_id/list_id.
        filter:
          type: object
          additionalProperties: true
          description: The canonical §13.5 predicate tree (nested and/or groups over typed leaves). Required with `object`.
        view_id:
          type: string
          format: uuid
          description: Export the filter state of one of the caller's saved views. Mutually exclusive with object/list_id.
        list_id:
          type: string
          format: uuid
          description: Export the definition of a dynamic list. Mutually exclusive with object/view_id.
        format:
          type: string
          enum: [csv, json]

    # ---- Identity (User / Team / Role) ----
    User:
      type: object
      description: A seat — human or first-party agent. Mirrors `app_user`.
      required: [id, workspace_id, email, display_name, status, is_agent]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        email: { type: string, format: email }
        display_name: { type: string }
        timezone: { type: string, default: UTC, description: IANA name. }
        status: { type: string, enum: [active, suspended, deactivated], default: active }
        is_agent: { type: boolean, default: false, description: First-party Agent Runner identity vs a human seat. }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    InviteUserRequest:
      type: object
      description: Admin-supplied details for a new member. No password — the invite issues a set-password token.
      required: [email, display_name, role]
      properties:
        email: { type: string, format: email }
        display_name: { type: string, minLength: 1, maxLength: 255 }
        role: { type: string, enum: [admin, manager, rep, read_only, ops] }

    ChangeUserRoleRequest:
      type: object
      required: [role]
      properties:
        role: { type: string, enum: [admin, manager, rep, read_only, ops] }

    DeactivateUserRequest:
      type: object
      properties:
        reason: { type: string, maxLength: 500, description: Optional operator note that rides the user.deactivated event. }

    Team:
      type: object
      description: Mirrors the `team` table.
      required: [id, workspace_id, name]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        parent_team_id: { type: [string, 'null'], format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }
        member_count: { type: integer, description: 'Active memberships; populated by listTeams.' }

    Role:
      type: object
      description: An RBAC role bundle. Mirrors the `role` table.
      required: [id, workspace_id, key, name, is_system, permissions]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        key: { type: string, description: 'admin | manager | rep | read_only | ops | <code-defined>.' }
        name: { type: string }
        is_system: { type: boolean, default: false }
        permissions:
          type: object
          additionalProperties: true
          description: '{ object: {crud}, field_masks: [...], row_scope: own|team|all }.'
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    AuthCapabilities:
      type: object
      required: [password, password_reset, oidc_providers]
      properties:
        password: { type: boolean, description: Email + password login is enabled. }
        password_reset: { type: boolean, description: The A74 reset flow can complete end to end (outbound email configured + healthy). }
        oidc_providers:
          type: array
          description: Operational OIDC providers (empty until the OIDC flow ships).
          items:
            type: object
            required: [key, label]
            properties:
              key: { type: string, description: 'Stable provider key, e.g. `google`.' }
              label: { type: string, description: 'Button label, e.g. `Continue with Google`.' }

    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:    { type: string, format: email }
        password: { type: string, minLength: 1, maxLength: 256 }

    MeResponse:
      type: object
      required: [user, roles, teams]
      properties:
        user: { $ref: '#/components/schemas/User' }
        roles:
          type: array
          items: { type: string }
          description: Effective role keys for this principal.
        teams:
          type: array
          items: { type: string, format: uuid }
        passport:
          type: [object, 'null']
          description: Present when the principal is an agent acting under an Agent Seat Passport.
          properties:
            passport_id: { type: string, format: uuid }
            on_behalf_of: { type: string, format: uuid }
            scopes:
              type: array
              items: { type: string, enum: [read_only, draft_only, act_with_approval, auto_execute_low_risk] }

    # ---- Audit ----
    AuditLogEntry:
      type: object
      description: An append-only audit row. Mirrors the `audit_log` table.
      required: [id, workspace_id, actor_type, actor_id, action, entity_type, entity_id, occurred_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        actor_type: { type: string, enum: [human, agent, system, connector] }
        actor_id: { type: string, description: "User uuid, agent id, connector name (e.g. connector:gmail), or 'system'." }
        passport_id: { type: [string, 'null'], format: uuid, description: Agent Seat Passport that authorized an agent action. }
        on_behalf_of: { type: [string, 'null'], format: uuid, description: The human authority for an agent action. }
        action:
          type: string
          # Every mutation is attributable (P12). connector captures audit as actor_type=connector.
          # audit_log is record-mutations-only: login and bulk export moved to system_log,
          # so `login` is not here. `export` stays — the DSR person export is entity-bound.
          # capture skip is NOT here either — it is a system_log 'capture_skip' event.
          enum: [create, update, archive, merge, promote, demote, disqualify, restore, export, erase, anonymize, assign, advance_stage, send_email, consent_grant, consent_withdraw, approve, reject, record_share, record_unshare, activity_relink, import, import_undo]
        entity_type: { type: string }
        entity_id: { type: string, format: uuid, description: Every audit_log row names the record it mutated (NOT NULL since 0075). }
        before: { type: [object, 'null'], additionalProperties: true }
        after: { type: [object, 'null'], additionalProperties: true }
        authorization_rule: { type: [string, 'null'], description: Which RBAC/scope rule allowed it. }
        evidence: { type: [object, 'null'], additionalProperties: true, description: e.g. which inbound email/meeting triggered a promotion. }
        occurred_at: { type: string, format: date-time }

    FieldHistoryEntry:
      type: object
      description: |
        One per-field change, projected read-only from a single audit_log row's before/after
        diff — not a stored history row. `id` is the source audit_log row's id, so entries from
        the same mutation share it. `old_value`/`new_value` are display-form strings; null means
        the empty/created origin.
      required: [id, entity_type, entity_id, field, changed_at, actor_type, actor_id]
      properties:
        id: { type: string, format: uuid }
        entity_type: { type: string, enum: [person, organization, deal, lead, activity] }
        entity_id: { type: string, format: uuid }
        field: { type: string }
        old_value: { type: [string, 'null'] }
        new_value: { type: [string, 'null'] }
        changed_at: { type: string, format: date-time }
        actor_type: { type: string, enum: [human, agent, system, connector] }
        actor_id: { type: string }
        passport_id: { type: [string, 'null'], format: uuid, description: Agent Seat Passport that authorized the change; present for agent actors only. }
        evidence: { type: [object, 'null'], additionalProperties: true, description: Grounding evidence for an agent-authored change; present for agent actors only. }

    FieldHistoryListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/FieldHistoryEntry' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Custom fields (CUSTOM-FIELDS-WIRE-1..5, A46/ADR-0002 Amendment 2) ----
    CustomField:
      type: object
      description: |
        A workspace-defined runtime field on an existing core object. Mirrors the
        `custom_field` catalog table — the system-of-record for every runtime-added
        column (CUSTOM-FIELDS-SCHEMA-1). `column_name` is the physical `cf_`-prefixed
        identifier, stable across rename; `status=retired` hides the field from the API
        and filtering while the column and its values are preserved (soft retire, never
        a column drop — CUSTOM-FIELDS-AC-13). Deliberately carries no
        `source`/`captured_by` — the catalog row itself has no such columns; provenance
        on create lives in the audit row.
      required: [id, workspace_id, object, label, slug, type, status, column_name, created_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        object:
          type: string
          enum: [person, organization, deal, lead, activity]
          description: The existing core object this field is added to (CUSTOM-FIELDS-PARAM-2).
        label: { type: string, description: Display label; the only thing a rename updates. }
        slug: { type: string, description: Admin-facing key the column_name derives from. }
        type:
          type: string
          enum: [text, number, date, currency, picklist, boolean]
          description: The closed set of six scalar types (CUSTOM-FIELDS-PARAM-1). Immutable once created.
        status:
          type: string
          enum: [active, retired]
          description: 'retired = soft: hidden from the API and filtering, column and values preserved (CUSTOM-FIELDS-AC-13).'
        column_name:
          type: string
          readOnly: true
          description: >-
            Server-derived, `cf_`-prefixed, slug-derived physical column identifier
            (CUSTOM-FIELDS-PARAM-3) — never client-supplied, immutable once live, stable
            across rename.
        currency:
          type: [string, 'null']
          pattern: '^[A-Z]{3}$'
          description: ISO-4217 currency code; present when `type=currency`, null otherwise.
        options:
          type: [array, 'null']
          items: { type: string }
          description: Allowed picklist values; present (non-empty) when `type=picklist` (CUSTOM-FIELDS-PARAM-5), null otherwise.
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at:
          type: [string, 'null']
          format: date-time
          description: >-
            Base envelope field (DM-CONV-3); stays null even when `status=retired` — retire
            is a status flip, not an archive.
        version: { $ref: '#/components/schemas/RowVersion' }

    CustomFieldListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/CustomField' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    CreateCustomFieldRequest:
      type: object
      description: |
        🟡 always (a schema change is never 🟢) — see `createCustomField`. `currency` is
        required when `type=currency` (pattern `^[A-Z]{3}$`); `options` is required
        non-empty when `type=picklist` (CUSTOM-FIELDS-PARAM-5). Neither conditional
        requirement is expressed as an OpenAPI 3.1 `oneOf`/`if`-`then` here — a prose note
        plus a 422 on mismatch is sufficient, matching how Offer/Product money fields are
        documented elsewhere in this contract.
      required: [object, label, type, source]
      properties:
        object:
          type: string
          enum: [person, organization, deal, lead, activity]
        label: { type: string }
        type:
          type: string
          enum: [text, number, date, currency, picklist, boolean]
        currency: { type: [string, 'null'], pattern: '^[A-Z]{3}$' }
        options: { type: [array, 'null'], items: { type: string } }
        source: { type: string }
      # Deliberately NOT additionalProperties: true — the x-extension
      # catch-all convention is for record schemas (data-model §9); on this
      # admin request an unknown key is a typo and answers the unknown_field
      # 422, never a silent drop.

    RenameCustomFieldRequest:
      type: object
      description: >-
        Merge-PATCH; `label` only — `column_name`, `object`, and `type` are absent from this
        request schema entirely (immutable, not just ignored if sent).
      properties:
        label: { type: string }

    UpdateCustomFieldOptionsRequest:
      type: object
      description: >-
        CUSTOM-FIELDS-PARAM-5. Replaces the picklist's full allowed-option set (ordered);
        at least one option is required — an empty array is rejected (422).
      required: [options]
      properties:
        options:
          type: array
          items: { type: string }
          minItems: 1

    AuditHistoryEntry:
      type: object
      description: |
        One rendered history line for a record mutation. `before`/`after` are
        masked to the viewer's readable fields — an absent key was hidden, not null.
        `summary` is server-composed plain language; field-level detail lives in
        before/after for the client to render.
      required: [id, actor_type, actor_id, action, occurred_at, summary]
      properties:
        id: { type: string, format: uuid }
        actor_type: { type: string, enum: [human, agent, system, connector] }
        actor_id: { type: string }
        on_behalf_of: { type: [string, 'null'], format: uuid, description: Granting human's user id for agent actions. }
        on_behalf_of_name: { type: [string, 'null'], description: Resolved display name for on_behalf_of. }
        action: { type: string }
        occurred_at: { type: string, format: date-time }
        authorization_rule: { type: [string, 'null'] }
        before: { type: [object, 'null'], additionalProperties: true }
        after: { type: [object, 'null'], additionalProperties: true }
        summary: { type: string }

    AuditHistoryListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/AuditHistoryEntry' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Reports ----
    RunReportRequest:
      type: object
      description: |
        A typed, validated query plan (not free-form SQL). For prebuilt reports, filters
        parameterize the plan; for ad-hoc, the object/group_by/aggregates compile to a plan.
        **Field vocabulary:** every key in `filters`, every entry in `group_by`, and every
        `aggregates[].field` MUST be a field in the target report's declared vocabulary
        (the per-report allowed dimension/measure list in data-model.md §13 / contract README).
        An out-of-vocabulary field returns `422 code: report_field_not_allowed`. `additionalProperties`
        is open only to admit *values*, never to admit arbitrary SQL identifiers.
        **`/reports/{report}` path param:** a value matching the UUID format resolves to a saved
        report; any other value resolves against the prebuilt-report key catalog (README "Prebuilt
        reports"). A prebuilt key is never a UUID, so there is no collision.
      properties:
        filters:
          type: object
          additionalProperties: true
          description: Typed predicates (period, status, owner, ...) — keys must be in the report vocabulary.
        group_by:
          type: array
          items: { type: string }
        aggregates:
          type: array
          items:
            type: object
            required: [fn]
            properties:
              fn: { type: string, enum: [count, count_distinct, sum, avg, min, max] }
              field: { type: [string, 'null'] }
              as: { type: [string, 'null'] }
        as_of_date: { type: [string, 'null'], format: date, description: Snapshot / historical reporting via deal_stage_history. }

    ReportResult:
      type: object
      required: [report, plan, columns, rows]
      properties:
        report: { type: string }
        plan:
          type: object
          additionalProperties: true
          description: The validated query plan that was executed (shown before/after run).
        columns:
          type: array
          items: { type: string }
        rows:
          type: array
          items: { type: object, additionalProperties: true }
          description: Aggregate rows; each carries its own `derivation_url` handle for the exact cell (group keys bound to the row's values).
        total_rows: { type: integer }
        generated_at: { type: string, format: date-time }
        derivation_url:
          type: [string, 'null']
          description: Handle for "Explain This Number" drill-through to source rows (`GET /reports/{report}/derivation`); the result-level handle explains the whole filtered set, each row's handle the single cell.

    ReportDerivation:
      type: object
      description: |
        The "Explain This Number" resolution (features/03 §1.3): a plain-language definition of
        the exact filter+group+aggregate plus the underlying source rows, which reconcile
        exactly to the explained aggregate (AC-X1).
      required: [report, definition, plan, columns, rows]
      properties:
        report: { type: string }
        definition:
          type: string
          description: Plain-language reading of the exact filter + group + aggregate that produced the number.
        plan:
          type: object
          additionalProperties: true
          description: The validated predicate/group/aggregate set that was resolved.
        columns:
          type: array
          items: { type: string }
        rows:
          type: array
          items: { type: object, additionalProperties: true }
          description: The underlying source rows (drill-through), row-scoped exactly like the report.
        aggregates:
          type: object
          additionalProperties: true
          description: The requested aggregates recomputed over exactly these source rows — equals the explained cell.
        total_rows: { type: integer, description: Source rows matched (rows is capped at the report row limit). }
        generated_at: { type: string, format: date-time }

    # ---- Search ----
    SearchResult:
      type: object
      required: [type, id]
      properties:
        type: { type: string, enum: [person, organization, deal, activity, lead] }
        id: { type: string, format: uuid }
        title: { type: [string, 'null'], description: Display label (name/subject). }
        snippet: { type: [string, 'null'] }
        score: { type: [number, 'null'], description: Relevance score. }
        trust_tier:
          type: [string, 'null']
          enum: [authoritative, external, unverified, null]
          description: >
            Provenance tier of the underlying record. In native mode every stored record is
            `authoritative`; `external`/`unverified` are reserved for overlay/connector-sourced rows
            (not emitted until overlay adapters land). Never guessed — null when unknown.

    SearchResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/SearchResult' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    ContextEntityRef:
      type: object
      required: [type, id]
      properties:
        type: { type: string, enum: [person, organization, deal, lead, activity] }
        id:   { type: string, format: uuid }
    ContextEvidence:
      type: object
      required: [snippet, source]
      properties:
        snippet: { type: string }
        source:  { type: string, description: Provenance ref, e.g. "activity:018f…". }
    ContextItem:
      type: object
      required: [ref]
      properties:
        ref:      { $ref: '#/components/schemas/ContextEntityRef' }
        summary:  { type: [string, 'null'] }
        evidence: { type: array, items: { $ref: '#/components/schemas/ContextEvidence' } }
    ContextSection:
      type: object
      required: [name, items]
      properties:
        name:  { type: string }
        items: { type: array, items: { $ref: '#/components/schemas/ContextItem' } }
    ContextResponse:
      type: object
      required: [anchor, sections]
      properties:
        anchor:   { $ref: '#/components/schemas/ContextEntityRef' }
        sections: { type: array, items: { $ref: '#/components/schemas/ContextSection' } }

    # ---- Agents: governed tool surface ----
    AgentTool:
      type: object
      required: [name, tier, egress]
      properties:
        name:  { type: string, description: The tool name (tools/list identity). }
        required_scope: { type: string, description: Passport scope required to call it. }
        tier:  { type: string, enum: [green, yellow, dynamic] }
        egress: { type: boolean, description: True if the tool reaches outside the workspace. }
    AgentToolListResponse:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/AgentTool' } }

    # ---- Connectors: IMAP one-shot capture ----
    ImapConnectRequest:
      type: object
      required: [host, email, password]
      properties:
        host: { type: string, minLength: 1, description: IMAP server hostname (e.g. imap.gmail.com). }
        port: { type: integer, minimum: 1, maximum: 65535, default: 993, description: IMAPS port; defaults to 993. }
        email: { type: string, format: email, description: Mailbox login / address. }
        password: { type: string, minLength: 1, description: Mailbox password (used for this call only — never stored, never logged). }
        mailbox: { type: string, default: INBOX, description: Folder to pull from; defaults to INBOX. }
        max_messages: { type: integer, minimum: 1, maximum: 200, default: 50, description: Most-recent messages to pull; capped at 200. }

    ImapConnectResult:
      type: object
      description: The outcome of a one-shot IMAP pull.
      required: [connected, mailbox, captured, skipped, contacts]
      properties:
        connected: { type: boolean, description: True when the mailbox was reached and read. }
        mailbox: { type: string, description: The folder that was pulled. }
        captured: { type: integer, description: Messages that landed as email activities. }
        skipped: { type: integer, description: Messages intentionally dropped (automated/system mail, unparseable). }
        contacts: { type: integer, description: Distinct counterparties seen across the captured messages. }

    # ---- AI: cold-start ----
    ColdStartRequest:
      type: object
      description: |
        EXACTLY ONE input source (B-E01.2b/.13): `url` (fetch+parse a website, ADR-0006), `text` (the
        manual paste-text fallback — a robots-disallowed / unreadable site degrades to "paste the text",
        never an error wall), or `self_description` (the user's own dictated/typed description of their
        ICP — B-E01.13 speech input). Provide one; supplying more than one is `422`.
      oneOf:
        - { required: [url] }
        - { required: [text] }
        - { required: [self_description] }
      properties:
        url: { type: [string, 'null'], format: uri, description: Company website URL to read back. }
        text: { type: [string, 'null'], description: 'Pasted page/company text (the paste-text fallback when a URL is unfetchable). Treated as T2 untrusted; extraction cites text offsets, not a URL.' }
        self_description: { type: [string, 'null'], description: 'The user''s own words describing their business/ICP (typed or dictated). Grounded in the user''s own statement — source_kind=self_description; still 🟡-staged, never auto-written.' }

    ColdStartField:
      type: object
      description: |
        One read-back field. EVERY field carries a non-empty `evidence_snippet` + `confidence`, or it is
        omitted (the no-guess gate). `source_kind` says where the evidence lives; `source_url` is present
        ONLY for `source_kind=url` (nullable otherwise — text/self-description evidence has no URL).
      required: [field, value, evidence_snippet, source_kind, confidence]
      properties:
        field: { type: string, enum: [display_name, offer_summary, icp, value_proposition, usp, customer_pains, desired_outcomes, buying_center, buying_intents, common_objections, sales_motion, legal_name, registered_address, register_vat, industry, history] }
        value: { type: string }
        evidence_snippet: { type: string, minLength: 1, description: 'Verbatim source text (from the page, the pasted text, or the user''s own words) — non-empty or the field is absent.' }
        source_kind: { type: string, enum: [url, text, self_description], description: 'Where evidence_snippet came from. For self_description the "evidence" is the user''s own statement — a self-declared ICP is grounded in that statement (B-E01.13), not fabricated.' }
        source_url: { type: [string, 'null'], format: uri, description: 'Present only when source_kind=url; null for text/self_description.' }
        evidence_offset: { type: [integer, 'null'], description: 'Optional char offset of evidence_snippet within the pasted text (source_kind=text), for highlight-back; null for url/self_description.' }
        confidence: { type: number, minimum: 0, maximum: 1 }

    ColdStartProposal:
      type: object
      description: A staged proposal. NOTHING is written to real records until accepted via /approvals.
      required: [proposal_id, source_kind, status, fields]
      properties:
        proposal_id: { type: string, format: uuid }
        source_kind: { type: string, enum: [url, text, self_description], description: The input source this proposal was read from. }
        source_url: { type: [string, 'null'], format: uri, description: 'The company URL when source_kind=url; null for text/self_description.' }
        status: { type: string, enum: [staged], description: Always staged — accept via the approval inbox. }
        fields:
          type: array
          items: { $ref: '#/components/schemas/ColdStartField' }
        created_at: { type: string, format: date-time }

    ColdStartReadback:
      type: object
      description: |
        An un-staged read-back: the evidenced fields only, for a human to check in the company form.
        There is no proposal_id because there is no proposal — nothing was written or queued.
      required: [fields]
      properties:
        fields:
          type: array
          items: { $ref: '#/components/schemas/ColdStartField' }

    OnboardingCompanyDraft:
      type: object
      additionalProperties: false
      description: |
        Partial human-editable company input retained while the wizard is unfinished. Every field
        is optional here because this is not confirmed company truth; confirmation uses the stricter
        CompanyProfileInput or ConfirmCompanySiteReadRequest contract.
      properties:
        display_name: { type: [string, 'null'] }
        offer_summary: { type: [string, 'null'] }
        icp: { type: [string, 'null'] }
        value_proposition: { type: [string, 'null'] }
        usp: { type: [string, 'null'] }
        customer_pains: { type: [string, 'null'] }
        desired_outcomes: { type: [string, 'null'] }
        buying_center: { type: [string, 'null'] }
        buying_intents: { type: [string, 'null'] }
        common_objections: { type: [string, 'null'] }
        sales_motion: { type: [string, 'null'] }
        legal_name: { type: [string, 'null'] }
        registered_address: { type: [string, 'null'] }
        register_vat: { type: [string, 'null'] }
        industry: { type: [string, 'null'] }
        history: { type: [string, 'null'] }

    PutOnboardingStateRequest:
      type: object
      additionalProperties: false
      required: [expected_version, step, source_mode, company_draft, selected_fact_keys, voice_skipped, connect_skipped]
      properties:
        expected_version: { type: integer, minimum: 0, description: Zero creates; otherwise the version last read. }
        step: { type: string, enum: [read, confirm, voice, results, connect, complete] }
        source_mode: { type: [string, 'null'], enum: [website, manual, null] }
        website_url: { type: [string, 'null'], format: uri }
        site_read_id: { type: [string, 'null'], format: uuid }
        company_draft: { $ref: '#/components/schemas/OnboardingCompanyDraft' }
        selected_fact_keys:
          type: array
          uniqueItems: true
          items: { type: string }
        voice_skipped: { type: boolean }
        connect_skipped: { type: boolean }

    OnboardingState:
      type: object
      required: [path, step, source_mode, company_draft, selected_fact_keys, voice_skipped, connect_skipped, version, created_at, updated_at]
      properties:
        path: { type: string, enum: [creator, member], readOnly: true }
        step: { type: string, enum: [read, confirm, voice, results, connect, complete] }
        source_mode: { type: [string, 'null'], enum: [website, manual, null] }
        website_url: { type: [string, 'null'], format: uri }
        site_read_id: { type: [string, 'null'], format: uuid }
        company_draft: { $ref: '#/components/schemas/OnboardingCompanyDraft' }
        selected_fact_keys:
          type: array
          uniqueItems: true
          items: { type: string }
        voice_skipped: { type: boolean }
        connect_skipped: { type: boolean }
        version: { type: integer, minimum: 1, readOnly: true }
        completed_at: { type: [string, 'null'], format: date-time, readOnly: true }
        created_at: { type: string, format: date-time, readOnly: true }
        updated_at: { type: string, format: date-time, readOnly: true }

    CompanyProfile:
      type: object
      description: |
        The installation's own company. The flat properties remain compatibility aliases for the
        existing form; `fields` and `facts` are the provenance-bearing source records used by new
        clients and by CompanyContext. New onboarding considers the profile minimum-complete when
        display_name, offer_summary and icp are confirmed. Existing installations may remain
        incomplete until their next edit; reads never fabricate the missing values.
      required: [organization_id, display_name]
      properties:
        organization_id: { type: string, format: uuid, description: The anchor organization this profile belongs to. }
        display_name: { type: string, minLength: 1, description: What the company is called day to day. }
        website: { type: [string, 'null'], description: 'The company''s own domain (acme.com) — stored as its primary domain, the same handle a read-back resolves organizations by. A full URL is accepted on write and reduced to its domain.' }
        legal_name: { type: [string, 'null'], description: The registered legal entity, when it differs from display_name. }
        registered_address: { type: [string, 'null'], description: The registered address as one formatted line. }
        register_vat: { type: [string, 'null'], description: 'VAT ID / commercial register entry (e.g. DE123456789, HRB 12345 B).' }
        industry: { type: [string, 'null'] }
        offer_summary: { type: [string, 'null'], description: Plain-language summary of what the company sells or delivers. }
        icp: { type: [string, 'null'], description: Ideal customer profile — who this company sells to. }
        value_proposition: { type: [string, 'null'] }
        usp: { type: [string, 'null'] }
        customer_pains: { type: [string, 'null'] }
        desired_outcomes: { type: [string, 'null'] }
        buying_center: { type: [string, 'null'], description: The roles that decide on a purchase. }
        buying_intents: { type: [string, 'null'] }
        common_objections: { type: [string, 'null'] }
        sales_motion: { type: [string, 'null'] }
        history: { type: [string, 'null'], description: Company background. }
        fields:
          type: array
          items: { $ref: '#/components/schemas/CompanyProfileField' }
        facts:
          type: array
          items: { $ref: '#/components/schemas/OrganizationFact' }
        minimum_complete: { type: boolean, description: True when display_name, offer_summary and icp are confirmed. }
        updated_at: { type: string, format: date-time }

    CompanyProfileInput:
      type: object
      description: |
        The company form's body. New onboarding requires the semantic minimum: display_name,
        offer_summary and icp. The OpenAPI wire keeps only display_name structurally required so clients
        can be upgraded independently: clients that submit the former five-field legal identity block
        still succeed, while the current UI and server-created onboarding flow enforce the semantic
        minimum. Legal/registration fields are optional until a feature with a real
        jurisdictional or invoicing need asks for them. An omitted optional field is unchanged and one
        sent empty is cleared.
      required: [display_name]
      properties:
        display_name: { type: string, minLength: 1 }
        legal_name: { type: [string, 'null'], description: The registered legal entity. }
        registered_address: { type: [string, 'null'], description: The registered address as one formatted line. }
        register_vat: { type: [string, 'null'], description: 'VAT ID / commercial register entry (e.g. DE123456789, HRB 12345 B).' }
        industry: { type: [string, 'null'] }
        website: { type: [string, 'null'], description: 'The company''s own domain or full URL; stored as the bare domain.' }
        offer_summary: { type: [string, 'null'] }
        icp: { type: [string, 'null'] }
        value_proposition: { type: [string, 'null'] }
        usp: { type: [string, 'null'] }
        customer_pains: { type: [string, 'null'] }
        desired_outcomes: { type: [string, 'null'] }
        buying_center: { type: [string, 'null'] }
        buying_intents: { type: [string, 'null'] }
        common_objections: { type: [string, 'null'] }
        sales_motion: { type: [string, 'null'] }
        history: { type: [string, 'null'] }

    CompanyProfileField:
      type: object
      required: [field, value, source, captured_by, updated_at]
      properties:
        field: { type: string, enum: [display_name, offer_summary, icp, value_proposition, usp, customer_pains, desired_outcomes, buying_center, buying_intents, common_objections, sales_motion, legal_name, registered_address, register_vat, industry, history] }
        value: { type: string }
        source: { type: string, enum: [human, site_read, connector, migration] }
        captured_by: { type: string, readOnly: true }
        evidence_snippet: { type: [string, 'null'] }
        source_url: { type: [string, 'null'], format: uri }
        confidence: { type: [number, 'null'], minimum: 0, maximum: 1 }
        updated_at: { type: string, format: date-time }

    OrganizationFact:
      type: object
      required: [category, field, value, value_key, source, captured_by, updated_at]
      properties:
        category: { type: string, enum: [company, offering, market, signal] }
        field: { type: string, enum: [founded_year, employee_range, phone, contact_email, location, service, product, capability, served_industry, company_size, geography, language, certification, partner, named_customer, technology, quantified_outcome] }
        value: { type: string }
        value_key: { type: string }
        source: { type: string, enum: [human, site_read, connector, migration] }
        captured_by: { type: string, readOnly: true }
        evidence_snippet: { type: [string, 'null'] }
        source_url: { type: [string, 'null'], format: uri }
        confidence: { type: [number, 'null'], minimum: 0, maximum: 1 }
        updated_at: { type: string, format: date-time }

    CompanyContextItem:
      type: object
      required: [key, value, source, captured_by]
      properties:
        key: { type: string }
        value: { type: string }
        source: { type: string, enum: [human, site_read, connector, migration] }
        captured_by: { type: string, readOnly: true }
        source_url: { type: [string, 'null'], format: uri }
        confidence: { type: [number, 'null'], minimum: 0, maximum: 1 }

    CompanyContextScope:
      type: object
      required: [scope, items]
      properties:
        scope: { type: string, enum: [identity, positioning, sales, offer, market, proof, administrative] }
        items:
          type: array
          items: { $ref: '#/components/schemas/CompanyContextItem' }

    CompanyContext:
      type: object
      required: [organization_id, schema_version, scopes, fingerprint, generated_at]
      properties:
        organization_id: { type: string, format: uuid }
        schema_version: { type: integer, enum: [1] }
        scopes:
          type: array
          items: { $ref: '#/components/schemas/CompanyContextScope' }
        fingerprint: { type: string, description: Deterministic SHA-256 digest of the selected confirmed values and accepted facts. }
        generated_at: { type: string, format: date-time }

    CompanyContextCapabilities:
      type: object
      required: [rollout, read_enabled, tasks_enabled, onboarding_enabled]
      properties:
        rollout: { type: string, enum: [off, read, tasks, onboarding] }
        read_enabled: { type: boolean }
        tasks_enabled: { type: boolean }
        onboarding_enabled: { type: boolean }

    StartCompanySiteReadRequest:
      type: object
      required: [url]
      properties:
        url: { type: string, format: uri, description: Public company website to read. }

    CompanySiteReadPage:
      type: object
      required: [url, status]
      properties:
        url: { type: string, format: uri }
        status: { type: string, enum: [fetched, skipped, failed] }
        kind: { type: [string, 'null'], enum: [home, impressum, about, team, services, products, contact, other] }
        reason: { type: [string, 'null'], description: Stable human-readable reason when skipped or failed. }

    CompanySiteReadFact:
      type: object
      required: [category, field, value, value_key, evidence_snippet, evidence_url, confidence]
      properties:
        category: { type: string, enum: [company, offering, market, signal] }
        field: { type: string, enum: [founded_year, employee_range, phone, contact_email, location, service, product, capability, served_industry, company_size, geography, language, certification, partner, named_customer, technology, quantified_outcome] }
        value: { type: string }
        value_key: { type: string }
        evidence_snippet: { type: string, minLength: 1 }
        evidence_url: { type: string, format: uri }
        confidence: { type: number, minimum: 0, maximum: 1 }

    CompanySiteReadComparison:
      type: object
      required: [key, value_kind, classification, current_value, current_source, proposed_value]
      properties:
        key: { type: string, description: Stable profile-field key or fact selection key. }
        value_kind: { type: string, enum: [profile_field, fact] }
        classification: { type: string, enum: [new, machine_change, human_conflict, unchanged] }
        current_value: { type: [string, 'null'] }
        current_source: { type: [string, 'null'], enum: [human, site_read, connector, migration, null] }
        proposed_value: { type: string }

    CompanySiteReadResolution:
      type: object
      required: [key, action]
      properties:
        key: { type: string }
        action: { type: string, enum: [keep_current, accept_proposal, use_value] }
        value:
          type: [string, 'null']
          description: Required and non-blank only for use_value; forbidden for other actions.

    CompanySiteReadPerson:
      type: object
      required: [name, role, evidence_snippet, evidence_url]
      properties:
        name: { type: string }
        role: { type: string }
        published_email: { type: [string, 'null'], format: email }
        linkedin_url: { type: [string, 'null'], format: uri }
        evidence_snippet: { type: string, minLength: 1 }
        evidence_url: { type: string, format: uri }
        disposition: { type: string, enum: [separate_lead_proposal], description: People never enter company context or contact records through company confirmation. }

    CompanySiteRead:
      type: object
      required: [id, target_kind, root_url, status, status_code, status_detail, next_attempt_at, pages, profile_fields, facts, comparisons, people, warnings, draft_version, proposal_hash, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        target_kind: { type: string, enum: [onboarding] }
        organization_id: { type: [string, 'null'], format: uuid }
        root_url: { type: string, format: uri }
        status: { type: string, enum: [queued, deferred, reading, ready, partial, failed, confirmed, abandoned] }
        status_code: { type: [string, 'null'], enum: [null, budget_deferred] }
        status_detail: { type: [string, 'null'], description: Safe guidance only; never provider payload, prompt, SQL, or stack data. }
        next_attempt_at: { type: [string, 'null'], format: date-time }
        phase: { type: [string, 'null'], enum: [crawling, extracting] }
        pages_read: { type: integer, minimum: 0 }
        pages:
          type: array
          items: { $ref: '#/components/schemas/CompanySiteReadPage' }
        profile_fields:
          type: array
          items: { $ref: '#/components/schemas/ColdStartField' }
        facts:
          type: array
          items: { $ref: '#/components/schemas/CompanySiteReadFact' }
        comparisons:
          type: array
          description: Version-bound comparison against current confirmed company truth.
          items: { $ref: '#/components/schemas/CompanySiteReadComparison' }
        people:
          type: array
          items: { $ref: '#/components/schemas/CompanySiteReadPerson' }
        warnings:
          type: array
          items: { type: string }
        draft_version: { type: integer, minimum: 1 }
        proposal_hash: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ConfirmCompanySiteReadRequest:
      type: object
      required: [draft_version, proposal_hash, profile, selected_fact_keys]
      properties:
        draft_version: { type: integer, minimum: 1 }
        proposal_hash: { type: string }
        profile: { $ref: '#/components/schemas/CompanyProfileInput' }
        selected_fact_keys:
          type: array
          uniqueItems: true
          items: { type: string }
        resolutions:
          type: array
          description: Exactly one keyed resolution for every human_conflict comparison. Omitted is equivalent to an empty array for existing clients and succeeds only when no human conflict exists.
          items: { $ref: '#/components/schemas/CompanySiteReadResolution' }

    EnrichCompanyRequest:
      type: object
      description: Optional override. With no body the org's own domain is read.
      properties:
        url: { type: string, format: uri, description: Company URL to read instead of the org's domain. }

    SiteReadStarted:
      type: object
      description: The 202 handle for a queued deep read.
      required: [read_id, status]
      properties:
        read_id: { type: string, format: uuid }
        status: { type: string, enum: [queued, deferred, running], description: 'The joined dossier state when a read is already in flight.' }

    SiteReadPage:
      type: object
      description: One page the crawl fetched.
      required: [url, kind]
      properties:
        url: { type: string, format: uri }
        kind: { type: string, enum: [home, impressum, about, team, services, products, contact, other] }

    SiteReadSkip:
      type: object
      description: One page the crawl deliberately did NOT read — honest degradation is reportable.
      required: [url, reason]
      properties:
        url: { type: string, format: uri }
        reason:
          type: string
          enum: [robots, off_domain, page_cap, byte_cap, unreadable]
          x-enum-varnames: [SiteReadSkipReasonRobots, SiteReadSkipReasonOffDomain, SiteReadSkipReasonPageCap, SiteReadSkipReasonByteCap, SiteReadSkipReasonUnreadable]

    SiteReadReport:
      type: object
      description: |
        One deep read's full account: what was read, what was skipped and why, whether the crawl ended
        early (`partial` + `stopped_reason`), and the 🟡 proposals the findings staged. The report is
        the transparency surface — a crawl that silently dropped pages would read as "covered
        everything" when it did not.
      required: [read_id, organization_id, seed_url, status, status_code, status_detail, next_attempt_at, pages, skipped, proposal_ids, created_at]
      properties:
        read_id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        seed_url: { type: string, format: uri }
        status: { type: string, enum: [queued, deferred, running, done, partial, failed] }
        status_code: { type: [string, 'null'], enum: [null, budget_deferred] }
        status_detail: { type: [string, 'null'], description: Safe guidance only; never provider payload, prompt, SQL, or stack data. }
        next_attempt_at: { type: [string, 'null'], format: date-time }
        pages:
          type: array
          items: { $ref: '#/components/schemas/SiteReadPage' }
        skipped:
          type: array
          items: { $ref: '#/components/schemas/SiteReadSkip' }
        stopped_reason: { type: [string, 'null'], enum: [budget, page_cap, byte_cap, deadline, null], description: 'Why the crawl ended early; null when it exhausted discovery.' }
        fact_count: { type: integer, description: Evidenced fields staged in the deepread proposal. }
        phase: { type: [string, 'null'], enum: [crawling, extracting, null], description: 'Live position while status is running; null once terminal.' }
        pages_read: { type: integer, description: 'Pages committed so far — live progress while running, final count once terminal.' }
        proposal_ids:
          type: array
          items: { type: string, format: uuid }
          description: 'The staged 🟡 approvals this read produced (the deepread bundle first, then one per site_lead).'
        created_at: { type: string, format: date-time }
        finished_at: { type: [string, 'null'], format: date-time }

    EnrichmentProposal:
      type: object
      description: A staged enrichment of one organization. Field shape is the read-back's (evidence-or-omit); NOTHING is written until accepted via /approvals, which fills only the org's empty fields.
      required: [proposal_id, organization_id, source_url, status, fields]
      properties:
        proposal_id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid, description: The org this proposal enriches — the accept executor writes only here. }
        source_url: { type: string, format: uri }
        status: { type: string, enum: [staged], description: Always staged — accept via the approval inbox. }
        fields:
          type: array
          items: { $ref: '#/components/schemas/ColdStartField' }
        created_at: { type: string, format: date-time }

    # ---- Approvals ----
    Approval:
      type: object
      description: A staged 🟡 confirm-first action awaiting human decision.
      required: [id, workspace_id, kind, status, proposed_by, created_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        kind: { type: string, description: 'coldstart | send_email | advance_deal | promote_lead | overnight | transcript_proposal.' }
        status: { type: string, enum: [pending, approved, rejected, expired] }
        proposal_id: { type: [string, 'null'], format: uuid, description: 'For kind=coldstart, the ColdStartProposal this approval accepts (links the staged proposal to its approval item).' }
        proposed_by: { type: string, description: 'agent:<id> / connector:<n> that staged this.' }
        on_behalf_of: { type: [string, 'null'], format: uuid }
        expires_at: { type: [string, 'null'], format: date-time, description: 'When the staged action expires unactioned (mirrors approval.requested.expires_at). After this it auto-transitions to status=expired and cannot be approved.' }
        target_entity_type: { type: [string, 'null'], description: Entity the effect mutates (for precondition re-validation). }
        target_entity_id: { type: [string, 'null'], format: uuid }
        target_version: { type: [integer, 'null'], description: 'The `version` of the target row when the diff was staged. On approve-execute the server RE-READS the row; if its current version ≠ target_version the execution is rejected with 409 ErrVersionSkew (the world changed since the human last saw the diff — re-stage). This closes the stage→approval race (ADR-0036).' }
        diff_hash: { type: [string, 'null'], description: 'Hash of the staged proposed_change; the minted approval_token is bound to this hash so a token cannot authorize a different effect.' }
        summary: { type: [string, 'null'], description: One-line description of the proposed change. }
        proposed_change:
          type: object
          additionalProperties: true
          description: The staged diff/payload that will execute on approve.
        evidence:
          type: array
          description: Per-claim evidence (snippet + source id) backing the proposal.
          items:
            type: object
            properties:
              evidence_snippet: { type: string }
              source_type: { type: [string, 'null'], enum: [activity, deal, signal, relationship, page, null] }
              source_id: { type: [string, 'null'], format: uuid }
        confidence: { type: [number, 'null'], minimum: 0, maximum: 1 }
        result_entity_type: { type: [string, 'null'] }
        result_entity_id: { type: [string, 'null'], format: uuid }
        approval_token: { type: [string, 'null'], description: 'Signed single-use token minted on approve (schema ApprovalToken, serialized as compact JWS); authorizes exactly the downstream 🟡 operation it is bound to.' }
        decided_by: { type: [string, 'null'], format: uuid }
        decided_at: { type: [string, 'null'], format: date-time }
        created_at: { type: string, format: date-time }

    ApproveRequest:
      type: object
      description: |
        Approve a staged 🟡 action. **Who may approve:** the principal must hold the RBAC required
        to perform the action on the target (≥ the on_behalf_of human's authority for that effect);
        a lower-privilege user cannot approve an action they could not themselves perform. **Edit
        path:** if `edited_payload` is supplied, the edited effect RE-ENTERS the admission gate from
        scratch (re-tiered, re-RBAC-checked, new diff_hash) before a token is minted — an edit can
        never escalate a 🟢 staged note into an external send without re-gating (ADR-0036).
      properties:
        edited_payload:
          type: object
          additionalProperties: true
          description: Optional edits — the edited payload is re-admitted, then it executes (edit-then-send).

    ApprovalListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Approval' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    # ---- Optimistic concurrency ----
    RowVersion:
      type: integer
      format: int64
      readOnly: true
      minimum: 1
      description: |
        Monotonic row version, incremented by the server on every mutation (data-model §1.3a).
        Echoed back as the `version` field on every mutable entity. To make a write conditional,
        send the last-seen value in `If-Match`; a mismatch returns `409 code: version_skew`
        (ErrVersionSkew) so the client re-reads before retrying. Applies to the native SoR path,
        not only overlay mode.

    # ---- Approval token (ADR-0036) ----
    ApprovalToken:
      type: object
      description: |
        The claims carried by the signed `X-Approval-Token` (serialized as a compact JWS; the wire
        value is the string). It is single-use and bound to one effect — it is NOT a bare opaque
        string. The server verifies the signature, that `jti` has not been consumed, that `exp` is
        in the future, and that `workspace_id`/`passport_id`/`tool`/`diff_hash` match the operation
        being executed; any mismatch → `403 code: approval_token_invalid`.
      required: [jti, approval_id, workspace_id, tool, diff_hash, exp, single_use]
      properties:
        jti: { type: string, description: Unique token id; recorded as consumed on first use (replay → 403). }
        approval_id: { type: string, format: uuid, description: The Approval this token authorizes. }
        workspace_id: { type: string, format: uuid }
        passport_id: { type: [string, 'null'], format: uuid, description: Agent Seat Passport the token was minted for; null for a human-minted token. }
        on_behalf_of: { type: [string, 'null'], format: uuid }
        tool: { type: string, description: 'The exact 🟡 operation authorized (e.g. send_email, advance_deal). A token for one tool cannot authorize another.' }
        diff_hash: { type: string, description: Hash of the approved effect; binds the token to that specific staged change. }
        target_version: { type: [integer, 'null'], description: Row version the diff was staged against; re-checked at execute (see Approval.target_version). }
        exp: { type: string, format: date-time, description: Expiry (short TTL — minutes, not hours). }
        single_use: { type: boolean, default: true }

    # ---- Partner (A41/ADR-0032) ----
    Partner:
      type: object
      description: |
        First-class partner state as a 1:1 extension of an organization (an org IS a partner iff it
        has a `partner` row + classification='partner'). Company identity is never duplicated.
        A68/ADR-0053 adds the relationship-in-flight layer: lifecycle stage, relationship health,
        partner fit, next step, and served segments. Behavior is Fast-follow, but the V1 schema is
        forward-compatible.
      required: [organization_id, cert_status, created_at, updated_at]   # partner_role is nullable (data-model §4.3)
      properties:
        organization_id: { type: string, format: uuid, description: The org this partner record extends (PK = FK). }
        partner_role: { type: string, enum: [hosting, consulting, strategic], description: Functional role (A44/ADR-0034); implementation + dev are Gradion's turf. }
        cert_status: { type: string, enum: [applied, certified, suspended] }   # data-model §4.3 CHECK
        margin_tier: { type: [string, 'null'], enum: [null, tier1_15, tier2_20, tier3_25], description: Scenario-C margin tier (business/14-partner-program.md; data-model §4.3 CHECK). }
        gate_metrics: { type: [object, 'null'], additionalProperties: true, description: Program gate metrics (certified seats, CSAT, ...). }
        relationship_stage: { type: string, enum: [research, identified, contacted, in_conversation, fit_confirmed, agreement_pending, active, active_referring, dormant, no_fit], default: research }
        partner_fit_score: { type: [integer, 'null'], minimum: 0, maximum: 100, description: 'Current partner-fit score; if partner_fit_override_reason is non-null this is the Commercial Judgement value.' }
        partner_fit_score_computed: { type: [integer, 'null'], minimum: 0, maximum: 100, readOnly: true, description: 'Retained machine-computed partner-fit value while a Commercial Judgement override is in force.' }
        partner_fit_override_reason: { type: [string, 'null'], readOnly: true, description: 'Non-null ⇒ partner_fit_score is a human Commercial Judgement override and recompute is suppressed until cleared.' }
        relationship_health: { type: [string, 'null'], description: 'Decimal-as-string 0..1 derived by formulas §16; basis for 30/60/90 partner dormancy flags.' }
        last_contact_at: { type: [string, 'null'], format: date-time }
        next_step: { type: [string, 'null'] }
        next_step_due_at: { type: [string, 'null'], format: date }
        served_segments: { type: [array, 'null'], items: { type: string } }
        version: { $ref: '#/components/schemas/RowVersion' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    UpsertPartnerRequest:
      type: object
      required: [partner_role]
      properties:
        partner_role: { type: string, enum: [hosting, consulting, strategic] }
        cert_status: { type: string, enum: [applied, certified, suspended] }   # data-model §4.3 CHECK
        margin_tier: { type: [string, 'null'], enum: [null, tier1_15, tier2_20, tier3_25] }
        gate_metrics: { type: [object, 'null'], additionalProperties: true }
        relationship_stage: { type: string, enum: [research, identified, contacted, in_conversation, fit_confirmed, agreement_pending, active, active_referring, dormant, no_fit] }
        next_step: { type: [string, 'null'] }
        next_step_due_at: { type: [string, 'null'], format: date }
        served_segments: { type: [array, 'null'], items: { type: string } }

    # ---- Per-purpose consent (A22/ADR-0011) ----
    ConsentPurpose:
      type: object
      required: [id, workspace_id, key, label, created_at]
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        key: { type: string, description: 'Stable machine key (e.g. transactional, marketing_email, profiling). Referenced by send_email.consent_purpose.' }
        label: { type: string }
        requires_double_opt_in: { type: boolean, default: false, description: 'When true, a grant is only effective after a confirmed DOI event (German email norm).' }
        created_at: { type: string, format: date-time }

    CreateConsentPurposeRequest:
      type: object
      required: [key, label]
      properties:
        key: { type: string }
        label: { type: string }
        requires_double_opt_in: { type: boolean, default: false }

    PersonConsentState:
      type: object
      description: A person's current consent for one purpose.
      required: [purpose_id, state]
      properties:
        purpose_id: { type: string, format: uuid }
        purpose_key: { type: [string, 'null'] }
        state: { type: string, enum: [unknown, granted, withdrawn] }
        lawful_basis: { type: [string, 'null'] }
        double_opt_in_confirmed_at: { type: [string, 'null'], format: date-time }
        updated_at: { type: [string, 'null'], format: date-time }

    ConsentEvent:
      type: object
      description: An append-only proof row (Art. 7 demonstrability). Never updated or deleted.
      required: [id, purpose_id, new_state, occurred_at]
      properties:
        id: { type: string, format: uuid }
        purpose_id: { type: string, format: uuid }
        new_state: { type: string, enum: [granted, withdrawn], description: Proof rows record only transitions to granted/withdrawn (never to unknown). }
        lawful_basis: { type: [string, 'null'] }
        source: { type: [string, 'null'], description: 'How consent was captured (e.g. webform, import, double_opt_in).' }
        actor_type: { type: string, enum: [human, agent, system, connector] }
        actor_id: { type: [string, 'null'] }
        occurred_at: { type: string, format: date-time }

    RecordConsentRequest:
      type: object
      required: [purpose_id, new_state]
      properties:
        purpose_id: { type: string, format: uuid }
        new_state: { type: string, enum: [granted, withdrawn] }
        lawful_basis: { type: [string, 'null'] }
        source: { type: [string, 'null'] }
        double_opt_in_token: { type: [string, 'null'], description: Required to make a grant effective when the purpose has requires_double_opt_in=true. }

    RecordGrant:
      type: object
      description: A manual per-record share (A52/ADR-0039) — widens own/team/all base scope for one record.
      required: [id, record_type, record_id, subject_type, subject_id, access, granted_by, created_at]
      properties:
        id: { type: string, format: uuid }
        record_type: { type: string, enum: [deal, person, organization, lead] }
        record_id: { type: string, format: uuid }
        subject_type: { type: string, enum: [user, team] }
        subject_id: { type: string, format: uuid, description: 'app_user(id) or team(id) per subject_type.' }
        access: { type: string, enum: [read, write], description: "'write' also satisfies 'read'." }
        granted_by: { type: string, format: uuid }
        reason: { type: [string, 'null'], description: 'Accountability/lawful-basis note surfaced in the audit row.' }
        expires_at: { type: [string, 'null'], format: date-time, description: 'Optional TTL; an expired grant matches no rows.' }
        created_at: { type: string, format: date-time }
        version: { type: integer, format: int64 }

    CreateRecordGrantRequest:
      type: object
      required: [record_type, record_id, subject_type, subject_id, access]
      properties:
        record_type: { type: string, enum: [deal, person, organization, lead] }
        record_id: { type: string, format: uuid }
        subject_type: { type: string, enum: [user, team] }
        subject_id: { type: string, format: uuid }
        access: { type: string, enum: [read, write] }
        reason: { type: [string, 'null'] }
        expires_at: { type: [string, 'null'], format: date-time }

    UserListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/User' } }
        page: { $ref: '#/components/schemas/PageInfo' }
    TeamListResponse:
      type: object
      required: [data, page]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Team' } }
        page: { $ref: '#/components/schemas/PageInfo' }

    DataSubjectRequest:
      type: object
      description: A GDPR data-subject request (Art. 15/16/17) tracked to completion (B-E11.30; data-model §12.5).
      required: [id, kind, subject_ref, status, due_at, created_at]
      properties:
        id: { type: string, format: uuid }
        kind: { type: string, enum: [access, rectify, erasure] }
        subject_ref: { type: string, description: 'The data subject — a person id or external identifier.' }
        status: { type: string, enum: [open, in_progress, fulfilled, rejected] }
        due_at: { type: string, format: date-time, description: 'Statutory deadline (e.g. 30 days).' }
        assignee_id: { type: [string, 'null'], format: uuid }
        resolution: { type: [string, 'null'] }
        created_at: { type: string, format: date-time }
        # no `version`/If-Match: data_subject_request has no version column (data-model §12.5) and is a
        # single-assignee human-only workflow record (x-agent-access: human-only) — not optimistically concurrent.

    CreateDataSubjectRequest:
      type: object
      required: [kind, subject_ref, due_at]
      properties:
        kind: { type: string, enum: [access, rectify, erasure] }
        subject_ref: { type: string }
        due_at: { type: string, format: date-time }
        assignee_id: { type: [string, 'null'], format: uuid }

    UpdateDataSubjectRequest:
      type: object
      properties:
        status: { type: string, enum: [open, in_progress, fulfilled, rejected] }
        assignee_id: { type: [string, 'null'], format: uuid }
        resolution: { type: [string, 'null'] }

    CaptureConsent:
      type: object
      description: |
        The consent passthrough every capture surface (booking, public forms, imports) must carry
        (EP07 capture contract, `features/07`; feedback/11 + /14). Names the purpose and the exact
        wording/version shown, so the resulting grant is demonstrable (Art 7(1)).
      required: [purpose_id, policy_version]
      properties:
        purpose_id: { type: string, format: uuid }
        policy_version: { type: string, description: Version id of the consent wording shown to the subject. }
        wording: { type: [string, 'null'], description: The exact wording shown, stored with the consent event for demonstrability. }
        double_opt_in_token: { type: [string, 'null'], description: Present when the surface delivered its own DOI confirmation (issueDoubleOptIn with deliver=false). }

    PreferenceCenter:
      type: object
      description: |
        The buyer-facing preference center's per-purpose view (B-E11.32): each tracked consent purpose
        with the recipient's current state and whether it is locked (transactional cannot be withdrawn
        while a deal is live).
      required: [purposes]
      properties:
        purposes:
          type: array
          items:
            type: object
            required: [key, label, state, locked]
            properties:
              key:    { type: string }
              label:  { type: string }
              state:  { type: string, enum: [unknown, granted, withdrawn] }
              locked: { type: boolean, description: A locked purpose (transactional) cannot be changed from this surface. }

    # ---- Automations (E15/ADR-0035, feedback/14) ----
    AutomationCatalogEntry:
      type: object
      description: An automation *type* in the closed starter library (E15/ADR-0035, feedback/14).
      required: [key, name, trigger, action, params_schema]
      properties:
        key: { type: string, description: 'Stable type key, e.g. stalled_deal_nudge.' }
        name: { type: string }
        description: { type: string }
        trigger: { type: string, description: 'What fires it (e.g. deal.stage_changed or schedule).' }
        action: { type: string, description: 'What it does (e.g. create_task or send_email).' }
        tier: { type: string, enum: [green, yellow], description: 'yellow actions stage to /approvals at run time.' }
        params_schema: { type: object, additionalProperties: true, description: JSON-schema for this type's parameters (drives the editor form). }

    Automation:
      type: object
      description: A configured automation instance (feedback/14).
      required: [id, key, name, status, params, created_at]
      properties:
        id: { type: string, format: uuid }
        key: { type: string, description: The catalog type this instance is built from. }
        name: { type: string }
        status: { type: string, enum: [enabled, paused] }
        params: { type: object, additionalProperties: true }
        version: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: [string, 'null'], format: date-time }

    CreateAutomationRequest:
      type: object
      required: [key, name, params]
      properties:
        key: { type: string }
        name: { type: string }
        params: { type: object, additionalProperties: true }

    UpdateAutomationRequest:
      type: object
      description: Any subset; omit a field to leave it unchanged. `status` flips enable/pause.
      properties:
        name: { type: [string, 'null'] }
        params: { type: [object, 'null'], additionalProperties: true }
        status: { type: [string, 'null'], enum: [enabled, paused, null] }

    AutomationPreviewRequest:
      type: object
      description: |
        Optional body for POST /automations/{id}/preview. Omit to preview the stored automation as-is; supply
        an inline draft recipe (key + params) to preview a not-yet-created or edited automation from the
        designer before saving (A72/ADR-0035 Am.1). Never causes a write or send — preview is a 🟢 read.
      properties:
        key: { type: [string, 'null'], description: Catalog type for a draft preview (defaults to the stored instance's key). }
        params: { type: [object, 'null'], additionalProperties: true, description: Draft parameters (trigger/filter/actions) to preview instead of the stored ones. }
        window_days: { type: [integer, 'null'], minimum: 1, maximum: 90, description: 'Trailing window for the would-have-fired estimate (default 30).' }

    AutomationPreview:
      type: object
      description: Read-only blast-radius result for the designer's dry-run. No side effects.
      required: [matches_now, window_days]
      properties:
        matches_now: { type: integer, description: 'Records matching the trigger+filter right now, bounded by the caller''s Passport visibility.' }
        would_have_fired: { type: [integer, 'null'], description: 'Estimated firings over the trailing window (null when not computable).' }
        window_days: { type: integer, description: 'The trailing window used for would_have_fired.' }
        sample: { type: array, items: { type: string, format: uuid }, description: 'Up to a few matching record ids for the "affects these" preview (visibility-bounded).' }
        excluded_by_permission: { type: integer, description: 'Matches the caller cannot see (masked, not silently dropped) — honest count, never widens scope.' }

    AutomationRun:
      type: object
      description: |
        One firing of an automation, reconstructed from audit_log/automation_run (data-model §12.5). Runs of
        EVERY outcome are first-class — including errored/blocked/skipped — so the designer's run history is
        honest, not success-only (A72/ADR-0035 Am.1). Read-only: produced by the engine, never created via API.
      required: [id, automation_id, occurred_at, outcome, tier]
      properties:
        id: { type: string, format: uuid }
        automation_id: { type: string, format: uuid }
        occurred_at: { type: string, format: date-time, description: 'Maps to automation_run.ran_at.' }
        outcome: { type: string, enum: [fired, failed, blocked, skipped, queued_for_approval], description: 'Maps 1:1 to automation_run.status (data-model §12.5); `blocked` added by A72/ADR-0035 Am.1.' }
        tier: { type: string, enum: [green, yellow], description: 'The tier that fired for this run.' }
        approval_required: { type: boolean }
        trigger_evidence: { type: [string, 'null'], description: 'What matched (e.g. "no activity 14d on deal BÄR Pharma") — the "why did this fire?" line.' }
        target_ref: { type: [string, 'null'], description: 'Record the run acted on (type + id or label).' }
        action_result: { type: [string, 'null'], description: 'What happened (e.g. "created task", "queued to approval inbox").' }
        reason: { type: [string, 'null'], description: 'For failed/blocked/skipped: why (e.g. "provider error", "approval expired", "Passport no longer permits send") — from automation_run.detail.' }
        audit_id: { type: [string, 'null'], description: 'Link into the audit_log row for this run.' }

    # ---- Voice DNA ----
    VoiceProfile:
      type: object
      description: The calling owner's live personal Voice DNA control record and active derived artifact.
      required:
        - id
        - owner_id
        - status
        - maturity
        - quality_band
        - voice_profile_md
        - profile_version
        - personality_md
        - auto_learning_enabled
        - active_source_hash
        - candidate_version
        - last_built_at
        - source
        - captured_by
        - version
        - created_at
        - updated_at
        - archived_at
      properties:
        id: { type: string, format: uuid }
        owner_id: { type: string, format: uuid, readOnly: true }
        status: { type: string, enum: [collecting, ready, stale] }
        maturity: { type: string, enum: [collecting, provisional, building], readOnly: true }
        quality_band: { type: string, enum: [thin, good, rich, sharp], readOnly: true }
        voice_profile_md: { type: string, readOnly: true, description: Active derived Voice DNA artifact; empty while collecting. }
        profile_version: { type: integer, minimum: 0, readOnly: true, description: Zero means no active artifact yet. }
        personality_md: { type: string, description: Owner-authored preferences; model output never overwrites this field. }
        auto_learning_enabled: { type: boolean, default: false, description: Explicit owner opt-in; defaults off. }
        active_source_hash: { type: [string, 'null'], readOnly: true }
        candidate_version: { type: [integer, 'null'], minimum: 1, readOnly: true }
        last_built_at: { type: [string, 'null'], format: date-time, readOnly: true }
        source: { type: string }
        captured_by: { type: string, readOnly: true }
        version: { type: integer, minimum: 1 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    CreateVoiceProfileRequest:
      type: object
      properties:
        personality_md: { type: string, maxLength: 20000, default: '' }

    UpdateVoiceProfileRequest:
      type: object
      minProperties: 1
      properties:
        personality_md: { type: string, maxLength: 20000 }
        auto_learning_enabled: { type: boolean }

    VoiceCorpusSource:
      type: object
      description: Privacy-safe source manifest. Retained source text is deliberately not returned.
      required: [id, origin, kind, register, weight, source_label, source_ref, word_count, included, exclusion_reason, extractor_version, occurred_at, retention_until, content_erased_at, source, captured_by, version, created_at, updated_at, archived_at]
      properties:
        id: { type: string, format: uuid }
