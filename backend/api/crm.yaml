        total_words: { type: integer, minimum: 0 }
        target_words: { type: integer, const: 30000 }
        maturity: { type: string, enum: [collecting, provisional, building] }
        quality_band: { type: string, enum: [thin, good, rich, sharp] }
        source_count: { type: integer, minimum: 0 }
        register_words:
          type: object
