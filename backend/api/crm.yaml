  # =========================================================================

  # ------------------------------ /products ---------------------------------
  # The optional rate-card (B-E03.16, data-model §12.6): reusable priced
  # items an offer line SNAPSHOTS from. Data, not a configurator — no
  # bundles, options or pricing rules (ADR-0037). A workspace may quote
  # fully free-form and never touch this surface.
  /products:
    get:
      tags: [Offers]
      operationId: listProducts
      summary: List rate-card products (live by default; cursor-paginated).
      x-mcp-tool: { verb: search_records, record_type: product, tier: green }
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/IncludeArchived'
        - name: active
          in: query
          schema: { type: boolean }
        - name: q
          in: query
          schema: { type: string }
          description: Case-insensitive name/SKU substring match.
      responses:
        '200':
          description: A page of products.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Offers]
      operationId: createProduct
      summary: Create a rate-card product.
      description: |
        Price is integer minor-units + ISO-4217 currency (P11, no float money). `sku` is
        optional; when present it is unique per workspace (409 on a live duplicate).
      x-mcp-tool: { verb: create_record, record_type: product, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateProductRequest' }
      responses:
        '201':
          description: Created product.
          headers:
            Location: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /products/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Offers]
      operationId: getProduct
      summary: Get a product by id.
      x-mcp-tool: { verb: read_record, record_type: product, tier: green }
      responses:
        '200':
          description: The product.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Offers]
      operationId: updateProduct
      summary: Update a product (partial). Existing offer lines keep their price snapshot.
      x-mcp-tool: { verb: update_record, record_type: product, tier: green }
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateProductRequest' }
      responses:
        '200':
          description: Updated product.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Offers]
      operationId: archiveProduct
      summary: Archive (soft-delete) a product. Lines referencing it survive with their snapshot.
      x-mcp-tool: { verb: archive_record, record_type: product, tier: yellow }
      responses:
        '200':
          description: Archived product.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '404': { $ref: '#/components/responses/NotFound' }

  # -------------------------- offer templates ---------------------------
  # Branded, workspace-governed DE/EN PDF layouts for offers (B-E03.22/WP7,
  # data-model §12.6). Admin/ops config surface, like pipeline/product rate-
  # card config — reps read the catalog but don't author brand layout.
  # `name` is unique per workspace among live (non-archived) rows (409
  # offer_template_name_duplicate). At most one default template per locale
  # (partial unique index on workspace_id+locale WHERE is_default AND NOT
  # archived) — setting is_default=true while another default already holds
  # that locale is rejected (409 offer_template_default_conflict); different
  # locales may each carry their own default. Deliberately carries no
  # source/captured_by — like Quota/CustomField, this is workspace-authored
  # config, not a captured record; provenance lives in the audit row.
  /offer-templates:
    get:
      tags: [Offers]
      operationId: listOfferTemplates
      summary: List offer templates (branded DE/EN PDF layouts), newest first.
      description: Default view excludes archived rows; pass include_archived=true to include them.
      x-mcp-tool: { verb: search_records, record_type: offer_template, tier: green }
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/IncludeArchived'
        - name: locale
          in: query
          schema: { type: string }
          description: Filter to one locale (e.g. de-DE, en-US).
      responses:
        '200':
          description: A page of offer templates.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OfferTemplateListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Offers]
      operationId: createOfferTemplate
      summary: Create an offer template.
      description: |
        `name` must be unique among this workspace's live templates (409
        `offer_template_name_duplicate`). At most one default template per locale (409
        `offer_template_default_conflict` — setting `is_default=true` while another
        default already holds that locale).
      x-mcp-tool: { verb: create_record, record_type: offer_template, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateOfferTemplateRequest' }
      responses:
        '201':
          description: Created offer template.
          headers:
            Location: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OfferTemplate' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: A template with this name already exists, or a default already exists for this locale.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                nameDuplicate:
                  summary: A live template with this name already exists in this workspace
                  value:
                    type: 'https://errors.gradion.com/offer_template_name_duplicate'
                    title: Duplicate name
                    status: 409
                    code: offer_template_name_duplicate
                    detail: An offer template named "Standard DE" already exists in this workspace.
                defaultConflict:
                  summary: Another template already holds is_default for this locale
                  value:
                    type: 'https://errors.gradion.com/offer_template_default_conflict'
                    title: Default template conflict
                    status: 409
                    code: offer_template_default_conflict
                    detail: 'A default template already exists for locale "de-DE"; archive or un-default it first.'
        '422': { $ref: '#/components/responses/ValidationError' }

  /offer-templates/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Offers]
      operationId: getOfferTemplate
      summary: Get an offer template by id.
      x-mcp-tool: { verb: read_record, record_type: offer_template, tier: green }
      responses:
        '200':
          description: The offer template.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OfferTemplate' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Offers]
      operationId: updateOfferTemplate
      summary: Update an offer template (full replace — every writable field is replaced).
      description: Uses PUT (not PATCH) — omitting a writable field resets it, it is not a partial no-op.
      x-mcp-tool: { verb: update_record, record_type: offer_template, tier: green }
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateOfferTemplateRequest' }
      responses:
        '200':
          description: Updated offer template.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OfferTemplate' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Offers]
      operationId: archiveOfferTemplate
      summary: Archive (soft-delete) an offer template.
      description: Sets archived_at (soft-archive); hidden from the default list but still fetchable by id. Offers already carrying this template_id are unaffected — a template is never deleted out from under an existing offer.
      x-mcp-tool: { verb: archive_record, record_type: offer_template, tier: yellow }
      responses:
        '200':
          description: Archived offer template.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OfferTemplate' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ------------------------------ offers -------------------------------------
  # The versioned, deal-bound Angebot (B-E03.17–.20, data-model §12.6).
  # Totals (line and offer) are SERVER-COMPUTED from the line items (P11);
  # a client-supplied total is rejected 422. An offer is mutable only while
  # status=draft; sent is immutable — regenerate mints the next revision.
  /deals/{id}/offers:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Offers]
      operationId: listDealOffers
      summary: List a deal's offers, newest revision first.
      x-mcp-tool: { verb: search_records, record_type: offer, tier: green }
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: status
          in: query
          schema: { type: string, enum: [draft, sent, accepted, rejected, expired, superseded] }
      responses:
        '200':
          description: A page of the deal's offers.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OfferListResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [Offers]
      operationId: createOffer
      summary: Create a draft offer under a deal (offer_number minted server-side).
      description: |
        Line items may ride the create; each snapshots description/price from its optional
        `product_id` unless given explicitly. Totals are DERIVED — a body carrying
        `net_minor`/`gross_minor`/`line_total` (any spelling) is rejected 422.
      x-mcp-tool: { verb: create_record, record_type: offer, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateOfferRequest' }
      responses:
        '201':
          description: Created draft offer with computed totals.
          headers:
            Location: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Offer' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /offers/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Offers]
      operationId: getOffer
      summary: Get an offer with its line items and computed totals.
      x-mcp-tool: { verb: read_record, record_type: offer, tier: green }
      responses:
        '200':
          description: The offer.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Offer' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Offers]
      operationId: updateOffer
      summary: Update offer header fields — allowed only while status=draft.
      x-mcp-tool: { verb: update_record, record_type: offer, tier: green }
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateOfferRequest' }
      responses:
        '200':
          description: Updated draft offer.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Offer' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422':
          description: Validation error — including any mutation of a non-draft offer (offer_not_draft).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
    delete:
      tags: [Offers]
      operationId: archiveOffer
      summary: Archive (soft-delete) an offer.
      x-mcp-tool: { verb: archive_record, record_type: offer, tier: yellow }
      responses:
        '200':
          description: Archived offer.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Offer' }
        '404': { $ref: '#/components/responses/NotFound' }

  /offers/{id}/line-items:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Offers]
      operationId: addOfferLineItem
      summary: Add a line item to a draft offer (position defaults to next; totals recomputed).
      x-mcp-tool: { verb: update_record, record_type: offer, tier: green }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OfferLineItemInput' }
      responses:
        '201':
          description: The offer with the new line and recomputed totals.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Offer' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /offers/{id}/line-items/{lineItemId}:
    parameters:
      - $ref: '#/components/parameters/Id'
      - name: lineItemId
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Offers]
      operationId: updateOfferLineItem
      summary: Update a draft offer's line item (totals recomputed; totals themselves are not settable).
      x-mcp-tool: { verb: update_record, record_type: offer, tier: green }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateOfferLineItemRequest' }
      responses:
        '200':
          description: The offer with the updated line and recomputed totals.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Offer' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Offers]
      operationId: removeOfferLineItem
      summary: Remove a line item from a draft offer (totals recomputed).
      x-mcp-tool: { verb: update_record, record_type: offer, tier: green }
      responses:
        '200':
          description: The offer without the line, totals recomputed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Offer' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /offers/{id}/send:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Offers]
      operationId: sendOffer
      summary: Send a draft offer (🟡 — leaves the workspace; freezes FX + buyer/issuer snapshot).
      description: |
        draft → sent. Freezes `fx_rate_to_base` as of today (422 `fx_rate_unavailable` when the
        daily rate is missing — never rate=1, RT-PR-C2), captures the buyer/issuer snapshots and
        emits `offer.sent`. Sending leaves the workspace, so an AGENT principal is refused with
        `ErrRequiresApproval` and the call is staged to the approval inbox; the approved retry
        redeems with the X-Approval-Token header (ADR-0036).
      x-mcp-tool: { verb: send_offer, record_type: offer, tier: yellow }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ApprovalToken'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: The sent offer (frozen totals + FX).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Offer' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /offers/{id}/accept:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Offers]
      operationId: acceptOffer
      summary: Record the buyer's acceptance — syncs the deal's amount from the offer's gross.
      description: |
        sent → accepted; sets `accepted_at`, syncs `deal.amount_minor`/`currency` from the
        accepted offer's `gross_minor` (the offer becomes the deal's value source) and emits
        `offer.accepted`. Recording the buyer's acceptance is a human attestation — an agent
        principal is rejected outright.
      security: [ { cookieAuth: [] } ]   # human session only — rejects agent bearer/Passport (x-agent-access: human-only)
      x-agent-access: human-only
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: The accepted offer.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Offer' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /offers/{id}/reject:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Offers]
      operationId: rejectOffer
      summary: Record the buyer's decline (sent → rejected; emits offer.rejected).
      security: [ { cookieAuth: [] } ]   # human session only — rejects agent bearer/Passport (x-agent-access: human-only)
      x-agent-access: human-only
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RejectOfferRequest' }
      responses:
        '200':
          description: The rejected offer.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Offer' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /offers/{id}/regenerate:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Offers]
      operationId: regenerateOffer
      summary: Mint the next revision as a fresh draft — mechanically, or AI-drafted from captured signal.
      description: |
        The `draft_offer` verb (🟢 — a reversible internal write, writes zero sends): copies the
        sent offer's header + lines into revision N+1 as a new `draft`, marks the prior revision
        `superseded` and emits `offer.superseded` + `offer.created`. A sent offer is never
        mutated in place. When an AI draft applies (regenerate-from-signal), the response Offer
        also carries the Art. 50 disclosure (`ai_generated`/`ai_disclosure`) and the
        `diff_from_previous` line-item summary versus the prior revision; a mechanical
        regenerate (no AI context available) still works and returns `ai_generated=false`. The
        produced draft still cannot leave without the 🟡 send gate.
      x-mcp-tool: { verb: draft_offer, record_type: offer, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '201':
          description: The new draft revision.
          headers:
            Location: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Offer' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /offers/{id}/render:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Offers]
      operationId: renderOffer
      summary: Render the offer's branded PDF (sets pdf_asset_ref).
      description: |
        Produces the branded DE/EN PDF from the offer's current template (`offer.template_id`,
        falling back to the workspace's default template for the offer's locale, de-DE when
        none is set) plus its line items, and stores the result as `pdf_asset_ref` (B-E03.22/
        WP7, data-model §12.6). The rendered totals equal the server-computed totals — the PDF
        never recomputes money (P11). Not itself an outbound or irreversible act — `send` is
        the 🟡 gated step that leaves the workspace — so render stays 🟢.
      x-mcp-tool: { verb: render_offer, record_type: offer, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: The offer, with pdf_asset_ref populated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Offer' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '501':
          description: >-
            The object store (blobstore) is not wired on this deployment — the same
            unwired-by-omission posture as the attachments seam.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                blobstoreUnwired:
                  value:
                    type: 'https://errors.gradion.com/not_implemented'
                    title: Not Implemented
                    status: 501
                    code: not_implemented
                    detail: operation RenderOffer is specified but not yet implemented

  /offers/{id}/pdf:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Offers]
      operationId: downloadOfferPdf
      security: [ { cookieAuth: [] } ]   # human session only (x-agent-access: human-only)
      x-agent-access: human-only
      summary: Download the offer's most recently rendered PDF.
      description: |
        Streams the bytes `pdf_asset_ref` points at (set by `renderOffer`). 404 both when the
        offer has never been rendered (`pdf_asset_ref` is null) and on the usual row-scope
        miss — neither leaks which case applies. 501 mirrors `renderOffer`'s own posture when
        the deployment has no blobstore wired.
      responses:
        '200':
          description: The PDF bytes; Content-Disposition names the file.
          content:
            application/pdf:
              schema: { type: string, format: binary }
        '404': { $ref: '#/components/responses/NotFound' }
        '501':
          description: >-
            The object store (blobstore) is not wired on this deployment — the same
            unwired-by-omission posture as renderOffer.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                blobstoreUnwired:
                  value:
                    type: 'https://errors.gradion.com/not_implemented'
                    title: Not Implemented
                    status: 501
                    code: not_implemented
                    detail: operation DownloadOfferPdf is specified but not yet implemented

  # -------------------------- /signals (E08 warm room) ----------------------
  # The warm-room signal spine (B-E08.1–.4, features/07 §9, data-model §12.5):
  # company-level, consent-gated, droppable. A signal resolves to an
  # ORGANIZATION (never a covert person dossier); the warm/cold join rides our
  # own contact graph and answers with evidence ids, never a mystery score.
  /signals:
    get:
      tags: [Signals]
      operationId: listSignals
      summary: List signals (cursor-paginated), newest first.
      # The warm room is a human review surface (features/07 §9: the warm room
      # proposes, the rep sends) and signal is deliberately NOT a datasource-seam
      # entity — the generic search_records tool scopes to person|organization|
      # deal|lead|activity. Reads stay REST-reachable under the signal RBAC object
      # + row scope; they are not offered as an agent tool.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/IncludeArchived'
        - name: status
          in: query
          schema: { type: string, enum: [open, acknowledged, resolved, dismissed] }
        - name: kind
          in: query
          schema: { type: string, enum: [stalled_deal, champion_left, reengagement, buying_intent, risk, other] }
        - name: resolution_state
          in: query
          schema: { type: string, enum: [resolved, low_confidence, unresolved, dropped] }
      responses:
        '200':
          description: A page of signals.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SignalListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Signals]
      operationId: createSignal
      summary: Record a signal (a derived observation, or a raw inbound/web item awaiting resolution).
      description: |
        A signal about a known record carries its subject (`entity_type`+`entity_id`, both or
        neither) and enters `resolution_state=resolved`; a raw item (only a `raw_ref` source
        pointer) enters `unresolved` until POST /signals/{id}/resolve attributes it to an
        organization or drops it. Signals are COMPANY-LEVEL: there is no mandatory person
        link, and `resolved_person_id` is only ever set by the resolver under recorded
        consent (P12).
      # The warm room proposes; the rep sends (features/07 §9). Recording,
      # triaging, resolving and archiving a consent-gated (P12) company-level
      # signal is a human act through the governed surface — never an agent tool.
      x-agent-access: human-only
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateSignalRequest' }
            examples:
              rawInbound:
                value:
                  kind: buying_intent
                  source_channel: inbound
                  raw_ref: 'inbound:sam@acme.example'
                  summary: Inbound demo request from acme.example
                  source: 'connector:imap:msg-991'
      responses:
        '201':
          description: Created signal.
          headers:
            Location: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Signal' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: The subject entity does not exist or is outside the caller's row scope.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /signals/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Signals]
      operationId: getSignal
      summary: Get a signal by id.
      # Read-only, REST-reachable under the signal RBAC object + row scope; not an
      # agent tool — signal is not a datasource-seam entity (see listSignals).
      responses:
        '200':
          description: The signal.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Signal' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Signals]
      operationId: updateSignal
      summary: Triage a signal (acknowledge / resolve / dismiss, severity).
      description: |
        A status change to `acknowledged`/`resolved`/`dismissed` appends the human-outcome
        row to `signal_resolution` (`outcome`+`note`+`resolved_by`) — the same append-only
        log that holds the resolver's match basis, distinguished by which columns are set.
      x-agent-access: human-only
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateSignalRequest' }
      responses:
        '200':
          description: Updated signal.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Signal' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Signals]
      operationId: archiveSignal
      summary: Archive (soft-delete) a signal.
      x-agent-access: human-only
      responses:
        '200':
          description: Archived signal.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Signal' }
        '404': { $ref: '#/components/responses/NotFound' }

  /signals/{id}/resolve:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Signals]
      operationId: resolveSignal
      summary: Run the signal→company resolver over the signal's raw_ref (inspectable match, never silently confident).
      description: |
        Maps the raw source pointer to a specific organization via the domain index,
        exact name, or a prior-interaction email match (B-E08.2), writing the append-only
        `signal_resolution` match-basis row and stamping the signal. Exactly one candidate →
        `resolved`; several plausible candidates → `low_confidence` (surfaced, never silently
        asserted); none → `dropped` — an unattributable signal retains NO person-level
        dossier. `resolved_person_id` is set only where the org match holds AND the person
        has a recorded consent grant; the resolver never creates person rows. Read+resolve
        only, no outbound.
      x-agent-access: human-only
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: The stamped signal with its resolution outcome.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Signal' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: The signal has no raw_ref to resolve, or is already terminally resolved/dropped.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /signals/{id}/warmth:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Signals]
      operationId: getSignalWarmth
      summary: The warm/cold classification with the full "why warm" evidence (B-E08.3).
      description: |
        A signal resolved to an organization where we hold ≥1 live contact edge
        (employment or deal stakeholder) is WARM and routes to the warm room; a resolved
        organization with no contact is COLD and routes to the cold queue. The answer is
        evidence, not a score: the source signal id, the resolved org id, and the specific
        contact id(s) in our own graph that make it warm, each with its §4 relationship
        strength. Reads only our own relational core — never an external profile.
      responses:
        '200':
          description: The warm/cold branch with its evidence ids.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SignalWarmth' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: The signal is not resolved to an organization (unresolved / low-confidence / dropped signals have no warmth).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /signals/{id}/intro-path:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Signals]
      operationId: getSignalIntroPath
      summary: The proposed warm-intro path for a warm signal (B-E08.4) — an actionable move, not a notification.
      description: |
        Names the route-in contact (the strongest live relationship at the resolved
        organization), the relationship we have, and a concrete suggested next move with a
        drafted message carrying the Art. 50 AI-assisted disclosure and evidence back to the
        warm signal. PROPOSAL ONLY: nothing is sent and no record mutates — the outbound
        send rides the 🟡 confirm-first send tool (POST /activities/{id}/send-email); the
        warm room proposes, the rep sends.
      responses:
        '200':
          description: The proposed intro path.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SignalIntroPath' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: The signal is cold or not resolved — there is no warm path to propose.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  # -------------------------- /brief (E05 Morning Brief) --------------------
  # The signature home surface (features/07 §6): a ranked, finite, honestly-short
  # queue of winnable deals, per rep. The queue is the deterministic §10.1
  # composite (B-E05.1) re-ordered by the L2 ranker within the same candidate
  # set (B-E05.2) — the model may re-order but never breaches the honest-short
  # cutoff or ships a claim without evidence. The brief is a PERSONAL lens: every
  # read and mark resolves through the acting rep, and another rep's brief reads
  # as not-found (existence-hiding), never forbidden. Assembly runs off the home
  # request path (overnight + on-open refresh, B-E05.3b); GET only re-reads the
  # persisted read-model, so the home route never blocks on ranking (P4).
  /brief:
    get:
      tags: [Brief]
      operationId: getMorningBrief
      summary: The acting rep's latest Morning-Brief run (the on-open read-model re-read; never re-ranks).
      # Read-only, REST-reachable under the same deal-read grant the brief rides
      # on and scoped to the acting rep's own runs. The brief is a human home
      # surface, not a datasource-seam entity — not offered as an agent tool.
      responses:
        '200':
          description: The latest brief run with its ranked queue.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MorningBrief' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: The rep has no brief run yet (none has been generated).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
    post:
      tags: [Brief]
      operationId: generateMorningBrief
      summary: Generate (refresh) the acting rep's brief now — ranks the candidate set and persists a new run.
      description: |
        The on-open / explicit-refresh path (B-E05.3b): ranks the rep's open deals through the
        §10.1 composite + the L2 re-order, and persists one `brief_run` with its ranked
        `brief_item` rows. It reads and stages only — no deal field mutates and nothing is sent.
        This is off the passive home GET; the home route re-reads the persisted run.
      # Generating a rep's own brief is a personal human act on the home surface;
      # an agent never refreshes a human's morning brief.
      x-agent-access: human-only
      responses:
        '201':
          description: The freshly generated brief run.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MorningBrief' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /brief/items/{itemId}/act:
    parameters:
      - name: itemId
        in: path
        required: true
        schema: { type: string, format: uuid }
        description: A brief_item id belonging to one of the acting rep's runs.
    post:
      tags: [Brief]
      operationId: markBriefItemActed
      summary: Mark a brief item acted (B-E05.13) — the deal drops from the next run until it materially changes.
      # Per-rep queue state on the human home surface; a second mark on an
      # already-marked item is a 409 conflict, never a silent overwrite.
      x-agent-access: human-only
      responses:
        '200':
          description: The updated brief item.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MorningBriefItem' }
        '404':
          description: No such item in one of the acting rep's runs (another rep's item reads as not-found).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '409':
          description: The item was already acted on or dismissed.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /brief/items/{itemId}/dismiss:
    parameters:
      - name: itemId
        in: path
        required: true
        schema: { type: string, format: uuid }
        description: A brief_item id belonging to one of the acting rep's runs.
    post:
      tags: [Brief]
      operationId: markBriefItemDismissed
      summary: Dismiss a brief item (B-E05.13) — it does not reappear unless a new linked activity arrives after the mark.
      x-agent-access: human-only
      responses:
        '200':
          description: The updated brief item.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MorningBriefItem' }
        '404':
          description: No such item in one of the acting rep's runs (another rep's item reads as not-found).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '409':
          description: The item was already acted on or dismissed.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /brief/items/{itemId}/snooze:
    parameters:
      - name: itemId
        in: path
        required: true
        schema: { type: string, format: uuid }
        description: A brief_item id belonging to one of the acting rep's runs.
    post:
      tags: [Brief]
      operationId: snoozeBriefItem
      summary: Snooze a brief item (A77/AC-home-6) — hidden until `snoozed_until` passes, then it re-surfaces as actionable.
      description: |
        Sets the item to `state=snoozed` with the given `snoozed_until`. While the instant has not
        passed, the item is hidden from the home read AND the deal is suppressed from freshly
        generated runs. Once `snoozed_until` passes, the item re-surfaces as actionable — distinct
        from `dismissed` (which needs a new linked activity) and `acted` (which needs a material
        change). Per-rep queue state, like act/dismiss.
      x-agent-access: human-only
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BriefSnoozeRequest' }
      responses:
        '200':
          description: The updated brief item.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MorningBriefItem' }
        '404':
          description: No such item in one of the acting rep's runs (another rep's item reads as not-found).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '409':
          description: The item was already acted on or dismissed.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422':
          description: '`snoozed_until` is missing or not in the future.'
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  # ------------------------------ /quotas -------------------------------------
  /quotas:
    get:
      tags: [Quotas]
      operationId: listQuotas
      summary: List quotas (cursor-paginated).
      x-mcp-tool: { verb: search_records, record_type: quota, tier: green }
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/IncludeArchived'
        - name: owner_id
          in: query
          schema: { type: string, format: uuid }
        - name: team_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: A page of quotas.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QuotaListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
    post:
      tags: [Quotas]
      operationId: createQuota
      summary: Create a quota (owner XOR team revenue target for one period).
      description: |
        RD-WIRE-2. Exactly one of owner_id/team_id must be non-null (RD-DDL-2 CHECK) —
        supplying both or neither is refused with a 422 validation_error carrying a distinct
        details.errors[].code (owner_xor_team_required), not the generic per-field
        validation code, so a caller can branch on this specific violation. target_minor is
        always human-set (RD-PARAM-3) — no default, no AI-guessed or server-computed
        fallback. Quota targets follow the pipeline/stage-config posture (createPipeline,
        updateStage): human session only (x-agent-access: human-only), never an MCP tool
        tier — an agent never sets or changes a sales target.
      security: [ { cookieAuth: [] } ]   # human session only — rejects agent bearer/Passport (x-agent-access: human-only)
      x-agent-access: human-only
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateQuotaRequest' }
            examples:
              ownerQuota:
                value:
                  owner_id: 018f3a1b-0000-7000-8000-000000000001
                  period_start: '2026-01-01'
                  period_end: '2026-03-31'
                  target_minor: 28000000
                  currency: EUR
              teamQuota:
                value:
                  team_id: 018f3a1b-0000-7000-8000-000000000030
                  period_start: '2026-01-01'
                  period_end: '2026-03-31'
                  target_minor: 100000000
                  currency: EUR
      responses:
        '201':
          description: Created quota.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Quota' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422':
          description: Validation failed, including the owner-XOR-team contract.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                bothSet:
                  summary: Both owner_id and team_id supplied
                  value:
                    type: 'https://errors.gradion.com/validation_error'
                    title: Validation failed
                    status: 422
                    code: validation_error
                    detail: Exactly one of owner_id/team_id must be set, not both.
                    details:
                      errors:
                        - { field: owner_id, code: owner_xor_team_required, message: 'Supply exactly one of owner_id or team_id, not both.' }
                neitherSet:
                  summary: Neither owner_id nor team_id supplied
                  value:
                    type: 'https://errors.gradion.com/validation_error'
                    title: Validation failed
                    status: 422
                    code: validation_error
                    detail: Exactly one of owner_id/team_id must be set.
                    details:
                      errors:
                        - { field: owner_id, code: owner_xor_team_required, message: 'Supply exactly one of owner_id or team_id.' }

  /quotas/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Quotas]
      operationId: getQuota
      summary: Get a quota by id.
      x-mcp-tool: { verb: read_record, record_type: quota, tier: green }
      responses:
        '200':
          description: The quota.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Quota' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Quotas]
      operationId: updateQuota
      summary: Update a quota (partial).
      description: |
        Merge-PATCH (API-CONV-1); If-Match required for concurrency-safe writes (API-CC-2).
        Re-validates the owner-XOR-team contract after the merge — patching into a both-set
        or neither-set state returns the same 422 owner_xor_team_required shape as
        createQuota. Human session only, like createQuota/archiveQuota (see createQuota's
        description) — an agent never sets or changes a sales target.
      security: [ { cookieAuth: [] } ]   # human session only — rejects agent bearer/Passport (x-agent-access: human-only)
      x-agent-access: human-only
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateQuotaRequest' }
      responses:
        '200':
          description: Updated quota.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Quota' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422':
          description: Validation failed, including the owner-XOR-team contract.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                bothSet:
                  value:
                    type: 'https://errors.gradion.com/validation_error'
                    title: Validation failed
                    status: 422
                    code: validation_error
                    detail: Exactly one of owner_id/team_id must be set, not both.
                    details:
                      errors:
                        - { field: owner_id, code: owner_xor_team_required, message: 'Supply exactly one of owner_id or team_id, not both.' }
    delete:
      tags: [Quotas]
      operationId: archiveQuota
      summary: Archive (soft-delete) a quota.
      description: |
        Archive semantics (API-CONV-2): sets archived_at, drops from default lists, stays
        fetchable by id, and returns 200 + the full archived entity — never 204. This
        deliberately does not follow /automations/{id}'s deleteAutomation 204-on-archive
        shape, which predates/diverges from the standard convention every other archive
        operation in this contract (archivePerson, archiveOrganization, archiveDeal)
        correctly follows. Human session only, like createQuota/updateQuota.
      security: [ { cookieAuth: [] } ]   # human session only — rejects agent bearer/Passport (x-agent-access: human-only)
      x-agent-access: human-only
      responses:
        '200':
          description: Archived quota (now carries a non-null archived_at).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Quota' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /quotas/{id}/attainment:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Quotas]
      operationId: getQuotaAttainment
      summary: Server-computed attainment for this quota (RD-WIRE-3), decomposed per closed-won deal.
      x-mcp-tool: { verb: read_record, record_type: quota, tier: green }
      description: |
        RD-FORM-2: attainment = Σ(closed-won base_value_minor in the quota's period) ÷
        target_minor, base-currency converted. Never client-summed — contributing_deals
        always sums to closed_won_minor. A zero or otherwise unusable target refuses the
        computation honestly (422 attainment_target_zero, RD-AC-4/AC-quota-6) rather than
        dividing by zero; a failed clean-core query (e.g. a missing FX rate, mirroring
        getOrganizationHierarchyRollup's fx_rate_unavailable) is an honest error, never a
        stale or invented figure. Requires read on quotas AND deals (the aggregate is
        built from deal sums); per-deal row visibility is deliberately not consulted —
        attainment is a workspace-level figure, the hierarchy-rollup posture.
      responses:
        '200':
          description: This quota's server-computed attainment.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QuotaAttainment' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: Attainment cannot be honestly computed — target is zero, or the clean-core query failed.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                targetZero:
                  summary: The quota's target_minor is zero
                  value:
                    type: 'https://errors.gradion.com/attainment_target_zero'
                    title: Attainment target is zero
                    status: 422
                    code: attainment_target_zero
                    detail: This quota's target_minor is zero; attainment is refused rather than computed against a zero denominator.
                computationFailed:
                  summary: The clean-core closed-won query failed
                  value:
                    type: 'https://errors.gradion.com/attainment_computation_failed'
                    title: Attainment computation failed
                    status: 422
                    code: attainment_computation_failed
                    detail: The clean-core closed-won query failed; showing a stale or guessed figure is never acceptable — retry.

  # =========================================================================
  # =========================================================================
  # NET-NEW V1 RESOURCES (data-model.md §12.5) — first-class, but specified by
  # PATTERN here rather than expanded inline, to keep this file readable. Each
  # follows the SAME resource shape as /people|/deals above — list (cursor+Sort),
  # get, create, update (If-Match), archive — with schemas drawn 1:1 from the
  # §12.5 DDL. The contract-codegen + AC-MCP-3 lint MUST emit/verify these ops:
  #   /signals            (E08; now SPECIFIED above, B-E08.1–.4 — resolve via POST /signals/{id}/resolve, warm/cold via /signals/{id}/warmth + /signals/{id}/intro-path)
  #   /deal-rooms         (E08/E12; engagement events are read via /deal-rooms/{id}/engagement)
  #   /voice-profiles     (E07; now SPECIFIED above, B-E07.4/.5a — corpus sources via /voice-profiles/{id}/sources)
  #   /drafting-assets    (E07/E08; approval flips `approved` — admin/🟡)
  #   /agent-connections  (E10; revoke via POST /agent-connections/{id}/revoke; events read-only)
  #   /saved-views        (E15; V1 enforces shared_scope=private)
  #   /quotas             (E09; now SPECIFIED above, RD-T06 — owner XOR team, attainment via /quotas/{id}/attainment)
  #   /webhook-subscriptions (E10/S-E10.6, A51; HTTPS-only target_url, event_types ⊆ the published
  #                       events.md §2 catalog, signing_secret_ref; state active|paused. create/update
  #                       is 🟡 — registers outbound egress; x-mcp-tool create_record tier yellow.
  #                       Deliveries are read via /webhook-subscriptions/{id}/deliveries and a parked one
  #                       replays via POST /webhook-subscriptions/{id}/deliveries/{id}/replay. Fan-out is
  #                       RBAC-bounded to the owner's visibility + fully audited; 🟡-gated event types
  #                       deliver only AFTER the ADR-0036 approval gate — B-E10.13a/.15)
  # field_mask, conversation_link, deal_channel, gtm_module_install, webhook_delivery are config/
  # join/append tables surfaced through admin/parent endpoints, not standalone CRUD.
  #
  # OFFERS / ANGEBOTE (data-model.md §12.6; A48/ADR-0037) — bounded line-item
  # quote engine, NOT CPQ. /products, /offer-templates, /deals/{id}/offers,
  # /offers/{id} (+/line-items, /regenerate, /render, /send, /accept, /reject)
  # are now SPECIFIED above (B-E03.16–.20, B-E03.22/WP7).
  # Money totals (net/tax/gross) are DERIVED server-side from line items (P11
  # integer minor-units); a client-supplied total is rejected. Multi-currency
  # offers roll up to base via fx_rate (RT-PR-C2). Offer drafting obeys evidence-
  # or-omit (features/07) and NEVER fabricates a price (rate-card or blank).
  # =========================================================================
  #
  # OVERLAY / AUGMENTATION MANAGEMENT (data-model.md §12 overlay cluster;
  # narrative/03e AC-OV-1..11; E18/E19/E20; A53). The B-E18.*/B-E19.*/B-E20.*
  # build stories trace here.
  #
  # **Bounded-equivalence invariant (AC-OV-2 / ADR-0018): overlay mode does NOT
  # fork the data API.** Mirrored people/orgs/deals/activities/relationships are
  # read and written through the SAME operations above (/people, /deals, …) via
  # the SystemOfRecordProvider seam (architecture/01); each L1 MCP tool either
  # passes identically OR returns a declared, tested `unsupported_by_sor` result
  # (422) — never a silent break. The ops below are ONLY the overlay LIFECYCLE /
  # MANAGEMENT surface, which has no SoR-mode equivalent and exists only when
  # `workspace.sor_mode = overlay` (data-model §12); in SoR-mode each returns
  # 404 `mode_not_overlay`. Schemas drawn 1:1 from data-model §12
  # (`incumbent_connection`, `overlay_mirror` sync-state); contract-codegen +
  # AC-MCP-3 lint MUST emit/verify these ops. One incumbent per workspace, so the
  # connection resource is SINGULAR. Associations (`overlay_association`,
  # B-E18.22) surface through the normal /relationships endpoint — NOT a new path.
  #
  #   GET    /overlay/connection
  #       Current incumbent binding + status: {incumbent, region, status ∈
  #       active|revoked|error, connected_at, scopes[]}. 🟢 read.
  #       x-mcp-tool: read_record record_type=overlay_connection, tier green.
  #   POST   /overlay/connection
  #       Connect an incumbent via OAuth (HubSpot public app B-E18.13 /
  #       Salesforce ECA-JWT B-E19.* / Entra app B-E20.*). Body {incumbent,
  #       region, auth_code|assertion}. EU customers MUST route to the incumbent's
  #       EU region with an honest dual-residency disclosure (mirror replica lives
  #       in OUR store → operator's residency, A35; B-E18.14). 🟡 — establishes
  #       egress + ingest of the customer's entire CRM; ErrRequiresApproval +
  #       ADR-0036 token; Idempotency-Key. 409 `incumbent_already_connected` if a
  #       binding exists. x-mcp-tool: connect_incumbent, tier yellow.
  #   DELETE /overlay/connection
  #       Disconnect → revoke token + mirror teardown: purge the `overlay_mirror`
  #       replica AND incumbent-derived embeddings/context-graph nodes within the
  #       declared retention window (B-E18.15; GDPR — the mirror must not outlive
  #       the connection). 🟡, ErrRequiresApproval; 202 + teardown job ref.
  #       x-mcp-tool: disconnect_incumbent, tier yellow.
  #   GET    /overlay/sync-status
  #       Mirror freshness, per object class: [{object, last_synced_at, state ∈
  #       fresh|pending_sync|stale, backfill_progress}]. Backs the three overlay
  #       UI affordances every overlay screen must show (last_synced_at,
  #       pending_sync optimism, staleness warning — 30-screen-acceptance §3a;
  #       B-E18.4/.16). 🟢 read.
  #   POST   /overlay/reconcile
  #       Trigger the reconciliation poller sweep — heal gaps within the incumbent
  #       search budget, incumbent-wins on divergence emitting `mirror.conflict`
  #       (AC-OV-8; B-E18.7/.18). 🟢 (read-heavy, budget-metered); 202 + job ref.
  #   GET    /overlay/budget
  #       Per-incumbent consumption meter: {window, consumed, limit, band ∈
  #       healthy|degrading|exhausted, policy} (B-E18.11/.12). At threshold,
  #       force-fresh reads degrade to mirror-with-staleness (AC-OV-7) — surfaced
  #       here so the UI/agent warns instead of starving the customer's quota.
  #       🟢 read.
  #   POST   /overlay/flip:preflight
  #       Overlay→SoR flip preflight gate (B-E18.26, V1-WOW): force-fresh sync +
  #       conflict reconciliation + honest-scope export check → {ready,
  #       blocking[], unresolved_conflicts[]}. 🟢. 409 `overlay_flip_blocked` is
  #       returned by the execute op below when this is not satisfied.
  #   POST   /overlay/flip
  #       Execute Overlay→SoR flip (B-E18.27; AC-OV-9/10): reuse the features/04
  #       §5 importer, preserve record counts/relationships, carry over OUR
  #       augmentation (context/embeddings/audit/capture/mappings), re-tag
  #       incumbent-derived nodes T2→T1, detach write-back, flip
  #       `workspace.sor_mode = native`. 🟡 (irreversible mode change),
  #       ErrRequiresApproval + token; 202 + migration job ref.
  #       x-mcp-tool: tier yellow.
  #
  # Overlay error sentinels (interfaces.md §0 + overlay additions): 404
  # `mode_not_overlay` (op called in SoR-mode), 409 `incumbent_already_connected`,
  # 422 `unsupported_by_sor` (declared bounded-capability gap, AC-OV-2), 409
  # `overlay_flip_blocked` (preflight unsatisfied), 503
  # `incumbent_budget_exhausted` (degrade-don't-starve, AC-OV-7). All as RFC-7807
  # `Problem`.
  # =========================================================================

  /attachments:
    get:
      tags: [Attachments]
      operationId: listAttachments
      security: [ { cookieAuth: [] } ]   # human session only (x-agent-access: human-only)
      x-agent-access: human-only
      summary: List the attachments hung off one entity (cursor-paginated metadata).
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: entity_type
          in: query
          required: true
          schema: { type: string, enum: [person, organization, deal, activity, lead] }
        - name: entity_id
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: A page of attachment metadata for the entity.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AttachmentListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
    post:
      tags: [Attachments]
      operationId: uploadAttachment
      security: [ { cookieAuth: [] } ]   # human session only (x-agent-access: human-only)
      x-agent-access: human-only
      summary: Upload a file and attach it to an entity.
      description: |
        Multipart upload. The bytes are written to object storage; the row records the
        metadata + object key. `captured_by` is server-stamped from the authenticated
        principal, never the request. The parent entity must be visible to the caller
        (a hidden or cross-tenant entity answers 404, never leaks existence).
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [entity_type, entity_id, file]
              properties:
                entity_type: { type: string, enum: [person, organization, deal, activity, lead] }
                entity_id: { type: string, format: uuid }
                file: { type: string, format: binary }
      responses:
        '201':
          description: The stored attachment metadata.
          headers:
            Location: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Attachment' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /attachments/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Attachments]
      operationId: downloadAttachment
      security: [ { cookieAuth: [] } ]   # human session only (x-agent-access: human-only)
      x-agent-access: human-only
      summary: Download an attachment's file bytes.
      description: |
        The scan gate refuses the byte stream while `scan_status` is `scanning` or
        `blocked` (RD-T05) — the row's metadata is still visible via `listAttachments`,
        only this byte stream is withheld.
      responses:
        '200':
          description: The file bytes; Content-Disposition names the file.
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: The scan gate refuses the byte stream — retryable while scanning, terminal once blocked.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                scanPending:
                  summary: Virus scan still in progress — retry shortly
                  value:
                    type: 'https://errors.gradion.com/scan_pending'
                    title: Scan pending
                    status: 409
                    code: scan_pending
                    detail: This file is still being scanned; retry the download shortly.
                attachmentBlocked:
                  summary: The file failed the virus scan and is quarantined
                  value:
                    type: 'https://errors.gradion.com/attachment_blocked'
                    title: Attachment blocked
                    status: 409
                    code: attachment_blocked
                    detail: This file was quarantined by the virus scan and cannot be downloaded.
    delete:
      tags: [Attachments]
      operationId: deleteAttachment
      security: [ { cookieAuth: [] } ]   # human session only (x-agent-access: human-only)
      x-agent-access: human-only
      summary: Archive an attachment (soft delete).
      description: |
        Soft-deletes the attachment: the row is archived and it disappears from
        listings and downloads. The object bytes are retained and purged by the
        Art. 17 erasure / retention path, matching how every archived record's
        data persists until erasure. Already-archived or invisible → 404.
      responses:
        '204': { description: Archived. }
        '404': { $ref: '#/components/responses/NotFound' }

  /attachments/{id}/extraction:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Attachments]
      operationId: getAttachmentExtraction
      security: [ { cookieAuth: [] } ]   # human session only (x-agent-access: human-only)
      x-agent-access: human-only
      summary: Staged AI-extraction for this attachment (pure read; zero writes; evidence-or-omit).
      description: |
        Every returned field carries a non-empty source_quote/page_or_section/confidence,
        or is listed in `omitted` with reason "not_stated_in_file" — never a guessed value
        (RD-T10). Backed by the injectable `shared/ports/extraction.Extractor` seam; the
        production default returns an honest `{fields: [], omitted: []}` (no
        document-extraction/OCR/LLM pipeline exists or is built by this ticket). Valid for
        any entity_type — a non-deal attachment or the empty-seam default both honestly
        return zero fields; the same parent-visibility gate as `downloadAttachment`/
        `listAttachments` applies.
      responses:
        '200':
          description: The staged extraction (possibly empty).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AttachmentExtraction' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /attachments/{id}/extraction:accept:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Attachments]
      operationId: acceptAttachmentExtraction
      security: [ { cookieAuth: [] } ]   # human session only (x-agent-access: human-only)
      x-agent-access: human-only
      summary: Accept staged extraction fields onto the attachment's deal (deal-scoped attachments only).
      description: |
        Persists the named fields onto the target deal via the deals module's existing
        partial-update path, then writes one audit activity note per accepted field
        carrying its source quote; provenance flips to `human` for any field named in
        `edits`. Only valid on a deal-scoped attachment (`entity_type == "deal"`) — 422
        `unsupported_entity_type` otherwise. `field_keys` is checked against the closed
        allowlist of deal-writable fields before any write lands — a key outside that
        allowlist 422s the whole request (no partial acceptance). Requires deal UPDATE
        authority on the target deal (object RBAC + row-scope visibility), on top of the
        transport-level human-only gate below: the human's direct call is itself the
        approval, matching the rest of the attachment surface (`x-agent-access:
        human-only`) — there is no 🟡 agent-staged path for this operation in V1.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AcceptExtractionRequest' }
      responses:
        '200':
          description: The accepted fields, persisted to the deal.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AttachmentExtractionAcceptResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: The attachment is not deal-scoped, or field_keys names a field outside the deal-update allowlist.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                unsupportedEntityType:
                  summary: The attachment is not bound to a deal
                  value:
                    type: 'https://errors.gradion.com/unsupported_entity_type'
                    title: Unsupported entity type
                    status: 422
                    code: unsupported_entity_type
                    detail: Extraction accept is only valid on a deal-scoped attachment.
                unknownFieldKey:
                  summary: field_keys named a field outside the deal-update allowlist
                  value:
                    type: 'https://errors.gradion.com/validation_error'
                    title: Validation failed
                    status: 422
                    code: validation_error
                    detail: One or more field_keys are not accepted onto a deal.
                    details:
                      errors:
                        - { field: 'field_keys[2]', code: not_deal_writable }

  /attachments/{id}/request-access:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Attachments]
      operationId: requestAttachmentAccess
      security: [ { cookieAuth: [] } ]   # human session only (x-agent-access: human-only)
      x-agent-access: human-only
      summary: Request access to a restricted attachment (audit row only — no notification system).
      description: |
        Writes one audit activity note carrying the requesting principal; there is no
        notification or approval workflow behind it in V1 — the note is the entire effect.
      responses:
        '200':
          description: Request recorded.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RequestAccessResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # DEFERRED — stubs only (data-model.md §12). Intentionally NOT specified:
  #   /sequences, /sequences/{id}/steps, /enrollments   (outbound cadences; sends gated)
  #   /calls, /telephony/*                               (telephony / click-to-call)
  #   /embeddings, /context-graph/*                      (pgvector retrieval store)
  #   /workflow-runs                                     (workflow registry run records)
  #   /users, /teams, /roles                             (admin identity mgmt — schema below; CRUD fast-follow)
