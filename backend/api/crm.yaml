              schema: { $ref: '#/components/schemas/DealListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Deals]
      operationId: createDeal
      summary: Create a deal.
      description: |
        Amount is integer minor-units + ISO-4217 currency (no float money). The stage
        must belong to the deal's pipeline (422 otherwise). Deals attach to person/org,
        never to a raw lead (ADR-0008 §5).
      x-mcp-tool: { verb: create_record, record_type: deal, tier: green }
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateDealRequest' }
            examples:
              minimal:
                value:
                  name: Acme — Platform expansion
                  amount_minor: 5000000
                  currency: EUR
                  pipeline_id: 018f3a1b-0000-7000-8000-0000000000c0
                  stage_id: 018f3a1b-0000-7000-8000-0000000000c1
                  organization_id: 018f3a1b-0000-7000-8000-000000000020
                  source: ui
      responses:
        '201':
          description: Created deal.
          headers:
            Location: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Deal' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422':
          description: Validation error (e.g. stage not in pipeline, lost without lost_reason).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              examples:
                stage_mismatch:
                  value:
                    type: 'https://errors.gradion.com/validation_error'
                    title: Validation failed
                    status: 422
                    code: validation_error
                    detail: stage_id does not belong to pipeline_id.
                    details:
