# ai-tasks.yaml — the AI task contract (spec §1.2, ai-operational-spec.md).
#
# Authority relationship (ratified: margince-poc-v1 AI runtime contract +
# certification arc): THIS file is the normative authority for the task/tier
# vocabulary — the task list, its tiers, each task's fallback ladder, execution
# mode (interactive | background), and budget-exhaustion posture (degrade |
# queue). The build repo's copy
# (backend/api/ai-tasks.yaml) must match it verbatim; the build's
# tools/gen-aitasks compiles that copy into the binary (tasks_gen.go) behind a
# drift gate, the same mechanism crm.yaml already uses for the HTTP contract.
# Tier→model binding (which concrete provider/model serves local_small /
# cheap_cloud / premium / local_large) stays a per-deployment runtime config
# (config/ai-routing.yaml, §1.4) — editing THAT never requires a rebuild.
# Editing the ladders/posture below is a routing-POLICY change: it requires a
# spec update here, the mirrored edit in the build repo, `make gen`, and a
# rebuild — never a silent code diff.
# Closed pairing invariant: interactive tasks use `degrade`; background tasks
# use `queue`. Here `queue` means "return a typed budget deferral to the task's
# existing durable carrier" — the router never creates an unowned generic job.
# Deferral makes no provider call and does not consume a worker attempt.
tiers: [local_small, cheap_cloud, premium, local_large]

tasks:
  capture_classify: {ladder: [local_small, cheap_cloud], execution_mode: background, on_budget_exhausted: queue}
  enrich:           {ladder: [local_small, cheap_cloud], execution_mode: background, on_budget_exhausted: queue}
  summarize:        {ladder: [cheap_cloud, premium], execution_mode: interactive, on_budget_exhausted: degrade}
  draft_reply:      {ladder: [cheap_cloud, premium], execution_mode: interactive, on_budget_exhausted: degrade}
  nl_search:        {ladder: [cheap_cloud, premium], execution_mode: interactive, on_budget_exhausted: degrade}
  cold_start:       {ladder: [cheap_cloud, premium], execution_mode: interactive, on_budget_exhausted: degrade}
  transcript:       {ladder: [cheap_cloud, premium], execution_mode: interactive, on_budget_exhausted: degrade}
  deal_health:      {ladder: [cheap_cloud, premium], execution_mode: interactive, on_budget_exhausted: degrade}
  brief_ranking:    {ladder: [premium, cheap_cloud], execution_mode: background, on_budget_exhausted: queue,
                     doc: "the one Premium-frontier default (§1.2 RATIFY): genuinely multi-hop reasoning"}
  agent_loop:       {ladder: [cheap_cloud, premium], execution_mode: background, on_budget_exhausted: queue}
  offer_draft:      {ladder: [cheap_cloud, premium], execution_mode: interactive, on_budget_exhausted: degrade}
  site_extract:     {ladder: [premium], execution_mode: background, on_budget_exhausted: queue,
                     doc: "premium-only BY CONTRACT: the no-guess gate demands verbatim quotes cheap tiers paraphrase; no fallback rung"}
  site_fact_extract: {ladder: [cheap_cloud, premium], execution_mode: background, on_budget_exhausted: queue,
                     doc: "the deep read's page-parallel fact lane: tiny snippet-id-cited records a fast cheap tier serves reliably — its latency IS the read time, so the fast tier leads"}
  cert_judge:       {ladder: [premium, cheap_cloud], execution_mode: background, on_budget_exhausted: queue,
                     doc: "the aicert quality judge — pinned to its own router in the cert lane, never the candidate's binding"}
  voice_build:      {ladder: [cheap_cloud, premium], execution_mode: background, on_budget_exhausted: queue,
                     doc: "owner-requested or automatic durable Voice DNA candidate build; own-authored corpus only, CompanyContext none (ADR-0066)"}

degrade_to:
  premium: cheap_cloud
  cheap_cloud: local_small
  local_large: local_small
  local_small: local_small
