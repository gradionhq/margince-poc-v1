# ai-routing.yaml — the per-deployment tier→model binding
# (ai-operational-spec §1.4): the ONLY place vendor names appear. Code
# routes over tiers; swapping a model is an edit here, never a deploy.
#
# BYOK (ADR-0020): cloud tiers need the customer's key — set
# api_key on the binding or leave the tier unbound and the router
# degrades honestly. Local defaults are non-Chinese (A23/ADR-0012);
# Mistral is the recommended EU-origin alternative.
tiers:
  local_small: { provider: ollama, model: gemma3 }
  cheap_cloud: { provider: anthropic, model: claude-haiku-4-5-20251001 }
  premium: { provider: anthropic, model: claude-opus-4-8 }
  # local_large is bound on sovereign deployments only:
  # local_large: {provider: ollama, model: llama3.3:70b}
embeddings: { provider: ollama, model: bge-m3 }
# eu_hosted (default) | sovereign | cloud_frontier — the §4 location
# ladder. sovereign refuses every cloud binding at startup.
profile: eu_hosted
