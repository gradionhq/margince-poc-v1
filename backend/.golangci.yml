version: "2"

linters:
  default: standard
  enable:
    - depguard
    - gosec
    - misspell
    - revive
  settings:
    depguard:
      rules:
        # Layer B of the boundary stack (ADR-0014 §3): the module DAG from
        # architecture/01, expressed as import denials. Layer A is the Go
        # compiler (internal/); Layer C is go-arch-lint (.go-arch-lint.yml).
        shared-purity:
          files:
            - "**/internal/shared/**"
          # Default-deny: the shared layer (kernel + apperrors + ports) is
          # stdlib + each other, period — a new shared package pulling a
          # third-party dep fails HERE, not only in the arch fitness test.
          list-mode: strict
          allow:
            - $gostd
            - github.com/gradionhq/margince/backend/internal/shared
        platform:
          files:
            - "**/internal/platform/**"
          deny:
            - pkg: github.com/gradionhq/margince/backend/internal/modules
              desc: platform owns no domain module
            - pkg: github.com/gradionhq/margince/backend/internal/compose
              desc: platform never sees the composition layer
        # Sibling isolation ("a module never imports a sibling module",
        # ADR-0054 §9) is NOT spelled here: depguard cannot say "no
        # sibling but your own subpackages are fine" without an N²
        # hand-maintained rule per module, and that list drifted. The
        # invariant is enforced mechanically instead — the tree-derived
        # TestNoSiblingModuleImports in backend/arch_test.go enrolls a
        # new module the moment its directory exists, and go-arch-lint
        # (.go-arch-lint.yml) gates the same DAG per component.
        modules-common:
          files:
            - "**/internal/modules/**"
          deny:
            - pkg: github.com/gradionhq/margince/backend/internal/compose
              desc: modules never see the composition layer
            - pkg: github.com/gradionhq/margince/backend/cmd
              desc: modules never see the process roles
    revive:
      # package-comments stays ON: package docs are onboarding
      # infrastructure (architecture/15) — a missing one fails the gate
      # instead of rotting silently.
      rules:
        - name: package-comments

formatters:
  enable:
    - gofmt
