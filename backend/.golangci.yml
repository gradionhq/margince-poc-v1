version: "2"

linters:
  default: standard
  enable:
    - depguard
    - gosec
    - misspell
    - revive
  settings:
    depguard:
      rules:
        # Layer B of the boundary stack (ADR-0014 §3): the module DAG from
        # architecture/01, expressed as import denials. Layer A is the Go
        # compiler (internal/); Layer C is go-arch-lint (.go-arch-lint.yml).
        shared-purity:
          files:
            - "**/internal/shared/**"
          # Default-deny: the shared layer (kernel + apperrors + ports) is
          # stdlib + each other, period — a new shared package pulling a
          # third-party dep fails HERE, not only in the arch fitness test.
          listMode: strict
          allow:
            - $gostd
            - github.com/gradionhq/margince/backend/internal/shared
        platform:
          files:
            - "**/internal/platform/**"
          deny:
            - pkg: github.com/gradionhq/margince/backend/internal/modules
              desc: platform owns no domain module
            - pkg: github.com/gradionhq/margince/backend/internal/compose
              desc: platform never sees the composition layer
        # One rule per module: a module imports shared + platform +
        # contracts, NEVER a sibling — every cross-module edge is
        # injected by the composition layer (ADR-0054 §9).
        module-identity:
          files:
            - "**/internal/modules/identity/**"
          deny:
            - pkg: github.com/gradionhq/margince/backend/internal/modules/people
              desc: identity imports no sibling module
            - pkg: github.com/gradionhq/margince/backend/internal/modules/deals
              desc: identity imports no sibling module (the workspace seed is injected)
            - pkg: github.com/gradionhq/margince/backend/internal/modules/activities
              desc: identity imports no sibling module
            - pkg: github.com/gradionhq/margince/backend/internal/modules/agents
              desc: identity imports no sibling module
            - pkg: github.com/gradionhq/margince/backend/internal/modules/approvals
              desc: identity imports no sibling module
        module-people:
          files:
            - "**/internal/modules/people/**"
          deny:
            - pkg: github.com/gradionhq/margince/backend/internal/modules/identity
              desc: people reads the Principal from shared kernel, not from identity
            - pkg: github.com/gradionhq/margince/backend/internal/modules/deals
              desc: people imports no sibling module (merge/promote reach deal rows via owned SQL, decisions/0011)
            - pkg: github.com/gradionhq/margince/backend/internal/modules/activities
              desc: people imports no sibling module (the activity scope rule lives in platform/auth)
            - pkg: github.com/gradionhq/margince/backend/internal/modules/agents
              desc: agents sits above the domain; the reverse edge is forbidden
            - pkg: github.com/gradionhq/margince/backend/internal/modules/approvals
              desc: people never reaches the approval engine; the composition layer wires them
        module-deals:
          files:
            - "**/internal/modules/deals/**"
          deny:
            - pkg: github.com/gradionhq/margince/backend/internal/modules/identity
              desc: deals imports no sibling module
            - pkg: github.com/gradionhq/margince/backend/internal/modules/people
              desc: deals imports no sibling module
            - pkg: github.com/gradionhq/margince/backend/internal/modules/activities
              desc: deals imports no sibling module
            - pkg: github.com/gradionhq/margince/backend/internal/modules/agents
              desc: agents sits above the domain; the reverse edge is forbidden
            - pkg: github.com/gradionhq/margince/backend/internal/modules/approvals
              desc: deals never reaches the approval engine; the composition layer wires them
        module-activities:
          files:
            - "**/internal/modules/activities/**"
          deny:
            - pkg: github.com/gradionhq/margince/backend/internal/modules/identity
              desc: activities imports no sibling module
            - pkg: github.com/gradionhq/margince/backend/internal/modules/people
              desc: activities imports no sibling module (link visibility lives in platform/auth)
            - pkg: github.com/gradionhq/margince/backend/internal/modules/deals
              desc: activities imports no sibling module
            - pkg: github.com/gradionhq/margince/backend/internal/modules/agents
              desc: agents sits above the domain; the reverse edge is forbidden
            - pkg: github.com/gradionhq/margince/backend/internal/modules/approvals
              desc: activities never reaches the approval engine; the composition layer wires them
        module-approvals:
          files:
            - "**/internal/modules/approvals/**"
          deny:
            - pkg: github.com/gradionhq/margince/backend/internal/modules/identity
              desc: approvals imports no sibling module
            - pkg: github.com/gradionhq/margince/backend/internal/modules/people
              desc: approvals imports no sibling module
            - pkg: github.com/gradionhq/margince/backend/internal/modules/deals
              desc: approvals imports no sibling module
            - pkg: github.com/gradionhq/margince/backend/internal/modules/activities
              desc: approvals imports no sibling module
            - pkg: github.com/gradionhq/margince/backend/internal/modules/agents
              desc: approvals imports no sibling module
        module-agents:
          files:
            - "**/internal/modules/agents/**"
          deny:
            - pkg: github.com/gradionhq/margince/backend/internal/modules/identity
              desc: agents imports no sibling module
            - pkg: github.com/gradionhq/margince/backend/internal/modules/people
              desc: the agent surface reaches records only through the datasource seam
            - pkg: github.com/gradionhq/margince/backend/internal/modules/deals
              desc: the agent surface reaches records only through the datasource seam
            - pkg: github.com/gradionhq/margince/backend/internal/modules/activities
              desc: the agent surface reaches records only through the datasource seam
            - pkg: github.com/gradionhq/margince/backend/internal/modules/approvals
              desc: agents stages approvals through the injected adapter, never directly
        modules-common:
          files:
            - "**/internal/modules/**"
          deny:
            - pkg: github.com/gradionhq/margince/backend/internal/compose
              desc: modules never see the composition layer
            - pkg: github.com/gradionhq/margince/backend/cmd
              desc: modules never see the process roles
    revive:
      rules:
        - name: package-comments
          disabled: true

formatters:
  enable:
    - gofmt
