# Layer C of the boundary stack (ADR-0014 §3): the triad DAG from
# architecture/01 declared once — shared → platform → modules → compose →
# cmd; `go-arch-lint check` exits 1 on any forbidden edge — a hard
# `make check` gate.
version: 3
workdir: .

allow:
  depOnAnyVendor: false
  # deepScan's call-graph heuristic misreads the generated chi wiring
  # (HandlerWithOptions) as a forbidden edge; the import-graph linter is
  # the load-bearing gate and stays on.
  deepScan: false

exclude:
  - tools

vendors:
  # The composed extension set (ADR-0069): an out-of-module import — the
  # committed vanilla stub in bare builds, the generated module under
  # build/composition/ in composed ones. Only cmd wires it (the fitness
  # test in backend/extensions_arch_test.go holds the same rule).
  composition: { in: github.com/gradionhq/margince/composition }
  pgx:    { in: github.com/jackc/** }
  chi:    { in: github.com/go-chi/** }
  oapi:   { in: github.com/oapi-codegen/** }
  redis:  { in: github.com/redis/** }
  xcrypto: { in: golang.org/x/crypto/** }
  xterm:   { in: golang.org/x/term }
  yaml:   { in: gopkg.in/** }
  emersion: { in: github.com/emersion/** }
  # the OpenAPI 3.1 loader that already drives gen-payloads; the webhooks
  # integration test loads api/public-events.yaml through it to assert wire
  # shapes conform to the contract schema.
  kinopenapi: { in: github.com/getkin/** }
  river:  { in: github.com/riverqueue/** }
  minio:  { in: github.com/minio/** }
  fpdf:   { in: github.com/go-pdf/** }
  # unicode transforms for the PO-PARAM-JW-2 dedupe preprocessing (casefold+unaccent)
  xtext:  { in: golang.org/x/text/** }
  # webread's crawl mechanics: the html tokenizer (link harvest from raw HTML)
  # and publicsuffix (same-registrable-domain fencing) — R2 crawl seam
  xnet:   { in: golang.org/x/net/** }

components:
  # The published extension surface (ADR-0069 §3): the outermost Tier-0
  # leaf, importable by every layer (and by extensions outside this
  # module); its own imports are gated to stdlib by depguard pkg-purity +
  # TestPublishedSurfaceIsPure.
  pkg:         { in: pkg/** }
  shared:      { in: internal/shared/** }
  contracts:   { in: internal/contracts }
  platform:    { in: internal/platform/** }
  identity:    { in: [internal/modules/identity, internal/modules/identity/**] }
  ai:          { in: internal/modules/ai }
  search:      { in: internal/modules/search }
  capture:     { in: [internal/modules/capture, internal/modules/capture/**] }
  consent:     { in: internal/modules/consent }
  collections: { in: internal/modules/collections }
  signals:     { in: internal/modules/signals }
  people:      { in: internal/modules/people }
  privacy:     { in: internal/modules/privacy }
  deals:       { in: internal/modules/deals }
  activities:  { in: internal/modules/activities }
  approvals:   { in: internal/modules/approvals }
  customfields: { in: internal/modules/customfields }
  quotas:      { in: internal/modules/quotas }
  agents:      { in: [internal/modules/agents, internal/modules/agents/**] }
  automation:  { in: internal/modules/automation }
  overlay:     { in: [internal/modules/overlay, internal/modules/overlay/**] }
  webhooks:    { in: internal/modules/webhooks }
  compose:     { in: [internal/compose, internal/compose/**] }
  migrations:  { in: migrations }
  cmd:         { in: cmd/** }
  root:        { in: . }

commonComponents:
  - shared
  - pkg

deps:
  # The generated contract package carries its transport runtime; it
  # imports no project component.
  contracts:
    canUse: [chi, oapi]
  platform:
    mayDependOn: [platform, contracts, migrations]
    # yaml: the deployment configuration file (deployconfig, A107/ADR-0061).
    # xnet: webread's crawl mechanics (html tokenizer + publicsuffix).
    canUse: [pgx, chi, oapi, redis, river, minio, yaml, xnet]
  # Modules import shared + platform + contracts — NEVER a sibling; every
  # cross-module edge is injected by the composition layer.
  identity:
    mayDependOn: [identity, contracts, platform]
    canUse: [pgx, oapi, xcrypto]
  ai:
    mayDependOn: [contracts, platform]
    canUse: [pgx, yaml, oapi]
  search:
    mayDependOn: [contracts, platform]
    canUse: [pgx, oapi]
  capture:
    mayDependOn: [capture, contracts, platform]
    canUse: [pgx, oapi, emersion]
  consent:
    mayDependOn: [contracts, platform]
    canUse: [pgx, oapi]
  collections:
    mayDependOn: [contracts, platform]
    canUse: [pgx, oapi]
  signals:
    mayDependOn: [contracts, platform]
    canUse: [pgx, oapi]
  people:
    mayDependOn: [contracts, platform]
    canUse: [pgx, oapi, xtext]
  privacy:
    mayDependOn: [contracts, platform]
    canUse: [pgx, oapi]
  deals:
    mayDependOn: [contracts, platform]
    # fpdf backs offer_pdf.go's branded PDF render (offers-depth arc 4a
    # T4, OFFER-AC-12): pure-Go, no cgo, a runtime render path — belongs
    # in the product module, not tools.
    canUse: [pgx, oapi, fpdf]
  activities:
    mayDependOn: [contracts, platform]
    canUse: [pgx, oapi]
  approvals:
    mayDependOn: [contracts, platform]
    canUse: [pgx, oapi]
  customfields:
    mayDependOn: [contracts, platform]
    canUse: [pgx, oapi]
  quotas:
    mayDependOn: [contracts, platform]
    canUse: [pgx, oapi]
  agents:
    mayDependOn: [agents, contracts, platform]
    canUse: [pgx, oapi]
  overlay:
    mayDependOn: [overlay, contracts, platform]
    canUse: [pgx, oapi]
  webhooks:
    mayDependOn: [contracts, platform]
    canUse: [pgx, oapi]
  automation:
    mayDependOn: [contracts, platform]
    canUse: [pgx, oapi]
  compose:
    mayDependOn: [compose, identity, people, privacy, deals, activities, approvals, agents, automation, ai, search, capture, consent, collections, signals, customfields, quotas, overlay, webhooks, contracts, platform, migrations]
    # xtext: the evidence gate normalizes page text to NFC before matching
    # (evidencematch.go) — Unicode normal forms need golang.org/x/text.
    # yaml: aicert's corpus loader parses scenario files directly — the
    # cert harness is a compose subpackage, not a config-loading path
    # platform already owns, so it needs the same parser platform does.
    # emersion: the in-memory IMAP server the standing-connect transport
    # test drives; production compose reaches IMAP only through capture.
    canUse: [pgx, chi, oapi, river, xtext, yaml, emersion, kinopenapi]
  migrations:
    mayDependOn: [platform]
    canUse: [pgx]
  # The root fitness tests walk the authoritative contract document
  # (api/crm.yaml) directly — the RD-AC-7 negative-scope gate reads the
  # 3.1 source of truth, not the generated Go, so a contract-only change
  # cannot slip past it.
  root:
    # publicevents_test.go reads crmcontracts.PublicEventVersions — the
    # authoritative catalog gate walks the generated contract directly.
    mayDependOn: [contracts]
    canUse: [yaml]
  cmd:
    mayDependOn: [compose, identity, people, privacy, deals, activities, approvals, agents, automation, ai, search, capture, consent, collections, signals, customfields, quotas, overlay, webhooks, contracts, platform, migrations]
    canUse: [pgx, redis, xterm, composition]
