# config/margince.example.yaml — the dev deployment configuration (A107/ADR-0061).
#
# `make dev` copies this to config/margince.yaml on first run and then LEAVES it
# — the same create-if-missing / leave-if-exists pattern as config/ai-routing.yaml
# — so your edits persist across `make dev-stop` / `make dev`. To reset, delete
# config/margince.yaml and re-run `make dev`.
#
# The api bootstraps the demo organization + admin from this file the first time
# it boots against an empty database; an existing installation just reads it.
version: 1

organization:
  name: Demo Workspace
  base_currency: EUR
  timezone: Europe/Berlin

bootstrap_admin:
  email: admin@demo.test
  display_name: Demo Admin
  # Read at boot (must be >=12 chars). `make dev` seeds the referenced file
  # (config/margince-admin-password) with the demo password on first run; the
  # path is relative to the repo root the api is launched from. These defaults
  # match scripts/seed-dev.sh — change both together if you change them.
  password_file: config/margince-admin-password

# AI runtime posture (optional). Uncomment to turn on Layer-3 AI payload capture
# (ai_call_payload) — OFF by default because it stores special-category-adjacent
# content that then ages under the retention engine and the Art. 17 erasure
# cascade. Honored by both the api and worker roles (both take --config).
# ai:
#   capture_payloads: true

# Rates & costs "Refresh from sources" (optional, worker role). The admin can
# trigger an async refresh that stages confirm-first proposals into the
# approvals inbox — a human approves every change; nothing auto-applies.
#   fx_source: the structured FX JSON API base URL ({base,rates}; ?base=&symbols=).
#     Defaults to the free, no-key ECB source api.frankfurter.dev when unset.
#   model_pricing: provider -> pricing-page URL the model-cost refresh crawls +
#     AI-extracts (the rate_extract task, certified for Gemini). A plain GET must
#     yield the price text — Google's docs page does; many marketing pages are
#     JS-rendered and yield none. Absent = the model-cost refresh is a no-op.
# rates:
#   fx_source: https://api.frankfurter.dev/v1/latest
#   # Candidate foreign currencies "Refresh from sources" proposes when the FX
#   # sheet is still empty (a fresh install tracks none). Defaults to USD/GBP/CHF
#   # when unset. Each is staged as a proposal for admin approval — never applied.
#   fx_currencies: [USD, GBP, CHF]
#   model_pricing:
#     gemini: https://ai.google.dev/gemini-api/docs/pricing
#     # anthropic: https://docs.anthropic.com/en/docs/about-claude/pricing
#     # openai: https://platform.openai.com/docs/pricing

# Ordered company-context rollout (OPS-CFG-10). The default is onboarding;
# moving backward disables reads/injection/surfaces but never deletes confirmed
# company data. Stages include the prior stage: off < read < tasks < onboarding.
company_context:
  rollout: onboarding
