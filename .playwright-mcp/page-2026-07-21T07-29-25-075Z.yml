              - generic [ref=f6e424]: read from site
            - textbox "Company history high read from site" [ref=f6e428]: Gradion traces its origin to NFQ, founded in Lithuania over two decades ago. The company expanded into Asia as a market thesis that Asia was becoming a third axis of global technology. It has offices in Vietnam, Singapore, Bangkok, Cairo, and Hamburg. In Asia, the company operates under the Gradion name since 2023, building on more than two decades of NFQ Group history. Key milestones include building Swoodoo (acquired by KAYAK 2010), engineering partnership with KAYAK (acquired by Priceline for $1.8B in 2013), and engineering HomeToGo to a EUR 1B IPO in 2021.
            - generic [ref=f6e429]: "\"Gradion now has offices and engineering teams across Vietnam , Singapore , Bangkok , Cairo , and Hamburg . In Asia, the company operates under the Gradion name since 2023, building on more than two decades of NFQ Group history.\" · https://gradion.com/about"
