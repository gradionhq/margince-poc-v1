            - textbox "Buying intents medium read from site" [ref=f6e405]: Businesses looking to scope an engineering team for a digital or deep tech project; companies open to advisory equity, co-investment, or founding partnerships for the right market and product.
            - generic [ref=f6e406]: "\"For the right business, the right market, the right founding team, and a product the company genuinely believes in, Gradion is open to going further than a services engagement: advisory equity, co investment, or a founding role. Not as a standard offering.\" · https://gradion.com/en/about/values-esg"
