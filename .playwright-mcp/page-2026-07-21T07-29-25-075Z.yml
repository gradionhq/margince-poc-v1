              - generic [ref=f6e388]: read from site
            - textbox "Desired outcomes high read from site" [ref=f6e392]: Scalable engineering capability, sustained quality over time, ISO 27001 certified processes, 97% client satisfaction, $10B+ GMV through built/maintained systems, 20M+ tasks automated monthly across production deployments.
            - generic [ref=f6e393]: "\"More than 20 million tasks are automated monthly across production deployments. ISO 27001 certified . 97% client satisfaction across more than 1,000 deployments. Domain depth built over decades Gradion builds capability in specific domains rather than maintaining a generalist bench.\" · https://gradion.com/about"
