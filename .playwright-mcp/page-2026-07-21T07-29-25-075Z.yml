            - textbox "What do you sell? * high read from site" [ref=f6e342]: Digital and Deep Tech Consultancy that diagnoses problems, produces clear assessment reports, and delivers engineering teams across four continents to fix them — covering software development, automation, AI, and deep tech across travel, e-commerce, and manufacturing domains.
            - generic [ref=f6e343]: "\"A consultancy that delivers Gradion is a Digital and Deep Tech Consultancy - with an important distinction from most consultancies. A good doctor does not guess at the prescription. They examine, read the data, and then treat.\" · https://gradion.com/about"
          - generic [ref=f6e344]:
