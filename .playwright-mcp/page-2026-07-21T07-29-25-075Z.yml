              - generic [ref=f6e368]: read from site
            - textbox "What sets you apart high read from site" [ref=f6e372]: Unlike most consultancies that hand over a report and leave, Gradion both diagnoses problems and has 320 engineers to fix them — combining consultancy insight with engineering delivery at scale, with domain depth built over decades in travel, e-commerce, and manufacturing.
            - generic [ref=f6e373]: "\"A consultancy that delivers Gradion is a Digital and Deep Tech Consultancy - with an important distinction from most consultancies. A good doctor does not guess at the prescription. They examine, read the data, and then treat.\" · https://gradion.com/about"
          - generic [ref=f6e374]:
            - generic [ref=f6e375]:
              - text: Customer pains
              - generic [ref=f6e376]: high
              - generic [ref=f6e378]: read from site
            - textbox "Customer pains high read from site" [ref=f6e382]: Most consultancies hand a report to the client and leave; clients are left without an implementation partner who can execute the recommended changes at scale, on time, and at a fair price.
            - generic [ref=f6e383]: "\"Gradion works the same way: the assessment produces a clear report - what is broken, what needs to change, and in what order. The difference is what happens next. Most consultancies hand that report to the client and leave.\" · https://gradion.com/about"
          - generic [ref=f6e384]:
