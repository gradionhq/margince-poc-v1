              - generic [ref=f6e346]: high
              - generic [ref=f6e348]: read from site
            - textbox "Ideal customer * high read from site" [ref=f6e352]: Technology companies and enterprises in Asia (Singapore, Vietnam, Thailand), Europe (Germany/DACH), and MENA operating in travel, e-commerce, and manufacturing who need embedded engineering teams and deep tech consultancy to scale digital products and operations.
            - generic [ref=f6e353]: "\"It was a market thesis: that Asia - Singapore, Vietnam, Thailand - was becoming a third axis of global technology alongside the US and Europe, and that a firm positioned inside that axis, not just pointing at it, would compound differently over time. That thesis has proven correct.\" · https://gradion.com/about"
          - generic [ref=f6e354]:
