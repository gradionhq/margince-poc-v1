              - generic [ref=f6e358]: read from site
            - textbox "Value proposition high read from site" [ref=f6e362]: 320 engineers across four continents who can fix what the assessment identifies, at a price that reflects how the company is built, not where it is headquartered. $10B+ in GMV flows annually through systems Gradion has built or maintained. 97% client satisfaction across more than 1,000 deployments.
            - generic [ref=f6e363]: "\"Gradion has 320 engineers across four continents who can fix it, at a price that reflects how the company is built, not where it is headquartered. $10B+ in GMV flows annually through systems Gradion has built or maintained.\" · https://gradion.com/about"
          - generic [ref=f6e364]:
