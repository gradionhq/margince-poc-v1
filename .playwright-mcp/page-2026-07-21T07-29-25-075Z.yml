            - textbox "Sales motion high read from site" [ref=f6e418]: Start small. Measure. Grow. Clients book a call to scope a team, beginning with a scoped assessment that produces a clear report, followed by phased engineering delivery.
            - generic [ref=f6e419]: "\"One delivery network. Explore How We Work Start small. Measure. Grow. Explore Our DNA We are your partner. We have skin in the game. Explore Let&#x27;s work together Tell us about your project and we&#x27;ll scope a team.\" · https://gradion.com/about"
          - generic [ref=f6e420]:
