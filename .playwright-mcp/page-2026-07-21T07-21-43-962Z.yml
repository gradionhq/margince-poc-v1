            - textbox "Company history high read from site" [ref=e414]: Gradion traces its origin to NFQ, founded in Lithuania over two decades ago. It expanded into Asia (Singapore, Vietnam, Thailand) based on a market thesis about Asia as a third axis of global technology. In Asia, the company operates under the Gradion name since 2023, building on more than two decades of NFQ Group history. Founder Lars Jankowfsky built Swoodoo (acquired by KAYAK in 2010); NFQ then partnered with KAYAK for over a decade and with HomeToGo from founding through its EUR 1B IPO in 2021.
            - generic [ref=e415]: "\"About Gradion Gradion traces its origin to NFQ , founded in Lithuania over two decades ago. The move into Asia was not a talent arbitrage play.\" · https://gradion.com/about"
