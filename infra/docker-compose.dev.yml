# The dev/test infrastructure stack. `make db-up` brings it up (and applies
# scripts/db-init.sql on top for the non-owner app role); `make clean` tears
# it down including data. Ports and credentials are a contract shared with
# the backend Makefile's MARGINCE_TEST_* defaults, scripts/dev.sh, and CI's
# service containers — change them everywhere or nowhere.
#
# Images are digest-pinned to the multi-arch INDEX digest (works on both
# arm64 dev machines and amd64 CI — CI's integration lane runs this same
# compose file via `make db-up`, so these are the only pins). Bump tag and
# digest together. The check-image-pins gate fails a floating tag here.
#
# The project name is repo-specific: a generic name (margince-dev) collides
# with stale volumes from the frozen poc-era stack on machines that ran it,
# and Postgres skips initdb on a non-empty volume — the owner role would
# silently never be created.
name: margince-poc-v1

services:
  postgres:
    # pgvector ships inside the Postgres image: the search module's hybrid
    # retrieval needs the extension available at migrate time.
    image: pgvector/pgvector:pg16@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
    environment:
      POSTGRES_USER: margince_owner
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: margince
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U margince_owner -d margince"]
      interval: 2s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7@sha256:a8f08480e1f88f2647fed492d1178c06abb0d0c1fbf02c682a61e2f483fb3954
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 15

  # MinIO backs the blobstore seam (attachment/transcript object bytes).
  # Ports 59000 (S3 API) / 59001 (console)
  # are part of the MARGINCE_TEST_BLOBSTORE_* contract shared with the backend
  # Makefile and CI — change them everywhere or nowhere. No compose healthcheck:
  # the minio image ships no curl, and platform/blobstore's New tolerates a
  # not-yet-ready backend with a bounded connect retry and creates the bucket,
  # so readiness is the store's job, not compose's.
  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":59001"
    ports:
      - "59000:9000"
      - "59001:9001"
    volumes:
      - minio-data:/data

volumes:
  pgdata: {}
  minio-data: {}
