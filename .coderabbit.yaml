# CodeRabbit review scope. Mirrors sonar-project.properties: keep the AI review
# on hand-written product code and skip what we do not hand-write or own —
# generated contract types, append-only DDL, vendored tooling, build config, and
# the design-system story/UAT fixtures the fe-uat gate renders.
language: en-US
reviews:
  # Negated globs exclude; everything else is reviewed as normal.
  path_filters:
    - "!backend/internal/contracts/**"
    - "!**/*_gen.go"
    - "!backend/migrations/**"
    - "!cli/craft/**"
    - "!backend/web/static/**"
    - "!frontend/src/api/schema.d.ts"
    - "!frontend/.storybook/**"
    - "!frontend/scripts/**"
    - "!frontend/src/**/*.stories.tsx"
    - "!**/pnpm-lock.yaml"
    - "!**/go.sum"
  auto_review:
    enabled: true
    # Draft PRs get no review — matches the CI path-filter's draft skip (the
    # swarm pushes many WIP commits before marking a PR ready).
    drafts: false
