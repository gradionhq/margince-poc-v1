# GitGuardian / ggshield config. The dev stack's credentials are shared,
# throwaway, localhost-only defaults (the same literals docker-compose.dev.yml
# declares) — not real secrets. Scoped exclusions keep the secret scan honest
# without blanket-ignoring the tree. (The GitGuardian GitHub App reads its
# exclusions from the dashboard; this file governs ggshield runs and documents
# the intent.)
version: 2
secret:
  ignored-paths:
    - "scripts/dev.sh"
    - "scripts/db-init.sql"
    - ".env.template"
    # Tests and Storybook stories hold fabricated fixtures — fake passport /
    # approval-token stand-ins and demo ids — that trip the generic
    # high-entropy detector but are never real credentials. Scoped to the
    # fixture file types only, so product source is still fully scanned.
    # The IMAP connector's standing-connection tests
    # (internal/modules/capture/imap/standing*_test.go) are one such case:
    # the mailbox password is generated per run from crypto/rand (memPass =
    # testSecret()), so the tree carries no password-shaped literal, yet the
    # `Password: memPass` struct field trips the generic-password detector.
    - "**/*.test.ts"
    - "**/*.test.tsx"
    - "**/*.stories.tsx"
    - "**/*_test.go"
  ignored-matches:
    - name: throwaway localhost dev DB password (margince_app_dev)
      match: margince_app_dev
