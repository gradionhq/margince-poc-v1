# The merge gate as CI (security review M1/M2): `make check` alone runs
# only the no-database lane, so the tenant-isolation and GDPR-erasure
# fitness tests — which are `//go:build integration` and need a real
# Postgres — never blocked a PR. This pipeline runs BOTH lanes plus the
# pinned vulnerability scan, the deterministic craftsmanship gate, and the
# frontend lane as required checks, so a migration that forgets FORCE RLS,
# an erasure that misses a PII table, a vulnerable dependency, a swallowed
# error, or a UI regression fails the merge instead of shipping.
#
# Job names mirror the foundation's craftsmanship wiring (ADR-0045,
# cli/craft/wiring): external/fork PRs hit the same dco + deterministic-gates
# + craftsmanship + craft-residue jobs as internal work, and craftsmanship
# runs only after the deterministic gates are green.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

# One live run per ref: a new push to the same branch/PR cancels the stale
# run instead of queueing behind it. Runs on main are never cancelled — a
# merge must not kill the in-flight check of the previous merge.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

defaults:
  run:
    working-directory: backend

jobs:
  # Classify the diff so a change runs only the checks it can affect — a
  # frontend-only PR skips the Go build/gate + the ~5-min integration lane, a
  # backend-only PR skips the frontend + UAT lanes, and a docs-only PR skips
  # everything. Draft PRs run nothing until marked ready (the swarm pushes many
  # WIP commits). A required job skipped this way counts as passing.
  #   backend  = Go/DB + the gate inputs (backend, infra, go.work, Makefile,
  #              scripts, workflows, AGENTS.md) — gates the Go build/gate,
  #              craft, integration, vuln
  #   frontend = frontend/ + backend/api (the contract drives FE types) —
  #              gates the frontend lane + UAT
  #   e2e      = backend/ + frontend/ + infra — gates the full-stack live-boot
  changes:
    name: changes
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'infra/**'
              - 'go.work'
              - 'go.work.sum'
              - 'Makefile'
              - 'scripts/**'
              - '.github/workflows/**'
              - 'AGENTS.md'
              - 'sonar-project.properties'
            frontend:
              - 'frontend/**'
              - 'backend/api/**'
            e2e:
              - 'backend/**'
              - 'frontend/**'
              - 'infra/**'

  # Every commit in a PR carries a Developer Certificate of Origin sign-off.
  # PR-only: the direct-to-main workflow signs off at push time, and history
  # predating this gate is not retro-required.
  dco:
    name: dco
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Every PR commit is signed off (DCO)
        working-directory: .
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: ./scripts/check-dco.sh "$BASE_SHA" "$HEAD_SHA"

  # The deterministic merge gate: build, vet, lint (baseline + new-code
  # strict), arch-lint, unit + root fitness tests (incl. audit_log enum
  # coherence and the contract $ref pre-flight), generated-drift, and the
  # script gates (image pins, contract breaking, test lanes, file length, RLS
  # store-path, jurisdiction isolation).
  deterministic-gates:
    name: deterministic-gates
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # The contract-breaking gate and the strict lint's
          # new-from-merge-base both diff against origin/main — a shallow
          # checkout has no base ref and would silently disarm them.
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      # Install the pinned gate binaries (golangci-lint, go-arch-lint, oasdiff) so
      # `make check` runs golangci and the oasdiff contract gate itself — one run
      # of every gate, instead of the golangci-lint-action + per-gate steps that
      # `make check` then re-ran as its prerequisites.
      - name: Install the pinned gate binaries
        working-directory: .
        run: |
          make tools
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
      # The whole merge gate in one pass: craft-drift, check-craft-doc, image
      # pins, contract-breaking, test-lanes, file-length, RLS store-path,
      # jurisdiction isolation, then the backend gate (build, vet, lint,
      # arch-lint, unit + fitness tests, contract drift). Each prints its own
      # OK/FAIL line, so a failure is still identifiable in the log.
      - name: Merge gate (make check)
        working-directory: .
        env:
          # In CI a missing base ref is a broken checkout, never a skip.
          CONTRACT_BREAKING_REQUIRE_BASE: "1"
        run: make check

  # The code-craftsmanship gate (ADR-0045) runs only after the deterministic
  # gates are green — a red build must never be judged on style.
  craftsmanship:
    name: craftsmanship
    needs: [deterministic-gates, changes]
    if: needs.changes.outputs.backend == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: craft static (blocker-only)
        working-directory: .
        run: make craft-static

  # No unresolved review-loop markers (CRAFT-FIX / CRAFT-DISPUTE) reach main.
  craft-residue:
    name: craft-residue
    # Runs on every non-draft change (docs included) so a leaked
    # CRAFT-FIX/CRAFT-DISPUTE marker in any file fails the merge.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: craft residue
        working-directory: .
        run: make craft-residue

  integration:
    name: integration (RLS + erasure + HTTP e2e)
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
        env:
          POSTGRES_USER: margince_owner
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: margince
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U margince_owner"
          --health-interval 2s --health-timeout 5s --health-retries 15
      redis:
        image: redis:7@sha256:b2b95679e3b46fb51864949ed25ea976fc3a6bcc00a40a1bc00d568cb2822e50
        ports:
          - 56379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s --health-timeout 5s --health-retries 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Create the non-owner app role
        run: psql "postgres://margince_owner:dev@localhost:55432/margince" -v ON_ERROR_STOP=1 -f ../scripts/db-init.sql
      - name: Apply migrations
        run: go run ./cmd/migrate up --dsn "postgres://margince_owner:dev@localhost:55432/margince"
      # MinIO backs the blobstore integration lane. It cannot be a GH service
      # (the minio image needs a `server /data` command, which services can't
      # set), so it runs here; the digest matches the compose stack's pin
      # (decisions/0022). The store creates its bucket and tolerates a
      # still-starting backend, so no explicit wait is needed.
      - name: Start MinIO (blobstore)
        run: |
          docker run -d --name minio -p 59000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e \
            server /data
      - name: Integration lane
        run: make test-integration

  vuln:
    name: govulncheck
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - run: make vuln

  # The README quickstart, run literally: compose up → migrate → api →
  # seed-dev → verify-boot. This is what keeps the compose file, the
  # API-driven seed, and the boot proof honest — the integration job's
  # GH service containers would stay green even if the compose stack or
  # the seed script rotted.
  live-boot:
    name: live-boot (compose + seed + verify)
    needs: [changes]
    if: needs.changes.outputs.e2e == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 11
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Boot the dev stack and migrate
        run: make db-up && make migrate
      - name: Start the api
        working-directory: backend
        env:
          MARGINCE_ENV: dev
        run: |
          go run ./cmd/api --dsn "postgres://margince_app:margince_app_dev@localhost:55432/margince" \
            > "$RUNNER_TEMP/api.log" 2>&1 &
          for _ in $(seq 1 60); do
            curl -fsS http://localhost:8080/readyz >/dev/null 2>&1 && exit 0
            sleep 1
          done
          echo "api never became ready" >&2
          cat "$RUNNER_TEMP/api.log" >&2
          exit 1
      - name: Seed the demo workspace
        run: make seed-dev
      - name: Verify boot
        run: make verify-boot
      - name: API log (on failure)
        if: failure()
        run: cat "$RUNNER_TEMP/api.log" || true

  # The frontend lane: Biome, Vitest, TypeScript, and the Vite production
  # build. The root Makefile promises CI runs both lanes; this is that lane.
  frontend:
    name: frontend (biome + vitest + tsc + build)
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 11
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: make frontend-check
      # The Storybook catalog must build — a story that fails to compile or
      # register is caught deterministically here. The change-scoped render
      # capture (make fe-uat) stays a coordinator lane, not a required gate.
      - name: Storybook builds (stories compile + register)
        working-directory: frontend
        run: pnpm build-storybook

  # The UAT lane: the AC-<screen>-N screen-acceptance criteria as named
  # Playwright tests, plus the axe WCAG 2.2 AA gate, the 390px
  # no-horizontal-scroll sweep, and the PERF-1 record-open budget. The suite
  # mocks the API at the network edge (the coherent seed fixture), so it is
  # self-contained — no backend needed — and a UI regression that breaks a
  # named acceptance criterion fails the merge instead of shipping.
  uat:
    name: uat (AC screens + axe WCAG 2.2 AA + 390px, mocked)
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 11
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install deps and the Playwright Chromium browser
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium
      - name: Screen-acceptance UAT (build → preview → AC + axe)
        run: make frontend-e2e
