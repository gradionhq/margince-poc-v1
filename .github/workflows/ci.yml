# The merge gate as CI (security review M1/M2): `make check` alone runs
# only the no-database lane, so the tenant-isolation and GDPR-erasure
# fitness tests — which are `//go:build integration` and need a real
# Postgres — never blocked a PR. This pipeline runs BOTH lanes plus the
# pinned vulnerability scan, the deterministic craftsmanship gate, and the
# frontend lane as required checks, so a migration that forgets FORCE RLS,
# an erasure that misses a PII table, a vulnerable dependency, a swallowed
# error, or a UI regression fails the merge instead of shipping.
#
# Job names follow the craftsmanship wiring (ADR-0045,
# cli/craft/wiring): external/fork PRs hit the same dco + deterministic-gates
# + craftsmanship + craft-residue jobs as internal work, and craftsmanship
# runs only after the deterministic gates are green.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

# One live run per ref: a new push to the same branch/PR cancels the stale
# run instead of queueing behind it. Runs on main are never cancelled — a
# merge must not kill the in-flight check of the previous merge.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

defaults:
  run:
    working-directory: backend

jobs:
  # Classify the diff so a change runs only the checks it can affect — a
  # frontend-only PR skips the Go build/gate + the ~5-min integration lane, a
  # backend-only PR skips the frontend + UAT lanes, and a docs-only PR skips
  # everything. Draft PRs run nothing until marked ready (the swarm pushes many
  # WIP commits). A required job skipped this way counts as passing.
  #   backend  = Go/DB + the gate inputs (backend, infra, go.work, Makefile,
  #              scripts, workflows, AGENTS.md) — gates the Go build/gate,
  #              craft, integration, vuln
  #   frontend = frontend/ + backend/api (the contract drives FE types) —
  #              gates the frontend lane + UAT
  #   e2e      = backend/ + frontend/ + infra — gates the full-stack live-boot
  changes:
    name: changes
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'infra/**'
              - 'go.work'
              - 'go.work.sum'
              - 'Makefile'
              - 'scripts/**'
              - '.github/workflows/**'
              - 'AGENTS.md'
              - 'sonar-project.properties'
            frontend:
              - 'frontend/**'
              - 'backend/api/**'
            e2e:
              - 'backend/**'
              - 'frontend/**'
              - 'infra/**'

  # Every commit in a PR carries a Developer Certificate of Origin sign-off.
  # PR-only: the direct-to-main workflow signs off at push time, and history
  # predating this gate is not retro-required.
  dco:
    name: dco
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Every PR commit is signed off (DCO)
        working-directory: .
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: ./scripts/check-dco.sh "$BASE_SHA" "$HEAD_SHA"

  # The deterministic merge gate: build, vet, lint (baseline + new-code
  # strict), arch-lint, unit + root fitness tests (incl. audit_log enum
  # coherence and the contract $ref pre-flight), generated-drift, and the
  # script gates (image pins, contract breaking, test lanes, file length, RLS
  # store-path, jurisdiction isolation).
  deterministic-gates:
    name: deterministic-gates
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          # The contract-breaking gate and the strict lint's
          # new-from-merge-base both diff against origin/main — a shallow
          # checkout has no base ref and would silently disarm them.
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      # Cache the compiled gate binaries. `make tools` compiles golangci-lint,
      # go-arch-lint, govulncheck, and oasdiff from source into ~/go/bin — ~75s
      # that setup-go's module/build cache does not cover (it caches ~/go/pkg/mod
      # and ~/.cache/go-build, not installed binaries). The pinned versions live
      # in backend/Makefile and the Go toolchain version — which `go install`
      # embeds in every binary, so a bump makes it reject and recompile the
      # cached tools — lives in backend/go.mod, so the key hashes both: a change
      # to either reseeds, otherwise a hit skips the compile. arch is in the key
      # so a binary built for one runner CPU is never restored onto another.
      - name: Cache the gate binaries
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/go/bin
          key: gate-binaries-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('backend/go.mod', 'backend/Makefile') }}
      # Install the pinned gate binaries (golangci-lint, go-arch-lint, oasdiff) so
      # `make check` runs golangci and the oasdiff contract gate itself — one run
      # of every gate, instead of the golangci-lint-action + per-gate steps that
      # `make check` then re-ran as its prerequisites. On a cache hit `go install
      # ...@version` finds each binary already current and skips the compile, so
      # the step is near-instant; the PATH export runs regardless.
      - name: Install the pinned gate binaries
        working-directory: .
        run: |
          make tools
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
      # The backend half of the merge gate in one pass:
      # check-craft-doc, image pins, contract-breaking, test-lanes, file-length,
      # RLS store-path, jurisdiction isolation, then the backend gate (build,
      # vet, lint, arch-lint, unit + fitness tests, contract drift). The frontend
      # half (`make check-fe`) is the separate `frontend` job — no toolchain
      # duplication. `make check` = check-backend + check-fe locally.
      - name: Backend merge gate (make check-backend)
        working-directory: .
        env:
          # In CI a missing base ref is a broken checkout, never a skip.
          CONTRACT_BREAKING_REQUIRE_BASE: "1"
        run: make check-backend

  # The code-craftsmanship gate (ADR-0045) runs only after the deterministic
  # gates are green — a red build must never be judged on style.
  craftsmanship:
    name: craftsmanship
    needs: [deterministic-gates, changes]
    if: needs.changes.outputs.backend == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: craft static (blocker-only)
        working-directory: .
        run: make craft-static

  # No unresolved review-loop markers (CRAFT-FIX / CRAFT-DISPUTE) reach main.
  craft-residue:
    name: craft-residue
    # Runs on every non-draft change (docs included) so a leaked
    # CRAFT-FIX/CRAFT-DISPUTE marker in any file fails the merge.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: craft residue
        working-directory: .
        run: make craft-residue

  integration:
    name: integration (RLS + erasure + HTTP e2e)
    # Runs in parallel with deterministic-gates, not behind it. The real-Postgres
    # lane is the longest job in the pipeline, so gating it on the build gate
    # serialized the two slowest jobs and dominated PR wall-clock. Starting both
    # at once trades a wasted lane on the rare broken-build PR for ~3 minutes off
    # every green one. Still backend-gated like deterministic-gates, so the two
    # skip together on non-backend PRs; a broken build is still caught, by
    # deterministic-gates itself, and sonarcloud gates the scan on that result
    # directly (below) so a red build never posts a green coverage check.
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
        env:
          POSTGRES_USER: margince_owner
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: margince
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U margince_owner"
          --health-interval 2s --health-timeout 5s --health-retries 15
      redis:
        image: redis:7@sha256:a8f08480e1f88f2647fed492d1178c06abb0d0c1fbf02c682a61e2f483fb3954
        ports:
          - 56379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s --health-timeout 5s --health-retries 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      # The margince_app role must exist cluster-wide before the lane migrates:
      # migration 0015 GRANTs to it, and the parallel lane's clones inherit those
      # grants. The lane itself is self-contained — it builds the migrated
      # margince_test template and clones per package — so no separate "apply
      # migrations to the shared DB" step is needed (the shared margince DB is
      # never touched by the parallel lane).
      - name: Create the non-owner app role
        run: psql "postgres://margince_owner:dev@localhost:55432/margince" -v ON_ERROR_STOP=1 -f ../scripts/db-init.sql
      # MinIO backs the blobstore integration lane. It cannot be a GH service
      # (the minio image needs a `server /data` command, which services can't
      # set), so it runs here; the digest matches the compose stack's pin.
      # The store creates its bucket and tolerates a
      # still-starting backend, so no explicit wait is needed.
      - name: Start MinIO (blobstore)
        run: |
          docker run -d --name minio -p 59000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e \
            server /data
      # The same lane, with coverage: COVER_OUT switches the parallel runner
      # into per-package covdata + a merged text profile. Uploaded as an
      # artifact the sonarcloud job consumes — so the scan is NOT a second
      # Postgres/Redis/MinIO stack running the whole lane a second time.
      - name: Integration lane (+ coverage)
        env:
          COVER_OUT: backend/coverage.out
        run: make test-integration
      - name: Upload Go coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: go-coverage
          path: backend/coverage.out
          if-no-files-found: ignore
          retention-days: 1

  vuln:
    name: govulncheck
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - run: make vuln

  # CI-based SonarCloud scan. Unlike Automatic Analysis, the scanner reads the
  # committed sonar-project.properties (exclusions + rule tuning + coverage
  # report paths), so that file is the single source of truth for analysis
  # scope — which is why we run the scan in CI rather than let the app analyze
  # blind. The scan step is guarded on the SONAR_TOKEN secret: with no token it
  # is a clean no-op (green). Once the secret is present (it is, added
  # 2026-07-06) the scan runs and posts the required "SonarCloud Code Analysis"
  # check. Disable Automatic Analysis in SonarCloud → project → Administration →
  # Analysis Method so the two do not compete (the CI scan is the source of
  # truth). This job is deliberately NOT gated by the `changes` path filter: the
  # "SonarCloud Code Analysis" context is a required check, so it must post on
  # every ready PR — a path-skipped job never reports and would block doc-only
  # PRs forever. It does NOT re-run the suites: it downloads the coverage
  # artifacts the integration (Go) and frontend (lcov) jobs already produced and
  # runs only the scanner, so there is no second Postgres/Redis/MinIO stack and
  # no duplicated test run.
  sonarcloud:
    name: sonarcloud (scan reads sonar-project.properties)
    # Runs LAST, after the jobs whose coverage it consumes. The condition admits
    # success OR skipped (not failure) for each, because the gates are
    # area-scoped: a frontend-only PR legitimately skips deterministic-gates +
    # integration (and a backend-only PR skips frontend) yet SonarCloud must
    # still post its required "SonarCloud Code Analysis" check. A skipped
    # upstream just means that area produced no coverage artifact — the scan
    # proceeds without it (that area has no new code to measure).
    #
    # deterministic-gates is gated directly, not just transitively. Now that
    # integration runs in parallel with the build gate rather than behind it, a
    # failed build no longer skips integration — it can still go green on its
    # own. Requiring deterministic-gates.result to be success-or-skipped here is
    # therefore what keeps the scan from posting a green "SonarCloud Code
    # Analysis" check over a broken build (result == 'failure' fails this
    # condition, so the scan is skipped); the PR is already red, so nothing that
    # wasn't already blocked is blocked.
    needs: [deterministic-gates, integration, frontend]
    if: >-
      !cancelled()
      && (needs.deterministic-gates.result == 'success' || needs.deterministic-gates.result == 'skipped')
      && (needs.integration.result == 'success' || needs.integration.result == 'skipped')
      && (needs.frontend.result == 'success' || needs.frontend.result == 'skipped')
      && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: https://sonarcloud.io
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          # Full history so SonarCloud can attribute blame / compute new code.
          fetch-depth: 0
      # Coverage the integration + frontend jobs already produced. Each download
      # is guarded on its producer having run (a skipped area uploaded nothing);
      # if-no-files-found tolerates the gap so the scan still posts. The paths
      # match sonar-project.properties (backend/coverage.out,
      # frontend/coverage/lcov.info).
      - name: Download Go coverage
        if: ${{ env.SONAR_TOKEN != '' && needs.integration.result == 'success' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: go-coverage
          path: backend
      - name: Download FE coverage
        if: ${{ env.SONAR_TOKEN != '' && needs.frontend.result == 'success' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: fe-coverage
          path: frontend/coverage
      - name: SonarCloud scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
      - name: No token yet — scan skipped
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "SONAR_TOKEN not set; skipping CI scan (Automatic Analysis still active). Add the secret to activate."

  # The README quickstart, run literally: compose up → migrate → api →
  # seed-dev → verify-boot. This is what keeps the compose file, the
  # API-driven seed, and the boot proof honest — the integration job's
  # GH service containers would stay green even if the compose stack or
  # the seed script rotted.
  live-boot:
    name: live-boot (compose + seed + verify)
    needs: [changes]
    if: needs.changes.outputs.e2e == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 11
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Boot the dev stack and migrate
        run: make db-up && make migrate
      # The deployment configuration (A107/ADR-0061): the api bootstraps the
      # demo organization itself at boot; the credentials match seed-dev.sh's
      # demo defaults (admin@demo.test / demo-password-123 — throwaway CI-only
      # values, same posture as the compose stack's dev DSNs).
      - name: Write the deployment configuration
        run: |
          printf '%s' "demo-password-123" > "$RUNNER_TEMP/admin-password"
          chmod 600 "$RUNNER_TEMP/admin-password"
          cat > "$RUNNER_TEMP/margince.yaml" <<EOF
          version: 1
          organization:
            name: Demo Workspace
            base_currency: EUR
            timezone: Europe/Berlin
          bootstrap_admin:
            email: admin@demo.test
            display_name: Demo Admin
            password_file: $RUNNER_TEMP/admin-password
          EOF
      - name: Start the api
        working-directory: backend
        env:
          MARGINCE_ENV: dev
        run: |
          go run ./cmd/api --dsn "postgres://margince_app:margince_app_dev@localhost:55432/margince" \
            --config "$RUNNER_TEMP/margince.yaml" \
            > "$RUNNER_TEMP/api.log" 2>&1 &
          for _ in $(seq 1 60); do
            curl -fsS http://localhost:8080/readyz >/dev/null 2>&1 && exit 0
            sleep 1
          done
          echo "api never became ready" >&2
          cat "$RUNNER_TEMP/api.log" >&2
          exit 1
      - name: Seed the demo workspace
        run: make seed-dev
      - name: Verify boot
        run: make verify-boot
      - name: API log (on failure)
        if: failure()
        run: cat "$RUNNER_TEMP/api.log" || true

  # The frontend lane: Biome, Vitest, TypeScript, and the Vite production
  # build. The root Makefile promises CI runs both lanes; this is that lane.
  frontend:
    name: frontend (biome + vitest + tsc + build)
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 11
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: make frontend-check
      # Emit lcov from the same suite so the sonarcloud job consumes it as an
      # artifact instead of re-installing + re-running vitest itself.
      - name: Frontend coverage (lcov)
        working-directory: frontend
        run: pnpm exec vitest run --coverage.enabled --coverage.provider=v8 --coverage.reporter=lcov
      - name: Upload FE coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fe-coverage
          path: frontend/coverage/lcov.info
          if-no-files-found: ignore
          retention-days: 1
      # The Storybook catalog must build — a story that fails to compile or
      # register is caught deterministically here. The change-scoped render
      # capture (make fe-uat) stays a coordinator lane, not a required gate.
      - name: Storybook builds (stories compile + register)
        working-directory: frontend
        run: pnpm build-storybook

  # The UAT lane: the AC-<screen>-N screen-acceptance criteria as named
  # Playwright tests, plus the axe WCAG 2.2 AA gate, the 390px
  # no-horizontal-scroll sweep, and the PERF-1 record-open budget. The suite
  # mocks the API at the network edge (the coherent seed fixture), so it is
  # self-contained — no backend needed — and a UI regression that breaks a
  # named acceptance criterion fails the merge instead of shipping.
  uat:
    name: uat (AC screens + axe WCAG 2.2 AA + 390px, mocked)
    # Fail fast: the Playwright UAT lane only starts once the cheaper frontend
    # gate (biome + vitest + tsc + build) is green; both are frontend-gated, so
    # they skip together on non-frontend PRs.
    needs: [changes, frontend]
    if: needs.changes.outputs.frontend == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 11
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install deps and the Playwright Chromium browser
        working-directory: frontend
        # --ignore-scripts (githubactions:S6505): no lifecycle scripts run at
        # install; esbuild ships prebuilt platform binaries as optional deps.
        run: |
          pnpm install --frozen-lockfile --ignore-scripts
          pnpm exec playwright install --with-deps chromium
      - name: Screen-acceptance UAT (build → preview → AC + axe)
        run: make frontend-e2e
