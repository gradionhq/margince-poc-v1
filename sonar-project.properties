# SonarCloud analysis scope (project gradionhq_margince-poc-v1).
# Read by the CI-based scan (the `sonarcloud` job in .github/workflows/ci.yml),
# NOT by Automatic Analysis — disable Automatic Analysis in the dashboard
# (project → Administration → Analysis Method) so the two do not compete. The
# CI scan is chosen over the app because only it reads THIS file: the scanner
# honors these exclusions/rule tuning AND is handed real coverage reports the
# app cannot produce (Automatic Analysis runs no tests → a false 0%). This
# narrows the quality signal to hand-written product code — not generated
# files, append-only DDL, vendored tooling, or test scaffolding.
sonar.projectKey=gradionhq_margince-poc-v1
sonar.organization=gradion

# --- Exclusions: never analyze code we do not hand-write / do not own ---
#   internal/contracts/**   OpenAPI-generated types + server interface (make gen)
#   **/*_gen.go             gen-stubs / gen-agentpolicy output — drift gate fails a hand edit
#   backend/migrations/**   append-only historical DDL (ADR-0017)
#   cli/craft/**            foundation craftsmanship gate, vendored + hash-pinned (craft-drift)
#   .claude/**              Claude Code hooks/config/agents — not product
#   backend/tools/gen-evals/**  eval fixture data — literals read better than constants
#   backend/web/static/**   legacy embedded SPA, being replaced by frontend/
#   dev/**                  local-dev scripts + throwaway creds (clears the dev.sh secrets:S6698)
#   frontend/src/api/schema.d.ts  openapi-typescript output (pnpm gen:api)
#   frontend/.storybook/**  Storybook config — build tooling, not product
#   frontend/scripts/**     fe-uat capture gate + harness (.mjs build tooling)
#   .gitguardian.yaml / .coderabbit.yaml  tool config; .gitguardian.yaml carries
#                           the throwaway dev-password literal by design (it is
#                           the ignore rule), which the secret scanner would
#                           otherwise flag as a vulnerability (E security rating)
sonar.exclusions=\
  backend/internal/contracts/**,\
  **/*_gen.go,\
  backend/migrations/**,\
  cli/craft/**,\
  .claude/**,\
  backend/tools/gen-evals/**,\
  backend/web/static/**,\
  dev/**,\
  .gitguardian.yaml,\
  .coderabbit.yaml,\
  frontend/.storybook/**,\
  frontend/scripts/**,\
  frontend/src/api/schema.d.ts

# --- Test code: measured for issues, exempt from coverage/duplication metrics ---
sonar.test.inclusions=\
  **/*_test.go,\
  backend/internal/compose/integration/**,\
  frontend/src/**/*.test.ts,\
  frontend/src/**/*.test.tsx,\
  frontend/e2e/**

# --- Coverage: reports produced by the CI sonarcloud job before the scan.
# Go: `go test -coverpkg=./... -coverprofile=backend/coverage.out` over the
# unit + integration lanes. FE: vitest v8 --coverage.reporter=lcov. Without
# these paths the scan reports a false 0% new-code coverage and the quality
# gate fails.
sonar.go.coverage.reportPaths=backend/coverage.out
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# --- Copy-paste detection: the two i18n catalogs mirror each other's key
# structure BY DESIGN (exact parity is compile- and test-enforced), so CPD
# cross-matches them wholesale. Parallel translations are not duplication.
sonar.cpd.exclusions=\
  frontend/src/i18n/en.ts,\
  frontend/src/i18n/de.ts

# Entry points and build config have no meaningful unit-test surface;
# *.stories.tsx are the design-system catalog fixtures the fe-uat gate renders,
# not unit-tested product code.
sonar.coverage.exclusions=\
  backend/cmd/**,\
  frontend/src/main.tsx,\
  frontend/vite.config.ts,\
  frontend/playwright.config.ts,\
  frontend/src/**/*.stories.tsx

# --- Targeted rule tuning (files stay analyzed for every other rule) ---
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7
# Cognitive Complexity (go:S3776) fires on table-driven test harnesses whose
# structure is intentional and read as a spec; keep it enforced on production
# code, drop it for tests.
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go
# Same rationale for the TS side: complexity in the e2e seed/mock harness is
# intentional test scaffolding, not shippable code.
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.e2.resourceKey=frontend/e2e/**
# The CI workflow's service DSNs carry the throwaway localhost dev
# password the job-scoped Postgres container is booted with (same
# literal the services block itself declares) — runner-local, dies with
# the job, never a real credential. Same rationale as the dev/** scope.
sonar.issue.ignore.multicriteria.e3.ruleKey=secrets:S6698
sonar.issue.ignore.multicriteria.e3.resourceKey=.github/workflows/**
# scripts/uat-env.sh's default DSNs carry the same throwaway localhost dev
# password (margince_app_dev) the compose stack declares — a shared dev
# default, overridable via OWNER_DSN/APP_DSN, never a real credential.
sonar.issue.ignore.multicriteria.e4.ruleKey=secrets:S6698
sonar.issue.ignore.multicriteria.e4.resourceKey=scripts/uat-env.sh
# scripts/lib-testdb.sh's default DSNs carry the same throwaway localhost dev
# password (margince_app_dev) as the compose stack + uat-env.sh — a shared dev
# default, overridable via MARGINCE_TEST_DSN/MARGINCE_TEST_APP_DSN, never a real
# credential. It is the fallback for standalone runs; make always sets the env.
sonar.issue.ignore.multicriteria.e5.ruleKey=secrets:S6698
sonar.issue.ignore.multicriteria.e5.resourceKey=scripts/lib-testdb.sh
# The pnpm package install is pinned with --ignore-scripts; the only remaining
# S6505 match in the workflow is `pnpm exec playwright install --with-deps`,
# Playwright's own first-party browser + system-deps installer. It has no
# --ignore-scripts option and is not an npm-lifecycle-script vector — a false
# positive for this rule.
sonar.issue.ignore.multicriteria.e6.ruleKey=githubactions:S6505
sonar.issue.ignore.multicriteria.e6.resourceKey=.github/workflows/ci.yml
# shelldre:S7682 wants an explicit `return` at the end of every function. The
# test-db shell helpers deliberately propagate their last command's exit status
# (make_clone/build_template/pg_admin are relied on under `set -e`); forcing an
# explicit `return 0` would mask a failed CREATE/DROP DATABASE. Style rule, unsafe
# here — waived for the tooling scripts only.
sonar.issue.ignore.multicriteria.e7.ruleKey=shelldre:S7682
sonar.issue.ignore.multicriteria.e7.resourceKey=scripts/**
